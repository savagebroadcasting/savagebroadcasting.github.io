 employee Mrs."], [1783365335, 1783366632, "The Goldbergs (2013)", "The Most Handsome Boy on the Planet", "S2 E9", "Barry is excited when a modelling representative approaches him, but Erica thinks it's a scam."], [1783366632, 1783367942, "Schitt's Creek", "Rooms by the Hour", "S3 E5", "Johnny puts the motel in jeopardy when he rents rooms to a dubious enterprise and David helps Moira with a film audition."], [1783367942, 1783369251, "Schitt's Creek", "Murder Mystery", "S3 E6", "Johnny and Stevie visit a nearby golf course to pitch a package deal with the motel, but Johnny becomes distracted by his desire to play a round of golf. After agreeing to attend Twyla's murder mystery party, Moira must help her recruit other guests. Alexis entertains a suggestion from Ted to go back to school."], [1783369251, 1783370550, "Raising Hope", "Bro-gurt", "S2 E8", "Virginia encourages the family to submit their own inventions in the National Invention Convention Extravaganza, so they could win the cash prize. Burt and Andrew team up to create unusual flavored yogurt, while Sabrina and Jimmy create a new baby mop."], [1783370550, 1783371848, "Raising Hope", "The Men of New Natesville", "S2 E9", "After being encouraged to be more of a daredevil by Burt, Jimmy jumps at the chance of showing off his bolder side at a party at Frank's house. Frank and Jimmy realize they have shared a common high school bully, and when they try to take him down, they realize their old bully has changed."], [1783371848, 1783373145, "The Goldbergs (2013)", "DannyDonnieJoeJonJordan", "S2 E10", "Beverly is ordered to clean out the garage by Murray, who wants everything gone except for one trunk that he allows her to keep. Meanwhile, Adam and Barry discover Erica's old collection of New Kids on the Block memorabilia."], [1783373145, 1783374434, "The Goldbergs (2013)", "The Darryl Dawkins Dance", "S2 E11", "As the Sadie Hawkins dance approaches, Erica asks Beverly to help her find Barry a date to keep him away from Lainey. But Beverly comes up with a girl that shocks everyone. Meanwhile, Adam gets into a fight with his best friend...Pops."], [1783374434, 1783375743, "Schitt's Creek", "General Store", "S3 E7", "When David contemplates starting a new business in town, Moira uses her seat on town council to protect her son's interests. Alexis discovers high school isn't as easy as it used to be. Johnny reluctantly offers romantic advice to Ivan, the hapless baker, in return for help with the motel's continental breakfast."], [1783375743, 1783377053, "Schitt's Creek", "Motel Review", "S3 E8", "David meets a new friend while setting up his business, Johnny defends Alexis’s schoolwork, and Moira deals with a difficult guest at the motel."], [1783377053, 1783378356, "Raising Hope", "It's a Hopeful Life", "S2 E10", "In this \"It's a Wonderful Life\" themed episode, Jimmy is transported into a cinematic dreamlike state and watches on at a world where he never met Lucy. When he returns to reality he realizes that if Hope had never been born, his life wouldn't be as good. Meanwhile, Virginia, Burt and Maw Maw see a movie that bares a striking resemblance to their day-to-day lives."], [1783378356, 1783379658, "Raising Hope", "Mrs. Smartypants", "S2 E11", "When Hope shows signs of being a baby genius, the family pits themselves against one another to earn their GEDs. While attempting to secure his GED, Jimmy finds out that his old high school teacher, Mr. Swift, is teaching the class."], [1783379658, 1783380950, "The Goldbergs (2013)", "Cowboy Country", "S2 E12", "Beverly can't accept Adam has deep feelings for Dana. Murray watches football with Lainey's dad."], [1783380950, 1783382246, "The Goldbergs (2013)", "Van People", "S2 E13", "When Murray takes Erica's car privileges away, Erica and Barry retaliate by buying their own shabby used black van. Meanwhile, Adam gets voted in the yearbook as \"nicest guy,\" which results in a suspension when he objects."], [1783382246, 1783383556, "Schitt's Creek", "The Affair", "S3 E9", "Moira and Roland find themselves in a compromising situation. Alexis drives a wedge between David and Patrick."], [1783383556, 1783384865, "Schitt's Creek", "Sebastien Raine", "S3 E10", "David’s photographer ex-boyfriend arrives in town to do a photo series on Moira. Johnny and Roland suspect that Bob is cheating at poker."], [1783384865, 1783386167, "Raising Hope", "Gambling Again", "S2 E12", "When Burt starts gambling again to try and win back the items he lost 20 years ago, Jimmy and Virginia get addicted to gambling themselves, which causes them to forget about Shelley's play that Sabrina wrote and Hope stars in."], [1783386167, 1783387470, "Raising Hope", "Tarot Cards", "S2 E13", "Burt hires Barney to help him with his receipts during corporate tax season, and while caught up in the stress Burt accidentally makes a mean comment about Virginia's job, so she decides to change careers and become a tarot card reader. Meanwhile, Sabrina contemplates moving to Africa with Wyatt, upsetting Jimmy."], [1783387470, 1783388769, "The Goldbergs (2013)", "Barry Goldberg's Day Off", "S2 E14", "Barry pretends to be sick so he can have an epic day off -- but things don't go as planned. Pops and Adam try to help salvage Barry's day."], [1783388769, 1783390066, "The Goldbergs (2013)", "Happy Mom, Happy Life", "S2 E15", "Dana and Adam are given a doll to parent for a school project, but end up in jeopardy of failing because of Beverly's \"grand-smothering.\" Meanwhile, Erica tries to get back at Barry for monopolizing her best friend's time by joining the JTP, however her plan doesn't go as expected."], [1783390066, 1783391376, "Schitt's Creek", "Stop Saying Lice!", "S3 E11", "Johnny tries to avoid the spread of lice in the motel. Moira tries to get out of having a flower garden named after her."], [1783391376, 1783392685, "Schitt's Creek", "Friends and Family", "S3 E12", "Johnny and Moira struggle to find a place for their family portrait. David hosts a 'soft launch' of his new store."], [1783392685, 1783393975, "Raising Hope", "Jimmy's Fake Girlfriend", "S2 E14", "Bored and increasingly desperate for a distraction even they can afford, Burt and Virginia try out various hobbies, until they agree improvisation acting fits them scoundrels. Jimmy feels Sabrina a lost cause after her engagement with Wyatt."], [1783393975, 1783395276, "Raising Hope", "Sheer Madness", "S2 E15", "Jimmy and Sabrina continue building their relationship by learning more about their strange habits and childhood fears. Meanwhile, Virginia learns more about a habit Burt has been hiding from her for years."], [1783395276, 1783396571, "The Goldbergs (2013)", "The Lost Boy", "S2 E16", "Adam attends a Phillies game with his dad and ends up lost in the stadium after Murray allows him to leave his seat on his own. Elsewhere, Beverly's guilt trip backfires when Erica and Barry drive off without her during an argument on their way home from the mall."], [1783396571, 1783397862, "The Goldbergs (2013)", "The Adam Bomb", "S2 E17", "Adam and Barry get in a prank war, while Erica tries to become a pop star."], [1783397862, 1783399172, "Schitt's Creek", "Grad Night", "S3 E13", "Johnny and Stevie celebrate having a fully booked hotel; David and Patrick go on a date."], [1783399172, 1783400481, "Schitt's Creek", "Dead Guy in Room 4", "S4 E1", "While Moira fears she is responsible for the death of a motel guest, David and Patrick decide to make their budding romance official."], [1783400481, 1783401784, "Raising Hope", "Single White Female Role Model", "S2 E16", "Sabrina is arrested at a protest for civil disobedience, but her two-week sentence in jail is made even worse by a prison attendant who claims that they're old friends. Meanwhile, Virginia saves the Natesville mayor from a public scandal, but Jimmy's political encounter could threaten Sabrina's freedom."]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783305162, 1783307821, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783307821, 1783310415, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783310415, 1783313009, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783313009, 1783315623, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783315623, 1783318229, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783318229, 1783320839, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783320839, 1783323428, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783323428, 1783326071, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783326071, 1783328660, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783328660, 1783331293, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783331293, 1783333848, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783333848, 1783336487, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783336487, 1783339243, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783339243, 1783341947, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783341947, 1783344637, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783344637, 1783347276, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783347276, 1783350269, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783350269, 1783352909, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783352909, 1783355549, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783355549, 1783358189, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783358189, 1783360302, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783360302, 1783363190, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783363190, 1783365849, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whet ife forever."], [1783394515, 1783397270, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783397270, 1783399974, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783399974, 1783402665, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."]]}, {"id": "70", "name": "Groovy TV", "a": "groovy-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/groovy-v2.png", "progs": [[1783303968, 1783307930, "Saturday Night Live", "Madeline Kahn with Carly Simon", "S1 E19", "Live from New York, it's Chevy Chase!   Sketches are \"Ronald Reagan's Jam Session,\" Not for Ladies Only, Wilderness Comedian, \"Slumber Party,\" Bride of Frankenstein, \"Fondue Pots for Namibia,\" \"The Muppets Can Reunite the Beatles,\" New York's My Home (film), \"Super Absordent Dry Hose,\" and \"The Final Days.\" Carly Simon performs You're So Vain."], [1783307930, 1783311921, "Saturday Night Live", "Dyan Cannon with Leon & Mary Russell", "S1 E20", "Live from New York, It's...Chevy Chase\n\nSketches include--Chevy has to do the fall again, \"Hearing Test,\" \"The Adulterer,\" \"Vacationland Adventure\", \"Minister with Hiccups,\" \"Dyan Cannon's Dream,\" \"Orange Juice,\" \"The Bathwater of The Stars\", \"Johnny Angel\", \"Cresk Toothpaste,\"\" and \"The Hubcap Thief\" (film).  Leon Russell and Joe Cocker (Belushi) perform \"Daylight\"."], [1783311921, 1783313267, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783313267, 1783314613, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783314613, 1783318627, "Saturday Night Live", "Buck Henry with Gordon Lightfoot", "S1 E21", "Live from New York, It's...Chevy Chase\n\nSketches include--Emmy winner Chevy tries to get Laraine todo the fall, Samurai Tailor, \"Talk Back!\", \"Dell Stator's Toad Ranch Resturaunt\", \"Looks at Books\", The Crowd Audition, Peter Lemon Moodring, \"Not For Ladies Only\", Lorne Micheals offer to the Beatles."], [1783318627, 1783322592, "Saturday Night Live", "Elliott Gould with Leon Redbone and Harlan Collins & Joyce Everson", "S1 E22", "Sketches include \"Wax Museum,\" \"Phone Operator Academy,\" \"European Poker Player,\" \"Babs's Uvula,\" \"The Last Voyage of the Starship Enterprise,\" \"The Bee Honeymooners,\" \"Shirley Temple Black,\" \"Vibramatic,\" \"Uncle Charlie's School,\" and \"Show Us Your Guns.\"\n\nLeon Redbone performed \"Shine On Harvest Moon.\""], [1783322592, 1783323942, "That '70s Show", "Grandma's Dead", "S1 E23", "Red's mother Bernice has once again managed to make everyone miserable during one of her visits.  While driving his grandmother home, Eric lashes out and tells her that it wouldn't kill her to be nice once in a while.  Bernice promptly drops dead, leaving Eric to think he killed her.  The entire Forman family (including Laurie and Red's brother Marty) comes together for her funeral while Eric gets"], [1783323942, 1783325288, "That '70s Show", "Hyde Moves In", "S1 E24", "The gang goes skinny-dipping and Jackie gets sick. Hyde moves in with the Formans when his mom runs away with a trucker. Bob takes a liking to one of Midge's feminist friends."], [1783325288, 1783329288, "Saturday Night Live", "Louise Lasser with the Preservation Hall Jazz Band", "S1 E23", "Live from New York, It's...Chevy Chase\n\nSketches include--Belushi thinks Chevy has a big head, Louise Lasser locks herself dressing room, General \"V.D\" Amin, Sven and Inger, John Belushi tries to sell his clothes, Ode to Television, Louise apologizes to her dog, Jimmy Carter talks about the campagin."], [1783329288, 1783333281, "Saturday Night Live", "Kris Kristofferson with Rita Coolidge", "S1 E24", "Live from New York, It's...Chevy Chase\n\nSketches include--Kristofferson signs \"Help Me Make it Through The Night\", new SNL employer Sherry, Samurai General Practitioner, the Great White Athelete, Gerald Ford dosent want to talk about local issues, \"Talk Country\", My Blind Date is My Gynocologist, Andrew Young is a Suckup, Police State, \"Waiting For Don Pardo\"."], [1783333281, 1783334627, "That '70s Show", "The Good Son", "S1 E25", "Eric loves having Hyde as a \"brother\" because he does all of Eric's chores but when his parents start to prefer Hyde he starts to hate him. Hyde changes from the conspiracy minded trouble-making guy Eric loves to a total bore. Midge and Bob are having relationship problems. Red's old war buddy comes back and Red finds out that he's a swinger."], [1783334627, 1783335711, "That '70s Show", "Episode 26", "S1 E26", "Groovy TV"], [1783335711, 1783337037, "That '70s Show", "Garage Sale", "S2 E1", "The Formans have a garage sale to earn some extra cash. Hyde doesn't have anything to sell, so he bakes \"special brownies\" to sell; Kitty, Red, Bob and Midge eat some of the brownies unsuspectingly. Fez kisses Jackie who tells Donna it's the best kiss she's ever had. (#26)"], [1783337037, 1783338363, "That '70s Show", "Red's Last Day", "S2 E2", "It's Red's last day of work, and he decides to drown his unemployment sorrows at a bar.  Kitty sends Eric to pick Red up; he, Hyde and Fez end up drinking with Red instead, leaving none of them in any condition to drive.  Kelso gets a van, and christens it the \"shaggin' wagon.\""], [1783338363, 1783339690, "That '70s Show", "The Velvet Rope", "S2 E3", "Now that he's unemployed, the job hunt is on for Red.  The gang decides to go to a dance club, and Jackie manages to convince Kelso that dressing like David Bowie is a good idea.  Once at the club, Donna, Fez and Hyde have no problem getting in, but Eric can't make it past the overly large bouncer."], [1783339690, 1783341017, "That '70s Show", "Laurie and the Professor", "S2 E4", "Bob and Midge's marital troubles spill over into a fight over Donna's affection.  One of Laurie's college professors comes to Point Place to see if he can convince Laurie to return to classes, and he takes a 'hands-on' approach to the task, much to Eric's shock.  Fez looks for a woman, and Hyde looks for a room to sleep in."], [1783341017, 1783342344, "That '70s Show", "Halloween", "S2 E5", "The gang, looking for something fun to do on Halloween, revisits their old grammar school, where they find their permanent records. Looking through them, they find out some interesting things about each other. Fez discovers trick or treating."], [1783342344, 1783343670, "That '70s Show", "Vanstock", "S2 E6", "Eric, Donna, Kelso, Hyde and Fez are all going to Vanstock, Wisconsin's own Woodstock. Jackie says she doesn't want to go, so Kelso invites Laurie. In the end, both girls go leaving Kelso stuck in the middle. Donna gets mad at Eric for not telling her about Kelso and Laurie. Fez spends the night girl chatting to Jackie and Laurie, much to Kelso's chagrin while Hyde attempts drop him in it. Red bec"], [1783343670, 1783344996, "That '70s Show", "I Love Cake", "S2 E7", "Eric freaks out when Donna says 'I love you,' and all he can think of to say in return is 'I love cake.'  Donna, not knowing how to deal with this, turns to Jackie for relationship advice.  Midge kicks Bob out of the house; he stays with the Formans and Red has to act as a go-between to try to mend their marriage.  Kelso gets a new leather jacket that he thinks makes him look like Marlon Brando, b"], [1783344996, 1783346332, "That '70s Show", "Sleepover", "S2 E8", "Donna finally sleeps with Eric, but when the guys find out that all they did was sleep, they tease him mercilessly.  Hyde gets a job at the FotoHut, and finds out that compared to his boss, he's a workaholic.  And Kitty has to work double shifts at the hospital, leaving Red to do the cooking."], [1783346332, 1783347659, "That '70s Show", "Eric Gets Suspended", "S2 E9", "Donna is acting out over her parents' break up and takes up smoking. Eric gets caught holding one of her cigarettes in the school yard and is suspended. Even though Eric tries explaining what really happened, Red punishes him. Fez and Hyde go on a double date, set up by Fez's host parents; Hyde can't decide which girl he likes better. Jackie and Kelso argue over how many stuffed animals she can ha"], [1783347659, 1783348985, "That '70s Show", "Red's Birthday", "S2 E10", "It's Red's birthday and the roof collapses so Eric gets him some 2 x 4s to fix it. Bob and Midge take Red and Kitty out for dinner but they each bring a date and ditch them to do it in the car. Eric is mad at Donna for talking to Hyde about her parent's problems instead of talking to him."], [1783348985, 1783350309, "That '70s Show", "Laurie Moves Out", "S2 E11", "Laurie moves out and Red is annoyed when he finds out she moved in with a guy instead of with a girlfriend like she told him. She then moves back in when the guy goes back to his wife. Jackie suspects Kelso of being unfaithful."], [1783350309, 1783351635, "That '70s Show", "Eric's Stash", "S2 E12", "Eric's secret stash of money goes missing, and Hyde is the first and only suspect.  Hyde denies taking it, and everyone is shocked when the real culprit is revealed.  Fez and Kelso help Jackie prepare for a beauty pageant."], [1783351635, 1783352961, "That '70s Show", "Hunting", "S2 E13", "Red and Bob take the guys deer hunting; Hyde chills out, Fez bags dinner using only a few primitive weapons, Kelso is a menace with his gun, and Red and Eric bond in the deer blind. Meanwhile, Kitty and Midge have a girls' night with Donna, Jackie and Laurie, but with nothing to talk about, the end up playing poker."], [1783352961, 1783354288, "That '70s Show", "Red's New Job", "S2 E14", "Eric gets a job at Price Mart as a cashier while Red gets one as a supervisor. Kelso tries to break up with Laurie because she wants a real relationship but Laurie threatens to tell Jackie about her and Kelso."], [1783354288, 1783355614, "That '70s Show", "Burning Down the House", "S2 E15", "With her parents away, Jackie plans on throwing a small, classy dinner party.  Kelso tries to turn it into a fun party, and invites everyone he knows; Jackie is upset, and when Kelso tries to fix things, he only ends up making them worse.  Hyde makes it with a snobby girl from school, but the guys don't believe him.  Red finds out that Bob wears a toupee, and then has to spend an uncomfortable eve"], [1783355614, 1783356940, "That '70s Show", "The First Time", "S2 E16", "Bob and Midge are getting ready to renew their vows. Kitty is upset because her close friend Midge didn't ask her as a bridesmaid while Red is Bob's best man. Eric and Donna have sex for the first time."], [1783356940, 1783358267, "That '70s Show", "Afterglow", "S2 E17", "Contrary to what she tells Eric, Donna's review of their first sexual encounter is not good--or private; Red celebrates his first paycheck and buys a motorcycle."], [1783358267, 1783359593, "That '70s Show", "Kitty and Eric's Night Out", "S2 E18", "Eric is forced to go on a date with his mom. He is embarrassed seeing sex and drugs with his mom. But he warms up to it. Fez gets a cute new girlfriend. Jackie has to admit that she is jealous and has feelings for Fez."], [1783359593, 1783360920, "That '70s Show", "Parents Find Out", "S2 E19", "Kitty is devastated after the police catch Donna and Eric having sex in the Vista Cruiser."], [1783360920, 1783362247, "That '70s Show", "Kiss of Death", "S2 E20", "Eric lies after accidentally running over Donna's cat; Laurie sets Kelso up for a fall; Fez sees \"Fez's Angels\" while under anesthesia to have his appendix removed."], [1783362247, 1783363574, "That '70s Show", "Kelso's Serenade", "S2 E21", "Kelso wants to win Jackie back by writing her a song, while Jackie turns to the unlikeliest person for comfort. Meanwhile, Red, Kitty and Laurie visit bitter Aunt Pearl (Connie Sawyer) in a retirement home, and Eric and Donna get into communication problems."], [1783363574, 1783364900, "That '70s Show", "Jackie Moves On", "S2 E22", "Fez finally has a date with Jackie, but not the same Jackie he's coveted; Eric and Laurie have a war of embarrassing secrets; and Kitty reveals her secret about Red's mother's necklace."], [1783364900, 1783366226, "That '70s Show", "Holy Crap!", "S2 E23", "Kitty calls on a divine power, of sorts, when Eric and Laurie forsake going to church; Kelso's budding beard stirs Jackie."], [1783366226, 1783367553, "That '70s Show", "Red Fired Up", "S2 E24", "Eric appreciates another employee who draws Red's ire away from himself; Kelso and Laurie date openly, and receive separate cautions from Hyde and Kitty."], [1783367553, 1783368880, "That '70s Show", "Cat Fight Club", "S2 E25", "Hyde helps Jackie take a Zen approach to Kelso and Laurie, who introduce their relationship to Red at the Forman dinner table."], [1783368880, 1783370207, "That '70s Show", "Moon Over Point Place", "S2 E26", "Donna moons in a yearbook picture; Jackie claims Hyde as her new best friend; Kitty \"clears the air\" about Eric and Donna having sex."], [1783370207, 1783371533, "That '70s Show", "Reefer Madness", "S3 E1", "Hyde returns from jail only to find Red beyond furious and ready to kick him out of the house. Afraid that he'll turn the other kids into dope fiends, Red asks Eric if Hyde has ever pressured him to do drugs in the past. Eric wonders if he should confess the truth to Red in order to keep him from forcing Hyde out. Elsewhere, Leo visits the Formans to speak on Steven's behalf while Donna uncovers t"], [1783371533, 1783372850, "That '70s Show", "Red Sees Red", "S3 E2", "As punishment for being \"dope-heads\", Red gives Eric and Hyde a curfew.  Laurie is all for it until she discovers that it applies to her too.  Red booby-traps the house so that he'll know if there are any escape attempts, and keeps increasing the discipline, despite Kitty's pleas for leniency.  Jackie is still trying to convince Hyde that she's the woman for him, but he's not buying it."], [1783372850, 1783374180, "That '70s Show", "Hyde's Father", "S3 E3", "The guys get into a bar without showing their fake IDs only to learn that the bartender is none other than Hyde's father, Bud.  Kitty finds out about this and, against Hyde's wishes and Red's advice, invites Bud over in an attempt to set things right between father and son.  Meanwhile, Donna is disgusted when she finds out that Eric keeps dirty magazines under his bed.  And Fez tries to woo Donna "], [1783374180, 1783375496, "That '70s Show", "Too Old to Trick or Treat, Too Young to Die", "S3 E4", "A Halloween episode filled with parodies of Alfred Hitchcock movies: \"Rear Window\", \"Vertigo\", \"The Birds\", \"North By Northwest\" and \"Psycho\"."], [1783375496, 1783376823, "That '70s Show", "Roller Disco", "S3 E5", "Jackie has wonderful news: there's a roller disco competition in Kenosha and she wants Hyde to be her partner.  When she finds that he's more than unwilling, she's left with a choice between Kelso and Fez, and after seeing their moves, she chooses Fez.  This leaves Kelso less than happy, and more than a little jealous.  Red, meanwhile, is being sued by an ex-Price Mart employee for wrongful termin"], [1783376823, 1783378150, "That '70s Show", "Eric's Panties", "S3 E6", "Donna finds a pair of panties in the Vista Cruiser and thinks that Eric is cheating on her with his lab partner.  Everyone is in for a big shock when they find out who the panties really belong to.  Red's doctor's appointment shows that he has high blood pressure, so Kitty puts him on a strict diet, which he finds inedible.  Kelso gains a new nickname due to a mishap in the cafeteria."], [1783378150, 1783379476, "That '70s Show", "Baby Fever", "S3 E7", "Red is not happy when Kitty becomes obsessed with the idea of having another baby after bringing a friend's child home for Laurie to baby-sit.  Laurie is completely at a loss on how to take care of a baby until her maternal instincts eventually kick in.  Donna gets mad at Eric for thinking that she'll stay home with the children when they have their own.  And Hyde and Fez mediate a mock divorce se"], [1783379476, 1783380803, "That '70s Show", "Jackie Bags Hyde", "S3 E8", "It's Veteran's Day and the Formans are getting ready for their annual barbeque after the town parade. Trouble is that Bob, who was only in the National Guard and never saw any action, has inexplicably decided to throw his own barbeque in competition with the Formans. Hyde tells Jackie point blank that he's not interested, inspiring her to bring a date to the Formans' to make him jealous. This ploy"], [1783380803, 1783382129, "That '70s Show", "Hyde's Christmas Rager", "S3 E9", "Living with Bud has some definite benefits; Hyde finds this out when he's having his first Christmas party at Bud's place, and Bud leaves the guys alone with a keg of beer.  Eric suffers the consequences of being bad at quarters, and has to be carried home, where Red and Kitty decide that Bud needs a talking to about proper parenting practices.  Meanwhile, Jackie is desperate for a boyfriend, and "], [1783382129, 1783383456, "That '70s Show", "Ice Shack", "S3 E10", "In order to win Jackie back, Kelso has a master plan: He wants to take Eric, Donna and Jackie to his uncle's ice shack and copy all the sweet things Eric does for Donna. However, Fez knows about the plan and comes along as well. At the shack Fez and Kelso both try to get Jackie. Meanwhile Kitty tells Red to talk to Laurie about her future and Hyde drives Leo and a bag which, according to Leo, cont"], [1783383456, 1783384782, "That '70s Show", "Who Wants It More", "S3 E11", "After an argument, Eric and Donna decide to withhold sex to see who'll cave in first. Red is nearly killed by a falling tree and it changes his whole outlook on life. He starts being nice to people, even Fez, but he soon realizes that that's not who he is. Kelso claims to have seen a UFO."], [1783384782, 1783386110, "That '70s Show", "Fez Gets a Girl", "S3 E12", "Fez has a crush on a girl but is too shy to approach her, so Donna sets them up together. Donna wins two tickets to see Led Zeppelin in concert but Eric can't go because he has to work so she gives one to Fez and the other to Caroline, the girl that Fez has a crush on, because Kelso, Hyde and Jackie keep fighting over who she's going to take. Eric is named Price Mart employee of the month and it g"], [1783386110, 1783387436, "That '70s Show", "Dine & Dash", "S3 E13", "Kelso invites the gang to an expensive dinner but skips on the bill, leaving Eric and Donna in the restaurant with no money. The two of them decide to shed their \"square\" personalities and get back at the gang. Bob is upset that Red didn't offer him a job at Price Mart."], [1783387436, 1783388764, "That '70s Show", "Radio Daze", "S3 E14", "Donna gets a job at a radio station and Eric gets jealous because on the air she's known as Hot Donna and supposedly single. Red gets Earl fired from Fatso Burger but Kitty makes him get Earl his job back. Leo wants to sell his car to Kelso but then changes his mind and gives it to Hyde."], [1783388764, 1783390091, "That '70s Show", "Donna's Panties", "S3 E15", "Eric pulls Donna's pants down in public and reveals her granny panties to everyone.  So he tries to make up by giving her sexy panties on Valentine's Day. When Kelso finds out that Laurie cheated on him he realizes how Jackie must have felt when he cheated on her with Laurie; to Jackie's surprise he doesn't want her to feel sorry for him. Fez asks Caroline to go steady with him and only afterwards"], [1783390091, 1783391418, "That '70s Show", "Romantic Weekend", "S3 E16", "Eric finds a brochure for a nice motel and plans a romantic weekend with Donna, who's glad for the chance to get away from her feuding parents.  Both lie about their whereabouts to their parents.  But the lie blows up in their faces when they learn who their neighbors are at the motel.  Meanwhile, Kelso thinks that he's not a man any more because he can't perform with Pam Macy."], [1783391418, 1783392745, "That '70s Show", "Kitty's Birthday (That's Today?!)", "S3 E17", "It's Kitty's birthday and the only one who remembers is Hyde.  To make up for forgetting, Eric and Red agree to do the most horrifying thing imaginable. Meanwhile, Kelso plans to win Jackie back by being her friend, but it doesn't work the way he thinks it would.  And Hyde learns something disturbing about Caroline when he drives her home in his new car."], [1783392745, 1783394072, "That '70s Show", "The Trials of M. Kelso", "S3 E18", "Jackie tests Kelso to see if she should get back together with him. Fez, Eric and Hyde vandalize an opposing school's locker room because Fez was beaten up by their jocks. Kitty is angry at Bob and Midge for not inviting her and Red to their party until she finds out that Bob and Midge are nudists."], [1783394072, 1783395399, "That '70s Show", "Eric's Naughty No-No", "S3 E19", "Kitty's sister visits and Kitty thinks she's only there to show off that she's more successful. After going to see an X-rated movie, Eric tries a new move on Donna but it freaks her out; Kelso learns that honesty is the best policy."], [1783395399, 1783396725, "That '70s Show", "Holy Craps!", "S3 E20", "Kitty forces Red, Eric, Hyde and Kelso to help out at a church fundraiser. Red spends all of his time at the craps table, Kelso and Hyde cheat at bingo so they can win all the prizes. Eric is busy worrying about his relationship with Donna because a church member told him that his wife was nice too, when they first met, until they got tired of each other. Jackie and Donna tell Fez that Caroline is"], [1783396725, 1783398052, "That '70s Show", "Fez Dates Donna", "S3 E21", "Fez and Donna pretend to date so Caroline will leave him alone, but she stalks him anyways, until Fez tells her he doesn't like her any more. Bob reads the deed to his house and discovers that he owns half of Red's garage but Red sets him straight by turning the deed around and proving him wrong. Eric and Hyde have a pool going on when Kelso and Jackie will fight."], [1783398052, 1783399379, "That '70s Show", "Eric's Drunken Tattoo", "S3 E22", "After reading an entry in Donna's diary, Eric decides to get a tattoo, but things don't turn out the way he planned.  Kitty has Pastor Dave over for dinner and he ends up in the hospital; Jackie tries to get Kelso to sleep so he can repeat something he said before when he was sleeping."], [1783399379, 1783400706, "That '70s Show", "Canadian Road Trip", "S3 E23", "Eric, Hyde, Fez, Kelso and Leo go to Canada to get some beer.  Unfortunately, they get stopped on their way back across the border because Fez lost his green card. Donna tries to convince Jackie that she's being scammed by a modeling agency. Red gets a bonus at work: a Beta Max so he can tape something now and watch it later, but he forgets a vital step in the process."], [1783400706, 1783402039, "That '70s Show", "Backstage Pass", "S3 E24", "Eric gets upset at Donna when she goes backstage at a Ted Nugent concert and then forgets about him; Hyde and Fez get busted for selling counterfeit t-shirts; Kelso tries to be more romantic; and Red and Kitty can't remember how they first met."]]}, {"id": "75", "name": "Late Nite", "a": "late-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/late-nite-v2.png", "progs": [[1783306766, 1783310779, "Saturday Night Live", "Buck Henry with Gordon Lightfoot", "S1 E21", "Live from New York, It's...Chevy Chase\n\nSketches include--Emmy winner Chevy tries to get Laraine todo the fall, Samurai Tailor, \"Talk Back!\", \"Dell Stator's Toad Ranch Resturaunt\", \"Looks at Books\", The Crowd Audition, Peter Lemon Moodring, \"Not For Ladies Only\", Lorne Micheals offer to the Beatles."], [1783310779, 1783314745, "Saturday Night Live", "Elliott Gould with Leon Redbone and Harlan Collins & Joyce Everson", "S1 E22", "Sketches include \"Wax Museum,\" \"Phone Operator Academy,\" \"European Poker Player,\" \"Babs's Uvula,\" \"The Last Voyage of the Starship Enterprise,\" \"The Bee Honeymooners,\" \"Shirley Temple Black,\" \"Vibramatic,\" \"Uncle Charlie's School,\" and \"Show Us Your Guns.\"\n\nLeon Redbone performed \"Shine On Harvest Moon.\""], [1783314745, 1783316138, "In Living Color", "Laquita Meets Billy Dee", "S2 E8", "Sketches include:\n\n\"\"Magenta's Acting School\" 783386963, "Robot Chicken", "Two Weeks Without Food", "S4 E8", "Zeus decides to spice up \"Clash of the Titans\" with a monster truck! A young Iron Man fan gets swept up into a battle involving the Avengers and a giant robot. \"Star Trek II: The Wrath of Khan\" is re-imagined as an opera. Speed Racer competes in NASCAR Racing. When Dorothy leaves Oz, it's back to business as usual for the Wizard. Watch the latest edition to MTV's \"The Hills.\""], [1783386963, 1783388220, "In Living Color", "Handi-Man and the Tiny Avenger", "S3 E14", "Sketches include: Michael Jackson: Am I Black or White (cut from DVD) \"B.S. Brothers at the Funeral\" (featuring Wonderful Smith as the reverend) Darnel Bond: Agent 006 (cut from DVD) \"Handi-Man and the Tiny Avenger\" (featuring Debbie Lee Carrington as the Tiny Avenger) Close featuring A Tribe Called Quest performing \"Check the Rhime\""], [1783388220, 1783389617, "In Living Color", "Grim Reaper", "S3 E15", "Sketches include Connie Chung - Me Want Murray / Frenchie / Star Trek VII / Grim Reaper / Big Apple Airlines"], [1783389617, 1783390290, "Robot Chicken", "But Not In That Way", "S4 E9", "A girl's father becomes obsessed with her own favorite anime show: Inuyasha. The Giving Tree has much to give. Punky Brewster discovers boys, leaving Glomer forgotten and alone in his closet. Stephen King meets his new neighbor, Dean Koontz. Black Manta narrates a story about the Joker's life in prison in \"The Arkham Redemption.\""], [1783390290, 1783390970, "Robot Chicken", "I Love Her", "S4 E10", "What would happen if the Monchhichis drew first blood? Criss Angel substitutes for Professor Snape at Hogwarts. What would happen if the Power-Puff girls were on drugs? Freddy Kreuger's day gets off to a bad start thanks to ill-conceived gifts from his daughter. In an episode of \"Living Lohan\", the nerds next door have to contend with their unruly neighbors."], [1783390970, 1783392342, "In Living Color", "Live Super Bowl Show", "S3 E16", "Homeboy Shopping Network / Fire Marshall Bill / Men On Football / Background Guy / Color Me Badd performs \"I Wanna Sex You Up\""], [1783392342, 1783393579, "In Living Color", "George Bush Meets Tommy Wu", "S3 E17", "Sketches include: \"George H.W. Bush Acts Like Tommy Wu\" \"The Detective Head Gets Framed\" (featuring Steven Williams as the police chief) \"Don Rickles at a Peace Conference\" \"Arsenio Hall Harasses Eddie Murphy\" (\"Cape Fear II\")"], [1783393579, 1783394133, "Robot Chicken", "We Are a Humble Factory", "S4 E11", "The creators imagine an alternate ending to Armageddon, what a new Star Trek character might look like, the excitement that is M.A.S.K. And the WWF's new up and coming challenger."], [1783394133, 1783394722, "Robot Chicken", "Maurice Was Caught", "S4 E12", "Simon Belmont knows what works, Kermit introduces everyone to his cousin and the creators imagine what the new Gone With The Wind Re-make might look like, plus Annie Warbucks celebrates her Super Sweet Sixteen."], [1783394722, 1783396102, "In Living Color", "Hour of Power: Preachers On Trial", "S3 E18", "Sketches include: \"Sally Struthers: Feed the Planet\" \"The Church of Discount Sin Televangelists on Trial\" (featuring Chi McBride as a senator) \"Down Wit' MSG\" (\"O.P.P.\" spoof; cut from DVD) \"Ugly Wanda: Masseuse\""], [1783396102, 1783397478, "In Living Color", "The Fist That Rocks the Cradle", "S3 E19", "Sketches include: \"FOX Special: Elvis Sighting\" \"Vera De Milo: The Fist that Rocks the Cradle\" (featuring Mitchell Laurance as the husband) \"Male Bonding in the Woods\" \"House Party 3\" \"Ghost II: Sammy Davis, Jr.'s Spirit\" Close featuring Eric B. & Rakim performing \"Know the Ledge\""], [1783397478, 1783398176, "Robot Chicken", "Robot Chicken's DP Christmas Special", "S5 E1", "Come celebrate the holidays with Robot Chicken and see what the very first Christmas was like!"], [1783398176, 1783398861, "Robot Chicken", "Saving Private Gigli", "S5 E2", "The creators imagine how Cabbage Patch Kids are made, what the real reaction to shows like STOMP! are, and we see what Skeletor is forced to do when Snake Mountain is foreclosed on."], [1783398861, 1783400071, "In Living Color", "Club Ozone", "S3 E20", "Sketches include: \"Club Ozone\" \"Al MacAfee: McBurgers Security Guard\" \"Richard Simmons' Shed-A-Bed Diet Program\" \"Benita Butrell: Class Reunion\" \"Men on Vacation\" (repeat from Season 2, Episode 9) Close featuring Shabba Ranks with Maxi Priest performing \"Housecall\""], [1783400071, 1783401449, "In Living Color", "Anton And The Green Card", "S3 E21", "Sketches include: \"Career Aid\" (cut from DVD) \"Anton: Suburban Marriage\" \"Chillin'\" \"Handi Man: The Sequel\" (conclusion to \"Handi-Man and the Tiny Avenger\" from Season 3, Episode 14; featuring Debbie Lee Carrington as the Tiny Avenger)"]]}, {"id": "80", "name": "I Heart 80s", "a": "i-heart-80s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/iheart80s-v2.png", "progs": [[1783305993, 1783307361, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783307361, 1783308729, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783308729, 1783310064, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783310064, 1783311401, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783311401, 1783312739, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783312739, 1783314202, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "I Heart 80s"], [1783314202, 1783315665, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "I Heart 80s"], [1783315665, 1783316958, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783316958, 1783318253, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783318253, 1783319654, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783319654, 1783321056, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783321056, 1783322391, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783322391, 1783323727, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783323727, 1783325062, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783325062, 1783326397, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783326397, 1783327860, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "I Heart 80s"], [1783327860, 1783329324, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "I Heart 80s"], [1783329324, 1783330621, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783330621, 1783331918, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783331918, 1783333305, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783333305, 1783334699, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783334699, 1783335929, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783335929, 1783337268, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783337268, 1783338606, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783338606, 1783339942, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."], [1783339942, 1783341406, "Pee-wee's Playhouse", "Episode 19", "S1 E19", "I Heart 80s"], [1783341406, 1783342871, "Pee-wee's Playhouse", "Episode 20", "S1 E20", "I Heart 80s"], [1783342871, 1783344168, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783344168, 1783345465, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783345465, 1783346865, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783346865, 1783348235, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783348235, 1783349573, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783349573, 1783350911, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783350911, 1783352248, "Teenage Mutant Ninja Turtles", "The Cat Woman of Channel Six", "S2 E12", "While experimenting with a matter transporter in his secret hideout, Shredder sends Rocksteady and Bebop to a nearby garbage dump. Through a series of mishaps, Rocksteady and Bebop find themselves in the Turtles' Lair."], [1783352248, 1783353586, "Teenage Mutant Ninja Turtles", "Return of the Technodrome", "S2 E13", "Krang, sick of Shredder's constant failings, resolves to return the Technodrome to Earth."], [1783353586, 1783355049, "Pee-wee's Playhouse", "Episode 21", "S1 E21", "I Heart 80s"], [1783355049, 1783356514, "Pee-wee's Playhouse", "Episode 22", "S1 E22", "I Heart 80s"], [1783356514, 1783357808, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783357808, 1783359105, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783359105, 1783360497, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783360497, 1783361845, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783361845, 1783363177, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783363177, 1783364509, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783364509, 1783365846, "Teenage Mutant Ninja Turtles", "Beneath these Streets", "S3 E1", "The Turtles learn the cost of slacking off when Splinter is badly hurt during a confrontation with Shredder."], [1783365846, 1783367184, "Teenage Mutant Ninja Turtles", "Turtles On Trial", "S3 E2", "The intentions of the Ninja Turtles are put to the test when a controversial TV-figure portrays our heroes as menaces to society. The Turtles forego publicly clearing their name to defeat Krang and his new robotic weapon."], [1783367184, 1783368306, "Pee-wee's Playhouse", "Episode 23", "S1 E23", "I Heart 80s"], [1783368306, 1783369770, "Pee-wee's Playhouse", "Episode 24", "S1 E24", "I Heart 80s"], [1783369770, 1783371064, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783371064, 1783372360, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783372360, 1783373693, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783373693, 1783375081, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783375081, 1783376416, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783376416, 1783377785, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783377785, 1783379125, "Teenage Mutant Ninja Turtles", "Attack of the 50-Foot Irma", "S3 E3", "Irma accidentally becomes gigantic and her naturally clumsy nature makes her a danger to the city."], [1783379125, 1783380463, "Teenage Mutant Ninja Turtles", "The Maltese Hamster", "S3 E4", "Gangsters are swiping all the antiques in town. And when they swipe most of our heroes, it's up to Donatello and April to find out why. Could Shredder be behind this?"], [1783380463, 1783382253, "Pee-wee's Playhouse", "Episode 25", "S1 E25", "I Heart 80s"], [1783382253, 1783383652, "Pee-wee's Playhouse", "Open House", "S2 E1", "Today in the \"Playhouse,\" Pee-wee tricks his friends into doing all of his chores by pretending that work is fun. The gang meets some new friends while renovating the \"house.\" Reba arrives in time to deliver Clocky while the Playhouse gang uncovers Floory and meets Mrs. Rene for the first time."], [1783383652, 1783384951, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783384951, 1783386246, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783386246, 1783387642, "The Wonder Years", "How I'm Spending My Summer Vacation", "S2 E17", "As the end of school approaches, Kevins looks forward to spending the summer with Paul and Winnie. However, his summer is spoiled when Paul tells hims that he'll be leaving for summer and Winnie seems to be avoiding him."], [1783387642, 1783389368, "The Wonder Years", "Episode 18", "S2 E18", "I Heart 80s"], [1783389368, 1783390670, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783390670, 1783392036, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783392036, 1783393373, "Teenage Mutant Ninja Turtles", "Sky Turtles", "S3 E5", "The Turtles go flying when the Shredder invents a gravity-altering device."], [1783393373, 1783394708, "Teenage Mutant Ninja Turtles", "The Old Switcheroo", "S3 E6", "The personalities of Shredder and Splinter are switched when a device is accidentally activated during a battle between the Turtles and their enemies. As Shredder plans the Turtles' demise and Splinter plans on how to get back to his body, everyone else is clueless."], [1783394708, 1783396106, "Pee-wee's Playhouse", "Puppy In the Playhouse", "S2 E2", "Cowntess, just back from a world cruise, is showing some of her home movies from the trip. Globey teaches Pee-wee how to say \"hello, my name is Pee-wee\" in French and Chinese! When a lost puppy appears at the Playhouse door, no one can figure out who the owner is. Pee-wee develops a strong case of puppy love and decides to keep him and name him Aloysius. However, Reba comes \"over,\" and it's obviou"], [1783396106, 1783397498, "Pee-wee's Playhouse", "Store", "S2 E3", "Pee-wee and Cowboy Curtis take a leap into Magic Screen where they enjoy some mighty fine handcart ridin' until a train chases them back into the waiting arms of Chairry! Then, Cowboy Curtis sings a song with \"more\" of the secret word in it than you could scream at. Finally, Cowboy Curtis and Miss Yvonne go shopping at Pee-wee's \"department store\" where they decide to buy Chairry!"], [1783397498, 1783398794, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783398794, 1783400091, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783400091, 1783401336, "The Wonder Years", "Episode 19", "S2 E19", "I Heart 80s"]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v2.png", "progs": [[1783306027, 1783308811, "Beverly Hills, 90210", "Things to Do on a Rainy Day", "S2 E26", "On a rainy Saturday afternoon, Brenda, Kelly, Donna and David head to the Bel Age Hotel to meet Donna's favorite pop group, Color Me Badd. David rents a room so that the foursome can get into the hotel. Donna sees her mother, supposedly at the hotel for a conference, and fears that she will get in trouble. Kelly lifts a key to the penthouse and gets to hang out with the group. Donna, fearing repri"], [1783308811, 1783311512, "Beverly Hills, 90210", "Mexican Standoff", "S2 E27", "Brenda upsets her father by consistently violating her curfew. She promises to demonstrate more mature behavior. Jim and Cindy agree to let Brenda join Dylan for a weekend in Mexico. Brenda falls asleep while watching a movie at Dylan's, and doesn't come home until 4 AM. Her parents forbid her from taking the trip. Dylan encourages Brenda to stand up for herself, but she instead tells Jim and Cind"], [1783311512, 1783314231, "Beverly Hills, 90210", "Wedding Bell Blues", "S2 E28", "A furious Jim goes to the Mexican border to retrieve Brenda. Jim bans Dylan from the Walsh house. Jackie learns that Kelly covered for Brenda, and embarrasses her by yelling at her in front of Jake.\n\nMusic: \"\"Wedding Bell Blues\"\" by The Fifth Dimension (#1, 1969); \"\"Blue Moon\"\" (Glen Gray - #1, 1"], [1783314231, 1783316985, "Beverly Hills, 90210", "Misery Loves Company", "S3 E1", "Brenda drives her parents crazy with her constant sulking, and sneaks around with Dylan behind their backs. Dylan wants someone other than Jim to handle his trust, but Jim refuses to break his deal with Iris. Jim and Cindy join the beach club and catch Brenda making out with Dylan. Jim screams at Brenda and makes a scene. She packs up her belongings and moves in with Dylan. Brandon bets Steve that"], [1783316985, 1783319727, "Beverly Hills, 90210", "The Twins, the Trustee, and the Very Big Trip", "S3 E2", "Kelly bonds with her baby sister, Erin. She bows out of a six-week trip to study in Paris with Donna because she wants to spend time with her family. Brenda and Dylan clash over their new living arrangements. Cindy and Brandon realize that Brenda is unhappy, but she is too stubborn to give in. Jim threatens to freeze Dylan's account unless he helps convince Brenda to accept a trip to Paris. Dylan "], [1783319727, 1783322496, "Beverly Hills, 90210", "Too Little, Too Late/Paris 75001", "S3 E3", "Brenda and Donna have difficulty adjusting to life in France. Donna constantly complains about missing David, and Brenda soon begins to long for Dylan. They accidentally order brains at a restaurant, and Donna later spends an entire party eating pastries because she can't carry on a conversation in French. Andrea's boyfriend invites her to join him at the Republican Convention in Houston, where he"], [1783322496, 1783325238, "Beverly Hills, 90210", "Sex, Lies and Volleyball/Photo Fini", "S3 E4", "Donna is struggling in the French immersion program, and feels left out because Brenda and her classmates can speak fluent French. Donna catches the eye of a photographer, who offers her a modeling job. A man tries to entice Donna into signing a two-year modeling contract, but he's just trying to get her into bed. Steve finds the perfect partner for the mixed doubles volleyball tournament. He is h"], [1783325238, 1783328002, "Beverly Hills, 90210", "Shooting Star/American in Paris", "S3 E5", "Kelly feels guilty about kissing Dylan and tries to avoid him. She goes to his house to admit her feelings, and they share a passionate kiss. They spend a lot of time together, but reconsider their actions when David catches them kissing. Kelly turns down Dylan's offer to camp out on the beach (the night before Brenda is to return), but eventually joins him for a romantic evening. Brenda meets Ric"], [1783328002, 1783330769, "Beverly Hills, 90210", "Castles in the Sand", "S3 E6", "Andrea and the children nearly catch Dylan and Kelly sleeping on the beach. Kelly tells Dylan that they must forget their summer romance, but he doesn't want to do this. Brenda and Donna come home from Paris and are greeted with a party. Jim and Cindy agree to let Brenda resume her relationship with Dylan. Kelly tries to avoid Brenda and Dylan, and is annoyed when he continually inquires about her"], [1783330769, 1783333537, "Beverly Hills, 90210", "A Song of Myself", "S3 E7", "Brandon wants to quit the paper so that he can enjoy his senior year. Andrea enlists the help of new advisor and English teacher Gil Meyers to change his mind. Gil decides to have Brandon replace Andrea as editor. She accuses him of sexism and wants to resign. Gil resolves the dispute by making Andrea and Brandon co-editors. A depressed Kelly changes her entire schedule to avoid Brenda and Dylan. "], [1783333537, 1783336303, "Beverly Hills, 90210", "The Back Story", "S3 E8", "Brenda, Donna, Kelly, Steve and David prepare to take the SAT. Brenda constantly argues with Kelly, and also gets into hot water with her parents when they learn that she has been smoking since the Paris trip. Beth Nielson, a young producer from the tabloid show Back Story, seeks Brenda's help in putting together a story about Beverly Hills teens. The piece is intended to correct misconceptions, b"], [1783336303, 1783339069, "Beverly Hills, 90210", "Highwire", "S3 E9", "The gang must consider their future and meets with their guidance counselor, except for Kelly and Dylan who agree that college is not for everyone. Meanwhile, Jim and Cindy announce to Brenda and Brandon that they can afford a private college for only one of them. Also, Andrea has the same bad dreams involving walking a high-wire to get into her own college. Brandon and Nikki become even more clos"], [1783339069, 1783341836, "Beverly Hills, 90210", "Home and Away", "S3 E10", "West Beverly's undefeated football team prepares for a showdown with powerhouse Shaw High. The school decides to forfeit after two Shaw students are shot to death by gang members during a game. Brandon is furious because the West Beverly student body cares more about the homecoming dance (coordinated by Brenda) than the shootings. He and Jordan Bonner, editor of the Shaw paper, run each other's ed"], [1783341836, 1783344601, "Beverly Hills, 90210", "A Presumption of Innocence", "S3 E11", "Andrea tries to get to the bottom of a sexual assault accusation against Gil Meyers brought forth by Sue's mother. David and Donna join in on the investigation and find out about Sue's real emotional troubles. Meanwhile, Brandon reluctantly agrees to go out dancing with Nikki, despite not knowing how to dance. Also, Dylan develops a bad cough due to surfing in polluted water."], [1783344601, 1783347327, "Beverly Hills, 90210", "Destiny Rides Again", "S3 E12", "Brenda runs into Rick at a video store, as he has transferred to UCLA. She goes out with him and continues to pretend that she is French. He is understanding when she finally reveals the truth. The SAT review board accuses Dylan of paying someone to take his test. He annoys Brenda by refusing to re-take the test. After Dylan confesses that he had a summer fling, Brenda suggests that they take a br"], [1783347327, 1783350065, "Beverly Hills, 90210", "Rebel With a Cause", "S3 E13", "Kelly and Dylan go on a date, as Brenda insists that Dylan is free to see whomever he wishes. Brenda explodes when she and Rick run into Kelly and Dylan at a restaurant. Kelly denies that she is a bimbo and Brenda responds, \"I was always told that if it looks like a duck and walks like a duck...\" Kelly believes that Dylan is on the rebound, so she pushes him away. Brenda breaks up with Rick becaus"], [1783350065, 1783352773, "Beverly Hills, 90210", "Wild Horses", "S3 E14", "Dylan's Porsche breaks down near a secluded ranch. The wealthy owner takes him in and wants him to stay permanently (as her boy toy). Dylan is disappointed when she sells her favorite horse, and decides not to live in an environment where everything is for sale. Brenda and Kelly make up. David fires Steve as manager after he is humiliated at a showcase because he had to go on without a sound check"], [1783352773, 1783355539, "Beverly Hills, 90210", "The Kindness of Strangers", "S3 E15", "Brandon finds Jack Canner (the homeless vet he met at the beach club) rummaging through the dumpster behind the Peach Pit. He takes him home for Thanksgiving dinner, but Canner runs afoul of Jim, who accuses him of shirking his family responsibilities and hiding behind the flag. Brandon explains to Canner that Jim's father was a Marine; the two never spoke again after Jim refused to go to Vietnam."], [1783355539, 1783358276, "Beverly Hills, 90210", "It's a Totally Happening Life", "S3 E16", "Two talking stars narrate an account of the gang's events during the week before Christmas. Brenda, Kelly and Dylan decide to be friends, but the arrangement falls apart after both girls make out with Dylan. Andrea is accepted to Yale, but gets dumped by her boyfriend. Nikki tells Brandon that she is moving back to San Francisco. Brandon and Andrea share a kiss while watching \"\"It's a Wonderful Li"], [1783358276, 1783361044, "Beverly Hills, 90210", "The Game Is Chicken", "S3 E17", "Steve becomes friends with a guy in detention through their interest in cars. Steve and Brandon win a lot of money betting on Joe in a car race, but Dylan warns that the whole thing may be a scam. Steve and Brandon agree to bankroll Joe in a high-stakes race against drug dealer Frank Padilla. Brandon realizes that their opponent may be the guy who ran over Andrea. While Brandon contacts the police"], [1783361044, 1783363808, "Beverly Hills, 90210", "Midlife...Now What?", "S3 E18", "Cindy, Jackie and the girls spend the weekend at a health spa. Kelly is wary because Babette, a friend of Jackie's from her drug-using days, works at the facility. Brenda overhears a gossipy masseuse discussing a friend's affair with Mel. Kelly calls home and learns from David that Mel has been gone for several days. Babette tries to comfort Jackie by offering her drugs, but she resists temptation"], [1783363808, 1783366499, "Beverly Hills, 90210", "Back in the High Life Again", "S3 E19", "Jack is released from prison. He encourages Dylan to invite all his friends to a party, but only Kelly shows up. Dylan tells Kelly that he has chosen her over Brenda, and they kiss in the hotel pool. Dylan and Kelly take Brenda for a walk to inform her of Dylan's decision, and reveal their summer fling. She screams that she will never speak to them again. The financially destitute Jack wants to di"], [1783366499, 1783369208, "Beverly Hills, 90210", "Parental Guidance Recommended", "S3 E20", "Iris flies in from Hawaii, and Dylan and Jack try to soften her up to convince her to approve the dissolution of the trust. She is leery of Jack's motives, but elects not to stand in their way. Jack makes a clandestine phone call and promises someone that he will get the money. Brenda mopes around in her room and discards all mementos of Dylan. A visit from Iris convinces her to get past her pain,"], [1783369208, 1783371960, "Beverly Hills, 90210", "Dead End", "S3 E21", "Jack and Dylan begin living on a yacht, where they are constantly kept under surveillance. Jim does not want to dissolve the trust, but finally gives his approval so that Dylan can have a new life with his father. Christine accepts Jack's marriage proposal. Dylan and Kelly sleep together. Jack tries to confess something to Dylan, but a man interrupts them and warns Jack that he is breaking their d"], [1783371960, 1783374663, "Beverly Hills, 90210", "The Child Is Father to the Man", "S3 E22", "In the wake of his father's death, Dylan grapples with his personal demons while trying to elude the reporters camping out on his lawn. The media speculates that Jack was killed because of his mob ties--and that Dylan is the next target. Kelly feels uncomfortable when Brenda invites Dylan to stay with the Walshes. David has to miss the post-funeral reception because of a recording session. He post"], [1783374663, 1783377415, "Beverly Hills, 90210", "Duke's Bad Boy", "S3 E23", "Duke warns Brandon that he must pay off a $1500 debt by the end of the week. Brandon places a bet with a high school bookie and wins, but the guy cannot cover his bet. A desperate Brandon tries to rough him up. Nat realizes that Brandon is in trouble and pays Duke, but forces Brandon to promise that he will never place another bet. Kelly fears that she is losing her connection with Dylan. She beco"], [1783377415, 1783380181, "Beverly Hills, 90210", "Perfectly Perfect", "S3 E24", "Kelly continues to starve herself and abuse diet pills, and becomes extremely irritable. She freaks out and screams at a potential buyer for the house. Kelly believes that her friends are talking behind her back, until Steve explains that they are planning a surprise party for her eighteenth birthday. Brenda finds Kelly passed out in the Peach Pit's bathroom during the party. Kelly ignores the doc"], [1783380181, 1783382933, "Beverly Hills, 90210", "Senior Poll", "S3 E25", "Kelly stops attending her eating disorder group because the girls with more severe cases unnerve her. Kelly wins \"Most Beautiful\" in the senior poll, while Dylan is \"Most Handsome.\" Kelly suspects that everyone judges her entirely on her looks, and blows up at Dylan and Jackie. Dylan lets her read a section from his manuscript in which he describes his feelings for her. Brenda feels iso
