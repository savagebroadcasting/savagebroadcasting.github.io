out Carrie tries to cope with the ramifications. Miranda sleeps with Steve for the first time after their breakup. Charlotte tries to overcome her fear of horseback riding. Samantha dates a guy who's \"Mr. Too-Big\", determined to overcome his over-endowment."], [1783586457, 1783589185, "Beverly Hills, 90210", "Ashes to Ashes", "S2 E9", "Brandon befriends a black family, the Ashes, which stirs up Beverly Hills when they move in near the Walshes. The siblings include Robby, a freshman photographer who volunteers to work at the Blaze, and his older sister whose boyfriend is roughed up by a racist security patrol. Meanwhile, Jim and Cindy try out a new \"state of the art\" house alarm system which is more of a nuisance than a help."], [1783589185, 1783591921, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783591921, 1783593314, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."], [1783593314, 1783594708, "The Fresh Prince of Bel-Air", "She Ain't Heavy", "S2 E8", "Will hits it off with the full-figured Dee Dee, but her size keeps him from asking her to the dance."], [1783594708, 1783596046, "Saved by the Bell", "1-900-CRUSHED", "S2 E11", "In an attempt to make money, Zack sets up a 900 number hotline, with Lisa offering advice to the students of Bayside. However, things go awry when Zack decides to keep the line running by dishing out bad advice."]]}, {"id": "111", "name": "Savage at Nite", "a": "savage-at-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/savage-at-nite-v4.png", "progs": [[1783501003, 1783502300, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783502300, 1783503700, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783503700, 1783505070, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783505070, 1783506368, "Raising Hope", "Baby Monitor", "S1 E21", "Barney tells the team he loses each year's annual commercial competition for the store, so now he wants to recruit his employees to compete for this year's submission; unfortunately, flattery and considerations like fair-play, and team spirit, get in the way."], [1783506368, 1783507672, "Raising Hope", "Don't Vote for this Episode", "S1 E22", "The Chances reminisce about the year Jimmy turned 18 - when Maw Maw kicked them out of the house, when a goth Jimmy took up residence in the grocery store and when Burt and Virginia finally figured out how to be adults."], [1783507672, 1783509075, "Saved by the Bell", "The Prom", "S2 E1", "Zack asks Kelly to be his date for the prom and she agrees, but when her father loses his job, she decides family is more important and gives up her chance to go, but cannot bring herself to tell Zack."], [1783509075, 1783510478, "Saved by the Bell", "Zack's War", "S2 E2", "Mr. Belding tries to reform Zack by making him join the Army Cadet Corps. Zack gets the whole gang to join him, and they end up competing with each other in an obstacle course. Meanwhile, Lisa is swayed by the Cadet Corps drill instructor, Chet Adams."], [1783510478, 1783511827, "That '70s Show", "Grandma's Dead", "S1 E23", "Red's mother Bernice has once again managed to make everyone miserable during one of her visits.  While driving his grandmother home, Eric lashes out and tells her that it wouldn't kill her to be nice once in a while.  Bernice promptly drops dead, leaving Eric to think he killed her.  The entire Forman family (including Laurie and Red's brother Marty) comes together for her funeral while Eric gets"], [1783511827, 1783513173, "That '70s Show", "Hyde Moves In", "S1 E24", "The gang goes skinny-dipping and Jackie gets sick. Hyde moves in with the Formans when his mom runs away with a trucker. Bob takes a liking to one of Midge's feminist friends."], [1783513173, 1783514568, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783514568, 1783515974, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783515974, 1783517268, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783517268, 1783518565, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783518565, 1783519957, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783519957, 1783521305, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783521305, 1783522677, "Raising Hope", "Episode 23", "S1 E23", "Savage at Nite"], [1783522677, 1783523849, "Raising Hope", "Episode 24", "S1 E24", "Savage at Nite"], [1783523849, 1783525252, "Saved by the Bell", "Save the Max", "S2 E3", "The gang unearths Bayside's old school radio station and begins broadcasting again, before learning that The Max is to be closed if Max does not manage to pay $10,000 in back rent."], [1783525252, 1783526655, "Saved by the Bell", "Driver's Education", "S2 E4", "In order to get their driver's licenses, the gang go through a driver's education course. Zack and Kelly advance in their relationship, with Zack buying Kelly a ring. Slater buys a car, and is at the head of the driver's ed class. When Zack becomes jealous of Kelly's attention toward Slater over the driving issue, he tries to set Slater up to fail, but gets the boot himself instead."], [1783526655, 1783528001, "That '70s Show", "The Good Son", "S1 E25", "Eric loves having Hyde as a \"brother\" because he does all of Eric's chores but when his parents start to prefer Hyde he starts to hate him. Hyde changes from the conspiracy minded trouble-making guy Eric loves to a total bore. Midge and Bob are having relationship problems. Red's old war buddy comes back and Red finds out that he's a swinger."], [1783528001, 1783529085, "That '70s Show", "Episode 26", "S1 E26", "Savage at Nite"], [1783529085, 1783530480, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783530480, 1783531806, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783531806, 1783533101, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783533101, 1783534397, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783534397, 1783535729, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783535729, 1783537118, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783537118, 1783538290, "Raising Hope", "Episode 25", "S1 E25", "Savage at Nite"], [1783538290, 1783539593, "Raising Hope", "Prodigy", "S2 E1", "When Jimmy watches a home video of himself as a thirteen-year-old, he discovers that he was a musical prodigy with a promising career as a singer and pianist until a horrible accident involving a golf putter rendered him talentless. Jimmy recruits Burt, Virginia and Maw Maw to help him rediscover his lost abilities."], [1783539593, 1783540931, "Saved by the Bell", "House Party", "S2 E5", "Zack stays over at Screech's place for the weekend where the two of them along with Slater throw a party which is interrupted by the girls before breaking off a valuable item from Mrs. Powers."], [1783540931, 1783542335, "Saved by the Bell", "Blind Dates", "S2 E6", "Mr. Belding blackmails Zack with suspension if he won't take his bratty niece, Penny, out on a date. So, Zack asks Screech to impersonate him while he takes out Kelly for her birthday party at the Max. But Slater overhears this and decides to break up Zack's plans to he can have another chance with Kelly. Meanwhile, Lisa sets Jessie up on a blind date, but there's a problem: the guy is much shorte"], [1783542335, 1783543661, "That '70s Show", "Garage Sale", "S2 E1", "The Formans have a garage sale to earn some extra cash. Hyde doesn't have anything to sell, so he bakes \"special brownies\" to sell; Kitty, Red, Bob and Midge eat some of the brownies unsuspectingly. Fez kisses Jackie who tells Donna it's the best kiss she's ever had. (#26)"], [1783543661, 1783544988, "That '70s Show", "Red's Last Day", "S2 E2", "It's Red's last day of work, and he decides to drown his unemployment sorrows at a bar.  Kitty sends Eric to pick Red up; he, Hyde and Fez end up drinking with Red instead, leaving none of them in any condition to drive.  Kelso gets a van, and christens it the \"shaggin' wagon.\""], [1783544988, 1783546377, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783546377, 1783547771, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783547771, 1783549069, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783549069, 1783550365, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783550365, 1783551761, "The Wonder Years", "How I'm Spending My Summer Vacation", "S2 E17", "As the end of school approaches, Kevins looks forward to spending the summer with Paul and Winnie. However, his summer is spoiled when Paul tells hims that he'll be leaving for summer and Winnie seems to be avoiding him."], [1783551761, 1783553487, "The Wonder Years", "Episode 18", "S2 E18", "Savage at Nite"], [1783553487, 1783554790, "Raising Hope", "Sabrina Has Money", "S2 E2", "When Burt discovers that Sabrina is the daughter of his wealthy new client, he lets the family in on her secret. Embarrassed by her family’s wealth she reluctantly introduces the Chance family to her father, Cap. Meanwhile Jimmy decides Hope should have rich friends and begs Sabrina to take him to her sister’s party where Sabrina’s insecurities become apparent."], [1783554790, 1783556093, "Raising Hope", "Kidnapped", "S2 E3", "When a ponytailed hippie named Jack who kidnapped Burt twenty years ago unexpectedly pays the Chance family a visit, they discover that Burt's disappearance wasn't all it appeared. Meanwhile Jimmy's jealousy creeps out when Sabrina anxiously awaits a text from her boyfriend Wyatt."], [1783556093, 1783557496, "Saved by the Bell", "Rent-a-Pop", "S2 E7", "Zack hires an actor named James, who works as a waiter at the Max, to impersonate his father, Derek, to Mr. Belding, and later, asks James to impersonate Mr. Belding to his real father to avoid the consequences of some bad grades. Meanwhile, the rest of the gang plans a carnival to raise money for a new school field trip."], [1783557496, 1783558904, "Saved by the Bell", "Miss Bayside", "S2 E8", "Bayside's winner of the Miss Bayside beauty pageant will go on to compete in the state-wide pageant of Miss High School California. The pageant stirs up controversy about sexism, in which both A.C. Slater and Screech enter as contestants to win a bet over who could win. Who will be the next Miss Bayside?"], [1783558904, 1783560231, "That '70s Show", "The Velvet Rope", "S2 E3", "Now that he's unemployed, the job hunt is on for Red.  The gang decides to go to a dance club, and Jackie manages to convince Kelso that dressing like David Bowie is a good idea.  Once at the club, Donna, Fez and Hyde have no problem getting in, but Eric can't make it past the overly large bouncer."], [1783560231, 1783561558, "That '70s Show", "Laurie and the Professor", "S2 E4", "Bob and Midge's marital troubles spill over into a fight over Donna's affection.  One of Laurie's college professors comes to Point Place to see if he can convince Laurie to return to classes, and he takes a 'hands-on' approach to the task, much to Eric's shock.  Fez looks for a woman, and Hyde looks for a room to sleep in."], [1783561558, 1783562952, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't bear to think of her having a new man in her life."], [1783562952, 1783564346, "The Fresh Prince of Bel-Air", "Guess Who's Coming to Marry?", "S2 E6", "Tensions spill over just before the wedding of Will's Aunt Janice when Will's mom meets Janice's intended - and forbids Will to attend the interracial wedding."], [1783564346, 1783565642, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783565642, 1783566939, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783566939, 1783568183, "The Wonder Years", "Episode 19", "S2 E19", "Savage at Nite"], [1783568183, 1783569585, "The Wonder Years", "Summer Song", "S3 E1", "The Arnold family and Paul Pfeiffer travel to Ocean City for a little fun in the sun. However, once there, no one really seems to be having any. Paul's allergies flare up, and Wayne and Karen's attitudes are making it nothing like the family trips from long ago. Kevin is still stinging from the news the Winnie Cooper has a new boyfriend, until he meets a cute (but older) girl named Teri."], [1783569585, 1783570888, "Raising Hope", "Henderson, Nevada-Adjacent Baby! Henderson, Nevada-Adjacent!", "S2 E4", "Virginia, Burt, Jimmy and Sabrina go to Las Vegas when Delilah plans a big wedding, but Virginia is jealous of her cousin's fancy ceremony because she never had one. Meanwhile, Jimmy hopes his luck with Sabrina will improve in Sin City."], [1783570888, 1783572146, "Raising Hope", "Killer Hope", "S2 E5", "After discovering that Hope hit a boy at daycare, the family becomes worried that Hope is following in her mother's footsteps. Meanwhile, the Chances run into some problems when they camp out in tents due to their home being fumigated for termites."], [1783572146, 1783573548, "Saved by the Bell", "Jessie's Song", "S2 E9", "Jessie turns to caffeine pills to keep up with her studies and her new singing group, Hot Sundae."], [1783573548, 1783574886, "Saved by the Bell", "Model Students", "S2 E10", "After a heated debate about the school calenders, a photographer decides to use Jessie, Lisa and Kelly in a photo shoot where Kelly is chosen as the winner of a contest that'll make her famous in France."], [1783574886, 1783576212, "That '70s Show", "Halloween", "S2 E5", "The gang, looking for something fun to do on Halloween, revisits their old grammar school, where they find their permanent records. Looking through them, they find out some interesting things about each other. Fez discovers trick or treating."], [1783576212, 1783577538, "That '70s Show", "Vanstock", "S2 E6", "Eric, Donna, Kelso, Hyde and Fez are all going to Vanstock, Wisconsin's own Woodstock. Jackie says she doesn't want to go, so Kelso invites Laurie. In the end, both girls go leaving Kelso stuck in the middle. Donna gets mad at Eric for not telling her about Kelso and Laurie. Fez spends the night girl chatting to Jackie and Laurie, much to Kelso's chagrin while Hyde attempts drop him in it. Red bec"], [1783577538, 1783578931, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."], [1783578931, 1783580326, "The Fresh Prince of Bel-Air", "She Ain't Heavy", "S2 E8", "Will hits it off with the full-figured Dee Dee, but her size keeps him from asking her to the dance."], [1783580326, 1783581619, "The Goldbergs (2013)", "I Rode a Hoverboard", "S2 E8", "When Adam sustains a severe compound fracture, he lies in school about having ridden a hoverboard, just like Back to the Future II. However, the lie threatens his friendship with Emmy Mirsky. Meanwhile, when the Goldberg family is enamored with a new restaurant, China Garden, Beverly fears that her family does not appreciate her cooking. This leads to a war between her and restaurant employee Mrs."], [1783581619, 1783582916, "The Goldbergs (2013)", "The Most Handsome Boy on the Planet", "S2 E9", "Barry is excited when a modelling representative approaches him, but Erica thinks it's a scam."], [1783582916, 1783584303, "The Wonder Years", "Math Class", "S3 E2", "Kevin has trouble in math class when he comes up against a teacher who Kevin thinks is completely unreasonable."], [1783584303, 1783585669, "The Wonder Years", "Wayne on Wheels", "S3 E3", "Kevin wants to get to the mall to see a girl he can't stop thinking about, but the only way he can is by begging his brother to drive."], [1783585669, 1783586970, "Raising Hope", "Jimmy and the Kid", "S2 E6", "Supermarket manager Barney's wicked ex Gloria is in town and gets him to employ her cute teenage son, Trevor. Jimmy's sympathy for the kid turns into panic when Sabrina clearly prefers his wittier humor and boyish charms and Trevor digs her."], [1783586970, 1783588272, "Raising Hope", "Burt's Parents", "S2 E7", "Jimmy, Virginia, Burt, Sabrina, Maw Maw and Hope borrow a house to impress Burt's wealthy parents who have decided at the last minute to celebrate Thanksgiving with the family. Things also get interesting when the real homeowners return early."], [1783588272, 1783589610, "Saved by the Bell", "1-900-CRUSHED", "S2 E11", "In an attempt to make money, Zack sets up a 900 number hotline, with Lisa offering advice to the students of Bayside. However, things go awry when Zack decides to keep the line running by dishing out bad advice."], [1783589610, 1783591009, "Saved by the Bell", "Close Encounters Of The Nerd Kind", "S2 E12", "After Zack breaks the school's video camera, he and the gang pretend Screech is an alien in order to win a photo competition. However, their picture soon arouses government suspicion."], [1783591009, 1783592335, "That '70s Show", "I Love Cake", "S2 E7", "Eric freaks out when Donna says 'I love you,' and all he can think of to say in return is 'I love cake.'  Donna, not knowing how to deal with this, turns to Jackie for relationship advice.  Midge kicks Bob out of the house; he stays with the Formans and Red has to act as a go-between to try to mend their marriage.  Kelso gets a new leather jacket that he thinks makes him look like Marlon Brando, b"], [1783592335, 1783593671, "That '70s Show", "Sleepover", "S2 E8", "Donna finally sleeps with Eric, but when the guys find out that all they did was sleep, they tease him mercilessly.  Hyde gets a job at the FotoHut, and finds out that compared to his boss, he's a workaholic.  And Kitty has to work double shifts at the hospital, leaving Red to do the cooking."], [1783593671, 1783595065, "The Fresh Prince of Bel-Air", "Cased Up", "S2 E9", "A pompous lawyer who's dating Hilary is no fan of Will's after he's sideswiped by Will's roadster."]]}, {"id": "215", "name": "Bel-Air", "a": "bel-air", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/belair-v1.png", "progs": [[1783500845, 1783502150, "The Fresh Prince of Bel-Air", "Viva Lost Wages", "S6 E8", "It's Carlton's birthday. His father gives a trip to Vegas for Carlton and Will as a gift. Carlton becomes addicted to gambling and loses all the money as well as the return home tickets. They enter a talent contest to try to win the prize."], [1783502150, 1783503504, "The Fresh Prince of Bel-Air", "There's the Rub (1)", "S6 E9", "It's Thanksgiving time. Hilary's television show is filming at a homeless shelter; Hilary and Carlton go to the shelter to volunteer. Philip hurts his back; Will suggests they go to a massage parlor to help his pain."], [1783503504, 1783504859, "The Fresh Prince of Bel-Air", "There's the Rub (2)", "S6 E10", "Philip and Will get arrested at the massage parlor because the girls try to give more than a massage. Hilary and Carlton continue to volunteer at the homeless shelter and realize how fortunate they are."], [1783504859, 1783506214, "The Fresh Prince of Bel-Air", "I, Ooh, Baby, Baby", "S6 E11", "Hilary's show has its national premiere. What more could she possibly want? How about a baby?"], [1783506214, 1783507545, "The Fresh Prince of Bel-Air", "Boxing Helena", "S6 E12", "Will's pride is on the ropes when a gorgeous boxing instructor KOs him at the gym."], [1783507545, 1783508859, "The Fresh Prince of Bel-Air", "I, Clownius", "S6 E13", "It's no laughing matter when a bomb-toting clown holds Philip hostage in the courtroom on the day of the showbiz madam's sentencing."], [1783508859, 1783510137, "The Fresh Prince of Bel-Air", "Breaking Up is Hard To Do (1)", "S6 E14", "Ka-boooom! That explosion you hear is Philip and Vivian's marriage after Philip decides to go into politics."], [1783510137, 1783511474, "The Fresh Prince of Bel-Air", "Breaking Up is Hard To Do (2)", "S6 E15", "Breaking up may not be so hard to do for an angry Vivian, but when Philip finds he's lost without her, Will and Carlton conspire to reunite them."], [1783511474, 1783512804, "The Fresh Prince of Bel-Air", "I, Bowl Buster", "S6 E16", "After being accepted at Princeton, a worried Carlton changes his life plans and retreats to a place where everybody knows his name - the bowling alley."], [1783512804, 1783514149, "The Fresh Prince of Bel-Air", "The Butler's Son Did It", "S6 E17", "Geoffrey's life changes overnight when a man claiming to be his long-lost son shows up and charms everyone - except Will, who discovers the guy's not what he seems. Meanwhile, Hilary starts writing her autobiography, and an early childhood photo reveals a shocking secret."], [1783514149, 1783515504, "The Fresh Prince of Bel-Air", "Hare Today...", "S6 E18", "The minister at church thinks Vivian's devotion to the church is her way to be near him, so he makes a pass at her. Carlton and Ashley argue about who will get to sing at the Easter service. Nicky's pet rabbit dies when Philip sits on it."], [1783515504, 1783516858, "The Fresh Prince of Bel-Air", "I, Whoops, There It Is", "S6 E19", "Dick Clark has a cameo on this backstage outing that has Will Smith visiting with series stars and screening series bloopers."], [1783516858, 1783518214, "The Fresh Prince of Bel-Air", "I, Stank Horse", "S6 E20", "Ashley is anxious to get into the School of Performing Art, and a friend of Will's says he will help her with her acting. Her first commercial requires she wear a bikini. Will and Carlton buy a horse that is being retired from racing."], [1783518214, 1783519568, "The Fresh Prince of Bel-Air", "I, Stank Hole in One", "S6 E21", "On Live with Regis and Kathie Lee, Hilary subs for Gifford but doesn't see eye-to-eye with co-host Philbin. Meanwhile, Will subs for Carlton in a golf tourney and gets buddy-buddy with Philip, making Carlton jealous."], [1783519568, 1783520923, "The Fresh Prince of Bel-Air", "Eye, Tooth", "S6 E22", "William Shatner stars as Hilary's talk-show guest, but Will must find a way to beam him from the dentist's chair to the set. Meanwhile, Hilary's show treks to New York and Ashley insists on tagging along."], [1783520923, 1783522269, "The Fresh Prince of Bel-Air", "I, Done (1)", "S6 E23", "It's Phil's birthday and he says it is wonderful time with everyone moving to new places and challenges. Even Geoffrey is moving back to London. Phil announces they are selling the house and moving away. Will realizes he is in the slow lane."], [1783522269, 1783523661, "The Fresh Prince of Bel-Air", "I, Done (2)", "S6 E24", "As members of the Banks family and Geoffrey prepare for their moves, Will tries to pretend that he also has big plans for moving forward. After admitting the truth, Will makes a decision to stay in California and finish school."], [1783523661, 1783524990, "The Fresh Prince of Bel-Air", "The Fresh Prince Project", "S1 E1", "Will comes to live with his aunt and uncle in Bel-Air. Phillip isn't too impressed by Will's behavior, especially teaching Ashley to rap and ruining his image to his members of the law firm. Vivian tries to remain neutral in all this. Carlton and Hillary look at Will with disdain."], [1783524990, 1783526423, "The Fresh Prince of Bel-Air", "Bang the Drum, Ashley", "S1 E2", "Will persuades Ashley to pawn her violin for a drum set."], [1783526423, 1783527735, "The Fresh Prince of Bel-Air", "Clubba Hubba", "S1 E3", "Will wants to go out with a beautiful girl he meets at the country club, but first he must figure out how to impress her extremely snobbish and very protective father so he seeks tips from cousin Carlton on becoming preppie."], [1783527735, 1783529169, "The Fresh Prince of Bel-Air", "Not with My Pig, You Don't", "S1 E4", "Philip's parents come to visit for the weekend when he wins a prestigious award. After finding the rehearsed lines of the Bankses to be boring and deciding to kill the story, Will talks to the interviewer telling her embarrassing stories about Philip's past \"barnyard life\" he heard from Philip's parents."], [1783529169, 1783530563, "The Fresh Prince of Bel-Air", "Homeboy, Sweet Homeboy", "S1 E5", "Will gets a visit from an old pal named Ice Tray, who, to Vivian and Philip's dismay, warms up to Hilary."], [1783530563, 1783531968, "The Fresh Prince of Bel-Air", "Mistaken Identity", "S1 E6", "While Philip and Vivian go on a trip to Palm Springs in Mr. Furth's helicopter, Will and Carlton drive Furth's car there as well. They get pulled over for \"stealing\" the car. Hilary babysits Ashley as Geoffrey has the weekend off."], [1783531968, 1783533399, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet to Poetry Night. After Jazz doesn't come through with an impostor, Will uses Geoffrey as the fake poet."], [1783533399, 1783536102, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (1)", "S1 E8", "The family heads to the mall to pick up costumes for Hilary's Halloween Party, while Will and Carlton place a bet to see who can find a date for the party. Philip gets held up at a gadget store. Vivian sing in a Record-A-Song booth. Hilary forgets to take a hat off Ashley and walks out of the store with it, they get accused of theft."], [1783536102, 1783537536, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783537536, 1783538961, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783538961, 1783540395, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783540395, 1783541830, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783541830, 1783543236, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783543236, 1783544661, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783544661, 1783546076, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783546076, 1783547506, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783547506, 1783548936, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783548936, 1783550371, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783550371, 1783551786, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783551786, 1783553221, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783553221, 1783554657, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783554657, 1783556096, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783556096, 1783557490, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783557490, 1783558896, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783558896, 1783560291, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783560291, 1783561618, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783561618, 1783563007, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783563007, 1783564400, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783564400, 1783565794, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't bear to think of her having a new man in her life."], [1783565794, 1783567189, "The Fresh Prince of Bel-Air", "Guess Who's Coming to Marry?", "S2 E6", "Tensions spill over just before the wedding of Will's Aunt Janice when Will's mom meets Janice's intended - and forbids Will to attend the interracial wedding."], [1783567189, 1783568582, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."], [1783568582, 1783569976, "The Fresh Prince of Bel-Air", "She Ain't Heavy", "S2 E8", "Will hits it off with the full-figured Dee Dee, but her size keeps him from asking her to the dance."], [1783569976, 1783571370, "The Fresh Prince of Bel-Air", "Cased Up", "S2 E9", "A pompous lawyer who's dating Hilary is no fan of Will's after he's sideswiped by Will's roadster."], [1783571370, 1783572744, "The Fresh Prince of Bel-Air", "Hi-Ho Silver", "S2 E10", "Will and Carlton think a party guest stole the silverware."], [1783572744, 1783574138, "The Fresh Prince of Bel-Air", "The Butler Did It", "S2 E11", "Philip and Vivian take a weekend vacation and leave the kids home alone, Hilary and Carlton set up a video shoot with Bell Biv De Voe in their house, and then everyone must rush to clean up after Philip and Vivian decide to come home early."], [1783574138, 1783575526, "The Fresh Prince of Bel-Air", "Something for Nothing", "S2 E12", "Will gets lucky at a fundraiser and wins some money. When Will doesn't follow the club's tradition, it starts rumors about the Banks family. Ashley is too young to go to the fundraiser, so she and Geoffrey set up their own poker night."], [1783575526, 1783576920, "The Fresh Prince of Bel-Air", "Christmas Show", "S2 E13", "On a family ski trip, the Banks find that they must come up with Christmas gifts from the heart after their belongings are stolen."], [1783576920, 1783578316, "The Fresh Prince of Bel-Air", "Hilary Gets a Life", "S2 E14", "Hilary must work for a caterer after her credit cards are cancelled."], [1783578316, 1783579710, "The Fresh Prince of Bel-Air", "My Brother's Keeper", "S2 E15", "Will has a game coming up with Malibu Prep in which a scout will be in the crowd. He meets a player from the other team. After learning that Marcus has a child Will must choose between being greedy or realizing what the scholarship would mean to Marcus."], [1783579710, 1783581105, "The Fresh Prince of Bel-Air", "Geoffrey Cleans Up", "S2 E16", "Geoffrey falls for the woman next door while thinking she is a butler. When he finds out she is just visiting and is worth 25 million dollars he must decide whether he wants to continue seeing her, or not."], [1783581105, 1783582499, "The Fresh Prince of Bel-Air", "Community Action", "S2 E17", "When Hillary is ordered to do community service at a free clinic, the doctor in charge becomes the antidote for her marriage-mindedness."], [1783582499, 1783583893, "The Fresh Prince of Bel-Air", "Ill Will", "S2 E18", "The family fears a steamy exposé when Geoffrey begins his memoirs, while Will fears the scalpel when he enters the hospital, kicking and screaming, for a tonsillectomy."], [1783583893, 1783585287, "The Fresh Prince of Bel-Air", "Eyes on the Prize", "S2 E19", "Needing a game show partner, Will must choose between bickering friends."], [1783585287, 1783586675, "The Fresh Prince of Bel-Air", "Those Were the Days", "S2 E20", "Philip and Vivian welcome a '60s radical, who arouses the FBI's interest and influences Will and Carlton to take action over the firing of a nonconformist teacher."], [1783586675, 1783588068, "The Fresh Prince of Bel-Air", "Vying for Attention", "S2 E21", "Will dislikes his mother's new boyfriend."], [1783588068, 1783589462, "The Fresh Prince of Bel-Air", "The Aunt Who Came to Dinner", "S2 E22", "Aunt Helen arrives unexpectedly, and upsets Will and Carlton's plans for a rendezvous with two French women."], [1783589462, 1783590856, "The Fresh Prince of Bel-Air", "Be My Baby Tonight", "S2 E23", "Ashley cringes when the family oohs and aahs over her relationship with Kevin , but Will chokes when she asks him about sex - and her curiosity about reproduction sends Will to a pregnancy counseling center."], [1783590856, 1783592230, "The Fresh Prince of Bel-Air", "Strip-Tease for Two", "S2 E24", "Will and Carlton lose their shirts investing on a tip - then take jobs as strippers to recoup their losses and get Vivian's bracelet out of hock."], [1783592230, 1783593625, "The Fresh Prince of Bel-Air", "How I Spent My Summer Vacation", "S3 E1", "Will returns home from spending the summer in Philadelphia with a new look that doesn't sit well with Uncle Phil."], [1783593625, 1783595020, "The Fresh Prince of Bel-Air", "Will Gets Committed", "S3 E2", "When the Banks family returns to its former neighborhood to help old friends after a destructive city-wide riot, Vivian reveals a surprise to Philip."]]}, {"id": "411", "name": "SBC Bulletin", "a": "sbc-bulletin", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/sbc-bulletin-v2.png", "progs": [[1783501299, 1783522899, "SBC Bulletin", "", "", "SBC Bulletin"], [1783522899, 1783544499, "SBC Bulletin", "", "", "SBC Bulletin"], [1783544499, 1783566099, "SBC Bulletin", "", "", "SBC Bulletin"], [1783566099, 1783587699, "SBC Bulletin", "", "", "SBC Bulletin"], [1783587699, 1783594935, "SBC Bulletin", "", "", "SBC Bulletin"]]}]};
const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
</script>
