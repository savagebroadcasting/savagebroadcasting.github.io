lated from "], [1783382933, 1783385673, "Beverly Hills, 90210", "She Came in Through the Bathroom Window", "S3 E26", "The Gang plans to go to Magic Mountain for Senior Ditch Day but plans change for Brandon, Dylan, and Steve when a Burt Reynolds fan club eats at The Peach Pit when Nat is sick. Everyone else heads to Magic Mountain."], [1783385673, 1783388261, "Beverly Hills, 90210", "A Night to Remember", "S3 E27", "Brandon and Andrea discover that the school board has quietly passed a measure in which any senior found drunk at the prom will be barred from graduation. Jackie tells David and Kelly that she has sold the house. Brandon and Brenda do not plan to attend the prom. Brenda accepts an invitation from football star Tony Miller, and Andrea calls Brandon at the last minute after Jordan gets the flu. Donn"], [1783388261, 1783390890, "Beverly Hills, 90210", "Something in the Air", "S3 E28", "Following a little advice from Gil Meyers, Brandon and the rest of Donna's friends join forces to help her in a major school protest when she is suspended from school and is threatened with not graduating for getting drunk on Senior Prom night."], [1783390890, 1783393651, "Beverly Hills, 90210", "Commencement", "S3 E29", "At graduation, the friends reminisce about their high-school days and look ahead to college."], [1783393651, 1783396369, "Beverly Hills, 90210", "Episode 30", "S3 E30", "The Peach Pit"], [1783396369, 1783399082, "Beverly Hills, 90210", "Episode 31", "S3 E31", "The Peach Pit"], [1783399082, 1783401826, "Beverly Hills, 90210", "So Long, Farewell, Auf Wiedersehen, Goodbye", "S4 E1", "Steve is taken off the waiting list and accepted to California University. A producer hoping to entice Samantha to star in a sitcom allows Steve, Brandon and Celeste use of his beach house for a few weeks. The gang throws a blow-out bash the night before Brenda is to leave for Minnesota. Kelly comes home early from Europe--without Dylan. She claims that all is well, but later confesses to Donna th"]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783306454, 1783307884, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783307884, 1783309229, "Saved by the Bell", "King of the Hill", "S1 E15", "At Bayside High School in Palisades, California, conniving preppy Zack Morris makes a play for Kelly Kapowski, the new girl that he has a crush on, but so does transfer student, A.C. Slater. So, after Kelly gets a detention, Zack tries to ensue that he does in order to be in the same room with her."], [1783309229, 1783310568, "Saved by the Bell", "Save That Tiger", "S1 E16", "The cheerleader county competition arrives as well as the annual prank war with Valley and Bayside High. Jessie is asked to be the head cheerleader and Screech is to be the tiger mascot this year, which is crucial to the cheer leading routine. But two Valley guys kidnap Screech in retaliation for Zack and Slater's pranks against Valley."], [1783310568, 1783311951, "In Living Color", "Anton at the Recruiter", "S2 E2", "Sketches include:\n\n\"\"Anton Volunteers\"\"   \"\"Training Men the Wodehouse Way\"\"   \"\"Roseanne Sings America\"\"   \"\"2 Live Crew\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""], [1783311951, 1783313256, "In Living Color", "Spike's Joint", "S2 E3", "Sketches (not including intro) include:\n\n\"\"Flatuscents\"\"   \"\"Good Morning/Good Night (Magenta Thompson Show)\"\"   \"\"Cephus & Reesie's Broadway Tour\"\"   \"\"The Buttmans: Guess Who's Coming to Dinner\"\"   \"\"Spike's Joint\"\""], [1783313256, 1783314817, "Sex and the City", "The Freak Show", "S2 E3", "Carrie turns freakish herself after dating a string of freaky guys and freaks out the very normal Ben when trying to discover his secret freakiness. Miranda dates \"Manhattan Guy,\" a guy who hasn't left Manhattan in ten years. Charlotte dates the renowned \"Mr. Pussy\" and tries to make a real relationship out of it. Samantha decides to get plastic surgery and freaks out during the consult."], [1783314817, 1783316390, "Sex and the City", "They Shoot Single People, Don't They?", "S2 E4", "Single and fabulous Carrie gets a horrible photo taken for the cover story of New York Magazine: Single and Fabulous...?. Miranda fakes orgasms with her current boyfriend. Charlotte starts dating her handyman. Samantha dates a club owner, who calls them a \"we\" right away."], [1783316390, 1783319207, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783319207, 1783322021, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783322021, 1783323450, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783323450, 1783324885, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783324885, 1783326223, "Saved by the Bell", "Episode 17", "S1 E17", "Prime Time"], [1783326223, 1783327561, "Saved by the Bell", "Episode 18", "S1 E18", "Prime Time"], [1783327561, 1783328953, "In Living Color", "Hour of Power", "S2 E4", "Sketches include:\n\nTag Team Evangelists / Bonita Butrell: Uninvited Guest / 1-900-YT GUILT / Al MacAfee: Hall Monitor / Monie Love performs \"Monie in the Middle\""], [1783328953, 1783330346, "In Living Color", "Miss Black Person USA", "S2 E5", "Sketches include:\n\n\"\"Black Like You\"\"   \"\"Go On Girl: Sensitive Men\"\"   \"\"I Won't Drift Away\"\"   \"\"Miss Black Person U.S.A.\"\""], [1783330346, 1783332006, "Sex and the City", "Four Women and a Funeral", "S2 E5", "Carrie starts seeing Mr. Big again. Miranda buys her own apartment on the Upper West Side. Charlotte meets a recent widower at a cemetery. Samantha's actions with a married man gets her in trouble with the New York high-society \"ladies who lunch\" and only a titanic star can help her out."], [1783332006, 1783333511, "Sex and the City", "The Cheating Curve", "S2 E6", "Carrie starts to \"officially\" date Mr. Big again. Miranda dates a guy who insists on watching porn while they have sex. Fed up with cheating men, Charlotte spends time with her new friends, the \"Power Lesbians.\" Samantha starts dating her gym instructor who \"brands\" her with a lightning bolt."], [1783333511, 1783336326, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783336326, 1783339023, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783339023, 1783340438, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783340438, 1783341874, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783341874, 1783343213, "Saved by the Bell", "Episode 19", "S1 E19", "Prime Time"], [1783343213, 1783344624, "Saved by the Bell", "Episode 20", "S1 E20", "Prime Time"], [1783344624, 1783346018, "In Living Color", "The Black Man's Guide to Understanding the Black Woman", "S2 E6", "Sketches include:\n\n\"\"Hey Mon/Hedley Court\"\"   \"\"Shahrazad Ali's Video (The Black Man's Guide to Understanding the Black Woman)\"\"   \"\"Snackin' Shack\"\"   \"\"Frenchie\"\""], [1783346018, 1783347411, "In Living Color", "Funky Finger Productions", "S2 E7", "Sketches include:\n\n\"\"B.S. Brothers: Penitentiary IV\"\"   \"\"Iraqi Fashion Show\"\"   \"\"Lil Miss Trouble: The School Play\"\"   \"\"Vera DeMilo: Buffed, Beautiful, and Bitchin'\"\"   \"\"Homeboy Shopping Network: Hollywood Homeboys\"\""], [1783347411, 1783348922, "Sex and the City", "The Chicken Dance", "S2 E7", "Carrie gets fed up with Big's inability to pay attention to her. Miranda inadvertently sets her interior designer up with a long-distance would-be boyfriend, and they marry after only four weeks. Charlotte has a \"warp speed\" relationship with a guy she meets at the wedding. Samantha is upset when she experiences \"déjà-screw\": sleeping with a guy she previously did fifteen years ago."], [1783348922, 1783350427, "Sex and the City", "The Man, the Myth, the Viagra", "S2 E8", "A frustrated Carrie tries to get Big to make time to meet the girls. Miranda meets Steve Brady, a cute bartender who wants to be more than a one-night stand. Samantha dates an incredibly wealthy man in his seventies with a sumptuous lifestyle and a pocket full of Viagra."], [1783350427, 1783353211, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783353211, 1783355996, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783355996, 1783357432, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783357432, 1783358871, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783358871, 1783360274, "Saved by the Bell", "The Prom", "S2 E1", "Zack asks Kelly to be his date for the prom and she agrees, but when her father loses his job, she decides family is more important and gives up her chance to go, but cannot bring herself to tell Zack."], [1783360274, 1783361677, "Saved by the Bell", "Zack's War", "S2 E2", "Mr. Belding tries to reform Zack by making him join the Army Cadet Corps. Zack gets the whole gang to join him, and they end up competing with each other in an obstacle course. Meanwhile, Lisa is swayed by the Cadet Corps drill instructor, Chet Adams."], [1783361677, 1783363070, "In Living Color", "Laquita Meets Billy Dee", "S2 E8", "Sketches include:\n\n\"\"Magenta's Acting School\"\"   \"\"Foundation for Golf Heritage\"\"   \"\"Evelyn Smith\"\"   \"\"Laquita Sings the Blues\"\""], [1783363070, 1783364236, "In Living Color", "Men on Vacation", "S2 E9", "Sketches include:\n\nA Lassie '90 Sequel / Amazing Grace - Rocky VI / Cousin Milly / PMS Defense System / Men on Vacation / 3rd Bass perform \"Product of the Environment\""], [1783364236, 1783365854, "Sex and the City", "Old Dogs, New Dicks", "S2 E9", "Carrie tries to get Big to stop checking out other women when they're together. Miranda and Steve's opposite schedules become a problem. Samantha runs into an old hockey-player boyfriend who is now a blonde drag queen named Samantha. Charlotte is turned-off when she dates a man who has not been circumcised; Carrie points out to Charlotte that 85% of men are not circumcised while Samantha claims to"], [1783365854, 1783367517, "Sex and the City", "The Caste System", "S2 E10", "Carrie gets fed up with high society while at an Upper East Side party with Big. Miranda and Steve have an argument over money and social status. Charlotte meets Wiley Ford, the movie star and joins his entourage. Samantha dates a wealthy real-estate developer with a Southeast Asian live-in servant who has her master wrapped around her little finger."], [1783367517, 1783370259, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783370259, 1783373042, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."], [1783373042, 1783374436, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783374436, 1783375842, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783375842, 1783377245, "Saved by the Bell", "Save the Max", "S2 E3", "The gang unearths Bayside's old school radio station and begins broadcasting again, before learning that The Max is to be closed if Max does not manage to pay $10,000 in back rent."], [1783377245, 1783378648, "Saved by the Bell", "Driver's Education", "S2 E4", "In order to get their driver's licenses, the gang go through a driver's education course. Zack and Kelly advance in their relationship, with Zack buying Kelly a ring. Slater buys a car, and is at the head of the driver's ed class. When Zack becomes jealous of Kelly's attention toward Slater over the driving issue, he tries to set Slater up to fail, but gets the boot himself instead."], [1783378648, 1783380039, "In Living Color", "Anton's Thanksgiving", "S2 E10", "Sketches include:\n\nThe Brothers Brothers: Two Sisters for Two Brothers / Barbara Bush Visits the Illiterates / Dickie Peterson: Cherub of Justice / Anton's Thanksgiving / D-Nice performs"], [1783380039, 1783381428, "In Living Color", "Justice Legions of America", "S2 E11", "Sketches include:\n\n\"\"Three Champs and a Little Lady\"\"   \"\"The Newlywed Game\"\"   \"\"The Good Behavior Variety Hour Show\"\"   \"\"Handi Man: The Justice Legion of America\"\"  Nikki D perorms"], [1783381428, 1783383050, "Sex and the City", "Evolution", "S2 E11", "Carrie tries to leave her mark at Big's place by leaving some personal items behind. Miranda finds out that one of her ovaries has stopped producing eggs. Charlotte dates Stefan, a pastry chef who she mistakenly thought was gay but is, in his own words, a \"gay straight man\". Samantha tries to get revenge on Dominic, her ex who broke her heart."], [1783383050, 1783384798, "Sex and the City", "La Douleur Exquise!", "S2 E12", "Carrie is horrified when Big casually tells her he's moving to Paris for seven months. Miranda dates a man who only wants to have sex in places where they might get caught. Charlotte meets Buster, a high-end shoe salesman with a serious foot fetish. Samantha introduces the girls to a hot new S&M restaurant."], [1783384798, 1783387585, "Beverly Hills, 90210", "Summer Storm", "S2 E3", "Cindy's mothering instincts upset both Jim and Brenda after she brings an injured Dylan to recuperate at their house after he has a accident while surfing in dangerous conditions, while Dylan's father is arrested for income tax evasion. Kelly gets involved with a shy volleyball player named Kyle who is reluctant to make a move on her. Meanwhile, David and Donna are reluctantly paired for a Romeo a"], [1783387585, 1783390341, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783390341, 1783391736, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783391736, 1783393063, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783393063, 1783394400, "Saved by the Bell", "House Party", "S2 E5", "Zack stays over at Screech's place for the weekend where the two of them along with Slater throw a party which is interrupted by the girls before breaking off a valuable item from Mrs. Powers."], [1783394400, 1783395805, "Saved by the Bell", "Blind Dates", "S2 E6", "Mr. Belding blackmails Zack with suspension if he won't take his bratty niece, Penny, out on a date. So, Zack asks Screech to impersonate him while he takes out Kelly for her birthday party at the Max. But Slater overhears this and decides to break up Zack's plans to he can have another chance with Kelly. Meanwhile, Lisa sets Jessie up on a blind date, but there's a problem: the guy is much shorte"], [1783395805, 1783397195, "In Living Color", "Veracosa", "S2 E12", "Sketches include:\n\n\"\"Vera DeMilo: Veracosa, Mistress of Destruction\"\"   \"\"Cephus & Reesie: Christmas Album\"\"   \"\"Lil Miss Trouble at the Museum\"\"   \"\"Homey the Clown: Homey Claus\"\""], [1783397195, 1783398584, "In Living Color", "Johnny Abdul", "S2 E13", "Sketches include:\n\n\"\"The Brothers Brothers: Tom and Tom for the Arizona Tourism Commission\"\"   \"\"Johnny Abdul - Saudi Rock Star\"\"   \"\"The Last Orphan\"\"   \"\"Velma Mulholland\"\"   \"\"B.S. Brothers: Funky Finger Productions\"\"   \"\"The Head Detective\"\"  / Rich Nice performs"], [1783398584, 1783400089, "Sex and the City", "Games People Play", "S2 E13", "Carrie starts going to therapy after obsessing about Big for too long. Offended by the diagnosis of dating men who are wrong for her, she dates cute fellow-patient Seth (Jon Bon Jovi)...a guy who loses interest in women after sleeping with them. Miranda plays \"peek-a-boo\" with her cute across-the-airshaft neighbor. Samantha dates a sports fanatic whose mood depends on who won the game that night."], [1783400089, 1783401703, "Sex and the City", "The Fuck Buddy", "S2 E14", "Carrie tries to make a relationship with her \"fuck buddy.\" Miranda dates an abusive, condescending lawyer. Charlotte becomes a free-wheeling dater and double-books dates with two guys on the same night. Samantha overhears the couple moaning next door, and decides to outdo them."]]}, {"id": "111", "name": "Savage at Nite", "a": "savage-at-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/savage-at-nite-v4.png", "progs": [[1783306258, 1783307664, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783307664, 1783308958, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783308958, 1783310255, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783310255, 1783311647, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783311647, 1783312995, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783312995, 1783314367, "Raising Hope", "Episode 23", "S1 E23", "Savage at Nite"], [1783314367, 1783315539, "Raising Hope", "Episode 24", "S1 E24", "Savage at Nite"], [1783315539, 1783316942, "Saved by the Bell", "Save the Max", "S2 E3", "The gang unearths Bayside's old school radio station and begins broadcasting again, before learning that The Max is to be closed if Max does not manage to pay $10,000 in back rent."], [1783316942, 1783318345, "Saved by the Bell", "Driver's Education", "S2 E4", "In order to get their driver's licenses, the gang go through a driver's education course. Zack and Kelly advance in their relationship, with Zack buying Kelly a ring. Slater buys a car, and is at the head of the driver's ed class. When Zack becomes jealous of Kelly's attention toward Slater over the driving issue, he tries to set Slater up to fail, but gets the boot himself instead."], [1783318345, 1783319691, "That '70s Show", "The Good Son", "S1 E25", "Eric loves having Hyde as a \"brother\" because he does all of Eric's chores but when his parents start to prefer Hyde he starts to hate him. Hyde changes from the conspiracy minded trouble-making guy Eric loves to a total bore. Midge and Bob are having relationship problems. Red's old war buddy comes back and Red finds out that he's a swinger."], [1783319691, 1783320775, "That '70s Show", "Episode 26", "S1 E26", "Savage at Nite"], [1783320775, 1783322170, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783322170, 1783323496, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783323496, 1783324791, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783324791, 1783326087, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783326087, 1783327419, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783327419, 1783328808, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783328808, 1783329980, "Raising Hope", "Episode 25", "S1 E25", "Savage at Nite"], [1783329980, 1783331283, "Raising Hope", "Prodigy", "S2 E1", "When Jimmy watches a home video of himself as a thirteen-year-old, he discovers that he was a musical prodigy with a promising career as a singer and pianist until a horrible accident involving a golf putter rendered him talentless. Jimmy recruits Burt, Virginia and Maw Maw to help him rediscover his lost abilities."], [1783331283, 1783332621, "Saved by the Bell", "House Party", "S2 E5", "Zack stays over at Screech's place for the weekend where the two of them along with Slater throw a party which is interrupted by the girls before breaking off a valuable item from Mrs. Powers."], [1783332621, 1783334025, "Saved by the Bell", "Blind Dates", "S2 E6", "Mr. Belding blackmails Zack with suspension if he won't take his bratty niece, Penny, out on a date. So, Zack asks Screech to impersonate him while he takes out Kelly for her birthday party at the Max. But Slater overhears this and decides to break up Zack's plans to he can have another chance with Kelly. Meanwhile, Lisa sets Jessie up on a blind date, but there's a problem: the guy is much shorte"], [1783334025, 1783335351, "That '70s Show", "Garage Sale", "S2 E1", "The Formans have a garage sale to earn some extra cash. Hyde doesn't have anything to sell, so he bakes \"special brownies\" to sell; Kitty, Red, Bob and Midge eat some of the brownies unsuspectingly. Fez kisses Jackie who tells Donna it's the best kiss she's ever had. (#26)"], [1783335351, 1783336678, "That '70s Show", "Red's Last Day", "S2 E2", "It's Red's last day of work, and he decides to drown his unemployment sorrows at a bar.  Kitty sends Eric to pick Red up; he, Hyde and Fez end up drinking with Red instead, leaving none of them in any condition to drive.  Kelso gets a van, and christens it the \"shaggin' wagon.\""], [1783336678, 1783338067, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783338067, 1783339461, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783339461, 1783340759, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783340759, 1783342055, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783342055, 1783343451, "The Wonder Years", "How I'm Spending My Summer Vacation", "S2 E17", "As the end of school approaches, Kevins looks forward to spending the summer with Paul and Winnie. However, his summer is spoiled when Paul tells hims that he'll be leaving for summer and Winnie seems to be avoiding him."], [1783343451, 1783345177, "The Wonder Years", "Episode 18", "S2 E18", "Savage at Nite"], [1783345177, 1783346480, "Raising Hope", "Sabrina Has Money", "S2 E2", "When Burt discovers that Sabrina is the daughter of his wealthy new client, he lets the family in on her secret. Embarrassed by her family’s wealth she reluctantly introduces the Chance family to her father, Cap. Meanwhile Jimmy decides Hope should have rich friends and begs Sabrina to take him to her sister’s party where Sabrina’s insecurities become apparent."], [1783346480, 1783347783, "Raising Hope", "Kidnapped", "S2 E3", "When a ponytailed hippie named Jack who kidnapped Burt twenty years ago unexpectedly pays the Chance family a visit, they discover that Burt's disappearance wasn't all it appeared. Meanwhile Jimmy's jealousy creeps out when Sabrina anxiously awaits a text from her boyfriend Wyatt."], [1783347783, 1783349186, "Saved by the Bell", "Rent-a-Pop", "S2 E7", "Zack hires an actor named James, who works as a waiter at the Max, to impersonate his father, Derek, to Mr. Belding, and later, asks James to impersonate Mr. Belding to his real father to avoid the consequences of some bad grades. Meanwhile, the rest of the gang plans a carnival to raise money for a new school field trip."], [1783349186, 1783350594, "Saved by the Bell", "Miss Bayside", "S2 E8", "Bayside's winner of the Miss Bayside beauty pageant will go on to compete in the state-wide pageant of Miss High School California. The pageant stirs up controversy about sexism, in which both A.C. Slater and Screech enter as contestants to win a bet over who could win. Who will be the next Miss Bayside?"], [1783350594, 1783351921, "That '70s Show", "The Velvet Rope", "S2 E3", "Now that he's unemployed, the job hunt is on for Red.  The gang decides to go to a dance club, and Jackie manages to convince Kelso that dressing like David Bowie is a good idea.  Once at the club, Donna, Fez and Hyde have no problem getting in, but Eric can't make it past the overly large bouncer."], [1783351921, 1783353248, "That '70s Show", "Laurie and the Professor", "S2 E4", "Bob and Midge's marital troubles spill over into a fight over Donna's affection.  One of Laurie's college professors comes to Point Place to see if he can convince Laurie to return to classes, and he takes a 'hands-on' approach to the task, much to Eric's shock.  Fez looks for a woman, and Hyde looks for a room to sleep in."], [1783353248, 1783354642, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't bear to think of her having a new man in her life."], [1783354642, 1783356036, "The Fresh Prince of Bel-Air", "Guess Who's Coming to Marry?", "S2 E6", "Tensions spill over just before the wedding of Will's Aunt Janice when Will's mom meets Janice's intended - and forbids Will to attend the interracial wedding."], [1783356036, 1783357332, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783357332, 1783358629, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783358629, 1783359873, "The Wonder Years", "Episode 19", "S2 E19", "Savage at Nite"], [1783359873, 1783361275, "The Wonder Years", "Summer Song", "S3 E1", "The Arnold family and Paul Pfeiffer travel to Ocean City for a little fun in the sun. However, once there, no one really seems to be having any. Paul's allergies flare up, and Wayne and Karen's attitudes are making it nothing like the family trips from long ago. Kevin is still stinging from the news the Winnie Cooper has a new boyfriend, until he meets a cute (but older) girl named Teri."], [1783361275, 1783362578, "Raising Hope", "Henderson, Nevada-Adjacent Baby! Henderson, Nevada-Adjacent!", "S2 E4", "Virginia, Burt, Jimmy and Sabrina go to Las Vegas when Delilah plans a big wedding, but Virginia is jealous of her cousin's fancy ceremony because she never had one. Meanwhile, Jimmy hopes his luck with Sabrina will improve in Sin City."], [1783362578, 1783363836, "Raising Hope", "Killer Hope", "S2 E5", "After discovering that Hope hit a boy at daycare, the family becomes worried that Hope is following in her mother's footsteps. Meanwhile, the Chances run into some problems when they camp out in tents due to their home being fumigated for termites."], [1783363836, 1783365238, "Saved by the Bell", "Jessie's Song", "S2 E9", "Jessie turns to caffeine pills to keep up with her studies and her new singing group, Hot Sundae."], [1783365238, 1783366576, "Saved by the Bell", "Model Students", "S2 E10", "After a heated debate about the school calenders, a photographer decides to use Jessie, Lisa and Kelly in a photo shoot where Kelly is chosen as the winner of a contest that'll make her famous in France."], [1783366576, 1783367902, "That '70s Show", "Halloween", "S2 E5", "The gang, looking for something fun to do on Halloween, revisits their old grammar school, where they find their permanent records. Looking through them, they find out some interesting things about each other. Fez discovers trick or treating."], [1783367902, 1783369228, "That '70s Show", "Vanstock", "S2 E6", "Eric, Donna, Kelso, Hyde and Fez are all going to Vanstock, Wisconsin's own Woodstock. Jackie says she doesn't want to go, so Kelso invites Laurie. In the end, both girls go leaving Kelso stuck in the middle. Donna gets mad at Eric for not telling her about Kelso and Laurie. Fez spends the night girl chatting to Jackie and Laurie, much to Kelso's chagrin while Hyde attempts drop him in it. Red bec"], [1783369228, 1783370621, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."], [1783370621, 1783372016, "The Fresh Prince of Bel-Air", "She Ain't Heavy", "S2 E8", "Will hits it off with the full-figured Dee Dee, but her size keeps him from asking her to the dance."], [1783372016, 1783373309, "The Goldbergs (2013)", "I Rode a Hoverboard", "S2 E8", "When Adam sustains a severe compound fracture, he lies in school about having ridden a hoverboard, just like Back to the Future II. However, the lie threatens his friendship with Emmy Mirsky. Meanwhile, when the Goldberg family is enamored with a new restaurant, China Garden, Beverly fears that her family does not appreciate her cooking. This leads to a war between her and restaurant employee Mrs."], [1783373309, 1783374606, "The Goldbergs (2013)", "The Most Handsome Boy on the Planet", "S2 E9", "Barry is excited when a modelling representative approaches him, but Erica thinks it's a scam."], [1783374606, 1783375993, "The Wonder Years", "Math Class", "S3 E2", "Kevin has trouble in math class when he comes up against a teacher who Kevin thinks is completely unreasonable."], [1783375993, 1783377359, "The Wonder Years", "Wayne on Wheels", "S3 E3", "Kevin wants to get to the mall to see a girl he can't stop thinking about, but the only way he can is by begging his brother to drive."], [1783377359, 1783378660, "Raising Hope", "Jimmy and the Kid", "S2 E6", "Supermarket manager Barney's wicked ex Gloria is in town and gets him to employ her cute teenage son, Trevor. Jimmy's sympathy for the kid turns into panic when Sabrina clearly prefers his wittier humor and boyish charms and Trevor digs her."], [1783378660, 1783379962, "Raising Hope", "Burt's Parents", "S2 E7", "Jimmy, Virginia, Burt, Sabrina, Maw Maw and Hope borrow a house to impress Burt's wealthy parents who have decided at the last minute to celebrate Thanksgiving with the family. Things also get interesting when the real homeowners return early."], [1783379962, 1783381300, "Saved by the Bell", "1-900-CRUSHED", "S2 E11", "In an attempt to make money, Zack sets up a 900 number hotline, with Lisa offering advice to the students of Bayside. However, things go awry when Zack decides to keep the line running by dishing out bad advice."], [1783381300, 1783382699, "Saved by the Bell", "Close Encounters Of The Nerd Kind", "S2 E12", "After Zack breaks the school's video camera, he and the gang pretend Screech is an alien in order to win a photo competition. However, their picture soon arouses government suspicion."], [1783382699, 1783384025, "That '70s Show", "I Love Cake", "S2 E7", "Eric freaks out when Donna says 'I love you,' and all he can think of to say in return is 'I love cake.'  Donna, not knowing how to deal with this, turns to Jackie for relationship advice.  Midge kicks Bob out of the house; he stays with the Formans and Red has to act as a go-between to try to mend their marriage.  Kelso gets a new leather jacket that he thinks makes him look like Marlon Brando, b"], [1783384025, 1783385361, "That '70s Show", "Sleepover", "S2 E8", "Donna finally sleeps with Eric, but when the guys find out that all they did was sleep, they tease him mercilessly.  Hyde gets a job at the FotoHut, and finds out that compared to his boss, he's a workaholic.  And Kitty has to work double shifts at the hospital, leaving Red to do the cooking."], [1783385361, 1783386755, "The Fresh Prince of Bel-Air", "Cased Up", "S2 E9", "A pompous lawyer who's dating Hilary is no fan of Will's after he's sideswiped by Will's roadster."], [1783386755, 1783388129, "The Fresh Prince of Bel-Air", "Hi-Ho Silver", "S2 E10", "Will and Carlton think a party guest stole the silverware."], [1783388129, 1783389426, "The Goldbergs (2013)", "DannyDonnieJoeJonJordan", "S2 E10", "Beverly is ordered to clean out the garage by Murray, who wants everything gone except for one trunk that he allows her to keep. Meanwhile, Adam and Barry discover Erica's old collection of New Kids on the Block memorabilia."], [1783389426, 1783390716, "The Goldbergs (2013)", "The Darryl Dawkins Dance", "S2 E11", "As the Sadie Hawkins dance approaches, Erica asks Beverly to help her find Barry a date to keep him away from Lainey. But Beverly comes up with a girl that shocks everyone. Meanwhile, Adam gets into a fight with his best friend...Pops."], [1783390716, 1783392081, "The Wonder Years", "Mom Wars", "S3 E4", "Kevin thinks his mother is being over-protective when she tries to stop him from playing tackle football after school."], [1783392081, 1783393469, "The Wonder Years", "On the Spot", "S3 E5", "Kevin joins the school play just to get out of Gym class, while Winnie and Paul seem to take it very seriously. Winnie has problems with her performance, and Kevin unexpectedly helps her during the show."], [1783393469, 1783394768, "Raising Hope", "Bro-gurt", "S2 E8", "Virginia encourages the family to submit their own inventions in the National Invention Convention Extravaganza, so they could win the cash prize. Burt and Andrew team up to create unusual flavored yogurt, while Sabrina and Jimmy create a new baby mop."], [1783394768, 1783396066, "Raising Hope", "The Men of New Natesville", "S2 E9", "After being encouraged to be more of a daredevil by Burt, Jimmy jumps at the chance of showing off his bolder side at a party at Frank's house. Frank and Jimmy realize they have shared a common high school bully, and when they try to take him down, they realize their old bully has changed."], [1783396066, 1783397476, "Saved by the Bell", "Running Zack", "S2 E13", "Zack is the key man at a track meet, but he can't run unless he finishes a project on his family's heritage. So on Mrs. Wentworth's advice, Zack visits an elderly Native American beatnik who tells him about his distant Indian heritage. But when tragedy strikes and Chief Henry dies from natural causes, Zack doesn't know if he can run for the school."], [1783397476, 1783398816, "Saved by the Bell", "The Last Dance", "S3 E1", "When Kelly gets a job at the Max, the attraction of Kelly to her boss Jeff Hunter causes her and Zack to break up for good at the annual costume ball. Meanwhile, Jessie and Slater plot to be elected prom king and queen, while the gang forms a new band called 'Zack Attack' to perform at the dance."], [1783398816, 1783400142, "That '70s Show", "Eric Gets Suspended", "S2 E9", "Donna is acting out over her parents' break up and takes up smoking. Eric gets caught holding one of her cigarettes in the school yard and is suspended. Even though Eric tries explaining what really happened, Red punishes him. Fez and Hyde go on a double date, set up by Fez's host parents; Hyde can't decide which girl he likes better. Jackie and Kelso argue over how many stuffed animals she can ha"], [1783400142, 1783401469, "That '70s Show", "Red's Birthday", "S2 E10", "It's Red's birthday and the roof collapses so Eric gets him some 2 x 4s to fix it. Bob and Midge take Red and Kitty out for dinner but they each bring a date and ditch them to do it in the car. Eric is mad at Donna for talking to Hyde about her parent's problems instead of talking to him."]]}, {"id": "215", "name": "Bel-Air", "a": "bel-air", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/belair-v1.png", "progs": [[1783307188, 1783308544, "The Fresh Prince of Bel-Air", "Fresh Prince: The Movie", "S5 E5", "Will tells a tall tale about seeing a mob killing, then being placed in a witness-protection program in the backwoods of Alabama."], [1783308544, 1783309902, "The Fresh Prince of Bel-Air", "Will's Misery", "S5 E6", "The Banks hate the ugly golf shirts Hilary gives them - until they see Kareem Abdul-Jabbar wearing the same design."], [1783309902, 1783311259, "The Fresh Prince of Bel-Air", "Father Knows Best", "S5 E7", "To help Ashley out of a jam at school, Will poses as her father. Oh yeah, this is gonna work."], [1783311259, 1783312610, "The Fresh Prince of Bel-Air", "Soul Train", "S5 E8", "At a Soul Train reunion, middle-aged Philip feels like his train has left the station."], [1783312610, 1783313968, "The Fresh Prince of Bel-Air", "Love Hurts", "S5 E9", "Lisa humiliates Will by knocking out a guy with her self-defense moves."], [1783313968, 1783315323, "The Fresh Prince of Bel-Air", "Will's Up a Dirt Road", "S5 E10", "Will, in an attempt to impress Lisa, makes a photo of Jay Leno by night and sells the picture to an editor. However, Will doesn't know the editor works for a sleazy gossip magazine and ends up being sued for libel by Jay Leno."], [1783315323, 1783316679, "The Fresh Prince of Bel-Air", "Will Steps Out", "S5 E11", "To understand Philip's battle with the scale, Will dons a fat suit and gets a big fat lesson in empathy."], [1783316679, 1783318021, "The Fresh Prince of Bel-Air", "Same Game, Next Season", "S5 E12", "Will works so hard to impress Lisa's dad that he spends all his free time with his new best buddy."], [1783318021, 1783319370, "The Fresh Prince of Bel-Air", "Three's a Crowd", "S5 E13", "Will gets roped into a weekend ski trip with Carlton that quickly turns to disaster when their party arrives; meanwhile, back home, Hilary prepares to leave the nest."], [1783319370, 1783320728, "The Fresh Prince of Bel-Air", "It's a Wonderful Lie", "S5 E14", "Lisa tells Will is OK if he wants to go out with his friends one night and she will go out with her friends. They each lie about what they are going to do, and happen to both go to the same party. Worse, they find Ashley at the same party."], [1783320728, 1783322049, "The Fresh Prince of Bel-Air", "Bullets Over Bel-Air", "S5 E15", "A planned camping trip is cut short for Carlton and Will when a robber approaches them at an automated bank-teller machine - and fires a gun."], [1783322049, 1783323400, "The Fresh Prince of Bel-Air", "A Decent Proposal", "S5 E16", "Still in the hospital from being shot, Will thinks about his future. He asks Lisa to marry him."], [1783323400, 1783324759, "The Fresh Prince of Bel-Air", "Will is from Mars...", "S5 E17", "Thanks to relationship counseling, Will and Lisa hop to move on up to a new understanding in preparation for marriage. Meanwhile Hillary wants Geoffrey to work at her new home."], [1783324759, 1783326115, "The Fresh Prince of Bel-Air", "The Wedding Show (Psyche!)", "S5 E18", "Shafted! The engaged couple opts for flashy Vegas vows, complete with costumes. The tasteful theme: Shaft."], [1783326115, 1783327443, "The Fresh Prince of Bel-Air", "Slum Like It... Not!", "S5 E19", "Will vows Philip with his sound investment advice to buy Jazz's apartment building - but the tenants scream slumlord after Philip acts on Will's moneymaking tip."], [1783327443, 1783328797, "The Fresh Prince of Bel-Air", "As the Will Turns", "S5 E20", "Will finds out what it is like to have a woman in his life that controls things. Also, Will lands a part in a soap opera and begins to see himself as a major star, spending money to fit his new status."], [1783328797, 1783330146, "The Fresh Prince of Bel-Air", "Save the Last Trance for Me", "S5 E21", "Put into a trance by a stage hypnotist, Will behaves like a 4-year-old just as the family gears up for an interview with the admissions head of a private school."], [1783330146, 1783331497, "The Fresh Prince of Bel-Air", "To Thine Own Self Be Blue... and Gold", "S5 E22", "A family friend visits Philip. He asks WIll to do something illegal and Will tries to find a way to avoid the issue. Carlton and Hilary try to find a match in online dating and end up being matched with each other."], [1783331497, 1783332844, "The Fresh Prince of Bel-Air", "Cold Feet, Hot Body", "S5 E23", "Dinner date. The Banks host a gorgeous girl from Philly who tries to lure Will away from Lisa."], [1783332844, 1783334202, "The Fresh Prince of Bel-Air", "Love in an Elevator", "S5 E24", "Stuck and out of luck, Will spends his bachelor party trapped in an elevator with a feuding Carlton and Jazz."], [1783334202, 1783335526, "The Fresh Prince of Bel-Air", "For Whom the Wedding Bells Toll", "S5 E25", "Husband-to-be Will has the bride, the ring, the date...and second thoughts about the whole idea."], [1783335526, 1783336881, "The Fresh Prince of Bel-Air", "Burnin' Down the House", "S6 E1", "While Carlton is away at a Young Republican camp, Will cooks up a flambe of a disaster on a night when an influential judge is coming to dinner, and Will can only make it through the night with the help of Geoffrey, and other plan is not to make Phil find out."], [1783336881, 1783338218, "The Fresh Prince of Bel-Air", "Get a Job", "S6 E2", "Will and Carlton compete for a job at Hilary's talk show. Will wins the job and has to take out a comedian's sister as part of his duties. Will is looking forward to it until he sees what the sister looks like."], [1783338218, 1783339557, "The Fresh Prince of Bel-Air", "Stress Related", "S6 E3", "After learning a little something about initiative, Will jumps to Hilary's aid prior to a key business meeting at the station, meanwhile an unemployed Carlton subs for Philip on career day at Ashley's school."], [1783339557, 1783340902, "The Fresh Prince of Bel-Air", "Bourgie Sings the Blues", "S6 E4", "Carlton is worried about the interview at Princeton and is afraid of another disappointment. Will does his best to check him up, but nothing seems to work. Carlton does not want to go to the interview, so Will goes for him."], [1783340902, 1783342256, "The Fresh Prince of Bel-Air", "The Script Formerly Known As...", "S6 E5", "Will decides to book a juror dismissed from Philip's big show-biz madam sex-scandal case for Hilary's show, which results in embarrassment for Judge Banks and some annoying apologies from Will and Hilary."], [1783342256, 1783343620, "The Fresh Prince of Bel-Air", "Not, I Barbecue", "S6 E6", "Will and Carlton's double date ends unromantically when a big bruiser shows up looking for his squeeze."], [1783343620, 1783344975, "The Fresh Prince of Bel-Air", "Not With My Cousin You Don't", "S6 E7", "Freakin' out! On the home intercom, Will and Carlton overhear Ashley talking about sex."], [1783344975, 1783346280, "The Fresh Prince of Bel-Air", "Viva Lost Wages", "S6 E8", "It's Carlton's birthday. His father gives a trip to Vegas for Carlton and Will as a gift. Carlton becomes addicted to gambling and loses all the money as well as the return home tickets. They enter a talent contest to try to win the prize."], [1783346280, 1783347634, "The Fresh Prince of Bel-Air", "There's the Rub (1)", "S6 E9", "It's Thanksgiving time. Hilary's television show is filming at a homeless shelter; Hilary and Carlton go to the shelter to volunteer. Philip hurts his back; Will suggests they go to a massage parlor to help his pain."], [1783347634, 1783348989, "The Fresh Prince of Bel-Air", "There's the Rub (2)", "S6 E10", "Philip and Will get arrested at the massage parlor because the girls try to give more than a massage. Hilary and Carlton continue to volunteer at the homeless shelter and realize how fortunate they are."], [1783348989, 1783350344, "The Fresh Prince of Bel-Air", "I, Ooh, Baby, Baby", "S6 E11", "Hilary's show has its national premiere. What more could she possibly want? How about a baby?"], [1783350344, 1783351675, "The Fresh Prince of Bel-Air", "Boxing Helena", "S6 E12", "Will's pride is on the ropes when a gorgeous boxing instructor KOs him at the gym."], [1783351675, 1783352989, "The Fresh Prince of Bel-Air", "I, Clownius", "S6 E13", "It's no laughing matter when a bomb-toting clown holds Philip hostage in the courtroom on the day of the showbiz madam's sentencing."], [1783352989, 1783354267, "The Fresh Prince of Bel-Air", "Breaking Up is Hard To Do (1)", "S6 E14", "Ka-boooom! That explosion you hear is Philip and Vivian's marriage after Philip decides to go into politics."], [1783354267, 1783355604, "The Fresh Prince of Bel-Air", "Breaking Up is Hard To Do (2)", "S6 E15", "Breaking up may not be so hard to do for an angry Vivian, but when Philip finds he's lost without her, Will and Carlton conspire to reunite them."], [1783355604, 1783356934, "The Fresh Prince of Bel-Air", "I, Bowl Buster", "S6 E16", "After being accepted at Princeton, a worried Carlton changes his life plans and retreats to a place where everybody knows his name - the bowling alley."], [1783356934, 1783358279, "The Fresh Prince of Bel-Air", "The Butler's Son Did It", "S6 E17", "Geoffrey's life changes overnight when a man claiming to be his long-lost son shows up and charms everyone - except Will, who discovers the guy's not what he seems. Meanwhile, Hilary starts writing her autobiography, and an early childhood photo reveals a shocking secret."], [1783358279, 1783359634, "The Fresh Prince of Bel-Air", "Hare Today...", "S6 E18", "The minister at church thinks Vivian's devotion to the church is her way to be near him, so he makes a pass at her. Carlton and Ashley argue about who will get to sing at the Easter service. Nicky's pet rabbit dies when Philip sits on it."], [1783359634, 1783360988, "The Fresh Prince of Bel-Air", "I, Whoops, There It Is", "S6 E19", "Dick Clark has a cameo on this backstage outing that has Will Smith visiting with series stars and screening series bloopers."], [1783360988, 1783362344, "The Fresh Prince of Bel-Air", "I, Stank Horse", "S6 E20", "Ashley is anxious to get into the School of Performing Art, and a friend of Will's says he will help her with her acting. Her first commercial requires she wear a bikini. Will and Carlton buy a horse that is being retired from racing."], [1783362344, 1783363698, "The Fresh Prince of Bel-Air", "I, Stank Hole in One", "S6 E21", "On Live with Regis and Kathie Lee, Hilary subs for Gifford but doesn't see eye-to-eye with co-host Philbin. Meanwhile, Will subs for Carlton in a golf tourney and gets buddy-buddy with Philip, making Carlton jealous."], [1783363698, 1783365053, "The Fresh Prince of Bel-Air", "Eye, Tooth", "S6 E22", "William Shatner stars as Hilary's talk-show guest, but Will must find a way to beam him from the dentist's chair to the set. Meanwhile, Hilary's show treks to New York and Ashley insists on tagging along."], [1783365053, 1783366399, "The Fresh Prince of Bel-Air", "I, Done (1)", "S6 E23", "It's Phil's birthday and he says it is wonderful time with everyone moving to new places and challenges. Even Geoffrey is moving back to London. Phil announces they are selling the house and moving away. Will realizes he is in the slow lane."], [1783366399, 1783367791, "The Fresh Prince of Bel-Air", "I, Done (2)", "S6 E24", "As members of the Banks family and Geoffrey prepare for their moves, Will tries to pretend that he also has big plans for moving forward. After admitting the truth, Will makes a decision to stay in California and finish school."], [1783367791, 1783369120, "The Fresh Prince of Bel-Air", "The Fresh Prince Project", "S1 E1", "Will comes to live with his aunt and uncle in Bel-Air. Phillip isn't too impressed by Will's behavior, especially teaching Ashley to rap and ruining his image to his members of the law firm. Vivian tries to remain neutral in all this. Carlton and Hillary look at Will with disdain."], [1783369120, 1783370553, "The Fresh Prince of Bel-Air", "Bang the Drum, Ashley", "S1 E2", "Will persuades Ashley to pawn her violin for a drum set."], [1783370553, 1783371865, "The Fresh Prince of Bel-Air", "Clubba Hubba", "S1 E3", "Will wants to go out with a beautiful girl he meets at the country club, but first he must figure out how to impress her extremely snobbish and very protective father so he seeks tips from cousin Carlton on becoming preppie."], [1783371865, 1783373299, "The Fresh Prince of Bel-Air", "Not with My Pig, You Don't", "S1 E4", "Philip's parents come to visit for the weekend when he wins a prestigious award. After finding the rehearsed lines of the Bankses to be boring and deciding to kill the story, Will talks to the interviewer telling her embarrassing stories about Philip's past \"barnyard life\" he heard from Philip's parents."], [1783373299, 1783374693, "The Fresh Prince of Bel-Air", "Homeboy, Sweet Homeboy", "S1 E5", "Will gets a visit from an old pal named Ice Tray, who, to Vivian and Philip's dismay, warms up to Hilary."], [1783374693, 1783376098, "The Fresh Prince of Bel-Air", "Mistaken Identity", "S1 E6", "While Philip and Vivian go on a trip to Palm Springs in Mr. Furth's helicopter, Will and Carlton drive Furth's car there as well. They get pulled over for \"stealing\" the car. Hilary babysits Ashley as Geoffrey has the weekend off."], [1783376098, 1783377529, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet to Poetry Night. After Jazz doesn't come through with an impostor, Will uses Geoffrey as the fake poet."], [1783377529, 1783380232, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (1)", "S1 E8", "The family heads to the mall to pick up costumes for Hilary's Halloween Party, while Will and Carlton place a bet to see who can find a date for the party. Philip gets held up at a gadget store. Vivian sing in a Record-A-Song booth. Hilary forgets to take a hat off Ashley and walks out of the store with it, they get accused of theft."], [1783380232, 1783381666, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783381666, 1783383091, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783383091, 1783384525, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783384525, 1783385960, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783385960, 1783387366, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783387366, 1783388791, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783388791, 1783390206, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783390206, 1783391636, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783391636, 1783393066, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783393066, 1783394501, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783394501, 1783395916, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783395916, 1783397351, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783397351, 1783398787, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783398787, 1783400226, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783400226, 1783401620, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."]]}]};
const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
</script>
</body></html>
