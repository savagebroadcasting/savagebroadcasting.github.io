const D = {"t0": 1783406658, "t1": 1783504416, "gen": 1783421105, "chans": [{"id": "1", "name": "The Silver Screen", "a": "the-silver-screen", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/silver-screen-v2.png", "progs": [[1783409325, 1783410878, "The Twilight Zone", "A Penny for Your Thoughts", "S2 E16", "The lucky flip of a coin seems to give a mild-mannered bank clerk the power to read minds. But he soon learns that you can't believe everything you read."], [1783410878, 1783412430, "The Twilight Zone", "Twenty Two", "S2 E17", "Miss Powell has a recurring nightmare about room 22 – a morgue."], [1783412430, 1783413982, "The Twilight Zone", "The Odyssey of Flight 33", "S2 E18", "Global Flight 33 is en route from London to New York in what appears to be a routine flight in a modern jetliner. Suddenly however, the jet's speed increases to an incredible 3000 knots and they arrive in New York rather quickly. Neither the captain or his well-trained crew can explain what happened - a strange tail-wind perhaps - but they are certainly not prepared for what they find as they surv"], [1783413982, 1783415525, "The Twilight Zone", "Mr. Dingle, the Strong", "S2 E19", "Luther Dingle is a meek and mild-mannered vacuum cleaner salesman. He spends some time in a bar but always seems to be in the middle of others arguments and always seems to get the worst of it. Courtesy of visiting - but invisible - aliens, he is given great strength, some 300 times greater than that of a normal human being. Dingle becomes something of a local celebrity but just how long will his "], [1783415525, 1783417056, "The Twilight Zone", "Static", "S2 E20", "Ed Lindsay hates television, so he gets his old radio out of the basement of the boardinghouse where he lives. He soon finds he can receive programs from the past when he's alone."], [1783417056, 1783418612, "The Twilight Zone", "The Prime Mover", "S2 E21", "Ace Larsen discovers his business partner has the ability to control objects with his mind. The pair head to Vegas to win big."], [1783418612, 1783420167, "The Twilight Zone", "Long Distance Call", "S2 E22", "A toy telephone given as a birthday gift becomes the link between young Billy Bayles and his newly deceased beloved grandmother, but this link becomes dangerous when she apparently wants him to join her on the other side."], [1783420167, 1783421688, "The Twilight Zone", "A Hundred Yards Over the Rim", "S2 E23", "In 1847 a western settler sets out to find medicine for his dying son - and stumbles into modern-day New Mexico."], [1783421688, 1783423252, "The Twilight Zone", "The Rip Van Winkle Caper", "S2 E24", "Thieves put themselves into suspended animation for 100 years after hiding a million dollars worth of gold bars."], [1783423252, 1783424806, "The Twilight Zone", "The Silence", "S2 E25", "Annoyed by fellow country club member Jamie Tennyson's constant chatter, Colonel Archie Taylor bets half a million dollars that Jamie cannot be completely silent for one year while living in a glass enclosure in the club's basement."], [1783424806, 1783426371, "The Twilight Zone", "Shadow Play", "S2 E26", "Convicted killer Adam Grant is trapped in a recurring nightmare in which he is sentenced to death by electrocution. He tries to convince those around him that they are imaginary and will cease to exist if he is executed."], [1783426371, 1783427924, "The Twilight Zone", "The Mind and the Matter", "S2 E27", "A book on the power of thought enables an irritable worker to re-create the world exactly as he wants it. But what he wants and what he gets are two different things!"], [1783427924, 1783429476, "The Twilight Zone", "Will the Real Martian Please Stand Up?", "S2 E28", "Following a frantic phone call about a crashed spaceship on a winter night, state troopers Bill Padgett and Dan Perry try to determine who among the bus passengers at a snowed-in roadside diner is a visitor from another world."], [1783429476, 1783431043, "The Twilight Zone", "The Obsolete Man", "S2 E29", "In a future state where religion and books have been banned, a librarian is judged obsolete and sentenced to death."], [1783431043, 1783432589, "The Twilight Zone", "Two", "S3 E1", "In a futuristic world a man and a woman, from opposing sides in a devastating war, meet in a deserted city. They don't share a common language and she is quite wary of her opponent, though he doesn't appear aggressive in any way. When she attempts to kill him, he goes off on his own. It's obvious that society and civilization has been destroyed and she begins to reconsider."], [1783432589, 1783434130, "The Twilight Zone", "The Arrival", "S3 E2", "A plane lands safely, but all its passengers, pilot and crew are missing."], [1783434130, 1783435674, "The Twilight Zone", "The Shelter", "S3 E3", "A dinner party for Bill Stockton's birthday is interrupted by a bulletin warning of an impending nuclear attack. As the neighbors scramble to prepare, they turn against the Stockton's, the only family that installed a bomb shelter."], [1783435674, 1783437216, "The Twilight Zone", "The Passersby", "S3 E4", "On the road home from the Civil War, a Confederate soldier stops at a burned-out house and gets to know the owner, a recent widow."], [1783437216, 1783438756, "The Twilight Zone", "A Game of Pool", "S3 E5", "Frustrated pool champion Jesse Cardiff has beaten everyone except for the deceased James Howard \"Fats\" Brown. Jesse can only curse his name. But guess who just walked into the pool room on Randolph Street?"], [1783438756, 1783440298, "The Twilight Zone", "The Mirror", "S3 E6", "After a poor but ambitious Central American farm worker overthrows his country's tyrannical leader, he believes he sees assassins everywhere. A look in the mirror reveals his most dangerous enemy."], [1783440298, 1783441839, "The Twilight Zone", "The Grave", "S3 E7", "Conny Miller rides into the hometown of Pinto Sykes, the man he's been tracking. He finds that Sykes has been gunned down by townsmen but no one knows who fired the fatal bullet. He is challenged by three of the townsmen to a grisly wager."], [1783441839, 1783443378, "The Twilight Zone", "It's a Good Life", "S3 E8", "On an isolated family farm in Peakesville, Ohio, young Anthony Fremont, who has vast mental powers but lacks emotional development, holds his terrified family and neighbors in thrall to his every juvenile wish."], [1783443378, 1783444917, "The Twilight Zone", "Deaths-Head Revisited", "S3 E9", "Former German SS Captain Gunther Lutze returns to Dachau concentration camp and begins reminiscing about the power he enjoyed there during \"the good old days\", until he finds himself on trial by the ghosts of those who died at his hands."], [1783444917, 1783446457, "The Twilight Zone", "The Midnight Sun", "S3 E10", "The Earth's orbit has been changed, drawing ever closer to the sun and promising imminent destruction."], [1783446457, 1783447998, "The Twilight Zone", "Still Valley", "S3 E11", "Confederacy scout Sgt. Joseph Paradine finds a town full of Union soldiers, and an old man who claims he used witchcraft to paralyze them."], [1783447998, 1783449537, "The Twilight Zone", "The Jungle", "S3 E12", "Engineer Alan Richards who has recently come home to New York City from his company's controversial hydroelectric project in Africa is plagued by both superstitions and the dire warnings of a native witch doctor."], [1783449537, 1783451077, "The Twilight Zone", "Once Upon a Time", "S3 E13", "In 1890, janitor Woodrow Mulligan uses his employers' invention to transport himself to the future. He imagines an Eden but finds a polluted, busy world that he doesn't find at all attractive. He meets Rollo who is also disgusted with the world he lives imagining life in the 1890s as idyllic. When Woodrow goes back to his own time Rollo goes with him but he is soon bored without any of the conveni"], [1783451077, 1783452619, "The Twilight Zone", "Five Characters in Search of an Exit", "S3 E14", "An American army major awakens in a small circular unfurnished room with no idea of his name or how he got there. Four other people are there with him and they all begin to question how they got there and, more importantly, how to escape."], [1783452619, 1783454161, "The Twilight Zone", "A Quality of Mercy", "S3 E15", "A gung ho young soldier gets a new viewpoint on war when he inexplicably changes places with a Japanese officer trying to stop his superior from leading a charge against American forces."], [1783454161, 1783455701, "The Twilight Zone", "Nothing in the Dark", "S3 E16", "Elderly urban dweller Wanda Dunn has fought with Death a thousand times and always won. Now she is afraid to let wounded policeman Harold Beldon in her tenement's door for fear that he is Death incarnate. Is he?"], [1783455701, 1783457243, "The Twilight Zone", "One More Pallbearer", "S3 E17", "Paul Radin has invited three people to join him in his bomb shelter."], [1783457243, 1783458793, "The Twilight Zone", "Dead Man's Shoes", "S3 E18", "Homeless Nathan Edward Bledsoe steals expensive shoes off of dead gangster Dane's abandoned body, steps into Dane's life, and plans third-party revenge on Dane's killer, his traitorous former business partner Daggett."], [1783458793, 1783460334, "The Twilight Zone", "The Hunt", "S3 E19", "On a hunting trip, Hyder Simpson and his dog Rip dive into a lake after a raccoon. When he gets home he finds that no one can see or hear him."], [1783460334, 1783461887, "The Twilight Zone", "Showdown with Rance McGrew", "S3 E20", "Overbearing Western TV series star Rance McGrew is transported back in time to the real Wild West and comes face-to-face with Jesse James who's not happy about how he and his fellow outlaws are being portrayed on Rance's show."], [1783461887, 1783463430, "The Twilight Zone", "Kick the Can", "S3 E21", "Charles Whitley living in the Sunnyvale Rest Home thinks he's found the secret of youth in playing child's games and exhorts his fellow seniors into joining in. His friend Ben Conroy and facility superintendent Cox want this stopped."], [1783463430, 1783464986, "The Twilight Zone", "A Piano in the House", "S3 E22", "Sadistic theatre critic Fitzgerald Fortune buys a gift for his wife Esther's birthday: a player piano that has the power to reveal the souls of all who hear it play. He then uses it to provide \"entertainment\" for her birthday party."], [1783464986, 1783466492, "The Twilight Zone", "The Last Rites of Jeff Myrtlebank", "S3 E23", "Young Southerner Jefferson Myrtlebank wakes up during his own funeral and wants to know what is going on. The townsfolk are glad to see him back, but they begin to wonder if he's a man - or something else."], [1783466492, 1783468033, "The Twilight Zone", "To Serve Man", "S3 E24", "An alien race comes to Earth, promising peace and sharing technology. Linguists Michael Chambers, Patricia Brody, and their team set out to translate the aliens' language, using a book whose title they deduce to be \"To Serve Man.\""], [1783468033, 1783469569, "The Twilight Zone", "The Fugitive", "S3 E25", "Young lame Jenny and the other neighborhood kids don't realize that their kind playmate Old Ben is really an intergalactic fugitive hiding out - until two serious men come looking for him and asking questions that test their friendship."], [1783469569, 1783471116, "The Twilight Zone", "Little Girl Lost", "S3 E26", "Awakened by the cries of their daughter Bettina, Chris and Ruth Miller enter her room to find that she has vanished, even though they still hear her crying for help. Chris' physicist friend Bill thinks she moved into another dimension."], [1783471116, 1783472656, "The Twilight Zone", "Person or Persons Unknown", "S3 E27", "David Gurney wakes up to find that no one - his wife, his co-workers, his best friend, not even his own mother knows him."], [1783472656, 1783474217, "The Twilight Zone", "The Little People", "S3 E28", "After crash landing on a seemingly desolate planet, astronauts Bill Fletcher and Peter Craig find a society of very small beings. While Fletcher repairs the spaceship, Craig becomes a megalomaniac and decides to rule their society."], [1783474217, 1783475758, "The Twilight Zone", "Four O'Clock", "S3 E29", "Obsessed Oliver Crangle wants to expose vice in the world, investigating people that he sees as evil, and then attempting to ruin their lives. His plan is to punish them all by an unspecified means at 4:00 this afternoon."], [1783475758, 1783477313, "The Twilight Zone", "Hocus-Pocus and Frisby", "S3 E30", "Rural gas station/general store proprietor Somerset Frisby, who's given to telling tall tales about himself, is abducted by visiting aliens who mistakenly believe him to be one of Earth's leading intellectuals."], [1783477313, 1783478854, "The Twilight Zone", "The Trade-Ins", "S3 E31", "Elderly long-married John and Marie Holt visit the New Life Corporation to shop for a pair of younger replacement bodies. But then John resorts to desperate measures in order to cover the immense cost of this purchase."], [1783478854, 1783480408, "The Twilight Zone", "The Gift", "S3 E32", "An alien who crash-lands into a remote mountain village stirs up the villagers' fears and animosity, but he befriends a little boy and gives him a mysterious present."], [1783480408, 1783481951, "The Twilight Zone", "The Dummy", "S3 E33", "Ventriloquist Jerry Etherson is convinced that his dummy, Willie, is alive and evil. He locks Willie in a trunk and makes plans for a new act with a new dummy. Too bad he didn't clear those plans with Willie first."], [1783481951, 1783483493, "The Twilight Zone", "Young Man's Fancy", "S3 E34", "When a newlywed couple briefly return to the groom's childhood home, the ties of the past prove too strong to resist."], [1783483493, 1783485034, "The Twilight Zone", "I Sing the Body Electric", "S3 E35", "Recent widower George Rogers, needing loving care for his three young children, orders a cybernetic \"grandmother\". While two of his children accept her, one of his daughters fiercely rejects her, with near tragic consequences."], [1783485034, 1783486542, "The Twilight Zone", "Cavender is Coming", "S3 E36", "Inept apprentice guardian angel Harmon Cavender is chastised by his superior and given a final chance to earn his wings by helping an unconventional big city woman, the young, socially awkward Agnes Grep."], [1783486542, 1783488047, "The Twilight Zone", "The Changing of the Guard", "S3 E37", "An elderly private school teacher wonders if his life has meant anything as he contemplates suicide on Christmas Eve and is reminded by former students that he has, indeed, made an effect on the lives of his students over the years."], [1783488047, 1783491177, "The Twilight Zone", "In His Image", "S4 E1", "A scientist tries to correct his imperfections by building a mechanical likeness of himself, which includes of all the finer qualities he is lacking."], [1783491177, 1783494307, "The Twilight Zone", "The Thirty-Fathom Grave", "S4 E2", "As a U.S. Navy destroyer cruises near Guadalcanal in the South Pacific, its sonar detects muted but constant hammering on metal undersea. The eerie sounds emanate from a submarine on the ocean floor, apparently there since World War II. The ship's chief boatswain's mate becomes very nervous, having served aboard that sub - and he was its sole survivor."], [1783494307, 1783497438, "The Twilight Zone", "Valley of the Shadow", "S4 E3", "A reporter finds himself trapped in a small town where people can reverse time and do many other amazing things."], [1783497438, 1783500571, "The Twilight Zone", "He's Alive", "S4 E4", "A tiny neo-Nazi organization struggles pathetically to succeed in a big city. A mysterious figure begins to ruthlessly guide a young, insecure U.S. Nazi leader, and the group begins to draw more attention."], [1783500571, 1783503703, "The Twilight Zone", "Mute", "S4 E5", "A 12-year-old girl who lost her parents in it due to Dylan's lifestyle and his father who gets indicted for corporate financial fraud. Meanwhile, Steve meets a woman who will be speaking at an AIDS seminar at school which leads everyone into discussing condoms."], [1783411679, 1783413042, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783413042, 1783414408, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783414408, 1783416174, "The Wonder Years", "Episode 9", "S1 E9", "Taba TV"], [1783416174, 1783417469, "The Wonder Years", "Episode 10", "S1 E10", "Taba TV"], [1783417469, 1783418903, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783418903, 1783420328, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783420328, 1783423144, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783423144, 1783425929, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783425929, 1783427294, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783427294, 1783428660, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783428660, 1783430091, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783430091, 1783431517, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783431517, 1783432952, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783432952, 1783434387, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783434387, 1783437189, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783437189, 1783440005, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783440005, 1783441358, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783441358, 1783442710, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783442710, 1783443935, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783443935, 1783445411, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783445411, 1783446816, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783446816, 1783448242, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783448242, 1783451057, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783451057, 1783453870, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783453870, 1783455238, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783455238, 1783456573, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783456573, 1783457868, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783457868, 1783459236, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783459236, 1783460651, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783460651, 1783462081, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783462081, 1783464898, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783464898, 1783467712, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783467712, 1783469047, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783469047, 1783470383, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783470383, 1783471784, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783471784, 1783473186, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783473186, 1783474615, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783474615, 1783476050, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783476050, 1783478865, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783478865, 1783481562, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783481562, 1783482792, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783482792, 1783484131, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783484131, 1783485518, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783485518, 1783486913, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783486913, 1783488328, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783488328, 1783489763, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783489763, 1783492548, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783492548, 1783495332, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783495332, 1783496670, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783496670, 1783498007, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783498007, 1783499408, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783499408, 1783500778, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783500778, 1783502214, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783502214, 1783503652, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."]]}, {"id": "5", "name": "The Fifth Dimension", "a": "the-fifth-dimension", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/fifth-dimension-v2.png", "progs": [[1783406813, 1783409694, "Quantum Leap", "Catch A Falling Star", "S2 E10", "May 21, 1979: Sam leaps into Ray Hutton, the understudy for the role of Cervantes just seconds before curtain time. His mission: prevent the drunken star from falling and seriously injuring himself during a benefit performance of \"Man of La Mancha.\" Sam isn't helped by the presence of his former piano teacher, on whom he once had a crush, and who now appears to have caught the star's eye as well."], [1783409694, 1783411247, "The Twilight Zone", "The Purple Testament", "S1 E19", "Lieutenant Fitzgerald, serving in World War II, possesses the disquieting ability to foresee impending death by observing a strange glow on the faces of his men before battle."], [1783411247, 1783412798, "The Twilight Zone", "Elegy", "S1 E20", "Three astronauts touch down on an Earth-like asteroid where they discover a world of people who appear to be frozen in time. Confused, they try to theorize why everyone is motionless until a resident springs to life and explains."], [1783412798, 1783415609, "Quantum Leap", "A Portrait for Troian", "S2 E11", "February 7, 1971: Sam leaps into a renowned parapsychologist where he must prevent a young widow from joining her husband at the bottom of a lake, while proving that she's not crazy, despite her claims of hearing her dead husband calling to her."], [1783415609, 1783418423, "Quantum Leap", "Animal Frat", "S2 E12", "October 19, 1967: Trapped in the body of Knut Wileton, better known as \"Wild Thing,\" the typical frat jock, Sam must win the confidence of an attractive campus radical before she bombs the college's chemistry building as a protest against the war in Vietnam."], [1783418423, 1783419976, "The Twilight Zone", "Mirror Image", "S1 E21", "In a bus depot, Millicent Barnes experiences odd events, leading to concerns about her sanity."], [1783419976, 1783421533, "The Twilight Zone", "The Monsters are Due on Maple Street", "S1 E22", "Paranoia strikes the residents of Maple Street when they believe human-looking aliens have invaded the neighborhood."], [1783421533, 1783424400, "Quantum Leap", "Another Mother", "S2 E13", "September 30, 1981: As a divorced mother of three, Sam's job of preventing his teenage son from running away, never to be seen again, is made more interesting by the fact that his youngest daughter can see both him and Al."], [1783424400, 1783427286, "Quantum Leap", "All-Americans", "S2 E14", "November 6, 1962: Keeping his best friend from throwing the high school championship football game, costing both of them their scholarship offers, Sam must also get their families to consolidate."], [1783427286, 1783428841, "The Twilight Zone", "A World of Difference", "S1 E23", "Arthur Curtis, a successful businessman sitting in his office discovers that he is on a film set and everyone refers to him as Gerry Reagan, a movie star struggling with alcoholism and a declining career."], [1783428841, 1783430393, "The Twilight Zone", "Long Live Walter Jameson", "S1 E24", "Walter Jameson, a popular history professor, is suspected by his fiancée's father, another professor at the college, to be an immortal."], [1783430393, 1783433270, "Quantum Leap", "Her Charm", "S2 E15", "September 26, 1973: Protecting a female member of the witness protection program from a mafia hitman proves difficult for Sam, since the FBI appears to have an informant confounding his attempts to hide her."], [1783433270, 1783436092, "Quantum Leap", "Freedom", "S2 E16", "November 22, 1970: Rather than saving his grandfather's life, Sam has to escape from jail and elude the police long enough to get them both to the reservation, where the old man can die in peace, at home."], [1783436092, 1783437646, "The Twilight Zone", "People are Alike All Over", "S1 E25", "After a space exploration crash-lands on Mars, the lone surviving astronaut is surprised to find that Martians are human-looking and friendly."], [1783437646, 1783439199, "The Twilight Zone", "Execution", "S1 E26", "When a 20th-century scientist tests out his time machine he accidentally retrieves a murderer from 1880, saving him from the hangman's noose. Unaware of the man's history, the scientist attempts to acclimatize him to his new surroundings."], [1783439199, 1783442086, "Quantum Leap", "Good Night, Dear Heart", "S2 E17", "November 9, 1957: Rather than saving the damsel of the episode, who supposedly committed suicide, Sam is the coroner trying to prove that she was murdered, and find out by whom."], [1783442086, 1783444964, "Quantum Leap", "Pool Hall Blues", "S2 E18", "September 4, 1954: In order to help his granddaughter save a small bar from the slimy loan shark holding a note on the place, Sam has to play pool like a pro...with a little help from Al and Ziggy."], [1783444964, 1783446520, "The Twilight Zone", "The Big Tall Wish", "S1 E27", "An aging boxer finds himself the winner of a match he thought he had lost, the result a six-year-old's frantic wish. But can a world-weary, embittered man still believe in miracles, or will he turn his back on them?"], [1783446520, 1783448073, "The Twilight Zone", "A Nice Place to Visit", "S1 E28", "After being shot to death, the criminal Rocky Valentine encounters the amiable white-haired Mr. Pip in the afterlife, who gives him everything he wishes for."], [1783448073, 1783450963, "Quantum Leap", "Leaping in Without a Net", "S2 E19", "November 18, 1958: Sam remembers he's afraid of heights when he leaps into a trapeze artist, whose sister wants him to catch her as she does a triple without a net. Dad is less than pleased, since his wife died a few years earlier while attempting the same stunt."], [1783450963, 1783453843, "Quantum Leap", "Maybe Baby", "S2 E20", "Sam leaps into the body of Buster who is in the process of kidnapping a baby along with a stripper whose stage name is Bunny O'Hare and whose story is constantly changing. Initially, he thinks they might be the parents but Bunny tells him she is trying to get the baby, Christie, back to its real mother. Turns out she had good reason to take the baby away from her father"], [1783453843, 1783455395, "The Twilight Zone", "Nightmare as a Child", "S1 E29", "Schoolteacher Helen Foley finds a strange and very serious little girl on the stairs outside her apartment, who tries to jog Helen's memory about a man she saw earlier that day."], [1783455395, 1783456950, "The Twilight Zone", "A Stop at Willoughby", "S1 E30", "Tired of his miserable job and wife, a businessman starts dreaming on the train each night, about an old, idyllic town called Willoughby. Soon he has to know whether the town is real and fancies the thought of seeking refuge there."], [1783456950, 1783459800, "Quantum Leap", "Sea Bride", "S2 E21", "June 3, 1954: Aboard an ocean liner, Sam must stop the marriage of a young man's ex-wife to a mobster. In the process, he finds himself in one heck of a mess in the ship's garbage compartment."], [1783459800, 1783462689, "Quantum Leap", "M.I.A.", "S2 E22", "April 1, 1969: When Sam leaps into the life of an undercover cop, Al explains that his mission is to convince a navy nurse that her MIA husband is still alive, and to prevent her from marrying a lawyer she meets on the day Sam leaps in. But a series of coincidences causes Sam to wonder about the true nature of his mission."], [1783462689, 1783464241, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."], [1783464241, 1783465808, "The Twilight Zone", "A Passage for Trumpet", "S1 E32", "Musician Joey Crown is down on his luck. An alcoholic, he can't find work because no one trusts him. Broke, he hocks his trumpet but then steps in front of truck which knocks him onto the sidewalk. He awakens in a strange world where no one can see him and he presumes that he has died. He eventually bumps into someone who can in fact see him, a fellow horn player who tells him that it's still with"], [1783465808, 1783468636, "Quantum Leap", "The Leap Home (1)", "S3 E1", "Sam leaps into himself as a 16-year-old boy to help his high school basketball team win the championship. He also tries to help the other members of his family including his father who died from smoking, his brother who was killed in Vietnam and his sister who married an abusive alcoholic."], [1783468636, 1783471442, "Quantum Leap", "The Leap Home (2): Vietnam", "S3 E2", "April 7, 1970: As a Navy SEAL in his own brother's squad, Sam must determine whether he is there to save Tom's life or ensure the success of the mission on which his brother was killed. Also Al from 1970 was a P.O.W."], [1783471442, 1783472998, "The Twilight Zone", "Mr. Bevis", "S1 E33", "After losing his job, his car and his apartment on the same day, an eccentric loser gets a new lease on life from his guardian angel, but there is a price for keeping it."], [1783472998, 1783474552, "The Twilight Zone", "The After Hours", "S1 E34", "Puzzled and unsettled by the odd behavior of the salespeople, a woman discovers that the floor of a department store, on which she bought a gold thimble, doesn't exist."], [1783474552, 1783477271, "Quantum Leap", "Leap of Faith", "S3 E3", "August 19, 1963: Sam finds himself in one holy mess as a priest in Philadelphia, trying to help an alcoholic priest deal with a killer and the death of a young parishioner."], [1783477271, 1783480134, "Quantum Leap", "One Strobe Over the Line", "S3 E4", "June 15, 1965: Sam is a photographer who must protect a fashion model from a growing dependency on amphetamines and a predatory manager's ambitions."], [1783480134, 1783481686, "The Twilight Zone", "The Mighty Casey", "S1 E35", "A baseball manager takes his team to the championships thanks to a robot pitcher."], [1783481686, 1783483205, "The Twilight Zone", "A World of His Own", "S1 E36", "Coming home, Victoria catches her husband Gregory flirting with a beautiful woman in his study. His explanation that characters come to life before his eyes when he speaks into his dictation machine, leads Victoria to question his sanity."], [1783483205, 1783486023, "Quantum Leap", "The Boogieman", "S3 E5", "October 31, 1964: Things do more than go bump in the night when Sam leaps into Joshua Raye, a horror novelist on Halloween. Although Ziggy claims he's there to prevent the death of a church deacon, things get even stranger when two more people die without warning."], [1783486023, 1783488811, "Quantum Leap", "Miss Deep South", "S3 E6", "June 7, 1958: As Darlene Monte, a contestant in the \"Miss Deep South\" beauty pageant, Sam must come to the aid of an innocent contender who faces disgrace when she poses for naughty pictures taken by a sleazy pageant photographer. As if things weren't bad enough, Sam must ensure that Darlene finishes third, so that she'll go on to become a doctor."], [1783488811, 1783490364, "The Twilight Zone", "King Nine Will Not Return", "S2 E1", "The pilot of a downed B-25, Capt. James Embry, awakens in the desert, with no memory of how he got there. More worrisome, his crew is nowhere to be found. He begins to wonder if he's hallucinating, especially after he sees one of his men sitting in the cockpit. When he awakens in hospital, he thinks it might have all been a dream, but wonders: did any of this really happen?"], [1783490364, 1783491917, "The Twilight Zone", "The Man in the Bottle", "S2 E2", "A luckless couple stumbles upon fortune when a genie materializes from a bottle in their antique shop. The genie grants them four wishes but warns them, prophetically, to be careful what you wish for."], [1783491917, 1783494707, "Quantum Leap", "Black on White on Fire", "S3 E7", "August 11, 1965: Sam leaps into a black med. student engaged to a white woman in order to ensure that he and his fiancée survive the Watts Riot together."], [1783494707, 1783497552, "Quantum Leap", "The Great Spontini", "S3 E8", "May 9, 1974: Leaping into magician Harry Spontini, Sam has to prevent his estranged wife from taking their daughter away from him as she files for divorce, so she can marry her sleazy divorce attorney."], [1783497552, 1783499105, "The Twilight Zone", "Nervous Man in a Four Dollar Room", "S2 E3", "Ordered to commit a murder he doesn't want to perform, a smalltime hood nervously looks in the mirror and sees the man he could have been--confident, strong...and determined to get out."], [1783499105, 1783500656, "The Twilight Zone", "A Thing About Machines", "S2 E4", "Bartlett Finchley is an odd man, a writer who contributes to food magazines and the like. He lives alone and is always it seems in need of a repairman for one piece of household equipment or another. As time has gone by, he seems to be in a constant battle with machines - his typewriter, his television - which all have the same message for him: get out of the house. He has no intention of doing so"], [1783500656, 1783503441, "Quantum Leap", "Rebel without a Clue", "S3 E9", "September 1, 1958: As \"Bones,\" a member of a motorcycle gang, Sam is an uneasy rider who has to prevent a Jack Kerouac-inspired young woman from meeting her death on the road."]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783409157, 1783410621, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783410621, 1783411956, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783411956, 1783413289, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783413289, 1783414582, "He-Man and the Masters of the Universe", "Evil-Lyn's Plot", "S1 E13", "Skeletor wants to steal the Widgets' Coridite- a powerful mineral substance, out of which He-Man's harness is made.  Evil-Lyn devises a cunning scheme to help him; she disguises herself as a young girl lost in the forest, and persuades the Widgets to let her enter their fortress.  She then tricks the Widget guard Squinch into letting her enter the private chamber where the Coridite is kept, then s"], [1783414582, 1783415875, "He-Man and the Masters of the Universe", "Dawn of Dragoon", "S1 E14", "Orko's magic pyramid inadvertently saves Dree Elle, a female Trollan (Orko's species), who was hiding from Dragoon, an evil fire-breathing half man, half dragon who is terrorising Orko's home word of Trolla. On hearing the threat to his world, where he is a great magician, Orko promptly returns with Dree Elle in the pyramid. Knowing that their friend will need some help, He-Man and Battle Cat get "], [1783415875, 1783417081, "Power Rangers", "Foul Play in the Sky", "S1 E13", "Kimberly is in trouble when her uncle Steve succumbs to a sleeping potion in the middle of flying an airplane with her on board."], [1783417081, 1783418297, "Power Rangers", "Dark Warrior", "S1 E14", "Billy is inspired by Trini's uncle Howard - a brilliant scientist and expert in martial arts."], [1783418297, 1783419650, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783419650, 1783421003, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783421003, 1783422466, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783422466, 1783423928, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "Saturday Morning"], [1783423928, 1783425265, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783425265, 1783426603, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783426603, 1783427898, "He-Man and the Masters of the Universe", "Prince Adam No More", "S1 E15", "Angered by his continual defeats, Skeletor blames Beast Man, banishing him from Snake Mountain and his evil forces. Meanwhile, King Randor is preparing for a Royal tour of Eternia, accompanied by Man-At-Arms and a guard of his choice. The King chooses He-Man, but Adam, upset that he always has to play down his qualities to hide his alter-ego, convinces the King to choose him instead. Beast Man spo"], [1783427898, 1783429191, "He-Man and the Masters of the Universe", "A Friend in Need", "S1 E16", "An inventor called Zicran visits the Royal Palace to deliver a Transmutator machine to Man-At-Arms, accompanied by his daughter Ileena, a friend of Teela's.  Ileena is vulnerable and lacking in self-confidence, feeling inferior compared to Teela's agility.\n\nMeanwhile, an evil sorcerer called Jarvan, who was previously defeated by He-Man and Man-At-Arms, has escaped from the prison mines and has se"], [1783429191, 1783430348, "Power Rangers", "Big Sisters", "S1 E15", "Kim & Trini get the task of being \"big sisters\" to a mischievous little girl named Maria. Rita kidnaps the bratty child, with intent of using her to open a magic trunk filled with Power Eggs. The Rangers end up facing the Chunky Chicken monster to save the annoying girl. All of this, plus, Billy unveils his specially modified VW Beetle, known as the RADBUG."], [1783430348, 1783431564, "Power Rangers", "Switching Places", "S1 E16", "Billy shows Kimberly a new machine he made that is supposed to transport people from one spot to another. Curious to see how well it works, they both get inside and end up switching bodies instead! Bulk and Skull show up and get inside later that day, unbeknown st to Billy or Kimberly and they switch bodies too and accidentally break the machine! Now Billy(in Kimberly's body) must fix the machine "], [1783431564, 1783432932, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783432932, 1783434267, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783434267, 1783435731, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "Saturday Morning"], [1783435731, 1783437193, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "Saturday Morning"], [1783437193, 1783438528, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783438528, 1783439863, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783439863, 1783441157, "He-Man and the Masters of the Universe", "Daimar the Demon", "S1 E17", "While bored, Orko casts a spell to bring a small, cute creature called Daimar, from a book about the dimension of darkness, to Eternia.  But Daimar doesn't stay cute for long- he soon turns into a giant demon and is threatening to overcome Grayskull with his power, which Skeletor is also determined to acquire for himself!"], [1783441157, 1783442452, "He-Man and the Masters of the Universe", "The Dragon's Gift", "S1 E18", "An ambassador from another kingdom visits the Royal Palace to present King Randor with a gift.  But Man-At-Arms recognises the man as Skeletor in disguise, and in an attempt to stop him, is turned into a crystal statue.  He-Man and Teela must journey to the Isles of Darksmoke, where the great and ancient dragon Granamyr knows the only spell to reverse the effect on Man-At-Arms.\n\nBut their task pro"], [1783442452, 1783443659, "Power Rangers", "Green with Evil Part 1: Out of Control", "S1 E17", "Rita creates her own evil Green Ranger to beat the Power Rangers at their own game."], [1783443659, 1783444879, "Power Rangers", "Green with Evil Part 2: Jason's Battle", "S1 E18", "The Power Rangers work to restore Zordon and Alpha unaware that the new kid in school is actually Rita's evil Green Ranger."], [1783444879, 1783446214, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783446214, 1783447550, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783447550, 1783449013, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "Saturday Morning"], [1783449013, 1783450478, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "Saturday Morning"], [1783450478, 1783451816, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783451816, 1783453151, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."], [1783453151, 1783454446, "He-Man and the Masters of the Universe", "The Shaping Staff", "S1 E19", "While entertaining the Royal Family with his magic, Orko finds his act interrupted by a strange sorceress called Majestra.  Majestra performs a trick in which she appears to make the King vanish then reappear- but in fact, Majestra is really Evil-Lyn in disguise, and has teleported the King to the dungeon and replaced him with a disguised Beast Man!\n\nEvil-Lyn has found a magical Shaping Staff whic"], [1783454446, 1783455740, "He-Man and the Masters of the Universe", "The Cosmic Comet", "S1 E20", "Skeletor has gained control of the Cosmic Comet above Eternia, and intends to use it to blow open the jaw bridge of Grayskull.  He-Man, Teela, Man-At-Arms, The Sorceress and Orko set out to stop Skeletor's scheme, with the help of Zagraz, a wizard with power over comets."], [1783455740, 1783456888, "Power Rangers", "Green with Evil Part 3: The Rescue", "S1 E19", "Femme fatale Scorpina joins Rita as the Green Ranger continues to battle the Power Rangers."], [1783456888, 1783458105, "Power Rangers", "Green with Evil Part 4: Eclipsing Megazord", "S1 E20", "An eclipse of the sun saps the Megazord's power as Rita's forces launch a full scale assault on Angel Grove."], [1783458105, 1783459335, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783459335, 1783460674, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783460674, 1783462139, "Pee-wee's Playhouse", "Episode 19", "S1 E19", "Saturday Morning"], [1783462139, 1783463604, "Pee-wee's Playhouse", "Episode 20", "S1 E20", "Saturday Morning"], [1783463604, 1783464941, "Teenage Mutant Ninja Turtles", "The Cat Woman of Channel Six", "S2 E12", "While experimenting with a matter transporter in his secret hideout, Shredder sends Rocksteady and Bebop to a nearby garbage dump. Through a series of mishaps, Rocksteady and Bebop find themselves in the Turtles' Lair."], [1783464941, 1783466279, "Teenage Mutant Ninja Turtles", "Return of the Technodrome", "S2 E13", "Krang, sick of Shredder's constant failings, resolves to return the Technodrome to Earth."], [1783466279, 1783467546, "He-Man and the Masters of the Universe", "The Taking of Grayskull", "S1 E21", "Orko thinks that everyone has forgotten his birthday, when Man-At-Arms reports word of strange destruction the town of Becilia. He-Man, Teela and Ram Man go to investigate, and find themselves in the middle of a tornado some very curious effects – one of which is He-Man's sword disappearing, as a result of some strange influence somewhere. Meanwhile, Orko, upset at his birthday seemingly being for"], [1783467546, 1783468841, "He-Man and the Masters of the Universe", "Double Edged Sword", "S1 E22", "Palace Eternia has run out of Eternium, the fuel which generates all power in Eternia.  A young boy called Chad finds a sample while practising his training with his grandfather in the desert, and He-Man and Teela set out to collect it from them.  But the Eternium is stolen by Trap Jaw, who intends to use it to gain equal power to He-Man!  As He-Man fights to recover the Eternium and stop Trap Jaw"], [1783468841, 1783469988, "Power Rangers", "Green with Evil Part 5: Breaking the Spell", "S1 E21", "The mighty Dragonzord awakes after thousands of years as the Rangers try to break the spell over the Green Ranger once and for all."], [1783469988, 1783471155, "Power Rangers", "The Trouble with Shellshock", "S1 E22", "Squatt and Baboo create their own Shellshock monster to impress Rita."], [1783471155, 1783472492, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783472492, 1783473830, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783473830, 1783475294, "Pee-wee's Playhouse", "Episode 21", "S1 E21", "Saturday Morning"], [1783475294, 1783476758, "Pee-wee's Playhouse", "Episode 22", "S1 E22", "Saturday Morning"], [1783476758, 1783478096, "Teenage Mutant Ninja Turtles", "Beneath these Streets", "S3 E1", "The Turtles learn the cost of slacking off when Splinter is badly hurt during a confrontation with Shredder."], [1783478096, 1783479434, "Teenage Mutant Ninja Turtles", "Turtles On Trial", "S3 E2", "The intentions of the Ninja Turtles are put to the test when a controversial TV-figure portrays our heroes as menaces to society. The Turtles forego publicly clearing their name to defeat Krang and his new robotic weapon."], [1783479434, 1783480729, "He-Man and the Masters of the Universe", "Quest For He-Man", "S1 E23", "Skeletor erases He-Man's memory and teleports him to a far-off world called Draenos, which has been rendered barren and desolate by pollution.  Cringer, Ram Man and Orko travel to the alien world to rescue Eternia's hero."], [1783480729, 1783482023, "He-Man and the Masters of the Universe", "Orko's Favorite Uncle", "S1 E24", "An evil wizard called Tauron casts a spell on Orko's Uncle Montork and his pet Gark, turns them evil and sets them on Grayskull!"], [1783482023, 1783483240, "Power Rangers", "The Spit Flower", "S1 E23", "Rita and her evil Spit Flower monster set out to ruin Kimberly's design for a float in the world peace parade."], [1783483240, 1783484436, "Power Rangers", "Itsy Bitsy Spider", "S1 E24", "Zack must overcome his fear of spiders to face Rita's newest monster."], [1783484436, 1783485768, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783485768, 1783487100, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783487100, 1783488222, "Pee-wee's Playhouse", "Episode 23", "S1 E23", "Saturday Morning"], [1783488222, 1783489686, "Pee-wee's Playhouse", "Episode 24", "S1 E24", "Saturday Morning"], [1783489686, 1783491026, "Teenage Mutant Ninja Turtles", "Attack of the 50-Foot Irma", "S3 E3", "Irma accidentally becomes gigantic and her naturally clumsy nature makes her a danger to the city."], [1783491026, 1783492364, "Teenage Mutant Ninja Turtles", "The Maltese Hamster", "S3 E4", "Gangsters are swiping all the antiques in town. And when they swipe most of our heroes, it's up to Donatello and April to find out why. Could Shredder be behind this?"], [1783492364, 1783493657, "He-Man and the Masters of the Universe", "Quest for the Sword", "S1 E25", "He-Man's sword is taken by a peaceful race of Rock People who believe the sword gives them power.  Fearing that himself and Battle Cat may never be able to become Adam and Cringer again, He-Man must journey to the underground world of the Rock People to recover the sword."], [1783493657, 1783494949, "He-Man and the Masters of the Universe", "A Beastly Sideshow", "S1 E26", "When a travelling sideshow comes to Eternos, Cringer falls for a female cat called Pretty Kitty and lusts after her- but it turns out Pretty Kitty was merely there to lure Cringer into the hands of Beast Man, the disguised owner of the sideshow!  Cringer is imprisoned in Snake Mountain, and He-Man must venture into Skeletor's domain to rescue his faithful companion."], [1783494949, 1783496165, "Power Rangers", "Life's a Masquerade", "S1 E25", "Rita's Frankenstein monster crashes the Power Rangers' Halloween costume party."], [1783496165, 1783497367, "Power Rangers", "Gung Ho!", "S1 E26", "Jason and Tommy must learn to work together to stop Rita's Super Putties."], [1783497367, 1783498703, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783498703, 1783500071, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783500071, 1783501861, "Pee-wee's Playhouse", "Episode 25", "S1 E25", "Saturday Morning"], [1783501861, 1783503260, "Pee-wee's Playhouse", "Open House", "S2 E1", "Today in the \"Playhouse,\" Pee-wee tricks his friends into doing all of his chores by pretending that work is fun. The gang meets some new friends while renovating the \"house.\" Reba arrives in time to deliver Clocky while the Playhouse gang uncovers Floory and meets Mrs. Rene for the first time."]]}, {"id": "7", "name": "Weather on the 7s", "a": "weather-on-the-7s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/weather-on-the-7s-v2.png", "progs": [[1783409512, 1783431112, "Weather on the 7s", "", "", "Weather on the 7s"], [1783431112, 1783452712, "Weather on the 7s", "", "", "Weather on the 7s"], [1783452712, 1783474312, "Weather on the 7s", "", "", "Weather on the 7s"], [1783474312, 1783495912, "Weather on the 7s", "", "", "Weather on the 7s"], [1783495912, 1783503172, "Weather on the 7s", "", "", "Weather on the 7s"]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783408725, 1783411365, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783411365, 1783414120, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783414120, 1783415423, "Raising Hope", "A Germ of a Story", "S1 E13", "When Sabrina points out to Jimmy just how many germs are lurking around his house, the Chance family becomes obsessed with cleanliness. Finding it impossible to keep Maw Maw clean, they move her to the backyard greenhouse, but after watching some old family movies, they discover a surprising secret that has kept them healthy all these years."], [1783415423, 1783416727, "Raising Hope", "What Up, Cuz?", "S1 E14", "Virginia's cousin Delilah, who struggles to make ends meet, pays a visit to the Chance family unannounced, determined to claim her share of Maw Maw's - whom she thinks died years ago - estate. Further tension builds when Delilah admits she still has a crush on Burt. Meanwhile, Jimmy babysits Maw Maw and panics when she takes off on Sabrina's moped."], [1783416727, 1783418024, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783418024, 1783419322, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783419322, 1783420628, "Schitt's Creek", "Town for Sale", "S1 E13", "Johnny finds a potential buyer for the town, while David and Alexis discover they may have become more attached to Schitt’s Creek than they ever thought possible."], [1783420628, 1783421938, "Schitt's Creek", "Finding David", "S2 E1", "The Roses search for their missing son, David, while Alexis takes her relationship with Mutt to the next level despite technically being engaged to Ted."], [1783421938, 1783424643, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783424643, 1783427333, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783427333, 1783428637, "Raising Hope", "Snip Snip", "S1 E15", "Barely reconciled with having to help care for Jimmy's baby, Burt and Virginia realize their unsafe sex is no longer acceptable. Burt defends his manhood but is outvoted, so Jimmy drags him to Dr. Burwitz for a vasectomy and patiently humors him to get the surgery done."], [1783428637, 1783429940, "Raising Hope", "The Cultish Personality", "S1 E16", "The Chances prepare to host once more Burt's cousin Mike, a hopeless loser even by their standards. Yet they find him a changed man, as neat member of a loony sect, one of Tanya's four 'brother-husbands'. Jimmy is inadvertently attracted by their neat, apparently harmonious 'fraternity'."], [1783429940, 1783431238, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783431238, 1783432532, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783432532, 1783433842, "Schitt's Creek", "Family Dinner", "S2 E2", "Moira decides to cook dinner with the help of David. Johnny scopes out an office for his consulting business. And Alexis finally comes clean with Ted about their engagement."], [1783433842, 1783435152, "Schitt's Creek", "Jazzagals", "S2 E3", "Moira attempts to join the town’s a cappella group. Alexis enjoys the heady first days of her latest relationship. And Johnny helps out at Bob’s Garage despite himself."], [1783435152, 1783437791, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783437791, 1783440784, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783440784, 1783442089, "Raising Hope", "Mongooses", "S1 E17", "The Chance family goes to see a lawyer to get their wills done, and Burt is insulted when Jimmy chooses Sabrina over him. Meanwhile, Sabrina is overcome with emotion by the news, while Maw Maw thinks mongooses are infesting the household."], [1783442089, 1783443393, "Raising Hope", "Cheaters", "S1 E18", "Jimmy hopes gullible Sabrina's boyfriend Wyatt may be cheating on her in college, so he insists to go with her to Wyatt's frat's wild costume party, but conclusive evidence is perilously hard to find. In order to have contact with generation peers, Maw Maw goes to Dead Tooth's daycare."], [1783443393, 1783444687, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783444687, 1783445982, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783445982, 1783447292, "Schitt's Creek", "Estate Sale", "S2 E4", "Johnny and Moira go to an estate sale. Mutt surprises Alexis with a bike, while Roland asks David to help him shop for a special item."], [1783447292, 1783448602, "Schitt's Creek", "Bob's Bagels", "S2 E5", "Johnny talks himself into an unlikely business partnership with Bob. David gets an interview at a woman's clothing store, while Moira reluctantly cares for an ailing Alexis."], [1783448602, 1783451242, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783451242, 1783453882, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783453882, 1783455184, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783455184, 1783456482, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee
