s with him and has a good time. Emily slips a drug "], [1783277017, 1783279773, "Beverly Hills, 90210", "My Desperate Valentine", "S2 E16", "Emily refuses to accept the fact that Brandon no longer wants to see her. She slashes her own tires and pretends that her parents are out of town so that Brandon will invite her to stay over. She sneaks into his bedroom and tries to seduce him. After he makes it clear that he is not interested, she begins to make crank phone calls. Andrea discovers that Emily is the person who has been sending men"], [1783279773, 1783282534, "Beverly Hills, 90210", "Chuckie's Back", "S2 E17", "Chuck Wilson, Samantha Sanders' old sitcom co-star and Steve's childhood nemesis, transfers to West Beverly after being kicked out of private school. Steve is depressed when Kelly agrees to go to a dance with Chuck. Samantha orders Steve to be nice to Chuck in the hopes of persuading him to appear in a reunion movie. Chuck taunts Steve about being adopted, and reveals that he knew about the adopti"], [1783282534, 1783285319, "Beverly Hills, 90210", "A Walsh Family Christmas", "S2 E18", "Steve arrives in Albuquerque and tracks down his grandfather, a diner owner. Al explains that his daughter gave up Steve because she was very young and wanted him to have a good home. He sadly reveals that Karen died in a car accident. Steve leaves flowers at her grave, and convinces an eccentric Santa-like charter pilot to fly him home for Christmas. Cindy is depressed about her first Christmas i"], [1783285319, 1783289438, "Beverly Hills, 90210", "Fire and Ice", "S2 E19", "Brandon learns a lesson in dedication to a task and hard work when he falls for Tricia, a young ice skater with Olympic goals, whom he pleasantly distracts from her skating practice. Meanwhile, Brenda must deal with a back-stabbing boss at her boutique job in which Cindy offers Brenda a chance to get back at her."], [1783289438, 1783292223, "Beverly Hills, 90210", "A Competitive Edge", "S2 E20", "Brandon goes undercover for the Blaze to try and expose steroid use within the school's track team, and finds that Steve is involved after teammate Kyle tips Brandon about it. Brandon is then caught in a dilemma of how to expose the drug use without hurting Steve along with everyone else. Meanwhile, Brenda gets into a minor car accident with a con artist woman who's out for money."], [1783292223, 1783294948, "Beverly Hills, 90210", "Everybody's Talkin' 'Bout It", "S2 E21", "Andrea is outraged when the school refuses to allow students to take part in a health survey that includes questions about sex. She goes before the school board and introduces a proposal to distribute condoms at West Beverly."], [1783294948, 1783297704, "Beverly Hills, 90210", "Baby Makes Five", "S2 E22", "Kelly confides in Brenda and Donna about her mother's pregnancy, but they can't keep a secret. David tells Donna that Mel is planning to propose, then learns about the pregnancy. He doesn't share the news with his father, who is clueless about Jackie's condition. Jackie assumes that Mel only wants to marry her to fulfill his obligation, so she dumps him.  Music: \"\"All 4 Love\"\" by Color Me Badd (#1"], [1783297704, 1783300488, "Beverly Hills, 90210", "Cardio Funk", "S2 E23", "Dylan's friend Sarah comes to an AA meeting. He offers his support, and she begins to rely on him. She seeks his help in throwing her abusive boyfriend out of the apartment.  Music: \"\"We Want the Funk\"\" by Gerardo (#16, 1991); \"\"Do Wah Diddy Diddy\"\" (Manfred Mann - #1, 1964), performed by the cast; \"\"Your Cheatin' Heart\"\" (Hank Williams), performed by Patricia Michel; \"\"Be Bop-a-Lul"], [1783300488, 1783303242, "Beverly Hills, 90210", "The Pit and the Pendulum", "S2 E24", "Brandon participates in a teen review committee that provides input to one of Jim's clients, who is building a gigantic new mall. Marcie, the developer's college-age daughter, aggressively pursues Brandon. Brandon is incensed to learn that the project would require the demolition of the Peach Pit. He squares off with Jim, who promises to stand up for Nat's interests. Brandon takes Marcie to the Pe"], [1783303242, 1783306027, "Beverly Hills, 90210", "Meeting Mr. Pony", "S2 E25", "Brenda is held up at gunpoint by an armed robber during an after-hours hold up at the Peach Pit. She starts having waking nightmares of the event and visits a psychiatrist who diagnoses Brenda with post traumatic stress disorder. Brenda identifies her attacker in a police line-up and is startled to learn that her attacker is only seventeen years old."], [1783306027, 1783308811, "Beverly Hills, 90210", "Things to Do on a Rainy Day", "S2 E26", "On a rainy Saturday afternoon, Brenda, Kelly, Donna and David head to the Bel Age Hotel to meet Donna's favorite pop group, Color Me Badd. David rents a room so that the foursome can get into the hotel. Donna sees her mother, supposedly at the hotel for a conference, and fears that she will get in trouble. Kelly lifts a key to the penthouse and gets to hang out with the group. Donna, fearing repri"], [1783308811, 1783311512, "Beverly Hills, 90210", "Mexican Standoff", "S2 E27", "Brenda upsets her father by consistently violating her curfew. She promises to demonstrate more mature behavior. Jim and Cindy agree to let Brenda join Dylan for a weekend in Mexico. Brenda falls asleep while watching a movie at Dylan's, and doesn't come home until 4 AM. Her parents forbid her from taking the trip. Dylan encourages Brenda to stand up for herself, but she instead tells Jim and Cind"], [1783311512, 1783314231, "Beverly Hills, 90210", "Wedding Bell Blues", "S2 E28", "A furious Jim goes to the Mexican border to retrieve Brenda. Jim bans Dylan from the Walsh house. Jackie learns that Kelly covered for Brenda, and embarrasses her by yelling at her in front of Jake.\n\nMusic: \"\"Wedding Bell Blues\"\" by The Fifth Dimension (#1, 1969); \"\"Blue Moon\"\" (Glen Gray - #1, 1"], [1783314231, 1783316985, "Beverly Hills, 90210", "Misery Loves Company", "S3 E1", "Brenda drives her parents crazy with her constant sulking, and sneaks around with Dylan behind their backs. Dylan wants someone other than Jim to handle his trust, but Jim refuses to break his deal with Iris. Jim and Cindy join the beach club and catch Brenda making out with Dylan. Jim screams at Brenda and makes a scene. She packs up her belongings and moves in with Dylan. Brandon bets Steve that"], [1783316985, 1783319727, "Beverly Hills, 90210", "The Twins, the Trustee, and the Very Big Trip", "S3 E2", "Kelly bonds with her baby sister, Erin. She bows out of a six-week trip to study in Paris with Donna because she wants to spend time with her family. Brenda and Dylan clash over their new living arrangements. Cindy and Brandon realize that Brenda is unhappy, but she is too stubborn to give in. Jim threatens to freeze Dylan's account unless he helps convince Brenda to accept a trip to Paris. Dylan "], [1783319727, 1783322496, "Beverly Hills, 90210", "Too Little, Too Late/Paris 75001", "S3 E3", "Brenda and Donna have difficulty adjusting to life in France. Donna constantly complains about missing David, and Brenda soon begins to long for Dylan. They accidentally order brains at a restaurant, and Donna later spends an entire party eating pastries because she can't carry on a conversation in French. Andrea's boyfriend invites her to join him at the Republican Convention in Houston, where he"], [1783322496, 1783325238, "Beverly Hills, 90210", "Sex, Lies and Volleyball/Photo Fini", "S3 E4", "Donna is struggling in the French immersion program, and feels left out because Brenda and her classmates can speak fluent French. Donna catches the eye of a photographer, who offers her a modeling job. A man tries to entice Donna into signing a two-year modeling contract, but he's just trying to get her into bed. Steve finds the perfect partner for the mixed doubles volleyball tournament. He is h"], [1783325238, 1783328002, "Beverly Hills, 90210", "Shooting Star/American in Paris", "S3 E5", "Kelly feels guilty about kissing Dylan and tries to avoid him. She goes to his house to admit her feelings, and they share a passionate kiss. They spend a lot of time together, but reconsider their actions when David catches them kissing. Kelly turns down Dylan's offer to camp out on the beach (the night before Brenda is to return), but eventually joins him for a romantic evening. Brenda meets Ric"], [1783328002, 1783330769, "Beverly Hills, 90210", "Castles in the Sand", "S3 E6", "Andrea and the children nearly catch Dylan and Kelly sleeping on the beach. Kelly tells Dylan that they must forget their summer romance, but he doesn't want to do this. Brenda and Donna come home from Paris and are greeted with a party. Jim and Cindy agree to let Brenda resume her relationship with Dylan. Kelly tries to avoid Brenda and Dylan, and is annoyed when he continually inquires about her"], [1783330769, 1783333537, "Beverly Hills, 90210", "A Song of Myself", "S3 E7", "Brandon wants to quit the paper so that he can enjoy his senior year. Andrea enlists the help of new advisor and English teacher Gil Meyers to change his mind. Gil decides to have Brandon replace Andrea as editor. She accuses him of sexism and wants to resign. Gil resolves the dispute by making Andrea and Brandon co-editors. A depressed Kelly changes her entire schedule to avoid Brenda and Dylan. "], [1783333537, 1783336303, "Beverly Hills, 90210", "The Back Story", "S3 E8", "Brenda, Donna, Kelly, Steve and David prepare to take the SAT. Brenda constantly argues with Kelly, and also gets into hot water with her parents when they learn that she has been smoking since the Paris trip. Beth Nielson, a young producer from the tabloid show Back Story, seeks Brenda's help in putting together a story about Beverly Hills teens. The piece is intended to correct misconceptions, b"], [1783336303, 1783339069, "Beverly Hills, 90210", "Highwire", "S3 E9", "The gang must consider their future and meets with their guidance counselor, except for Kelly and Dylan who agree that college is not for everyone. Meanwhile, Jim and Cindy announce to Brenda and Brandon that they can afford a private college for only one of them. Also, Andrea has the same bad dreams involving walking a high-wire to get into her own college. Brandon and Nikki become even more clos"], [1783339069, 1783341836, "Beverly Hills, 90210", "Home and Away", "S3 E10", "West Beverly's undefeated football team prepares for a showdown with powerhouse Shaw High. The school decides to forfeit after two Shaw students are shot to death by gang members during a game. Brandon is furious because the West Beverly student body cares more about the homecoming dance (coordinated by Brenda) than the shootings. He and Jordan Bonner, editor of the Shaw paper, run each other's ed"]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783245351, 1783246844, "Sex and the City", "The Monogamists", "S1 E7", "When she discovers that Big is dating other women, Carrie realizes that she desires a monogamous relationship with him. In the meantime, Samantha is having trouble being monogamous with her realtors. Charlotte dislikes the sexual desires of her new boyfriend."], [1783246844, 1783248318, "Sex and the City", "Three's a Crowd", "S1 E8", "Charlotte is dating Jack, who wants a threesome, but she is unsure. Carrie discovers that Mr. Big has an ex-wife, and feels threatened. Samantha is seeing a married man; when his wife finds out, she proposes a threesome to keep their marriage together. Miranda feels unattractive and looks for affirmation that she isn't."], [1783248318, 1783251132, "Beverly Hills, 90210", "The Gentle Art of Listening", "S1 E9", "Brenda becomes a trainee for a teen crisis hotline, although Andrea questions her devotion. Brenda violates the rules by taking a call after hours. The caller is a date rape victim, who suffers the same fate on three consecutive nights. Brenda is desperate to learn the girl's identity and help her. Brandon believes that a masseuse has a romantic interest in him. He also dodges a freshman admirer, "], [1783251132, 1783253947, "Beverly Hills, 90210", "Isn't It Romantic?", "S1 E10", "When Brenda finds herself falling in love with Dylan, it results in Brandon's wariness and Jim strongly opposed to it due to Dylan's lifestyle and his father who gets indicted for corporate financial fraud. Meanwhile, Steve meets a woman who will be speaking at an AIDS seminar at school which leads everyone into discussing condoms."], [1783253947, 1783255381, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783255381, 1783256805, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783256805, 1783258187, "Saved by the Bell", "Pinned to the Mat", "S1 E9", "During Career Week at school, Slater worries that continuing to focus on wrestling will not lead to a successful job. As a result, he quits the sport, worrying Zack, who has bet on Slater winning his next match."], [1783258187, 1783259561, "Saved by the Bell", "Beauty and the Screech", "S1 E10", "Zack enlists Screech to tutor Kelly, when he finds out that she needs to pass an upcoming science test in order to go to a concert with him. When Screech and Kelly begin spending more time together than he'd expected, it makes him uncomfortable."], [1783259561, 1783260952, "In Living Color", "Introducing...Homey D. Clown", "S1 E9", "Whizzer and Ice offer a seminar on making money; \"Andrea Dice Clay\" does her routine. Also: \"America's Funniest Security Camera Videos.\""], [1783260952, 1783262344, "In Living Color", "Vera DeMilo", "S1 E10", "An ad for a new celebrity toy; a forgetful Don Cornelius hosting \"Old Train\"; a female bodybuilding contest."], [1783262344, 1783263757, "Sex and the City", "The Turtle and the Hare", "S1 E9", "Mr. Big tells Carrie he's never going to marry again, which unsettles her. Miranda introduces the friends to the Rabbit, a mechanical aid, and Charlotte becomes addicted. Stanford Blatch proposes to Carrie as a cover, so he can inherit his part of the family fortune."], [1783263757, 1783265164, "Sex and the City", "The Baby Shower", "S1 E10", "The four women attend a baby shower for their one-time wild-child friend Laney in her new buttoned-down Connecticut-suburb environs. Carrie is forced to think about motherhood by her late period. Miranda regards the other guests as part of the cult of The Motherhood. Still-single Charlotte fears her dreams of being a wife and mother are slipping away. Samantha throws a \"no-baby shower\" in response"], [1783265164, 1783267980, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783267980, 1783270765, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783270765, 1783272199, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783272199, 1783273634, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783273634, 1783275038, "Saved by the Bell", "The Friendship Business", "S1 E11", "As part of an assignment for Business class, the gang forms a friendship bracelet company, but infighting soon leads to trouble and defection."], [1783275038, 1783276410, "Saved by the Bell", "The Mamas and the Papas", "S1 E12", "As a class project, the gang pairs up in mock marriages for the week. Slater's \"marriage\" to Jessie comes apart when he turns out to be the domineering type. Lisa's \"marriage\" to Screech is driving her crazy. Meanwhile, Slater tries to get Screech to break up Zack and Kelly's \"marriage\" so he can still have a chance with her."], [1783276410, 1783277800, "In Living Color", "Anton In The People's Court", "S1 E11", "Sketches include the homeless Anton defending himself in a people's court; a parody of rapper MC Hammer; Ted Turner's \"colorized classic\" version of \"The Kid.\""], [1783277800, 1783279191, "In Living Color", "Conspiracy", "S1 E12", "A cable repairman benefits when LaQuita tries to impress a producer. Also: a \"Ray Charles in Charge\" segment."], [1783279191, 1783280741, "Sex and the City", "The Drought", "S1 E11", "Carrie's relationship with Mr. Big has been going on for long enough that it is becoming less physical, especially after she farts in bed. Charlotte is dating a man who isn't interested in sex anymore thanks to the side-effects of Prozac. Samantha discovers that not having sex can be erotic. Miranda realizes that she hasn't had sex for months."], [1783280741, 1783282358, "Sex and the City", "Oh Come All Ye Faithful", "S1 E12", "After being introduced as \"a friend\" to his mother, Carrie realizes her relationship with Mr. Big is one-sided and breaks up with him. Miranda dates an up-and-coming playwright who is also an up-tight Catholic. Samantha falls in love with a perfect man, but he doesn't measure up to her requirements. Charlotte gets psychic readings to see if she'll ever marry."], [1783282358, 1783285160, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783285160, 1783287976, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783287976, 1783289382, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783289382, 1783290807, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783290807, 1783292211, "Saved by the Bell", "The Election", "S1 E13", "When Zack finds out that the elected student council president gets to leave school for a trip to Washington D.C., he runs against Jessie."], [1783292211, 1783293588, "Saved by the Bell", "The Zack Tapes", "S1 E14", "The new teacher, Mrs. Wentworth, teaches a class on subliminal advertising, so after Zack successfully uses it to get out of trouble with Mr. Belding, he tries to use hidden messages on a cassette music tape to get Kelly to go the Sweetheart's Dance with him and Lisa to go with Screech. But when the rest of the gang catches on, they all joins forces with the entire school including Mr. Belding to "], [1783293588, 1783294978, "In Living Color", "Homey D. Clown Returns", "S1 E13", "Damon Wayans plays Homey the Clown; comedienne Samantha Kinison speaks on men and marriage."], [1783294978, 1783296371, "In Living Color", "Bigger Brothers", "S2 E1", "Sketches include:\n\nHey Mon/Hedley Hospital /  Sidekick /  Bigger Brothers /  Mudhead's Funeral / Men On Films II / Flava Flave makes an appearance / Queen Latifah performs"], [1783296371, 1783297894, "Sex and the City", "Take Me Out to the Ballgame", "S2 E1", "Carrie meets \"the new Yankee,\" Joe, at a baseball game, all the while preparing for her first post-breakup encounter with Big. Miranda gets fed up with the girls always talking about men. Samantha gets frustrated with James' \"deficiencies\". Charlotte dates a guy named Paul Ericson who has a tendency to adjust his package... a lot."], [1783297894, 1783299411, "Sex and the City", "The Awful Truth", "S2 E2", "Carrie accidentally suggests that her friend Susan Sharon leave her domineering, violent husband. Miranda builds up the courage to talk dirty in bed. Charlotte tries to replace the perfect man with the perfect dog. Samantha gets dragged to couples' therapy with James and tries to avoid talking about her real problem with their sex life."], [1783299411, 1783302226, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783302226, 1783305039, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783305039, 1783306454, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783306454, 1783307884, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783307884, 1783309229, "Saved by the Bell", "King of the Hill", "S1 E15", "At Bayside High School in Palisades, California, conniving preppy Zack Morris makes a play for Kelly Kapowski, the new girl that he has a crush on, but so does transfer student, A.C. Slater. So, after Kelly gets a detention, Zack tries to ensue that he does in order to be in the same room with her."], [1783309229, 1783310568, "Saved by the Bell", "Save That Tiger", "S1 E16", "The cheerleader county competition arrives as well as the annual prank war with Valley and Bayside High. Jessie is asked to be the head cheerleader and Screech is to be the tiger mascot this year, which is crucial to the cheer leading routine. But two Valley guys kidnap Screech in retaliation for Zack and Slater's pranks against Valley."], [1783310568, 1783311951, "In Living Color", "Anton at the Recruiter", "S2 E2", "Sketches include:\n\n\"\"Anton Volunteers\"\"   \"\"Training Men the Wodehouse Way\"\"   \"\"Roseanne Sings America\"\"   \"\"2 Live Crew\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""], [1783311951, 1783313256, "In Living Color", "Spike's Joint", "S2 E3", "Sketches (not including intro) include:\n\n\"\"Flatuscents\"\"   \"\"Good Morning/Good Night (Magenta Thompson Show)\"\"   \"\"Cephus & Reesie's Broadway Tour\"\"   \"\"The Buttmans: Guess Who's Coming to Dinner\"\"   \"\"Spike's Joint\"\""], [1783313256, 1783314817, "Sex and the City", "The Freak Show", "S2 E3", "Carrie turns freakish herself after dating a string of freaky guys and freaks out the very normal Ben when trying to discover his secret freakiness. Miranda dates \"Manhattan Guy,\" a guy who hasn't left Manhattan in ten years. Charlotte dates the renowned \"Mr. Pussy\" and tries to make a real relationship out of it. Samantha decides to get plastic surgery and freaks out during the consult."], [1783314817, 1783316390, "Sex and the City", "They Shoot Single People, Don't They?", "S2 E4", "Single and fabulous Carrie gets a horrible photo taken for the cover story of New York Magazine: Single and Fabulous...?. Miranda fakes orgasms with her current boyfriend. Charlotte starts dating her handyman. Samantha dates a club owner, who calls them a \"we\" right away."], [1783316390, 1783319207, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783319207, 1783322021, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783322021, 1783323450, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783323450, 1783324885, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783324885, 1783326223, "Saved by the Bell", "Episode 17", "S1 E17", "Prime Time"], [1783326223, 1783327561, "Saved by the Bell", "Episode 18", "S1 E18", "Prime Time"], [1783327561, 1783328953, "In Living Color", "Hour of Power", "S2 E4", "Sketches include:\n\nTag Team Evangelists / Bonita Butrell: Uninvited Guest / 1-900-YT GUILT / Al MacAfee: Hall Monitor / Monie Love performs \"Monie in the Middle\""], [1783328953, 1783330346, "In Living Color", "Miss Black Person USA", "S2 E5", "Sketches include:\n\n\"\"Black Like You\"\"   \"\"Go On Girl: Sensitive Men\"\"   \"\"I Won't Drift Away\"\"   \"\"Miss Black Person U.S.A.\"\""], [1783330346, 1783332006, "Sex and the City", "Four Women and a Funeral", "S2 E5", "Carrie starts seeing Mr. Big again. Miranda buys her own apartment on the Upper West Side. Charlotte meets a recent widower at a cemetery. Samantha's actions with a married man gets her in trouble with the New York high-society \"ladies who lunch\" and only a titanic star can help her out."], [1783332006, 1783333511, "Sex and the City", "The Cheating Curve", "S2 E6", "Carrie starts to \"officially\" date Mr. Big again. Miranda dates a guy who insists on watching porn while they have sex. Fed up with cheating men, Charlotte spends time with her new friends, the \"Power Lesbians.\" Samantha starts dating her gym instructor who \"brands\" her with a lightning bolt."], [1783333511, 1783336326, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783336326, 1783339023, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783339023, 1783340438, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."]]}, {"id": "111", "name": "Savage at Nite", "a": "savage-at-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/savage-at-nite-v4.png", "progs": [[1783245370, 1783246665, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783246665, 1783248033, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783248033, 1783249337, "Raising Hope", "Snip Snip", "S1 E15", "Barely reconciled with having to help care for Jimmy's baby, Burt and Virginia realize their unsafe sex is no longer acceptable. Burt defends his manhood but is outvoted, so Jimmy drags him to Dr. Burwitz for a vasectomy and patiently humors him to get the surgery done."], [1783249337, 1783250641, "Raising Hope", "The Cultish Personality", "S1 E16", "The Chances prepare to host once more Burt's cousin Mike, a hopeless loser even by their standards. Yet they find him a changed man, as neat member of a loony sect, one of Tanya's four 'brother-husbands'. Jimmy is inadvertently attracted by their neat, apparently harmonious 'fraternity'."], [1783250641, 1783251986, "Saved by the Bell", "King of the Hill", "S1 E15", "At Bayside High School in Palisades, California, conniving preppy Zack Morris makes a play for Kelly Kapowski, the new girl that he has a crush on, but so does transfer student, A.C. Slater. So, after Kelly gets a detention, Zack tries to ensue that he does in order to be in the same room with her."], [1783251986, 1783253325, "Saved by the Bell", "Save That Tiger", "S1 E16", "The cheerleader county competition arrives as well as the annual prank war with Valley and Bayside High. Jessie is asked to be the head cheerleader and Screech is to be the tiger mascot this year, which is crucial to the cheer leading routine. But two Valley guys kidnap Screech in retaliation for Zack and Slater's pranks against Valley."], [1783253325, 1783254672, "That '70s Show", "The Pill", "S1 E17", "Since no one else is around, Jackie confides in Eric that she thinks she might be pregnant.   Eric passes the news on to Donna, who tries to get Jackie to tell Kelso.  The incident inspires Donna to go on birth control pills.  Her decision inadvertantly causes Eric a lot of grief when Bob and the Formans find out."], [1783254672, 1783256018, "That '70s Show", "Career Day", "S1 E18", "It's career day and the gang must spend the day working with their parents.  Eric goes to the hospital with Kitty and is amazed at all she has to deal with every day.  Fez accompanies Hyde and interviews cafeteria lady \"Gross Edna\" while mother and son feud.  Poor Michael spends the entire day trying to figure out what his dad does, while Donna is mortified by Bob's crazy promotional antics.  And "], [1783256018, 1783257448, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783257448, 1783258882, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783258882, 1783260176, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783260176, 1783261471, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783261471, 1783262872, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783262872, 1783264273, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783264273, 1783265578, "Raising Hope", "Mongooses", "S1 E17", "The Chance family goes to see a lawyer to get their wills done, and Burt is insulted when Jimmy chooses Sabrina over him. Meanwhile, Sabrina is overcome with emotion by the news, while Maw Maw thinks mongooses are infesting the household."], [1783265578, 1783266883, "Raising Hope", "Cheaters", "S1 E18", "Jimmy hopes gullible Sabrina's boyfriend Wyatt may be cheating on her in college, so he insists to go with her to Wyatt's frat's wild costume party, but conclusive evidence is perilously hard to find. In order to have contact with generation peers, Maw Maw goes to Dead Tooth's daycare."], [1783266883, 1783268221, "Saved by the Bell", "Episode 17", "S1 E17", "Savage at Nite"], [1783268221, 1783269559, "Saved by the Bell", "Episode 18", "S1 E18", "Savage at Nite"], [1783269559, 1783270907, "That '70s Show", "Prom Night", "S1 E19", "Prom night is fast approaching and Eric gets a motel room as part of his \"spontaneous\" plan to \"do it\" with Donna on the big night.  When Jackie finds out that Kelso asked slutty Pam Macy to prom, she gets Hyde to take her out of pity.  Fez wants to take his pretty English teacher to the prom.  As for the adults, they struggle with how to respond to Midge's idea for her future career."], [1783270907, 1783272253, "That '70s Show", "A New Hope", "S1 E20", "The guys go see Star Wars and are all completely blown away by it.  Red asks Eric to hang out with his boss's son now that he's started working at the plant full-time again.  David was an awkward kid the last time Eric saw him, but now he's a hunk who likes reading Donna's short stories.  Also, Laurie starts hitting on Kelso out of boredom."], [1783272253, 1783273668, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783273668, 1783275104, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783275104, 1783276400, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783276400, 1783277697, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783277697, 1783279084, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783279084, 1783280479, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783280479, 1783281781, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783281781, 1783283079, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee shop employee."], [1783283079, 1783284418, "Saved by the Bell", "Episode 19", "S1 E19", "Savage at Nite"], [1783284418, 1783285829, "Saved by the Bell", "Episode 20", "S1 E20", "Savage at Nite"], [1783285829, 1783287175, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783287175, 1783288522, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783288522, 1783289958, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783289958, 1783291396, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783291396, 1783292693, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783292693, 1783293990, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783293990, 1783295390, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783295390, 1783296760, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783296760, 1783298058, "Raising Hope", "Baby Monitor", "S1 E21", "Barney tells the team he loses each year's annual commercial competition for the store, so now he wants to recruit his employees to compete for this year's submission; unfortunately, flattery and considerations like fair-play, and team spirit, get in the way."], [1783298058, 1783299362, "Raising Hope", "Don't Vote for this Episode", "S1 E22", "The Chances reminisce about the year Jimmy turned 18 - when Maw Maw kicked them out of the house, when a goth Jimmy took up residence in the grocery store and when Burt and Virginia finally figured out how to be adults."], [1783299362, 1783300765, "Saved by the Bell", "The Prom", "S2 E1", "Zack asks Kelly to be his date for the prom and she agrees, but when her father loses his job, she decides family is more important and gives up her chance to go, but cannot bring herself to tell Zack."], [1783300765, 1783302168, "Saved by the Bell", "Zack's War", "S2 E2", "Mr. Belding tries to reform Zack by making him join the Army Cadet Corps. Zack gets the whole gang to join him, and they end up competing with each other in an obstacle course. Meanwhile, Lisa is swayed by the Cadet Corps drill instructor, Chet Adams."], [1783302168, 1783303517, "That '70s Show", "Grandma's Dead", "S1 E23", "Red's mother Bernice has once again managed to make everyone miserable during one of her visits.  While driving his grandmother home, Eric lashes out and tells her that it wouldn't kill her to be nice once in a while.  Bernice promptly drops dead, leaving Eric to think he killed her.  The entire Forman family (including Laurie and Red's brother Marty) comes together for her funeral while Eric gets"], [1783303517, 1783304863, "That '70s Show", "Hyde Moves In", "S1 E24", "The gang goes skinny-dipping and Jackie gets sick. Hyde moves in with the Formans when his mom runs away with a trucker. Bob takes a liking to one of Midge's feminist friends."], [1783304863, 1783306258, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783306258, 1783307664, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783307664, 1783308958, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783308958, 1783310255, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783310255, 1783311647, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783311647, 1783312995, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783312995, 1783314367, "Raising Hope", "Episode 23", "S1 E23", "Savage at Nite"], [1783314367, 1783315539, "Raising Hope", "Episode 24", "S1 E24", "Savage at Nite"], [1783315539, 1783316942, "Saved by the Bell", "Save the Max", "S2 E3", "The gang unearths Bayside's old school radio station and begins broadcasting again, before learning that The Max is to be closed if Max does not manage to pay $10,000 in back rent."], [1783316942, 1783318345, "Saved by the Bell", "Driver's Education", "S2 E4", "In order to get their driver's licenses, the gang go through a driver's education course. Zack and Kelly advance in their relationship, with Zack buying Kelly a ring. Slater buys a car, and is at the head of the driver's ed class. When Zack becomes jealous of Kelly's attention toward Slater over the driving issue, he tries to set Slater up to fail, but gets the boot himself instead."], [1783318345, 1783319691, "That '70s Show", "The Good Son", "S1 E25", "Eric loves having Hyde as a \"brother\" because he does all of Eric's chores but when his parents start to prefer Hyde he starts to hate him. Hyde changes from the conspiracy minded trouble-making guy Eric loves to a total bore. Midge and Bob are having relationship problems. Red's old war buddy comes back and Red finds out that he's a swinger."], [1783319691, 1783320775, "That '70s Show", "Episode 26", "S1 E26", "Savage at Nite"], [1783320775, 1783322170, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783322170, 1783323496, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783323496, 1783324791, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783324791, 1783326087, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783326087, 1783327419, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783327419, 1783328808, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783328808, 1783329980, "Raising Hope", "Episode 25", "S1 E25", "Savage at Nite"], [1783329980, 1783331283, "Raising Hope", "Prodigy", "S2 E1", "When Jimmy watches a home video of himself as a thirteen-year-old, he discovers that he was a musical prodigy with a promising career as a singer and pianist until a horrible accident involving a golf putter rendered him talentless. Jimmy recruits Burt, Virginia and Maw Maw to help him rediscover his lost abilities."], [1783331283, 1783332621, "Saved by the Bell", "House Party", "S2 E5", "Zack stays over at Screech's place for the weekend where the two of them along with Slater throw a party which is interrupted by the girls before breaking off a valuable item from Mrs. Powers."], [1783332621, 1783334025, "Saved by the Bell", "Blind Dates", "S2 E6", "Mr. Belding blackmails Zack with suspension if he won't take his bratty niece, Penny, out on a date. So, Zack asks Screech to impersonate him while he takes out Kelly for her birthday party at the Max. But Slater overhears this and decides to break up Zack's plans to he can have another chance with Kelly. Meanwhile, Lisa sets Jessie up on a blind date, but there's a problem: the guy is much shorte"], [1783334025, 1783335351, "That '70s Show", "Garage Sale", "S2 E1", "The Formans have a garage sale to earn some extra cash. Hyde doesn't have anything to sell, so he bakes \"special brownies\" to sell; Kitty, Red, Bob and Midge eat some of the brownies unsuspectingly. Fez kisses Jackie who tells Donna it's the best kiss she's ever had. (#26)"], [1783335351, 1783336678, "That '70s Show", "Red's Last Day", "S2 E2", "It's Red's last day of work, and he decides to drown his unemployment sorrows at a bar.  Kitty sends Eric to pick Red up; he, Hyde and Fez end up drinking with Red instead, leaving none of them in any condition to drive.  Kelso gets a van, and christens it the \"shaggin' wagon.\""], [1783336678, 1783338067, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783338067, 1783339461, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."]]}, {"id": "215", "name": "Bel-Air", "a": "bel-air", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/belair-v1.png", "progs": [[1783244300, 1783245694, "The Fresh Prince of Bel-Air", "Will Gets Committed", "S3 E2", "When the Banks family returns to its former neighborhood to help old friends after a destructive city-wide riot, Vivian reveals a surprise to Philip."], [1783245694, 1783247089, "The Fresh Prince of Bel-Air", "That's No Lady, That's My Cousin", "S3 E3", "Philip and Vivian tell the family they are expecting a baby. Hillary is expected to move out to make room for the baby. Ashley wants to fit in at a new school so she dresses like the girls Will is interested in."], [1783247089, 1783248484, "The Fresh Prince of Bel-Air", "Hilary Gets a Job", "S3 E4", "Hilary gets a job reporting weather on television."], [1783248484, 1783249879, "The Fresh Prince of Bel-Air", "Mama's Baby, Carlton's Maybe", "S3 E5", "Carlton prepares for a dinner date with his former girlfriend, Cindy (Lark Voorhees), forgiving her for rejecting him several months earlier, but when she arrives with a newborn baby named Carlton Jr., the entire Banks family is stunned."], [1783249879, 1783251274, "The Fresh Prince of Bel-Air", "P.S. I Love You", "S3 E6", "While Philip entertains rude, senile Judge Robertson, Will accepts expensive gifts from Lindsey Simon, a rich classmate who wants to buy his affection."], [1783251274, 1783252668, "The Fresh Prince of Bel-Air", "Here Comes the Judge", "S3 E7", "Will gets arrested for numerous parking tickets as Phil runs for judge against incumbent Judge Robertson."], [1783252668, 1783254063, "The Fresh Prince of Bel-Air", "Boyz in the Woods", "S3 E8", "Philip takes Will and Carlton on a camping trip that turns out to be a disaster when snow traps the unhappy campers."], [1783254063, 1783255458, "The Fresh Prince of Bel-Air", "A Night at the Oprah", "S3 E9", "The Bankses appear on Oprah's show and fail to invite Will on-stage, which may cause Philip to lose the election."], [1783255458, 1783256854, "The Fresh Prince of Bel-Air", "Asses to Ashes", "S3 E10", "Election results are in and Philip fights to remain cool amid lies by Judge Robertson, which prompt Will to confront the outspoken incumbent. Will Will go to far? Will he say what everyone is feeling? Will Judge Robertson be able to take it?"], [1783256854, 1783258209, "The Fresh Prince of Bel-Air", "A Funny Thing Happened on the Way to the Forum", "S3 E11", "When Philip backs out of taking Vivian to Lamaze class, Will reluctantly offers to be her coach. Will meets a single pregnant woman who is a sportswriter. She invites Will to attend a game with her, where she goes into labor."], [1783258209, 1783259603, "The Fresh Prince of Bel-Air", "The Cold War", "S3 E12", "Carlton is upset when Paula breaks up with him. She then pursues Will and they begin to date. After getting the picture of an ultrasound from the doctor, Philip & Vivian ask Geoffrey to hide it so they do not find the sex of the baby."], [1783259603, 1783260999, "The Fresh Prince of Bel-Air", "Mommy Nearest", "S3 E13", "Will's mother is in town after a broken engagement with Robert. She tells Will that after he graduates from high school, he can move back to Philadelphia. Will wants to stay in California for college."], [1783260999, 1783262394, "The Fresh Prince of Bel-Air", "Winner Takes Off", "S3 E14", "In an attempt to get back at Geoffrey, Will and Carlton give him a fake lottery ticket and trick him into thinking he won $26,000,000. As a response, Geoffrey quits and the boys must convince him to come back."], [1783262394, 1783263789, "The Fresh Prince of Bel-Air", "Robbing the Banks", "S3 E15", "Philip is quick to judge an ex-con Will urged him to hire as a handyman and temporary assistant after the house is robbed."], [1783263789, 1783265033, "The Fresh Prince of Bel-Air", "Bundle of Joy", "S3 E16", "As Vivian's delivery date approaches, the family fantasizes about what the baby will mean to each of them: Ashley feels all but invisible, Geoffrey feels overwhelmed by the family's demands, and Vivian feels like she's having triplets."], [1783265033, 1783266428, "The Fresh Prince of Bel-Air", "The Best Laid Plans", "S3 E17", "Will wants to take the next step in his relationship with his current girl Monique, but she has old fashioned ideas about sex before marriage. Will and Jazz set up a fake wedding. Monique, thinking they are married, is willing to consummate their marriage, saying that Will is a good and honest man. Will Will follow through on the devious plan, or will he come clean and tell the truth?"], [1783266428, 1783267822, "The Fresh Prince of Bel-Air", "The Alma Matter", "S3 E18", "Depressed and suicidal over having ruined his chances of attending Princeton University, Carlton is visited by his Guardian Angel, who shows him how awful the Banks family would be if he weren't alive."], [1783267822, 1783269216, "The Fresh Prince of Bel-Air", "Just Say Yo", "S3 E19", "Will is run down with work, school, and his girlfriend, and has trouble staying awake. He decides to take amphetamines to help him. Carlton asks will for vitamins and Will accidentally gives him the uppers. Carlton ends up in the hospital."], [1783269216, 1783270591, "The Fresh Prince of Bel-Air", "The Baby Comes Out", "S3 E20", "Vivian's baby is a week late, but family members and her visiting sisters are nowhere to be found when it's time to rush to the hospital."], [1783270591, 1783271986, "The Fresh Prince of Bel-Air", "You Bet Your Life", "S3 E21", "Heavyweight boxing champ Riddick Brown wreaks havoc with Carlton's mind and Will's face at a funky cafe-casino in Nevada, where the cousins have stopped on their way to check out a college for Will."], [1783271986, 1783273381, "The Fresh Prince of Bel-Air", "Ain't No Business Like Show Business", "S3 E22", "Will's friend Keith, a comedian from Philadelphia, visits Will and the Banks family. His sense of humor tickles Will's funny bone, causing Will to think that a career in comedy might work for him, too. Meanwhile, Vivian is away and Phillip demands the attention of his children in her absence."], [1783273381, 1783274776, "The Fresh Prince of Bel-Air", "The Way We Were", "S3 E23", "Philip and Vivian are celebrating their 25th wedding anniversary and the others put together a scrapbook. This is a flashback show with clips from the previous seasons as the scrapbook is put together."], [1783274776, 1783276171, "The Fresh Prince of Bel-Air", "Six Degrees of Graduation", "S3 E24", "Vy anticipates Will's graduation with enthusiasm, but there may be discord when she learns Will is failing music. To pass his music class, Will must sing at the graduation ceremony - with a class of eight-year-olds."], [1783276171, 1783277437, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (1)", "S4 E1", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783277437, 1783278803, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (2)", "S4 E2", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783278803, 1783280170, "The Fresh Prince of Bel-Air", "All Guts, No Glory", "S4 E3", "Will withdraws from philosophy class at college because it seems too difficult. Later he realizes the professor was actually a good one who held stimulating discussions. He tries to get in the class again but can only attend without credit."], [1783280170, 1783281531, "The Fresh Prince of Bel-Air", "Father of the Year", "S4 E4", "While working at the school bookstore, Will sees how the women flock over a single dad, and decides to try and pass Nicky off as his son to meet the ladies. While doing so, a picture is taken of the two by Candace, who is the school photographer, and it is put in schools newspaper as \"Father of the year\"."], [1783281531, 1783282862, "The Fresh Prince of Bel-Air", "It's Better to Have Loved and Lost It...", "S4 E5", "After Will's friends guys rib Carlton about being a virgin, Miss Right appears and sweeps Carlton off his feet. Elsewhere, Geoffrey confesses a secret of his own."], [1783282862, 1783284182, "The Fresh Prince of Bel-Air", "Will Goes a-Courtin'", "S4 E6", "Will and Carlton form a rivalry against Philip because of their unpaid rent. Since Philip was receiving no money he decides to take action and sue them. Despite Will and Carlton being faced with this challenge they are prepared to fight back."], [1783284182, 1783285548, "The Fresh Prince of Bel-Air", "Hex and the Single Guy", "S4 E7", "Hilary drags the family to a psychic for a séance to say goodbye to Trevor. Will doesn't believe the psychic is for real and mocks him. Because of that, the psychic curses him and bad things happen later that day."], [1783285548, 1783286842, "The Fresh Prince of Bel-Air", "Blood is Thicker Than Mud", "S4 E8", "A bro with dough? Carlton's upper-class upbringing may make him unwelcome at a black fraternity."], [1783286842, 1783288178, "The Fresh Prince of Bel-Air", "Fresh Prince After Dark", "S4 E9", "Will breaks a date with Jackie to accompany Hilary to a Playboy Mansion reception for weather reporters being photographed for the magazine."], [1783288178, 1783289544, "The Fresh Prince of Bel-Air", "Home is Where the Heart Attack Is", "S4 E10", "Will sneaks greasy, high-fat foods to Philip after he promises to diet and exercise, then blames himself when Philip has a heart attack."], [1783289544, 1783290879, "The Fresh Prince of Bel-Air", "Take My Cousin... Please", "S4 E11", "On academic probation, Will schemes to improve his grades by fixing up a newly divorced English professor with Hilary, who soon finds fault with the man, further jeopardizing Will's academic future."], [1783290879, 1783292244, "The Fresh Prince of Bel-Air", "You've Got to Be a Football Hero", "S4 E12", "Will uses booze to prove his manliness while competing with a hulking football hero who wants to score points with Jackie, and his fraternity brothers leave drunken Will in a cemetery, where he is haunted. Meanwhile, Ashley learns that beauty is in the eye of the beholder."], [1783292244, 1783293609, "The Fresh Prince of Bel-Air", "'Twas the Night Before Christening", "S4 E13", "Vivian promises god-motherhood of her child to both of her sisters, while Will hatches a harebrained scheme to get Boyz II Men to perform at baby Nicky's christening."], [1783293609, 1783294975, "The Fresh Prince of Bel-Air", "Sleepless in Bel-Air", "S4 E14", "Will pays for putting off studying for a midterm until the last minute, and Ashley pays for staying out late on her first date."], [1783294975, 1783296325, "The Fresh Prince of Bel-Air", "Who's the Boss", "S4 E15", "Carlton in charge. Will gets his feathers ruffled when his cousin becomes his boss at the Peacock Stop."], [1783296325, 1783297690, "The Fresh Prince of Bel-Air", "I Know Why the Caged Bird Screams", "S4 E16", "The big sports game is coming up and pranks against each team starts. Will steals the other teams statue and they retaliate by stealing Carlton, the team good luck charm. Phillip has the home alarm system upgraded and it causes problems."], [1783297690, 1783299055, "The Fresh Prince of Bel-Air", "When You Hit Upon a Star", "S4 E17", "Will becomes a jet-setter while dating a pop star."], [1783299055, 1783300420, "The Fresh Prince of Bel-Air", "Stop Will! In the Name of Love", "S4 E18", "A Valentine's double date finds Will treating Ashley like a kid and Ashley demanding r-e-s-p-e-c-t."], [1783300420, 1783301773, "The Fresh Prince of Bel-Air", "You'd Better Shop Around", "S4 E19", "Will goes with Phillip and Carlton to buy a new car. When Carlton wants Phillip to buy a car that Will thinks is dull, Will convinces Phillip to get a convertible. The owner of the lot offers Will a job and Will accepts. It isn't long that Will is the best salesman on the lot and he's being considered for an executive position so he drops out of school."], [1783301773, 1783303118, "The Fresh Prince of Bel-Air", "The Client", "S5 E1", "Ashley's success is going to Will's head. Phil decides that it would be best if Will did not manage Ashley any further. Upset, Will moves out for weeks, but eventually comes back. As soon he is back, Will learns that Ashley's success is going to her head as well and is upset to find that Ashley is turning into a Diva."], [1783303118, 1783304474, "The Fresh Prince of Bel-Air", "What's Will Got to Do With It?", "S5 E2", "Will helps Ashley make a big impression on a recording executive, but Philip is adamantly against her pursuing a singing career."], [1783304474, 1783305831, "The Fresh Prince of Bel-Air", "Reality Bites", "S5 E3", "Will loses points as a role model for Nicky while visiting an ever-positive kiddie hero who brings joy to youngsters - but not to Will."], [1783305831, 1783307188, "The Fresh Prince of Bel-Air", "Grumpy Young Men", "S5 E4", "War breaks out when the girl Will likes plants a big one on Carlton."], [1783307188, 1783308544, "The Fresh Prince of Bel-Air", "Fresh Prince: The Movie", "S5 E5", "Will tells a tall tale about seeing a mob killing, then being placed in a witness-protection program in the backwoods of Alabama."], [1783308544, 1783309902, "The Fresh Prince of Bel-Air", "Will's Misery", "S5 E6", "The Banks hate the ugly golf shirts Hilary gives them - until they see Kareem Abdul-Jabbar wearing the same design."], [1783309902, 1783311259, "The Fresh Prince of Bel-Air", "Father Knows Best", "S5 E7", "To help Ashley out of a jam at school, Will poses as her father. Oh yeah, this is gonna work."], [1783311259, 1783312610, "The Fresh Prince of Bel-Air", "Soul Train", "S5 E8", "At a Soul Train reunion, middle-aged Philip feels like his train has left the station."], [1783312610, 1783313968, "The Fresh Prince of Bel-Air", "Love Hurts", "S5 E9", "Lisa humiliates Will by knocking out a guy with her self-defense moves."], [1783313968, 1783315323, "The Fresh Pri const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
</script>
</body></html>
