d, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783435480, 1783438296, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783438296, 1783439702, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783439702, 1783441127, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783441127, 1783442531, "Saved by the Bell", "The Election", "S1 E13", "When Zack finds out that the elected student council president gets to leave school for a trip to Washington D.C., he runs against Jessie."], [1783442531, 1783443908, "Saved by the Bell", "The Zack Tapes", "S1 E14", "The new teacher, Mrs. Wentworth, teaches a class on subliminal advertising, so after Zack successfully uses it to get out of trouble with Mr. Belding, he tries to use hidden messages on a cassette music tape to get Kelly to go the Sweetheart's Dance with him and Lisa to go with Screech. But when the rest of the gang catches on, they all joins forces with the entire school including Mr. Belding to "], [1783443908, 1783445298, "In Living Color", "Homey D. Clown Returns", "S1 E13", "Damon Wayans plays Homey the Clown; comedienne Samantha Kinison speaks on men and marriage."], [1783445298, 1783446691, "In Living Color", "Bigger Brothers", "S2 E1", "Sketches include:\n\nHey Mon/Hedley Hospital /  Sidekick /  Bigger Brothers /  Mudhead's Funeral / Men On Films II / Flava Flave makes an appearance / Queen Latifah performs"], [1783446691, 1783448214, "Sex and the City", "Take Me Out to the Ballgame", "S2 E1", "Carrie meets \"the new Yankee,\" Joe, at a baseball game, all the while preparing for her first post-breakup encounter with Big. Miranda gets fed up with the girls always talking about men. Samantha gets frustrated with James' \"deficiencies\". Charlotte dates a guy named Paul Ericson who has a tendency to adjust his package... a lot."], [1783448214, 1783449731, "Sex and the City", "The Awful Truth", "S2 E2", "Carrie accidentally suggests that her friend Susan Sharon leave her domineering, violent husband. Miranda builds up the courage to talk dirty in bed. Charlotte tries to replace the perfect man with the perfect dog. Samantha gets dragged to couples' therapy with James and tries to avoid talking about her real problem with their sex life."], [1783449731, 1783452546, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783452546, 1783455359, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783455359, 1783456774, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783456774, 1783458204, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783458204, 1783459549, "Saved by the Bell", "King of the Hill", "S1 E15", "At Bayside High School in Palisades, California, conniving preppy Zack Morris makes a play for Kelly Kapowski, the new girl that he has a crush on, but so does transfer student, A.C. Slater. So, after Kelly gets a detention, Zack tries to ensue that he does in order to be in the same room with her."], [1783459549, 1783460888, "Saved by the Bell", "Save That Tiger", "S1 E16", "The cheerleader county competition arrives as well as the annual prank war with Valley and Bayside High. Jessie is asked to be the head cheerleader and Screech is to be the tiger mascot this year, which is crucial to the cheer leading routine. But two Valley guys kidnap Screech in retaliation for Zack and Slater's pranks against Valley."], [1783460888, 1783462271, "In Living Color", "Anton at the Recruiter", "S2 E2", "Sketches include:\n\n\"\"Anton Volunteers\"\"   \"\"Training Men the Wodehouse Way\"\"   \"\"Roseanne Sings America\"\"   \"\"2 Live Crew\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""], [1783462271, 1783463576, "In Living Color", "Spike's Joint", "S2 E3", "Sketches (not including intro) include:\n\n\"\"Flatuscents\"\"   \"\"Good Morning/Good Night (Magenta Thompson Show)\"\"   \"\"Cephus & Reesie's Broadway Tour\"\"   \"\"The Buttmans: Guess Who's Coming to Dinner\"\"   \"\"Spike's Joint\"\""], [1783463576, 1783465137, "Sex and the City", "The Freak Show", "S2 E3", "Carrie turns freakish herself after dating a string of freaky guys and freaks out the very normal Ben when trying to discover his secret freakiness. Miranda dates \"Manhattan Guy,\" a guy who hasn't left Manhattan in ten years. Charlotte dates the renowned \"Mr. Pussy\" and tries to make a real relationship out of it. Samantha decides to get plastic surgery and freaks out during the consult."], [1783465137, 1783466710, "Sex and the City", "They Shoot Single People, Don't They?", "S2 E4", "Single and fabulous Carrie gets a horrible photo taken for the cover story of New York Magazine: Single and Fabulous...?. Miranda fakes orgasms with her current boyfriend. Charlotte starts dating her handyman. Samantha dates a club owner, who calls them a \"we\" right away."], [1783466710, 1783469527, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783469527, 1783472341, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783472341, 1783473770, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783473770, 1783475205, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783475205, 1783476543, "Saved by the Bell", "Episode 17", "S1 E17", "Prime Time"], [1783476543, 1783477881, "Saved by the Bell", "Episode 18", "S1 E18", "Prime Time"], [1783477881, 1783479273, "In Living Color", "Hour of Power", "S2 E4", "Sketches include:\n\nTag Team Evangelists / Bonita Butrell: Uninvited Guest / 1-900-YT GUILT / Al MacAfee: Hall Monitor / Monie Love performs \"Monie in the Middle\""], [1783479273, 1783480666, "In Living Color", "Miss Black Person USA", "S2 E5", "Sketches include:\n\n\"\"Black Like You\"\"   \"\"Go On Girl: Sensitive Men\"\"   \"\"I Won't Drift Away\"\"   \"\"Miss Black Person U.S.A.\"\""], [1783480666, 1783482326, "Sex and the City", "Four Women and a Funeral", "S2 E5", "Carrie starts seeing Mr. Big again. Miranda buys her own apartment on the Upper West Side. Charlotte meets a recent widower at a cemetery. Samantha's actions with a married man gets her in trouble with the New York high-society \"ladies who lunch\" and only a titanic star can help her out."], [1783482326, 1783483831, "Sex and the City", "The Cheating Curve", "S2 E6", "Carrie starts to \"officially\" date Mr. Big again. Miranda dates a guy who insists on watching porn while they have sex. Fed up with cheating men, Charlotte spends time with her new friends, the \"Power Lesbians.\" Samantha starts dating her gym instructor who \"brands\" her with a lightning bolt."], [1783483831, 1783486646, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783486646, 1783489343, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783489343, 1783490758, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783490758, 1783492194, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783492194, 1783493533, "Saved by the Bell", "Episode 19", "S1 E19", "Prime Time"], [1783493533, 1783494944, "Saved by the Bell", "Episode 20", "S1 E20", "Prime Time"], [1783494944, 1783496338, "In Living Color", "The Black Man's Guide to Understanding the Black Woman", "S2 E6", "Sketches include:\n\n\"\"Hey Mon/Hedley Court\"\"   \"\"Shahrazad Ali's Video (The Black Man's Guide to Understanding the Black Woman)\"\"   \"\"Snackin' Shack\"\"   \"\"Frenchie\"\""], [1783496338, 1783497731, "In Living Color", "Funky Finger Productions", "S2 E7", "Sketches include:\n\n\"\"B.S. Brothers: Penitentiary IV\"\"   \"\"Iraqi Fashion Show\"\"   \"\"Lil Miss Trouble: The School Play\"\"   \"\"Vera DeMilo: Buffed, Beautiful, and Bitchin'\"\"   \"\"Homeboy Shopping Network: Hollywood Homeboys\"\""], [1783497731, 1783499242, "Sex and the City", "The Chicken Dance", "S2 E7", "Carrie gets fed up with Big's inability to pay attention to her. Miranda inadvertently sets her interior designer up with a long-distance would-be boyfriend, and they marry after only four weeks. Charlotte has a \"warp speed\" relationship with a guy she meets at the wedding. Samantha is upset when she experiences \"déjà-screw\": sleeping with a guy she previously did fifteen years ago."], [1783499242, 1783500747, "Sex and the City", "The Man, the Myth, the Viagra", "S2 E8", "A frustrated Carrie tries to get Big to make time to meet the girls. Miranda meets Steve Brady, a cute bartender who wants to be more than a one-night stand. Samantha dates an incredibly wealthy man in his seventies with a sumptuous lifestyle and a pocket full of Viagra."], [1783500747, 1783503531, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."]]}, {"id": "111", "name": "Savage at Nite", "a": "savage-at-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/savage-at-nite-v4.png", "progs": [[1783408892, 1783410195, "Raising Hope", "Burt Rocks", "S1 E10", "A washed-up rock star who is hired as the lead act at 'Grocery-Palooza', a rock concert at the supermarket where Sabrina works. Smokey was once Burt's musical idol, and Burt hopes to relive his rock-star years by playing backup for him at the concert."], [1783410195, 1783411577, "Saved by the Bell", "Pinned to the Mat", "S1 E9", "During Career Week at school, Slater worries that continuing to focus on wrestling will not lead to a successful job. As a result, he quits the sport, worrying Zack, who has bet on Slater winning his next match."], [1783411577, 1783412950, "Saved by the Bell", "Beauty and the Screech", "S1 E10", "Zack enlists Screech to tutor Kelly, when he finds out that she needs to pass an upcoming science test in order to go to a concert with him. When Screech and Kelly begin spending more time together than he'd expected, it makes him uncomfortable."], [1783412950, 1783414296, "That '70s Show", "Eric's Buddy", "S1 E11", "Eric has a new friend and Steven and Kelso can't stand it. Steven doesn't like him because he's rich and Eric doesn't give him a ride home anymore because Buddy has a Trans Am. Kelso, on the other hand, seems like a worried spouse. Eric starts to feel uncomfortable around him however when Buddy makes a move on him. Buddy apparently thought that Eric was also gay. And Red makes his first sale."], [1783414296, 1783415642, "That '70s Show", "The Best Christmas Ever", "S1 E12", "Red gives Eric 40 bucks to buy a Christmas tree and says that he can keep the change for his party. So Eric, Hyde and Kelso cut down a tree off the interstate and keep the money. They spend the money on beer and Kelso buys Jackie a Christmas present. Laurie spikes the punch with rum and Jackie's friend's are all attracted to Fez all of the sudden. Red has to work on Christmas Eve and not long afte"], [1783415642, 1783417076, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783417076, 1783418511, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783418511, 1783419805, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783419805, 1783421100, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783421100, 1783422531, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783422531, 1783423957, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783423957, 1783425261, "Raising Hope", "Toy Story", "S1 E11", "Jimmy finds out about his father's annual Christmas scheme where he sells the most wanted toy for a lot of money, which always left Jimmy disappointed when he was a child. Virginia wants the family to be a part of the living nativity scene at their church to gain the respect of the members."], [1783425261, 1783426567, "Raising Hope", "Romeo and Romeo", "S1 E12", "Jimmy hasn't had any time to socialize or make friends since Hope was born, so when he meets another single dad at the grocery store, he immediately sets up a play date. But when Jimmy finds out that Virginia is his new friend's housekeeper, Virginia insists that Jimmy cancel the outing. In an effort to keep the peace, Jimmy and his friend arrange a dinner at the Chance house."], [1783426567, 1783427971, "Saved by the Bell", "The Friendship Business", "S1 E11", "As part of an assignment for Business class, the gang forms a friendship bracelet company, but infighting soon leads to trouble and defection."], [1783427971, 1783429342, "Saved by the Bell", "The Mamas and the Papas", "S1 E12", "As a class project, the gang pairs up in mock marriages for the week. Slater's \"marriage\" to Jessie comes apart when he turns out to be the domineering type. Lisa's \"marriage\" to Screech is driving her crazy. Meanwhile, Slater tries to get Screech to break up Zack and Kelly's \"marriage\" so he can still have a chance with her."], [1783429342, 1783430689, "That '70s Show", "Ski Trip", "S1 E13", "Jackie dumps Kelso after he makes out with Pam Macy and invites everyone but him to her parent's ski cabin for the weekend.  Eric, excited about what this could mean for him and Donna, pays no attention to Kelso's whining about being left behind or Red's tips about driving in the snow.  He doesn't realize that Hyde keeps hitting on Donna and Kelso plans on following them to the lodge.  Also, Kitty"], [1783430689, 1783432036, "That '70s Show", "Stolen Car", "S1 E14", "When Eric scratches the car, Red suspends his driving privileges, so the gang has to walk everywhere. That is, until Kelso's cousin lends him a car. They get arrested though because the car was reported stolen. With one phone call, Kelso calls Jackie and she tells him that she'll have sex with him once he gets out of prison. The whole incident was a mix-up and the gang is released."], [1783432036, 1783433441, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783433441, 1783434866, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783434866, 1783436163, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783436163, 1783437461, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783437461, 1783438686, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783438686, 1783440162, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783440162, 1783441465, "Raising Hope", "A Germ of a Story", "S1 E13", "When Sabrina points out to Jimmy just how many germs are lurking around his house, the Chance family becomes obsessed with cleanliness. Finding it impossible to keep Maw Maw clean, they move her to the backyard greenhouse, but after watching some old family movies, they discover a surprising secret that has kept them healthy all these years."], [1783441465, 1783442769, "Raising Hope", "What Up, Cuz?", "S1 E14", "Virginia's cousin Delilah, who struggles to make ends meet, pays a visit to the Chance family unannounced, determined to claim her share of Maw Maw's - whom she thinks died years ago - estate. Further tension builds when Delilah admits she still has a crush on Burt. Meanwhile, Jimmy babysits Maw Maw and panics when she takes off on Sabrina's moped."], [1783442769, 1783444173, "Saved by the Bell", "The Election", "S1 E13", "When Zack finds out that the elected student council president gets to leave school for a trip to Washington D.C., he runs against Jessie."], [1783444173, 1783445550, "Saved by the Bell", "The Zack Tapes", "S1 E14", "The new teacher, Mrs. Wentworth, teaches a class on subliminal advertising, so after Zack successfully uses it to get out of trouble with Mr. Belding, he tries to use hidden messages on a cassette music tape to get Kelly to go the Sweetheart's Dance with him and Lisa to go with Screech. But when the rest of the gang catches on, they all joins forces with the entire school including Mr. Belding to "], [1783445550, 1783446897, "That '70s Show", "That Wrestling Show", "S1 E15", "Kitty thinks that it would be a good idea if Red and Eric become friends.  She forces Eric to invite Red to go with the gang to a wrestling event in Kenosha.  Bob tags along and seeks help from Fez and Hyde over Midge's decision to start therapy.  And Jackie is super nice to Kelso now that they've done the deed."], [1783446897, 1783448244, "That '70s Show", "First Date", "S1 E16", "Valentine's Day is coming up, so Eric decides to ask Donna out on their official first date and give her his class ring.  She breaks her study date with Hyde in order to go, leading Hyde to realize he only has one last chance with her.  Red and Kitty discover they don't have that much in common with Bob and Midge anymore.  And Jackie explains to Kelso how things are going to work now that they've "], [1783448244, 1783449658, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783449658, 1783451089, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783451089, 1783452386, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783452386, 1783453680, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783453680, 1783454975, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783454975, 1783456343, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783456343, 1783457647, "Raising Hope", "Snip Snip", "S1 E15", "Barely reconciled with having to help care for Jimmy's baby, Burt and Virginia realize their unsafe sex is no longer acceptable. Burt defends his manhood but is outvoted, so Jimmy drags him to Dr. Burwitz for a vasectomy and patiently humors him to get the surgery done."], [1783457647, 1783458951, "Raising Hope", "The Cultish Personality", "S1 E16", "The Chances prepare to host once more Burt's cousin Mike, a hopeless loser even by their standards. Yet they find him a changed man, as neat member of a loony sect, one of Tanya's four 'brother-husbands'. Jimmy is inadvertently attracted by their neat, apparently harmonious 'fraternity'."], [1783458951, 1783460296, "Saved by the Bell", "King of the Hill", "S1 E15", "At Bayside High School in Palisades, California, conniving preppy Zack Morris makes a play for Kelly Kapowski, the new girl that he has a crush on, but so does transfer student, A.C. Slater. So, after Kelly gets a detention, Zack tries to ensue that he does in order to be in the same room with her."], [1783460296, 1783461635, "Saved by the Bell", "Save That Tiger", "S1 E16", "The cheerleader county competition arrives as well as the annual prank war with Valley and Bayside High. Jessie is asked to be the head cheerleader and Screech is to be the tiger mascot this year, which is crucial to the cheer leading routine. But two Valley guys kidnap Screech in retaliation for Zack and Slater's pranks against Valley."], [1783461635, 1783462982, "That '70s Show", "The Pill", "S1 E17", "Since no one else is around, Jackie confides in Eric that she thinks she might be pregnant.   Eric passes the news on to Donna, who tries to get Jackie to tell Kelso.  The incident inspires Donna to go on birth control pills.  Her decision inadvertantly causes Eric a lot of grief when Bob and the Formans find out."], [1783462982, 1783464328, "That '70s Show", "Career Day", "S1 E18", "It's career day and the gang must spend the day working with their parents.  Eric goes to the hospital with Kitty and is amazed at all she has to deal with every day.  Fez accompanies Hyde and interviews cafeteria lady \"Gross Edna\" while mother and son feud.  Poor Michael spends the entire day trying to figure out what his dad does, while Donna is mortified by Bob's crazy promotional antics.  And "], [1783464328, 1783465758, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783465758, 1783467192, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783467192, 1783468486, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783468486, 1783469781, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783469781, 1783471182, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783471182, 1783472583, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783472583, 1783473888, "Raising Hope", "Mongooses", "S1 E17", "The Chance family goes to see a lawyer to get their wills done, and Burt is insulted when Jimmy chooses Sabrina over him. Meanwhile, Sabrina is overcome with emotion by the news, while Maw Maw thinks mongooses are infesting the household."], [1783473888, 1783475193, "Raising Hope", "Cheaters", "S1 E18", "Jimmy hopes gullible Sabrina's boyfriend Wyatt may be cheating on her in college, so he insists to go with her to Wyatt's frat's wild costume party, but conclusive evidence is perilously hard to find. In order to have contact with generation peers, Maw Maw goes to Dead Tooth's daycare."], [1783475193, 1783476531, "Saved by the Bell", "Episode 17", "S1 E17", "Savage at Nite"], [1783476531, 1783477869, "Saved by the Bell", "Episode 18", "S1 E18", "Savage at Nite"], [1783477869, 1783479217, "That '70s Show", "Prom Night", "S1 E19", "Prom night is fast approaching and Eric gets a motel room as part of his \"spontaneous\" plan to \"do it\" with Donna on the big night.  When Jackie finds out that Kelso asked slutty Pam Macy to prom, she gets Hyde to take her out of pity.  Fez wants to take his pretty English teacher to the prom.  As for the adults, they struggle with how to respond to Midge's idea for her future career."], [1783479217, 1783480563, "That '70s Show", "A New Hope", "S1 E20", "The guys go see Star Wars and are all completely blown away by it.  Red asks Eric to hang out with his boss's son now that he's started working at the plant full-time again.  David was an awkward kid the last time Eric saw him, but now he's a hunk who likes reading Donna's short stories.  Also, Laurie starts hitting on Kelso out of boredom."], [1783480563, 1783481978, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783481978, 1783483414, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783483414, 1783484710, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783484710, 1783486007, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783486007, 1783487394, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783487394, 1783488789, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783488789, 1783490091, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783490091, 1783491389, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee shop employee."], [1783491389, 1783492728, "Saved by the Bell", "Episode 19", "S1 E19", "Savage at Nite"], [1783492728, 1783494139, "Saved by the Bell", "Episode 20", "S1 E20", "Savage at Nite"], [1783494139, 1783495485, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783495485, 1783496832, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783496832, 1783498268, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783498268, 1783499706, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783499706, 1783501003, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783501003, 1783502300, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783502300, 1783503700, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."]]}, {"id": "215", "name": "Bel-Air", "a": "bel-air", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/belair-v1.png", "progs": [[1783408538, 1783409933, "The Fresh Prince of Bel-Air", "Boyz in the Woods", "S3 E8", "Philip takes Will and Carlton on a camping trip that turns out to be a disaster when snow traps the unhappy campers."], [1783409933, 1783411328, "The Fresh Prince of Bel-Air", "A Night at the Oprah", "S3 E9", "The Bankses appear on Oprah's show and fail to invite Will on-stage, which may cause Philip to lose the election."], [1783411328, 1783412724, "The Fresh Prince of Bel-Air", "Asses to Ashes", "S3 E10", "Election results are in and Philip fights to remain cool amid lies by Judge Robertson, which prompt Will to confront the outspoken incumbent. Will Will go to far? Will he say what everyone is feeling? Will Judge Robertson be able to take it?"], [1783412724, 1783414079, "The Fresh Prince of Bel-Air", "A Funny Thing Happened on the Way to the Forum", "S3 E11", "When Philip backs out of taking Vivian to Lamaze class, Will reluctantly offers to be her coach. Will meets a single pregnant woman who is a sportswriter. She invites Will to attend a game with her, where she goes into labor."], [1783414079, 1783415473, "The Fresh Prince of Bel-Air", "The Cold War", "S3 E12", "Carlton is upset when Paula breaks up with him. She then pursues Will and they begin to date. After getting the picture of an ultrasound from the doctor, Philip & Vivian ask Geoffrey to hide it so they do not find the sex of the baby."], [1783415473, 1783416869, "The Fresh Prince of Bel-Air", "Mommy Nearest", "S3 E13", "Will's mother is in town after a broken engagement with Robert. She tells Will that after he graduates from high school, he can move back to Philadelphia. Will wants to stay in California for college."], [1783416869, 1783418264, "The Fresh Prince of Bel-Air", "Winner Takes Off", "S3 E14", "In an attempt to get back at Geoffrey, Will and Carlton give him a fake lottery ticket and trick him into thinking he won $26,000,000. As a response, Geoffrey quits and the boys must convince him to come back."], [1783418264, 1783419659, "The Fresh Prince of Bel-Air", "Robbing the Banks", "S3 E15", "Philip is quick to judge an ex-con Will urged him to hire as a handyman and temporary assistant after the house is robbed."], [1783419659, 1783420903, "The Fresh Prince of Bel-Air", "Bundle of Joy", "S3 E16", "As Vivian's delivery date approaches, the family fantasizes about what the baby will mean to each of them: Ashley feels all but invisible, Geoffrey feels overwhelmed by the family's demands, and Vivian feels like she's having triplets."], [1783420903, 1783422298, "The Fresh Prince of Bel-Air", "The Best Laid Plans", "S3 E17", "Will wants to take the next step in his relationship with his current girl Monique, but she has old fashioned ideas about sex before marriage. Will and Jazz set up a fake wedding. Monique, thinking they are married, is willing to consummate their marriage, saying that Will is a good and honest man. Will Will follow through on the devious plan, or will he come clean and tell the truth?"], [1783422298, 1783423692, "The Fresh Prince of Bel-Air", "The Alma Matter", "S3 E18", "Depressed and suicidal over having ruined his chances of attending Princeton University, Carlton is visited by his Guardian Angel, who shows him how awful the Banks family would be if he weren't alive."], [1783423692, 1783425086, "The Fresh Prince of Bel-Air", "Just Say Yo", "S3 E19", "Will is run down with work, school, and his girlfriend, and has trouble staying awake. He decides to take amphetamines to help him. Carlton asks will for vitamins and Will accidentally gives him the uppers. Carlton ends up in the hospital."], [1783425086, 1783426461, "The Fresh Prince of Bel-Air", "The Baby Comes Out", "S3 E20", "Vivian's baby is a week late, but family members and her visiting sisters are nowhere to be found when it's time to rush to the hospital."], [1783426461, 1783427856, "The Fresh Prince of Bel-Air", "You Bet Your Life", "S3 E21", "Heavyweight boxing champ Riddick Brown wreaks havoc with Carlton's mind and Will's face at a funky cafe-casino in Nevada, where the cousins have stopped on their way to check out a college for Will."], [1783427856, 1783429251, "The Fresh Prince of Bel-Air", "Ain't No Business Like Show Business", "S3 E22", "Will's friend Keith, a comedian from Philadelphia, visits Will and the Banks family. His sense of humor tickles Will's funny bone, causing Will to think that a career in comedy might work for him, too. Meanwhile, Vivian is away and Phillip demands the attention of his children in her absence."], [1783429251, 1783430646, "The Fresh Prince of Bel-Air", "The Way We Were", "S3 E23", "Philip and Vivian are celebrating their 25th wedding anniversary and the others put together a scrapbook. This is a flashback show with clips from the previous seasons as the scrapbook is put together."], [1783430646, 1783432041, "The Fresh Prince of Bel-Air", "Six Degrees of Graduation", "S3 E24", "Vy anticipates Will's graduation with enthusiasm, but there may be discord when she learns Will is failing music. To pass his music class, Will must sing at the graduation ceremony - with a class of eight-year-olds."], [1783432041, 1783433307, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (1)", "S4 E1", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783433307, 1783434673, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (2)", "S4 E2", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783434673, 1783436040, "The Fresh Prince of Bel-Air", "All Guts, No Glory", "S4 E3", "Will withdraws from philosophy class at college because it seems too difficult. Later he realizes the professor was actually a good one who held stimulating discussions. He tries to get in the class again but can only attend without credit."], [1783436040, 1783437401, "The Fresh Prince of Bel-Air", "Father of the Year", "S4 E4", "While working at the school bookstore, Will sees how the women flock over a single dad, and decides to try and pass Nicky off as his son to meet the ladies. While doing so, a picture is taken of the two by Candace, who is the school photographer, and it is put in schools newspaper as \"Father of the year\"."], [1783437401, 1783438732, "The Fresh Prince of Bel-Air", "It's Better to Have Loved and Lost It...", "S4 E5", "After Will's friends guys rib Carlton about being a virgin, Miss Right appears and sweeps Carlton off his feet. Elsewhere, Geoffrey confesses a secret of his own."], [1783438732, 1783440052, "The Fresh Prince of Bel-Air", "Will Goes a-Courtin'", "S4 E6", "Will and Carlton form a rivalry against Philip because of their unpaid rent. Since Philip was receiving no money he decides to take action and sue them. Despite Will and Carlton being faced with this challenge they are prepared to fight back."], [1783440052, 1783441418, "The Fresh Prince of Bel-Air", "Hex and the Single Guy", "S4 E7", "Hilary drags the family to a psychic for a séance to say goodbye to Trevor. Will doesn't believe the psychic is for real and mocks him. Because of that, the psychic curses him and bad things happen later that day."], [1783441418, 1783442712, "The Fresh Prince of Bel-Air", "Blood is Thicker Than Mud", "S4 E8", "A bro with dough? Carlton's upper-class upbringing may make him unwelcome at a black fraternity."], [1783442712, 1783444048, "The Fresh Prince of Bel-Air", "Fresh Prince After Dark", "S4 E9", "Will breaks a date with Jackie to accompany Hilary to a Playboy Mansion reception for weather reporters being photographed for the magazine."], [1783444048, 1783445414, "The Fresh Prince of Bel-Air", "Home is Where the Heart Attack Is", "S4 E10", "Will sneaks greasy, high-fat foods to Philip after he promises to diet and exercise, then blames himself when Philip has a heart attack."], [1783445414, 1783446749, "The Fresh Prince of Bel-Air", "Take My Cousin... Please", "S4 E11", "On academic probation, Will schemes to improve his grades by fixing up a newly divorced English professor with Hilary, who soon finds fault with the man, further jeopardizing Will's academic future."], [1783446749, 1783448114, "The Fresh Prince of Bel-Air", "You've Got to Be a Football Hero", "S4 E12", "Will uses booze to prove his manliness while competing with a hulking football hero who wants to score points with Jackie, and his fraternity brothers leave drunken Will in a cemetery, where he is haunted. Meanwhile, Ashley learns that beauty is in the eye of the beholder."], [1783448114, 1783449479, "The Fresh Prince of Bel-Air", "'Twas the Night Before Christening", "S4 E13", "Vivian promises god-motherhood of her child to both of her sisters, while Will hatches a harebrained scheme to get Boyz II Men to perform at baby Nicky's christening."], [1783449479, 1783450845, "The Fresh Prince of Bel-Air", "Sleepless in Bel-Air", "S4 E14", "Will pays for putting off studying for a midterm until the last minute, and Ashley pays for staying out late on her first date."], [1783450845, 1783452195, "The Fresh Prince of Bel-Air", "Who's the Boss", "S4 E15", "Carlton in charge. Will gets his feathers ruffled when his cousin becomes his boss at the Peacock Stop."], [1783452195, 1783453560, "The Fresh Prince of Bel-Air", "I Know Why the Caged Bird Screams", "S4 E16", "The big sports game is coming up and pranks against each team starts. Will steals the other teams statue and they retaliate by stealing Carlton, the team good luck charm. Phillip has the home alarm system upgraded and it causes problems."], [1783453560, 1783454925, "The Fresh Prince of Bel-Air", "When You Hit Upon a Star", "S4 E17", "Will becomes a jet-setter while dating a pop star."], [1783454925, 1783456290, "The Fresh Prince of Bel-Air", "Stop Will! In the Name of Love", "S4 E18", "A Valentine's double date finds Will treating Ashley like a kid and Ashley demanding r-e-s-p-e-c-t."], [1783456290, 1783457643, "The Fresh Prince of Bel-Air", "You'd Better Shop Around", "S4 E19", "Will goes with Phillip and Carlton to buy a new car. When Carlton wants Phillip to buy a car that Will thinks is dull, Will convinces Phillip to get a convertible. The owner of the lot offers Will a job and Will accepts. It isn't long that Will is the best salesman on the lot and he's being considered for an executive position so he drops out of school."], [1783457643, 1783458988, "The Fresh Prince of Bel-Air", "The Client", "S5 E1", "Ashley's success is going to Will's head. Phil decides that it would be best if Will did not manage Ashley any further. Upset, Will moves out for weeks, but eventually comes back. As soon he is back, Will learns that Ashley's success is going to her head as well and is upset to find that Ashley is turning into a Diva."], [1783458988, 1783460344, "The Fresh Prince of Bel-Air", "What's Will Got to Do With It?", "S5 E2", "Will helps Ashley make a big impression on a recording executive, but Philip is adamantly against her pursuing a singing career."], [1783460344, 1783461701, "The Fresh Prince of Bel-Air", "Reality Bites", "S5 E3", "Will loses points as a role model for Nicky while visiting an ever-positive kiddie hero who brings joy to youngsters - but not to Will."], [1783461701, 1783463058, "The Fresh Prince of Bel-Air", "Grumpy Young Men", "S5 E4", "War breaks out when the girl Will likes plants a big one on Carlton."], [1783463058, 1783464414, "The Fresh Prince of Bel-Air", "Fresh Prince: The Movie", "S5 E5", "Will tells a tall tale about seeing a mob killing, then being placed in a witness-protection program in the backwoods of Alabama."], [1783464414, 1783465772, "The Fresh Prince of Bel-Air", "Will's Misery", "S5 E6", "The Banks hate the ugly golf shirts Hilary gives them - until they see Kareem Abdul-Jabbar wearing the same design."], [1783465772, 1783467129, "The Fresh Prince of Bel-Air", "Father Knows Best", "S5 E7", "To help Ashley out of a jam at school, Will poses as her father. Oh yeah, this is gonna work."], [1783467129, 1783468480, "The Fresh Prince of Bel-Air", "Soul Train", "S5 E8", "At a Soul Train reunion, middle-aged Philip feels like his train has left the station."], [1783468480, 1783469838, "The Fresh Prince of Bel-Air", "Love Hurts", "S5 E9", "Lisa humiliates Will by knocking out a guy with her self-defense moves."], [1783469838, 1783471193, "The Fresh Prince of Bel-Air", "Will's Up a Dirt Road", "S5 E10", "Will, in an attempt to impress Lisa, makes a photo of Jay Leno by night and sells the picture to an editor. However, Will doesn't know the editor works for a sleazy gossip magazine and ends up being sued for libel by Jay Leno."], [1783471193, 1783472549, "The Fresh Prince of Bel-Air", "Will Steps Out", "S5 E11", "To understand Philip's battle with the scale, Will dons a fat suit and gets a big fat lesson in empathy."], [1783472549, 1783473891, "The Fresh Prince of Bel-Air", "Same Game, Next Season", "S5 E12", "Will works so hard to impress Lisa's dad that he spends all his free time with his new best buddy."], [1783473891, 1783475240, "The Fresh Prince of Bel-Air", "Three's a Crowd", "S5 E13", "Will gets roped into a weekend ski trip with Carlton that quickly turns to disaster when their party arrives; meanwhile, back home, Hilary prepares to leave the nest."], [1783475240, 1783476598, "The Fresh Prince of Bel-Air", "It's a Wonderful Lie", "S5 E14", "Lisa tells Will is OK if he wants to go out with his friends one night and she will go out with her friends. They each lie about what they are going to do, and happen to both go to the same party. Worse, they find Ashley at the same party."], [1783476598, 1783477919, "The Fresh Prince of Bel-Air", "Bullets Over Bel-Air", "S5 E15", "A planned camping trip is cut short for Carlton and Will when a robber approaches them at an automated bank-teller machine - and fires a gun."], [1783477919, 1783479270, "The Fresh Prince of Bel-Air", "A Decent Proposal", "S5 E16", "Still in the hospital from being shot, Will thinks about his future. He asks Lisa to marry him."], [1783479270, 1783480629, "The Fresh Prince of Bel-Air", "Will is from Mars...", "S5 E17", "Thanks to relationship counseling, Will and Lisa hop to move on up to a new understanding in preparation for marriage. Meanwhile Hillary wants Geoffrey to work at her new home."], [1783480629, 1783481985, "The Fresh Prince of Bel-Air", "The Wedding Show (Psyche!)", "S5 E18", "Shafted! The engaged couple opts for flashy Vegas vows, complete with costumes. The tasteful theme: Shaft."], [1783481985, 1783483313, "The Fresh Prince of Bel-Air", "Slum Like It... Not!", "S5 E19", "Will vows Philip with his sound investment advice to buy Jazz's apartment building - but the tenants scream slumlord after Philip acts on Will's moneymaking tip."], [1783483313, 1783484667, "The Fresh Prince of Bel-Air", "As the Will Turns", "S5 E20", "Will finds out what it is like to have a woman in his life that controls things. Also, Will lands a part in a soap opera and begins to see himself as a major star, spending money to fit his new status."], [1783484667, 1783486016, "The Fresh Prince of Bel-Air", "Save the Last Trance for Me", "S5 E21", "Put into a trance by a stage hypnotist, Will behaves like a 4-year-old just as the family gears up for an interview with the admissions head of a private school."], [1783486016, 1783487367, "The Fresh Prince of Bel-Air", "To Thine Own Self Be Blue... and Gold", "S5 E22", "A family friend visits Philip. He asks WIll to do something illegal and Will tries to find a way to avoid the issue. Carlton and Hilary try to find a match in online dating and end up being matched with each other."], [1783487367, 1783488714, "The Fresh Prince of Bel-Air", "Cold Feet, Hot Body", "S5 E23", "Dinner date. The Banks host a gorgeous girl from Philly who tries to lure Will away from Lisa."], [1783488714, 1783490072, "The Fresh Prince of Bel-Air", "Love in an Elevator", "S5 E24", "Stuck and out of luck, Will spends his bachelor party trapped in an elevator with a feuding Carlton and Jazz."], [1783490072, 1783491396, "The Fresh Prince of Bel-Air", "For Whom the Wedding Bells Toll", "S5 E25", "Husband-to-be Will has the bride, the ring, the date...and second thoughts about the whole idea."], [1783491396, 1783492751, "The Fresh Prince of Bel-Air", "Burnin' Down the House", "S6 E1", "While Carlton is away at a Young Republican camp, Will cooks up a flambe of a disaster on a night when an influential judge is coming to dinner, and Will can only make it through the night with the help of Geoffrey, and other plan is not to make Phil find out."], [1783492751, 1783494088, "The Fresh Prince of Bel-Air", "Get a Job", "S6 E2", "Will and Carlton compete for a job at Hilary's talk show. Will wins the job and has to take out a comedian's sister as part of his duties. Will is looking forward to it until he sees what the sister looks like."], [1783494088, 1783495427, "The Fresh Prince of Bel-Air", "Stress Related", "S6 E3", "After learning a little something about initiative, Will jumps to Hilary's aid prior to a key business meeting at the station, meanwhile an unemployed Carlton subs for Philip on career day at Ashley's school."], [1783495427, 1783496772, "The Fresh Prince of Bel-Air", "Bourgie Sings the Blues", "S6 E4", "Carlton is worried about the interview at Princeton and is afraid of another disappointment. Will does his best to check him up, but nothing seems to work. Carlton does not want to go to the interview, so Will goes for him."], [1783496772, 1783498126, "The Fresh Prince of Bel-Air", "The Script Formerly Known As...", "S6 E5", "Will decides to book a juror dismissed from Philip's big show-biz madam sex-scandal case for Hilary's show, which results in embarrassment for Judge Banks and some annoying apologies from Will and Hilary."], [1783498126, 1783499490, "The Fresh Prince of Bel-Air", "Not, I Barbecue", "S6 E6", "Will and Carlton's double date ends unromantically when a big bruiser shows up looking for his squeeze."], [1783499490, 1783500845, "The Fresh Prince of Bel-Air", "Not With My Cousin You Don't", "S6 E7", "Freakin' out! On the home intercom, Will and Carlton overhear Ashley talking about sex."], [1783500845, 1783502150, "The Fresh Prince of Bel-Air", "Viva Lost Wages", "S6 E8", "It's Carlton's birthday. His father gives a trip to Vegas for Carlton and Will as a gift. Carlton becomes addicted to gambling and loses all the money as well as the return home tickets. They enter a talent contest to try to win the prize."], [1783502150, 1783503504, "The Fresh Prince of Bel-Air", "There's the Rub (1)", "S6 E9", "It's Thanksgiving time. Hilary's television show is filming at a homeless shelter; Hilary and Carlton go to the shelter to volunteer. Philip hurts his back; Will suggests they go to a massage parlor to help his pain."]]}, {"id": "411", "name": "SBC Bulletin", "a": "sbc-bulletin", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/sbc-bulletin-v2.png", "progs": [[1783409499, 1783431099, "SBC Bulletin", "", "", "SBC Bulletin"], [1783431099, 1783452699, "SBC Bulletin", "", "", "SBC Bulletin"], [1783452699, 1783474299, "SBC Bulletin", "", "", "SBC Bulletin"], [1783474299, 1783495899, "SBC Bulletin", "", "", "SBC Bulletin"], [1783495899, 1783503243, "SBC Bulletin", "", "", "SBC Bulletin"]]}]};
const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
</script>
