 shop employee."], [1783456482, 1783457778, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783457778, 1783459075, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783459075, 1783460385, "Schitt's Creek", "Moira vs. Town Council", "S2 E6", "Moira tries to beautify the town. David misuses the company credit card. A grooming misstep forces Alexis and Mutt to question their relationship."], [1783460385, 1783461695, "Schitt's Creek", "The Candidate", "S2 E7", "Johnny considers running for town council. David and Stevie look for love. Alexis copes with being single."], [1783461695, 1783464335, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783464335, 1783466447, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783466447, 1783467744, "Raising Hope", "Baby Monitor", "S1 E21", "Barney tells the team he loses each year's annual commercial competition for the store, so now he wants to recruit his employees to compete for this year's submission; unfortunately, flattery and considerations like fair-play, and team spirit, get in the way."], [1783467744, 1783469048, "Raising Hope", "Don't Vote for this Episode", "S1 E22", "The Chances reminisce about the year Jimmy turned 18 - when Maw Maw kicked them out of the house, when a goth Jimmy took up residence in the grocery store and when Burt and Virginia finally figured out how to be adults."], [1783469048, 1783470345, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783470345, 1783471642, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783471642, 1783472952, "Schitt's Creek", "Milk Money", "S2 E8", "Johnny gets thrown into the raw milk business. Moira tries to connect with the townspeople. David gives style advice."], [1783472952, 1783474262, "Schitt's Creek", "Moira's Nudes", "S2 E9", "Moira is worried that racy photos from her past will jeopardize the campaign; Johnny asks for financial help; Alexis gets a job."], [1783474262, 1783475634, "Raising Hope", "Episode 23", "S1 E23", "Y2K"], [1783475634, 1783476806, "Raising Hope", "Episode 24", "S1 E24", "Y2K"], [1783476806, 1783478100, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783478100, 1783479397, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783479397, 1783480707, "Schitt's Creek", "Ronnie's Party", "S2 E10", "Johnny and Moira meet with a key group of people, Alexis struggles with her new job, David offer's emotional support to his boss' daughter."], [1783480707, 1783482017, "Schitt's Creek", "The Motel Guest", "S2 E11", "Johnny and Moira have to deal with a surprise motel guest while Alexis and David go apartment hunting."], [1783482017, 1783483189, "Raising Hope", "Episode 25", "S1 E25", "Y2K"], [1783483189, 1783484492, "Raising Hope", "Prodigy", "S2 E1", "When Jimmy watches a home video of himself as a thirteen-year-old, he discovers that he was a musical prodigy with a promising career as a singer and pianist until a horrible accident involving a golf putter rendered him talentless. Jimmy recruits Burt, Virginia and Maw Maw to help him rediscover his lost abilities."], [1783484492, 1783485787, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783485787, 1783487083, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783487083, 1783488393, "Schitt's Creek", "Lawn Signs", "S2 E12", "Moira’s campaign takes a turn when some of her lawn signs mysteriously disappear. David and Alexis must work together to get David’s boss out of legal trouble."], [1783488393, 1783489702, "Schitt's Creek", "Happy Anniversary", "S2 E13", "Johnny and Moira go out for their anniversary and run into a couple they knew from their former life, while Alexis and David attend Mutt’s annual barn party, making up with some friends, and making out with others."], [1783489702, 1783491004, "Raising Hope", "Sabrina Has Money", "S2 E2", "When Burt discovers that Sabrina is the daughter of his wealthy new client, he lets the family in on her secret. Embarrassed by her family’s wealth she reluctantly introduces the Chance family to her father, Cap. Meanwhile Jimmy decides Hope should have rich friends and begs Sabrina to take him to her sister’s party where Sabrina’s insecurities become apparent."], [1783491004, 1783492308, "Raising Hope", "Kidnapped", "S2 E3", "When a ponytailed hippie named Jack who kidnapped Burt twenty years ago unexpectedly pays the Chance family a visit, they discover that Burt's disappearance wasn't all it appeared. Meanwhile Jimmy's jealousy creeps out when Sabrina anxiously awaits a text from her boyfriend Wyatt."], [1783492308, 1783493607, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783493607, 1783494902, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783494902, 1783496213, "Schitt's Creek", "Opening Night", "S3 E1", "Johnny struggles to find a new purpose, while Moira must confront the harsh realities of local politics."], [1783496213, 1783497523, "Schitt's Creek", "The Throuple", "S3 E2", "Johnny offers to help out an injured Twyla by waiting tables at the café, but soon gets in over his head. Alexis and Moira make a plan to have lunch, despite the fact that they're both anxious about spending time alone together. David and Stevie try to figure out the boundaries of their three-way relationship with Jake."], [1783497523, 1783498826, "Raising Hope", "Henderson, Nevada-Adjacent Baby! Henderson, Nevada-Adjacent!", "S2 E4", "Virginia, Burt, Jimmy and Sabrina go to Las Vegas when Delilah plans a big wedding, but Virginia is jealous of her cousin's fancy ceremony because she never had one. Meanwhile, Jimmy hopes his luck with Sabrina will improve in Sin City."], [1783498826, 1783500084, "Raising Hope", "Killer Hope", "S2 E5", "After discovering that Hope hit a boy at daycare, the family becomes worried that Hope is following in her mother's footsteps. Meanwhile, the Chances run into some problems when they camp out in tents due to their home being fumigated for termites."], [1783500084, 1783501380, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783501380, 1783502676, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783502676, 1783503986, "Schitt's Creek", "New Car", "S3 E3", "Johnny decides to buy a new car, and he and Moira craft an increasingly elaborate ruse to avoid getting gouged by the dealership. David accompanies Stevie as she says goodbye to her great-aunt and confronts her own mortality in the process. Alexis and Ted negotiate the rules of their professional relationship when Ted receives a gift from a female client."]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783409386, 1783412029, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783412029, 1783414618, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783414618, 1783417251, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783417251, 1783419805, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783419805, 1783422445, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783422445, 1783425201, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783425201, 1783427905, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783427905, 1783430595, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783430595, 1783433234, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783433234, 1783436227, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783436227, 1783438867, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783438867, 1783441507, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783441507, 1783444147, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783444147, 1783446260, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783446260, 1783449147, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783449147, 1783451806, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783451806, 1783454400, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783454400, 1783456994, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783456994, 1783459608, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783459608, 1783462214, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783462214, 1783464824, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783464824, 1783467413, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783467413, 1783470056, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783470056, 1783472645, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783472645, 1783475278, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting ands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783488622, 1783491261, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783491261, 1783494254, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783494254, 1783496894, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783496894, 1783499534, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783499534, 1783502174, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783502174, 1783504287, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."]]}, {"id": "70", "name": "Groovy TV", "a": "groovy-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/groovy-v2.png", "progs": [[1783407407, 1783411394, "Saturday Night Live", "Jill Clayburgh with Leon Redbone", "S1 E15", "Live from New York, It's...Chevy Chase\n\nSketches include-- No More Falls, \"Great Moments in Herstory\", White Guilt Relief Fund, Inquisitive Girlfriend, Grable and Lombard, Car Yummies, Paying the Milkman, Jill Carson Guidance Counselor!, Andy Kaufman sings \"Old Macdonald\", \"The Mr. Bill Show\"."], [1783411394, 1783415452, "Saturday Night Live", "Anthony Perkins with Betty Carter", "S1 E16", "Live from New York, It's...Chevy Chase\n\nSketches include--'SNL is not ad-libbed' says Chevy Chase, A President's View on Marijuana, Dominatrix Cleaning Tips, \"Norman Bates School of Hotel Management\", Low-budget Movie Trailers, Sherry protest her B(ee), Policemen Dance Party, \"Hello Dolly\"."], [1783415452, 1783416799, "That '70s Show", "The Pill", "S1 E17", "Since no one else is around, Jackie confides in Eric that she thinks she might be pregnant.   Eric passes the news on to Donna, who tries to get Jackie to tell Kelso.  The incident inspires Donna to go on birth control pills.  Her decision inadvertantly causes Eric a lot of grief when Bob and the Formans find out."], [1783416799, 1783418146, "That '70s Show", "Career Day", "S1 E18", "It's career day and the gang must spend the day working with their parents.  Eric goes to the hospital with Kitty and is amazed at all she has to deal with every day.  Fez accompanies Hyde and interviews cafeteria lady \"Gross Edna\" while mother and son feud.  Poor Michael spends the entire day trying to figure out what his dad does, while Donna is mortified by Bob's crazy promotional antics.  And "], [1783418146, 1783422149, "Saturday Night Live", "Ron Nessen with the Patti Smith Group", "S1 E17", "Live from New York, It's...Gerald Ford\n\nSketches include-- \"The Dead String Quartet\", Super Bass-O-Matic 76, An Oval Office, David Eisenhower is Anti-Nixon, Thomas Jefferson denies slavery, The New Stoner Volunteer Army, Catherine the Great, Disgusting Jam, Autumm Fizz--The Carbonated Douche, \"Tomorrow With Tom Snyder\"."], [1783422149, 1783426214, "Saturday Night Live", "Raquel Welch with Phoebe Snow and John Sebastian", "S1 E18", "Live from New York, It's...Chevy Chase\n\nSketches include-- \"Get to the fall Chevy!\", Purina Rat Chow, Joseph Franklin's 10-letter Metric Alphabet, \"The Claudine Longet Ski Invitational\", \"One Flew Over The Hornest Nest\", Chevy tries to convince Raquel to take off her shirt, Baba Wawa, Bisexual Moment, The Muppets are finished on SNL."], [1783426214, 1783427562, "That '70s Show", "Prom Night", "S1 E19", "Prom night is fast approaching and Eric gets a motel room as part of his \"spontaneous\" plan to \"do it\" with Donna on the big night.  When Jackie finds out that Kelso asked slutty Pam Macy to prom, she gets Hyde to take her out of pity.  Fez wants to take his pretty English teacher to the prom.  As for the adults, they struggle with how to respond to Midge's idea for her future career."], [1783427562, 1783428908, "That '70s Show", "A New Hope", "S1 E20", "The guys go see Star Wars and are all completely blown away by it.  Red asks Eric to hang out with his boss's son now that he's started working at the plant full-time again.  David was an awkward kid the last time Eric saw him, but now he's a hunk who likes reading Donna's short stories.  Also, Laurie starts hitting on Kelso out of boredom."], [1783428908, 1783432870, "Saturday Night Live", "Madeline Kahn with Carly Simon", "S1 E19", "Live from New York, it's Chevy Chase!   Sketches are \"Ronald Reagan's Jam Session,\" Not for Ladies Only, Wilderness Comedian, \"Slumber Party,\" Bride of Frankenstein, \"Fondue Pots for Namibia,\" \"The Muppets Can Reunite the Beatles,\" New York's My Home (film), \"Super Absordent Dry Hose,\" and \"The Final Days.\" Carly Simon performs You're So Vain."], [1783432870, 1783436861, "Saturday Night Live", "Dyan Cannon with Leon & Mary Russell", "S1 E20", "Live from New York, It's...Chevy Chase\n\nSketches include--Chevy has to do the fall again, \"Hearing Test,\" \"The Adulterer,\" \"Vacationland Adventure\", \"Minister with Hiccups,\" \"Dyan Cannon's Dream,\" \"Orange Juice,\" \"The Bathwater of The Stars\", \"Johnny Angel\", \"Cresk Toothpaste,\"\" and \"The Hubcap Thief\" (film).  Leon Russell and Joe Cocker (Belushi) perform \"Daylight\"."], [1783436861, 1783438207, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783438207, 1783439553, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783439553, 1783443567, "Saturday Night Live", "Buck Henry with Gordon Lightfoot", "S1 E21", "Live from New York, It's...Chevy Chase\n\nSketches include--Emmy winner Chevy tries to get Laraine todo the fall, Samurai Tailor, \"Talk Back!\", \"Dell Stator's Toad Ranch Resturaunt\", \"Looks at Books\", The Crowd Audition, Peter Lemon Moodring, \"Not For Ladies Only\", Lorne Micheals offer to the Beatles."], [1783443567, 1783447532, "Saturday Night Live", "Elliott Gould with Leon Redbone and Harlan Collins & Joyce Everson", "S1 E22", "Sketches include \"Wax Museum,\" \"Phone Operator Academy,\" \"European Poker Player,\" \"Babs's Uvula,\" \"The Last Voyage of the Starship Enterprise,\" \"The Bee Honeymooners,\" \"Shirley Temple Black,\" \"Vibramatic,\" \"Uncle Charlie's School,\" and \"Show Us Your Guns.\"\n\nLeon Redbone performed \"Shine On Harvest Moon.\""], [1783447532, 1783448882, "That '70s Show", "Grandma's Dead", "S1 E23", "Red's mother Bernice has once again managed to make everyone miserable during one of her visits.  While driving his grandmother home, Eric lashes out and tells her that it wouldn't kill her to be nice once in a while.  Bernice promptly drops dead, leaving Eric to think he killed her.  The entire Forman family (including Laurie and Red's brother Marty) comes together for her funeral while Eric gets"], [1783448882, 1783450228, "That '70s Show", "Hyde Moves In", "S1 E24", "The gang goes skinny-dipping and Jackie gets sick. Hyde moves in with the Formans when his mom runs away with a trucker. Bob takes a liking to one of Midge's feminist friends."], [1783450228, 1783454228, "Saturday Night Live", "Louise Lasser with the Preservation Hall Jazz Band", "S1 E23", "Live from New York, It's...Chevy Chase\n\nSketches include--Belushi thinks Chevy has a big head, Louise Lasser locks herself dressing room, General \"V.D\" Amin, Sven and Inger, John Belushi tries to sell his clothes, Ode to Television, Louise apologizes to her dog, Jimmy Carter talks about the campagin."], [1783454228, 1783458221, "Saturday Night Live", "Kris Kristofferson with Rita Coolidge", "S1 E24", "Live from New York, It's...Chevy Chase\n\nSketches include--Kristofferson signs \"Help Me Make it Through The Night\", new SNL employer Sherry, Samurai General Practitioner, the Great White Athelete, Gerald Ford dosent want to talk about local issues, \"Talk Country\", My Blind Date is My Gynocologist, Andrew Young is a Suckup, Police State, \"Waiting For Don Pardo\"."], [1783458221, 1783459567, "That '70s Show", "The Good Son", "S1 E25", "Eric loves having Hyde as a \"brother\" because he does all of Eric's chores but when his parents start to prefer Hyde he starts to hate him. Hyde changes from the conspiracy minded trouble-making guy Eric loves to a total bore. Midge and Bob are having relationship problems. Red's old war buddy comes back and Red finds out that he's a swinger."], [1783459567, 1783460651, "That '70s Show", "Episode 26", "S1 E26", "Groovy TV"], [1783460651, 1783461977, "That '70s Show", "Garage Sale", "S2 E1", "The Formans have a garage sale to earn some extra cash. Hyde doesn't have anything to sell, so he bakes \"special brownies\" to sell; Kitty, Red, Bob and Midge eat some of the brownies unsuspectingly. Fez kisses Jackie who tells Donna it's the best kiss she's ever had. (#26)"], [1783461977, 1783463303, "That '70s Show", "Red's Last Day", "S2 E2", "It's Red's last day of work, and he decides to drown his unemployment sorrows at a bar.  Kitty sends Eric to pick Red up; he, Hyde and Fez end up drinking with Red instead, leaving none of them in any condition to drive.  Kelso gets a van, and christens it the \"shaggin' wagon.\""], [1783463303, 1783464630, "That '70s Show", "The Velvet Rope", "S2 E3", "Now that he's unemployed, the job hunt is on for Red.  The gang decides to go to a dance club, and Jackie manages to convince Kelso that dressing like David Bowie is a good idea.  Once at the club, Donna, Fez and Hyde have no problem getting in, but Eric can't make it past the overly large bouncer."], [1783464630, 1783465957, "That '70s Show", "Laurie and the Professor", "S2 E4", "Bob and Midge's marital troubles spill over into a fight over Donna's affection.  One of Laurie's college professors comes to Point Place to see if he can convince Laurie to return to classes, and he takes a 'hands-on' approach to the task, much to Eric's shock.  Fez looks for a woman, and Hyde looks for a room to sleep in."], [1783465957, 1783467284, "That '70s Show", "Halloween", "S2 E5", "The gang, looking for something fun to do on Halloween, revisits their old grammar school, where they find their permanent records. Looking through them, they find out some interesting things about each other. Fez discovers trick or treating."], [1783467284, 1783468610, "That '70s Show", "Vanstock", "S2 E6", "Eric, Donna, Kelso, Hyde and Fez are all going to Vanstock, Wisconsin's own Woodstock. Jackie says she doesn't want to go, so Kelso invites Laurie. In the end, both girls go leaving Kelso stuck in the middle. Donna gets mad at Eric for not telling her about Kelso and Laurie. Fez spends the night girl chatting to Jackie and Laurie, much to Kelso's chagrin while Hyde attempts drop him in it. Red bec"], [1783468610, 1783469936, "That '70s Show", "I Love Cake", "S2 E7", "Eric freaks out when Donna says 'I love you,' and all he can think of to say in return is 'I love cake.'  Donna, not knowing how to deal with this, turns to Jackie for relationship advice.  Midge kicks Bob out of the house; he stays with the Formans and Red has to act as a go-between to try to mend their marriage.  Kelso gets a new leather jacket that he thinks makes him look like Marlon Brando, b"], [1783469936, 1783471272, "That '70s Show", "Sleepover", "S2 E8", "Donna finally sleeps with Eric, but when the guys find out that all they did was sleep, they tease him mercilessly.  Hyde gets a job at the FotoHut, and finds out that compared to his boss, he's a workaholic.  And Kitty has to work double shifts at the hospital, leaving Red to do the cooking."], [1783471272, 1783472599, "That '70s Show", "Eric Gets Suspended", "S2 E9", "Donna is acting out over her parents' break up and takes up smoking. Eric gets caught holding one of her cigarettes in the school yard and is suspended. Even though Eric tries explaining what really happened, Red punishes him. Fez and Hyde go on a double date, set up by Fez's host parents; Hyde can't decide which girl he likes better. Jackie and Kelso argue over how many stuffed animals she can ha"], [1783472599, 1783473925, "That '70s Show", "Red's Birthday", "S2 E10", "It's Red's birthday and the roof collapses so Eric gets him some 2 x 4s to fix it. Bob and Midge take Red and Kitty out for dinner but they each bring a date and ditch them to do it in the car. Eric is mad at Donna for talking to Hyde about her parent's problems instead of talking to him."], [1783473925, 1783475249, "That '70s Show", "Laurie Moves Out", "S2 E11", "Laurie moves out and Red is annoyed when he finds out she moved in with a guy instead of with a girlfriend like she told him. She then moves back in when the guy goes back to his wife. Jackie suspects Kelso of being unfaithful."], [1783475249, 1783476575, "That '70s Show", "Eric's Stash", "S2 E12", "Eric's secret stash of money goes missing, and Hyde is the first and only suspect.  Hyde denies taking it, and everyone is shocked when the real culprit is revealed.  Fez and Kelso help Jackie prepare for a beauty pageant."], [1783476575, 1783477901, "That '70s Show", "Hunting", "S2 E13", "Red and Bob take the guys deer hunting; Hyde chills out, Fez bags dinner using only a few primitive weapons, Kelso is a menace with his gun, and Red and Eric bond in the deer blind. Meanwhile, Kitty and Midge have a girls' night with Donna, Jackie and Laurie, but with nothing to talk about, the end up playing poker."], [1783477901, 1783479228, "That '70s Show", "Red's New Job", "S2 E14", "Eric gets a job at Price Mart as a cashier while Red gets one as a supervisor. Kelso tries to break up with Laurie because she wants a real relationship but Laurie threatens to tell Jackie about her and Kelso."], [1783479228, 1783480554, "That '70s Show", "Burning Down the House", "S2 E15", "With her parents away, Jackie plans on throwing a small, classy dinner party.  Kelso tries to turn it into a fun party, and invites everyone he knows; Jackie is upset, and when Kelso tries to fix things, he only ends up making them worse.  Hyde makes it with a snobby girl from school, but the guys don't believe him.  Red finds out that Bob wears a toupee, and then has to spend an uncomfortable eve"], [1783480554, 1783481880, "That '70s Show", "The First Time", "S2 E16", "Bob and Midge are getting ready to renew their vows. Kitty is upset because her close friend Midge didn't ask her as a bridesmaid while Red is Bob's best man. Eric and Donna have sex for the first time."], [1783481880, 1783483207, "That '70s Show", "Afterglow", "S2 E17", "Contrary to what she tells Eric, Donna's review of their first sexual encounter is not good--or private; Red celebrates his first paycheck and buys a motorcycle."], [1783483207, 1783484533, "That '70s Show", "Kitty and Eric's Night Out", "S2 E18", "Eric is forced to go on a date with his mom. He is embarrassed seeing sex and drugs with his mom. But he warms up to it. Fez gets a cute new girlfriend. Jackie has to admit that she is jealous and has feelings for Fez."], [1783484533, 1783485860, "That '70s Show", "Parents Find Out", "S2 E19", "Kitty is devastated after the police catch Donna and Eric having sex in the Vista Cruiser."], [1783485860, 1783487187, "That '70s Show", "Kiss of Death", "S2 E20", "Eric lies after accidentally running over Donna's cat; Laurie sets Kelso up for a fall; Fez sees \"Fez's Angels\" while under anesthesia to have his appendix removed."], [1783487187, 1783488514, "That '70s Show", "Kelso's Serenade", "S2 E21", "Kelso wants to win Jackie back by writing her a song, while Jackie turns to the unlikeliest person for comfort. Meanwhile, Red, Kitty and Laurie visit bitter Aunt Pearl (Connie Sawyer) in a retirement home, and Eric and Donna get into communication problems."], [1783488514, 1783489840, "That '70s Show", "Jackie Moves On", "S2 E22", "Fez finally has a date with Jackie, but not the same Jackie he's coveted; Eric and Laurie have a war of embarrassing secrets; and Kitty reveals her secret about Red's mother's necklace."], [1783489840, 1783491166, "That '70s Show", "Holy Crap!", "S2 E23", "Kitty calls on a divine power, of sorts, when Eric and Laurie forsake going to church; Kelso's budding beard stirs Jackie."], [1783491166, 1783492493, "That '70s Show", "Red Fired Up", "S2 E24", "Eric appreciates another employee who draws Red's ire away from himself; Kelso and Laurie date openly, and receive separate cautions from Hyde and Kitty."], [1783492493, 1783493820, "That '70s Show", "Cat Fight Club", "S2 E25", "Hyde helps Jackie take a Zen approach to Kelso and Laurie, who introduce their relationship to Red at the Forman dinner table."], [1783493820, 1783495147, "That '70s Show", "Moon Over Point Place", "S2 E26", "Donna moons in a yearbook picture; Jackie claims Hyde as her new best friend; Kitty \"clears the air\" about Eric and Donna having sex."], [1783495147, 1783496473, "That '70s Show", "Reefer Madness", "S3 E1", "Hyde returns from jail only to find Red beyond furious and ready to kick him out of the house. Afraid that he'll turn the other kids into dope fiends, Red asks Eric if Hyde has ever pressured him to do drugs in the past. Eric wonders if he should confess the truth to Red in order to keep him from forcing Hyde out. Elsewhere, Leo visits the Formans to speak on Steven's behalf while Donna uncovers t"], [1783496473, 1783497790, "That '70s Show", "Red Sees Red", "S3 E2", "As punishment for being \"dope-heads\", Red gives Eric and Hyde a curfew.  Laurie is all for it until she discovers that it applies to her too.  Red booby-traps the house so that he'll know if there are any escape attempts, and keeps increasing the discipline, despite Kitty's pleas for leniency.  Jackie is still trying to convince Hyde that she's the woman for him, but he's not buying it."], [1783497790, 1783499120, "That '70s Show", "Hyde's Father", "S3 E3", "The guys get into a bar without showing their fake IDs only to learn that the bartender is none other than Hyde's father, Bud.  Kitty finds out about this and, against Hyde's wishes and Red's advice, invites Bud over in an attempt to set things right between father and son.  Meanwhile, Donna is disgusted when she finds out that Eric keeps dirty magazines under his bed.  And Fez tries to woo Donna "], [1783499120, 1783500436, "That '70s Show", "Too Old to Trick or Treat, Too Young to Die", "S3 E4", "A Halloween episode filled with parodies of Alfred Hitchcock movies: \"Rear Window\", \"Vertigo\", \"The Birds\", \"North By Northwest\" and \"Psycho\"."], [1783500436, 1783501763, "That '70s Show", "Roller Disco", "S3 E5", "Jackie has wonderful news: there's a roller disco competition in Kenosha and she wants Hyde to be her partner.  When she finds that he's more than unwilling, she's left with a choice between Kelso and Fez, and after seeing their moves, she chooses Fez.  This leaves Kelso less than happy, and more than a little jealous.  Red, meanwhile, is being sued by an ex-Price Mart employee for wrongful termin"], [1783501763, 1783503090, "That '70s Show", "Eric's Panties", "S3 E6", "Donna finds a pair of panties in the Vista Cruiser and thinks that Eric is cheating on her with his lab partner.  Everyone is in for a big shock when they find out who the panties really belong to.  Red's doctor's appointment shows that he has high blood pressure, so Kitty puts him on a strict diet, which he finds inedible.  Kelso gains a new nickname due to a mishap in the cafeteria."], [1783503090, 1783504416, "That '70s Show", "Baby Fever", "S3 E7", "Red is not happy when Kitty becomes obsessed with the idea of having another baby after bringing a friend's child home for Laurie to baby-sit.  Laurie is completely at a loss on how to take care of a baby until her maternal instincts eventually kick in.  Donna gets mad at Eric for thinking that she'll stay home with the children when they have their own.  And Hyde and Fez mediate a mock divorce se"]]}, {"id": "75", "name": "Late Nite", "a": "late-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.githu 8, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783414748, 1783416046, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783416046, 1783417271, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783417271, 1783418747, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783418747, 1783420100, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783420100, 1783421452, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783421452, 1783422788, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783422788, 1783424120, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783424120, 1783425584, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783425584, 1783427046, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "I Heart 80s"], [1783427046, 1783428344, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783428344, 1783429638, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783429638, 1783430933, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783430933, 1783432301, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783432301, 1783433669, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783433669, 1783435004, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783435004, 1783436341, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783436341, 1783437679, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783437679, 1783439142, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "I Heart 80s"], [1783439142, 1783440605, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "I Heart 80s"], [1783440605, 1783441898, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783441898, 1783443193, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783443193, 1783444594, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783444594, 1783445996, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783445996, 1783447331, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783447331, 1783448667, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783448667, 1783450002, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783450002, 1783451337, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783451337, 1783452800, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "I Heart 80s"], [1783452800, 1783454264, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "I Heart 80s"], [1783454264, 1783455561, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783455561, 1783456858, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783456858, 1783458245, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783458245, 1783459639, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783459639, 1783460869, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783460869, 1783462208, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783462208, 1783463546, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783463546, 1783464882, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."], [1783464882, 1783466346, "Pee-wee's Playhouse", "Episode 19", "S1 E19", "I Heart 80s"], [1783466346, 1783467811, "Pee-wee's Playhouse", "Episode 20", "S1 E20", "I Heart 80s"], [1783467811, 1783469108, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783469108, 1783470405, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783470405, 1783471805, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783471805, 1783473175, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783473175, 1783474513, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783474513, 1783475851, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783475851, 1783477188, "Teenage Mutant Ninja Turtles", "The Cat Woman of Channel Six", "S2 E12", "While experimenting with a matter transporter in his secret hideout, Shredder sends Rocksteady and Bebop to a nearby garbage dump. Through a series of mishaps, Rocksteady and Bebop find themselves in the Turtles' Lair."], [1783477188, 1783478526, "Teenage Mutant Ninja Turtles", "Return of the Technodrome", "S2 E13", "Krang, sick of Shredder's constant failings, resolves to return the Technodrome to Earth."], [1783478526, 1783479989, "Pee-wee's Playhouse", "Episode 21", "S1 E21", "I Heart 80s"], [1783479989, 1783481454, "Pee-wee's Playhouse", "Episode 22", "S1 E22", "I Heart 80s"], [1783481454, 1783482748, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783482748, 1783484045, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783484045, 1783485437, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783485437, 1783486785, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783486785, 1783488117, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783488117, 1783489449, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783489449, 1783490786, "Teenage Mutant Ninja Turtles", "Beneath these Streets", "S3 E1", "The Turtles learn the cost of slacking off when Splinter is badly hurt during a confrontation with Shredder."], [1783490786, 1783492124, "Teenage Mutant Ninja Turtles", "Turtles On Trial", "S3 E2", "The intentions of the Ninja Turtles are put to the test when a controversial TV-figure portrays our heroes as menaces to society. The Turtles forego publicly clearing their name to defeat Krang and his new robotic weapon."], [1783492124, 1783493246, "Pee-wee's Playhouse", "Episode 23", "S1 E23", "I Heart 80s"], [1783493246, 1783494710, "Pee-wee's Playhouse", "Episode 24", "S1 E24", "I Heart 80s"], [1783494710, 1783496004, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783496004, 1783497300, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783497300, 1783498633, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783498633, 1783500021, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783500021, 1783501356, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783501356, 1783502725, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783502725, 1783504065, "Teenage Mutant Ninja Turtles", "Attack of the 50-Foot Irma", "S3 E3", "Irma accidentally becomes gigantic and her naturally clumsy nature makes her a danger to the city."]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v2.png", "progs": [[1783408225, 1783410980, "Beverly Hills, 90210", "Camping Trip", "S2 E7", "The gang takes off with plans to spend the weekend camping at Yosemite Park. A sudden monsoon forces the teens to seek refuge in a cramped one-bedroom cabin. Everyone quickly begins to get on each other's nerves. Steve and David go out for beer, but an elderly couple takes Steve's money and splits without buying him anything. The honeymooning couple in the next cabin supplies the kids with food an"], [1783410980, 1783413662, "Beverly Hills, 90210", "Wildfire", "S2 E8", "At the opening day of the new school year, Brenda becomes peeved when Dylan starts spending time with the new transfer student Emily Valentine, while she and Brandon also have eyes for each other. Meanwhile, David is reunited with Scott after he returns from his summer vacation in Oklahoma and finds that his friendship with David isn't as close as it used to be."], [1783413662, 1783416390, "Beverly Hills, 90210", "Ashes to Ashes", "S2 E9", "Brandon befriends a black family, the Ashes, which stirs up Beverly Hills when they move in near the Walshes. The siblings include Robby, a freshman photographer who volunteers to work at the Blaze, and his older sister whose boyfriend is roughed up by a racist security patrol. Meanwhile, Jim and Cindy try out a new \"state of the art\" house alarm system which is more of a nuisance than a help."], [1783416390, 1783419126, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783419126, 1783421875, "Beverly Hills, 90210", "Leading From the Heart", "S2 E11", "Brandon and Brenda's handicapped cousin, Bobby, visits the Walshes and a mutual attraction between him and Kelly is complicated more by others assumptions than by Bobby's wheelchair. Meanwhile, David tries asking Donna out on a date. Brenda finally gets her driver's license on the third try, but is hesitant to drive Brandon's car. Also, Emily joins the school newspaper just to be near Brandon."], [1783421875, 1783424629, "Beverly Hills, 90210", "Down and Out of District in Beverly Hills", "S2 E12", "Brandon submits one of Andrea's articles to a high school journalism contest. She wins the contest, but panics because a school district representative wants to conduct a home interview. Andrea asks her grandmother to say that she lives with her, but Rose does not want to play along. The school district initiates an investigation because they suspect that Andrea lives out of district. Andrea moves"], [1783424629, 1783427383, "Beverly Hills, 90210", "Halloween", "S2 E13", "Brenda, Dylan, Steve, Donna and Kelly attend a Halloween party. Donna dresses as a mermaid; but her fins inhibit dancing, walking, and trips to the bathroom. Kelly's seductive costume catches the eye of a college student. She goes upstairs to talk with him, then becomes uncomfortable. The guy accuses her of leading him on and tries to rape her. Brenda and Donna enter in the nick of time, and Steve"], [1783427383, 1783430139, "Beverly Hills, 90210", "The Next 50 Years", "S2 E14", "The students of West Beverly unearth a time capsule from 1941, and put together a capsule of their own. Mrs. Scanlon organizes a surprise party for Scott's birthday, and pushes David to round up the guests. Donna is the only person who wants to attend. Kelly, Steve, Brenda, Brandon and Emily reluctantly come to the party, but act like jerks and refuse to participate in the activities. David tries "], [1783430139, 1783432886, "Beverly Hills, 90210", "U4EA", "S2 E15", "Emily invites everyone to join her at an underground club. The location is a secret; the gang must exchange an egg at a convenience store for this information. The others leave without Steve and Andrea, who end up going to the wrong store and embarrassing themselves. Kelly is mortified when David drinks an entire bottle of whiskey, but Donna dances with him and has a good time. Emily slips a drug "], [1783432886, 1783435642, "Beverly Hills, 90210", "My Desperate Valentine", "S2 E16", "Emily refuses to accept the fact that Brandon no longer wants to see her. She slashes her own tires and pretends that her parents are out of town so that Brandon will invite her to stay over. She sneaks into his bedroom and tries to seduce him. After he makes it clear that he is not interested, she begins to make crank phone calls. Andrea discovers that Emily is the person who has been sending men"], [1783435642, 1783438403, "Beverly Hills, 90210", "Chuckie's Back", "S2 E17", "Chuck Wilson, Samantha Sanders' old sitcom co-star and Steve's childhood nemesis, transfers to West Beverly after being kicked out of private school. Steve is depressed when Kelly agrees to go to a dance with Chuck. Samantha orders Steve to be nice to Chuck in the hopes of persuading him to appear in a reunion movie. Chuck taunts Steve about being adopted, and reveals that he knew about the adopti"], [1783438403, 1783441188, "Beverly Hills, 90210", "A Walsh Family Christmas", "S2 E18", "Steve arrives in Albuquerque and tracks down his grandfather, a diner owner. Al explains that his daughter gave up Steve because she was very young and wanted him to have a good home. He sadly reveals that Karen died in a car accident. Steve leaves flowers at her grave, and convinces an eccentric Santa-like charter pilot to fly him home for Christmas. Cindy is depressed about her first Christmas i"], [1783441188, 1783445307, "Beverly Hills, 90210", "Fire and Ice", "S2 E19", "Brandon learns a lesson in dedication to a task and hard work when he falls for Tricia, a young ice skater with Olympic goals, whom he pleasantly distracts from her skating practice. Meanwhile, Brenda must deal with a back-stabbing boss at her boutique job in which Cindy offers Brenda a chance to get back at her."], [1783445307, 1783448092, "Beverly Hills, 90210", "A Competitive Edge", "S2 E20", "Brandon goes undercover for the Blaze to try and expose steroid use within the school's track team, and finds that Steve is involved after teammate Kyle tips Brandon about it. Brandon is then caught in a dilemma of how to expose the drug use without hurting Steve along with everyone else. Meanwhile, Brenda gets into a minor car accident with a con artist woman who's out for money."], [1783448092, 1783450817, "Beverly Hills, 90210", "Everybody's Talkin' 'Bout It", "S2 E21", "Andrea is outraged when the school refuses to allow students to take part in a health survey that includes questions about sex. She goes before the school board and introduces a proposal to distribute condoms at West Beverly."], [1783450817, 1783453573, "Beverly Hills, 90210", "Baby Makes Five", "S2 E22", "Kelly confides in Brenda and Donna about her mother's pregnancy, but they can't keep a secret. David tells Donna that Mel is planning to propose, then learns about the pregnancy. He doesn't share the news with his father, who is clueless about Jackie's condition. Jackie assumes that Mel only wants to marry her to fulfill his obligation, so she dumps him.  Music: \"\"All 4 Love\"\" by Color Me Badd (#1"], [1783453573, 1783456357, "Beverly Hills, 90210", "Cardio Funk", "S2 E23", "Dylan's friend Sarah comes to an AA meeting. He offers his support, and she begins to rely on him. She seeks his help in throwing her abusive boyfriend out of the apartment.  Music: \"\"We Want the Funk\"\" by Gerardo (#16, 1991); \"\"Do Wah Diddy Diddy\"\" (Manfred Mann - #1, 1964), performed by the cast; \"\"Your Cheatin' Heart\"\" (Hank Williams), performed by Patricia Michel; \"\"Be Bop-a-Lul"], [1783456357, 1783459111, "Beverly Hills, 90210", "The Pit and the Pendulum", "S2 E24", "Brandon participates in a teen review committee that provides input to one of Jim's clients, who is building a gigantic new mall. Marcie, the developer's college-age daughter, aggressively pursues Brandon. Brandon is incensed to learn that the project would require the demolition of the Peach Pit. He squares off with Jim, who promises to stand up for Nat's interests. Brandon takes Marcie to the Pe"], [1783459111, 1783461896, "Beverly Hills, 90210", "Meeting Mr. Pony", "S2 E25", "Brenda is held up at gunpoint by an armed robber during an after-hours hold up at the Peach Pit. She starts having waking nightmares of the event and visits a psychiatrist who diagnoses Brenda with post traumatic stress disorder. Brenda identifies her attacker in a police line-up and is startled to learn that her attacker is only seventeen years old."], [1783461896, 1783464680, "Beverly Hills, 90210", "Things to Do on a Rainy Day", "S2 E26", "On a rainy Saturday afternoon, Brenda, Kelly, Donna and David head to the Bel Age Hotel to meet Donna's favorite pop group, Color Me Badd. David rents a room so that the foursome can get into the hotel. Donna sees her mother, supposedly at the hotel for a conference, and fears that she will get in trouble. Kelly lifts a key to the penthouse and gets to hang out with the group. Donna, fearing repri"], [1783464680, 1783467381, "Beverly Hills, 90210", "Mexican Standoff", "S2 E27", "Brenda upsets her father by consistently violating her curfew. She promises to demonstrate more mature behavior. Jim and Cindy agree to let Brenda join Dylan for a weekend in Mexico. Brenda falls asleep while watching a movie at Dylan's, and doesn't come home until 4 AM. Her parents forbid her from taking the trip. Dylan encourages Brenda to stand up for herself, but she instead tells Jim and Cind"], [1783467381, 1783470100, "Beverly Hills, 90210", "Wedding Bell Blues", "S2 E28", "A furious Jim goes to the Mexican border to retrieve Brenda. Jim bans Dylan from the Walsh house. Jackie learns that Kelly covered for Brenda, and embarrasses her by yelling at her in front of Jake.\n\nMusic: \"\"Wedding Bell Blues\"\" by The Fifth Dimension (#1, 1969); \"\"Blue Moon\"\" (Glen Gray - #1, 1"], [1783470100, 1783472854, "Beverly Hills, 90210", "Misery Loves Company", "S3 E1", "Brenda drives her parents crazy with her constant sulking, and sneaks around with Dylan behind their backs. Dylan wants someone other than Jim to handle his trust, but Jim refuses to break his deal with Iris. Jim and Cindy join the beach club and catch Brenda making out with Dylan. Jim screams at Brenda and makes a scene. She packs up her belongings and moves in with Dylan. Brandon bets Steve that"], [1783472854, 1783475596, "Beverly Hills, 90210", "The Twins, the Trustee, and the Very Big Trip", "S3 E2", "Kelly bonds with her baby sister, Erin. She bows out of a six-week trip to study in Paris with Donna because she wants to spend time with her family. Brenda and Dylan clash over their new living arrangements. Cindy and Brandon realize that Brenda is unhappy, but she is too stubborn to give in. Jim threatens to freeze Dylan's account unless he helps convince Brenda to accept a trip to Paris. Dylan "], [1783475596, 1783478365, "Beverly Hills, 90210", "Too Little, Too Late/Paris 75001", "S3 E3", "Brenda and Donna have difficulty adjusting to life in France. Donna constantly complains about missing David, and Brenda soon begins to long for Dylan. They accidentally order brains at a restaurant, and Donna later spends an entire party eating pastries because she can't carry on a conversation in French. Andrea's boyfriend invites her to join him at the Republican Convention in Houston, where he"], [1783478365, 1783481107, "Beverly Hills, 90210", "Sex, Lies and Volleyball/Photo Fini", "S3 E4", "Donna is struggling in the French immersion program, and feels left out because Brenda and her classmates can speak fluent French. Donna catches the eye of a photographer, who offers her a modeling job. A man tries to entice Donna into signing a two-year modeling contract, but he's just trying to get her into bed. Steve finds the perfect partner for the mixed doubles volleyball tournament. He is h"], [1783481107, 1783483871, "Beverly Hills, 90210", "Shooting Star/American in Paris", "S3 E5", "Kelly feels guilty about kissing Dylan and tries to avoid him. She goes to his house to admit her feelings, and they share a passionate kiss. They spend a lot of time together, but reconsider their actions when David catches them kissing. Kelly turns down Dylan's offer to camp out on the beach (the night before Brenda is to return), but eventually joins him for a romantic evening. Brenda meets Ric"], [1783483871, 1783486638, "Beverly Hills, 90210", "Castles in the Sand", "S3 E6", "Andrea and the children nearly catch Dylan and Kelly sleeping on the beach. Kelly tells Dylan that they must forget their summer romance, but he doesn't want to do this. Brenda and Donna come home from Paris and are greeted with a party. Jim and Cindy agree to let Brenda resume her relationship with Dylan. Kelly tries to avoid Brenda and Dylan, and is annoyed when he continually inquires about her"], [1783486638, 1783489406, "Beverly Hills, 90210", "A Song of Myself", "S3 E7", "Brandon wants to quit the paper so that he can enjoy his senior year. Andrea enlists the help of new advisor and English teacher Gil Meyers to change his mind. Gil decides to have Brandon replace Andrea as editor. She accuses him of sexism and wants to resign. Gil resolves the dispute by making Andrea and Brandon co-editors. A depressed Kelly changes her entire schedule to avoid Brenda and Dylan. "], [1783489406, 1783492172, "Beverly Hills, 90210", "The Back Story", "S3 E8", "Brenda, Donna, Kelly, Steve and David prepare to take the SAT. Brenda constantly argues with Kelly, and also gets into hot water with her parents when they learn that she has been smoking since the Paris trip. Beth Nielson, a young producer from the tabloid show Back Story, seeks Brenda's help in putting together a story about Beverly Hills teens. The piece is intended to correct misconceptions, b"], [1783492172, 1783494938, "Beverly Hills, 90210", "Highwire", "S3 E9", "The gang must consider their future and meets with their guidance counselor, except for Kelly and Dylan who agree that college is not for everyone. Meanwhile, Jim and Cindy announce to Brenda and Brandon that they can afford a private college for only one of them. Also, Andrea has the same bad dreams involving walking a high-wire to get into her own college. Brandon and Nikki become even more clos"], [1783494938, 1783497705, "Beverly Hills, 90210", "Home and Away", "S3 E10", "West Beverly's undefeated football team prepares for a showdown with powerhouse Shaw High. The school decides to forfeit after two Shaw students are shot to death by gang members during a game. Brandon is furious because the West Beverly student body cares more about the homecoming dance (coordinated by Brenda) than the shootings. He and Jordan Bonner, editor of the Shaw paper, run each other's ed"], [1783497705, 1783500470, "Beverly Hills, 90210", "A Presumption of Innocence", "S3 E11", "Andrea tries to get to the bottom of a sexual assault accusation against Gil Meyers brought forth by Sue's mother. David and Donna join in on the investigation and find out about Sue's real emotional troubles. Meanwhile, Brandon reluctantly agrees to go out dancing with Nikki, despite not knowing how to dance. Also, Dylan develops a bad cough due to surfing in polluted water."], [1783500470, 1783503196, "Beverly Hills, 90210", "Destiny Rides Again", "S3 E12", "Brenda runs into Rick at a video store, as he has transferred to UCLA. She goes out with him and continues to pretend that she is French. He is understanding when she finally reveals the truth. The SAT review board accuses Dylan of paying someone to take his test. He annoys Brenda by refusing to re-take the test. After Dylan confesses that he had a summer fling, Brenda suggests that they take a br"]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783408507, 1783409881, "Saved by the Bell", "Beauty and the Screech", "S1 E10", "Zack enlists Screech to tutor Kelly, when he finds out that she needs to pass an upcoming science test in order to go to a concert with him. When Screech and Kelly begin spending more time together than he'd expected, it makes him uncomfortable."], [1783409881, 1783411272, "In Living Color", "Introducing...Homey D. Clown", "S1 E9", "Whizzer and Ice offer a seminar on making money; \"Andrea Dice Clay\" does her routine. Also: \"America's Funniest Security Camera Videos.\""], [1783411272, 1783412664, "In Living Color", "Vera DeMilo", "S1 E10", "An ad for a new celebrity toy; a forgetful Don Cornelius hosting \"Old Train\"; a female bodybuilding contest."], [1783412664, 1783414077, "Sex and the City", "The Turtle and the Hare", "S1 E9", "Mr. Big tells Carrie he's never going to marry again, which unsettles her. Miranda introduces the friends to the Rabbit, a mechanical aid, and Charlotte becomes addicted. Stanford Blatch proposes to Carrie as a cover, so he can inherit his part of the family fortune."], [1783414077, 1783415484, "Sex and the City", "The Baby Shower", "S1 E10", "The four women attend a baby shower for their one-time wild-child friend Laney in her new buttoned-down Connecticut-suburb environs. Carrie is forced to think about motherhood by her late period. Miranda regards the other guests as part of the cult of The Motherhood. Still-single Charlotte fears her dreams of being a wife and mother are slipping away. Samantha throws a \"no-baby shower\" in response"], [1783415484, 1783418300, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783418300, 1783421085, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783421085, 1783422519, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783422519, 1783423954, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783423954, 1783425358, "Saved by the Bell", "The Friendship Business", "S1 E11", "As part of an assignment for Business class, the gang forms a friendship bracelet company, but infighting soon leads to trouble and defection."], [1783425358, 1783426730, "Saved by the Bell", "The Mamas and the Papas", "S1 E12", "As a class project, the gang pairs up in mock marriages for the week. Slater's \"marriage\" to Jessie comes apart when he turns out to be the domineering type. Lisa's \"marriage\" to Screech is driving her crazy. Meanwhile, Slater tries to get Screech to break up Zack and Kelly's \"marriage\" so he can still have a chance with her."], [1783426730, 1783428120, "In Living Color", "Anton In The People's Court", "S1 E11", "Sketches include the homeless Anton defending himself in a people's court; a parody of rapper MC Hammer; Ted Turner's \"colorized classic\" version of \"The Kid.\""], [1783428120, 1783429511, "In Living Color", "Conspiracy", "S1 E12", "A cable repairman benefits when LaQuita tries to impress a producer. Also: a \"Ray Charles in Charge\" segment."], [1783429511, 1783431061, "Sex and the City", "The Drought", "S1 E11", "Carrie's relationship with Mr. Big has been going on for long enough that it is becoming less physical, especially after she farts in bed. Charlotte is dating a man who isn't interested in sex anymore thanks to the side-effects of Prozac. Samantha discovers that not having sex can be erotic. Miranda realizes that she hasn't had sex for months."], [1783431061, 1783432678, "Sex and the City", "Oh Come All Ye Faithful", "S1 E12", "After being introduced as \"a friend\" to his mother, Carrie realizes her relationship with Mr. Big is one-sided and breaks up with him. Miranda dates an up-and-coming playwright who is also an up-tight Catholic. Samantha falls in love with a perfect man, but he doesn't measure up to her requirements. Charlotte gets psychic readings to see if she'll ever marry."], [1783432678, 1783435480, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfrien
