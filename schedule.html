const D = {"t0": 1783243824, "t1": 1783341947, "gen": 1783248305, "chans": [{"id": "1", "name": "The Silver Screen", "a": "the-silver-screen", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/silver-screen-v2.png", "progs": [[1783245534, 1783247074, "The Twilight Zone", "A Game of Pool", "S3 E5", "Frustrated pool champion Jesse Cardiff has beaten everyone except for the deceased James Howard \"Fats\" Brown. Jesse can only curse his name. But guess who just walked into the pool room on Randolph Street?"], [1783247074, 1783248616, "The Twilight Zone", "The Mirror", "S3 E6", "After a poor but ambitious Central American farm worker overthrows his country's tyrannical leader, he believes he sees assassins everywhere. A look in the mirror reveals his most dangerous enemy."], [1783248616, 1783250157, "The Twilight Zone", "The Grave", "S3 E7", "Conny Miller rides into the hometown of Pinto Sykes, the man he's been tracking. He finds that Sykes has been gunned down by townsmen but no one knows who fired the fatal bullet. He is challenged by three of the townsmen to a grisly wager."], [1783250157, 1783251696, "The Twilight Zone", "It's a Good Life", "S3 E8", "On an isolated family farm in Peakesville, Ohio, young Anthony Fremont, who has vast mental powers but lacks emotional development, holds his terrified family and neighbors in thrall to his every juvenile wish."], [1783251696, 1783253235, "The Twilight Zone", "Deaths-Head Revisited", "S3 E9", "Former German SS Captain Gunther Lutze returns to Dachau concentration camp and begins reminiscing about the power he enjoyed there during \"the good old days\", until he finds himself on trial by the ghosts of those who died at his hands."], [1783253235, 1783254775, "The Twilight Zone", "The Midnight Sun", "S3 E10", "The Earth's orbit has been changed, drawing ever closer to the sun and promising imminent destruction."], [1783254775, 1783256316, "The Twilight Zone", "Still Valley", "S3 E11", "Confederacy scout Sgt. Joseph Paradine finds a town full of Union soldiers, and an old man who claims he used witchcraft to paralyze them."], [1783256316, 1783257855, "The Twilight Zone", "The Jungle", "S3 E12", "Engineer Alan Richards who has recently come home to New York City from his company's controversial hydroelectric project in Africa is plagued by both superstitions and the dire warnings of a native witch doctor."], [1783257855, 1783259395, "The Twilight Zone", "Once Upon a Time", "S3 E13", "In 1890, janitor Woodrow Mulligan uses his employers' invention to transport himself to the future. He imagines an Eden but finds a polluted, busy world that he doesn't find at all attractive. He meets Rollo who is also disgusted with the world he lives imagining life in the 1890s as idyllic. When Woodrow goes back to his own time Rollo goes with him but he is soon bored without any of the conveni"], [1783259395, 1783260937, "The Twilight Zone", "Five Characters in Search of an Exit", "S3 E14", "An American army major awakens in a small circular unfurnished room with no idea of his name or how he got there. Four other people are there with him and they all begin to question how they got there and, more importantly, how to escape."], [1783260937, 1783262479, "The Twilight Zone", "A Quality of Mercy", "S3 E15", "A gung ho young soldier gets a new viewpoint on war when he inexplicably changes places with a Japanese officer trying to stop his superior from leading a charge against American forces."], [1783262479, 1783264019, "The Twilight Zone", "Nothing in the Dark", "S3 E16", "Elderly urban dweller Wanda Dunn has fought with Death a thousand times and always won. Now she is afraid to let wounded policeman Harold Beldon in her tenement's door for fear that he is Death incarnate. Is he?"], [1783264019, 1783265561, "The Twilight Zone", "One More Pallbearer", "S3 E17", "Paul Radin has invited three people to join him in his bomb shelter."], [1783265561, 1783267111, "The Twilight Zone", "Dead Man's Shoes", "S3 E18", "Homeless Nathan Edward Bledsoe steals expensive shoes off of dead gangster Dane's abandoned body, steps into Dane's life, and plans third-party revenge on Dane's killer, his traitorous former business partner Daggett."], [1783267111, 1783268652, "The Twilight Zone", "The Hunt", "S3 E19", "On a hunting trip, Hyder Simpson and his dog Rip dive into a lake after a raccoon. When he gets home he finds that no one can see or hear him."], [1783268652, 1783270205, "The Twilight Zone", "Showdown with Rance McGrew", "S3 E20", "Overbearing Western TV series star Rance McGrew is transported back in time to the real Wild West and comes face-to-face with Jesse James who's not happy about how he and his fellow outlaws are being portrayed on Rance's show."], [1783270205, 1783271748, "The Twilight Zone", "Kick the Can", "S3 E21", "Charles Whitley living in the Sunnyvale Rest Home thinks he's found the secret of youth in playing child's games and exhorts his fellow seniors into joining in. His friend Ben Conroy and facility superintendent Cox want this stopped."], [1783271748, 1783273304, "The Twilight Zone", "A Piano in the House", "S3 E22", "Sadistic theatre critic Fitzgerald Fortune buys a gift for his wife Esther's birthday: a player piano that has the power to reveal the souls of all who hear it play. He then uses it to provide \"entertainment\" for her birthday party."], [1783273304, 1783274810, "The Twilight Zone", "The Last Rites of Jeff Myrtlebank", "S3 E23", "Young Southerner Jefferson Myrtlebank wakes up during his own funeral and wants to know what is going on. The townsfolk are glad to see him back, but they begin to wonder if he's a man - or something else."], [1783274810, 1783276351, "The Twilight Zone", "To Serve Man", "S3 E24", "An alien race comes to Earth, promising peace and sharing technology. Linguists Michael Chambers, Patricia Brody, and their team set out to translate the aliens' language, using a book whose title they deduce to be \"To Serve Man.\""], [1783276351, 1783277887, "The Twilight Zone", "The Fugitive", "S3 E25", "Young lame Jenny and the other neighborhood kids don't realize that their kind playmate Old Ben is really an intergalactic fugitive hiding out - until two serious men come looking for him and asking questions that test their friendship."], [1783277887, 1783279434, "The Twilight Zone", "Little Girl Lost", "S3 E26", "Awakened by the cries of their daughter Bettina, Chris and Ruth Miller enter her room to find that she has vanished, even though they still hear her crying for help. Chris' physicist friend Bill thinks she moved into another dimension."], [1783279434, 1783280974, "The Twilight Zone", "Person or Persons Unknown", "S3 E27", "David Gurney wakes up to find that no one - his wife, his co-workers, his best friend, not even his own mother knows him."], [1783280974, 1783282535, "The Twilight Zone", "The Little People", "S3 E28", "After crash landing on a seemingly desolate planet, astronauts Bill Fletcher and Peter Craig find a society of very small beings. While Fletcher repairs the spaceship, Craig becomes a megalomaniac and decides to rule their society."], [1783282535, 1783284076, "The Twilight Zone", "Four O'Clock", "S3 E29", "Obsessed Oliver Crangle wants to expose vice in the world, investigating people that he sees as evil, and then attempting to ruin their lives. His plan is to punish them all by an unspecified means at 4:00 this afternoon."], [1783284076, 1783285631, "The Twilight Zone", "Hocus-Pocus and Frisby", "S3 E30", "Rural gas station/general store proprietor Somerset Frisby, who's given to telling tall tales about himself, is abducted by visiting aliens who mistakenly believe him to be one of Earth's leading intellectuals."], [1783285631, 1783287172, "The Twilight Zone", "The Trade-Ins", "S3 E31", "Elderly long-married John and Marie Holt visit the New Life Corporation to shop for a pair of younger replacement bodies. But then John resorts to desperate measures in order to cover the immense cost of this purchase."], [1783287172, 1783288726, "The Twilight Zone", "The Gift", "S3 E32", "An alien who crash-lands into a remote mountain village stirs up the villagers' fears and animosity, but he befriends a little boy and gives him a mysterious present."], [1783288726, 1783290269, "The Twilight Zone", "The Dummy", "S3 E33", "Ventriloquist Jerry Etherson is convinced that his dummy, Willie, is alive and evil. He locks Willie in a trunk and makes plans for a new act with a new dummy. Too bad he didn't clear those plans with Willie first."], [1783290269, 1783291811, "The Twilight Zone", "Young Man's Fancy", "S3 E34", "When a newlywed couple briefly return to the groom's childhood home, the ties of the past prove too strong to resist."], [1783291811, 1783293352, "The Twilight Zone", "I Sing the Body Electric", "S3 E35", "Recent widower George Rogers, needing loving care for his three young children, orders a cybernetic \"grandmother\". While two of his children accept her, one of his daughters fiercely rejects her, with near tragic consequences."], [1783293352, 1783294860, "The Twilight Zone", "Cavender is Coming", "S3 E36", "Inept apprentice guardian angel Harmon Cavender is chastised by his superior and given a final chance to earn his wings by helping an unconventional big city woman, the young, socially awkward Agnes Grep."], [1783294860, 1783296365, "The Twilight Zone", "The Changing of the Guard", "S3 E37", "An elderly private school teacher wonders if his life has meant anything as he contemplates suicide on Christmas Eve and is reminded by former students that he has, indeed, made an effect on the lives of his students over the years."], [1783296365, 1783299495, "The Twilight Zone", "In His Image", "S4 E1", "A scientist tries to correct his imperfections by building a mechanical likeness of himself, which includes of all the finer qualities he is lacking."], [1783299495, 1783302625, "The Twilight Zone", "The Thirty-Fathom Grave", "S4 E2", "As a U.S. Navy destroyer cruises near Guadalcanal in the South Pacific, its sonar detects muted but constant hammering on metal undersea. The eerie sounds emanate from a submarine on the ocean floor, apparently there since World War II. The ship's chief boatswain's mate becomes very nervous, having served aboard that sub - and he was its sole survivor."], [1783302625, 1783305756, "The Twilight Zone", "Valley of the Shadow", "S4 E3", "A reporter finds himself trapped in a small town where people can reverse time and do many other amazing things."], [1783305756, 1783308889, "The Twilight Zone", "He's Alive", "S4 E4", "A tiny neo-Nazi organization struggles pathetically to succeed in a big city. A mysterious figure begins to ruthlessly guide a young, insecure U.S. Nazi leader, and the group begins to draw more attention."], [1783308889, 1783312021, "The Twilight Zone", "Mute", "S4 E5", "A 12-year-old girl who lost her parents in a fire doesn't speak because she has grown up in a secret telepathic community. The couple who take her in, and her teacher, are determined to help her adapt to their society, no matter the cost."], [1783312021, 1783315143, "The Twilight Zone", "Death Ship", "S4 E6", "A three-man spacecraft lands on a planet only to discover the wreckage of a spacecraft identical to their own. Two of the crew are convinced that they are dead, but the captain refuses to see the truth."], [1783315143, 1783318273, "The Twilight Zone", "Jess-Belle", "S4 E7", "Appalachian beauty Jess-Belle Stone can't bear to lose Billy Turner, the object of her desire, to local rich girl Ellie Glover, so she turns to local witch Granny Hart for assistance. The results bring unexpected and tragic consequences."], [1783318273, 1783321402, "The Twilight Zone", "Miniature", "S4 E8", "A lonely man falls in love with a mini museum doll, which he believes is alive."], [1783321402, 1783324532, "The Twilight Zone", "Printer's Devil", "S4 E9", "A wily old man, hired by a bankrupt newspaper editor, has the knack of predicting headline stories and claims to be the Devil."], [1783324532, 1783327665, "The Twilight Zone", "No Time Like the Past", "S4 E10", "A man travels back in time to try to prevent some of history's catastrophes."], [1783327665, 1783330795, "The Twilight Zone", "The Parallel", "S4 E11", "An astronaut blacks out while orbiting the earth and ends up in a parallel universe."], [1783330795, 1783333865, "The Twilight Zone", "I Dream of Genie", "S4 E12", "A wiseacre genie appears from a lamp to a meek man, George P. Hanley. Hanley is so used to bad luck, he imagines how each of three possible wishes could go very wrong - but the genie will grant him only one wish!"], [1783333865, 1783336999, "The Twilight Zone", "The New Exhibit", "S4 E13", "When Mr. Ferguson decides to close his wax museum, his employee Martin Lombard Senescue fights to preserve figures of famous murderers and store them in his home basement, a decision that does not sit well with his wife Emma."], [1783336999, 1783340128, "The Twilight Zone", "Of Late I Think of Cliffordville", "S4 E14", "A bored, wealthy businessman gets a chance to go back in time and start over, armed with all the knowledge he's acquired...an arsenal that's not as powerful as he thinks."]]}, {"id": "3", "name": "MachoVision", "a": "machovision", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/machovision-v4.png", "progs": [[1783244583, 1783245767, "Macho Man the Randy Savage Story", "vs Shawn Michaels — WWE Title (Munich, Apr 14 1992)", "S1 E10", "MachoVision"], [1783245767, 1783248241, "Macho Man the Randy Savage Story", "vs Ultimate Warrior — WWE Title (SummerSlam, Aug 31 1992)", "S1 E11", "MachoVision"], [1783248241, 1783249353, "Macho Man the Randy Savage Story", "vs Ric Flair — WWE Title (Prime Time Wrestling, Sept 14 1992)", "S1 E12", "MachoVision"], [1783249353, 1783250531, "Macho Man the Randy Sava 0, 1783337579, "Macho Man the Randy Savage Story", "vs Bruno Sammartino — Lumberjack IC Title (Boston Garden, Feb 7 1987)", "S1 E2", "MachoVision"], [1783337579, 1783338657, "Macho Man the Randy Savage Story", "vs Ricky Steamboat — IC Title (Maple Leaf Gardens, Feb 15 1987)", "S1 E3", "MachoVision"], [1783338657, 1783339413, "Macho Man the Randy Savage Story", "vs Harley Race (Philadelphia, Sept 18 1987)", "S1 E4", "MachoVision"]]}, {"id": "5", "name": "The Fifth Dimension", "a": "the-fifth-dimension", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/fifth-dimension-v2.png", "progs": [[1783244787, 1783247646, "Quantum Leap", "Thou Shalt Not...", "S2 E7", "February 2, 1974: Sam's task as a rabbi is to keep his sister-in-law from falling for a sleazy author and ruining her life. In the process he also helps the family recover from the year-old death of their son."], [1783247646, 1783250517, "Quantum Leap", "Jimmy", "S2 E8", "October 14, 1964: Since mainstreaming the mentally disabled is not yet a popular concept, Sam must help Jimmy LaMotta, the \"slow\" young man he's leaped into, get a job and gain his co-workers' acceptance, to prevent his brother from returning Jimmy to the institution."], [1783250517, 1783252071, "The Twilight Zone", "The Fever", "S1 E17", "Tight fisted Franklin Gibbs is not pleased when his wife wins a trip for two to Las Vegas.  But things change when he falls under the spell of a slot machine that calls his name."], [1783252071, 1783253626, "The Twilight Zone", "The Last Flight", "S1 E18", "A World War I flying ace flies through a mysterious cloud - and lands at a modern U.S. air base in the year 1959!"], [1783253626, 1783256493, "Quantum Leap", "So Help Me God", "S2 E9", "July 29, 1957: Though he can't remember much more than habeas corpus, Sam finds himself the defense attorney for a young black woman accused of murdering the son of the most powerful man in a small Louisiana town."], [1783256493, 1783259374, "Quantum Leap", "Catch A Falling Star", "S2 E10", "May 21, 1979: Sam leaps into Ray Hutton, the understudy for the role of Cervantes just seconds before curtain time. His mission: prevent the drunken star from falling and seriously injuring himself during a benefit performance of \"Man of La Mancha.\" Sam isn't helped by the presence of his former piano teacher, on whom he once had a crush, and who now appears to have caught the star's eye as well."], [1783259374, 1783260927, "The Twilight Zone", "The Purple Testament", "S1 E19", "Lieutenant Fitzgerald, serving in World War II, possesses the disquieting ability to foresee impending death by observing a strange glow on the faces of his men before battle."], [1783260927, 1783262478, "The Twilight Zone", "Elegy", "S1 E20", "Three astronauts touch down on an Earth-like asteroid where they discover a world of people who appear to be frozen in time. Confused, they try to theorize why everyone is motionless until a resident springs to life and explains."], [1783262478, 1783265289, "Quantum Leap", "A Portrait for Troian", "S2 E11", "February 7, 1971: Sam leaps into a renowned parapsychologist where he must prevent a young widow from joining her husband at the bottom of a lake, while proving that she's not crazy, despite her claims of hearing her dead husband calling to her."], [1783265289, 1783268103, "Quantum Leap", "Animal Frat", "S2 E12", "October 19, 1967: Trapped in the body of Knut Wileton, better known as \"Wild Thing,\" the typical frat jock, Sam must win the confidence of an attractive campus radical before she bombs the college's chemistry building as a protest against the war in Vietnam."], [1783268103, 1783269656, "The Twilight Zone", "Mirror Image", "S1 E21", "In a bus depot, Millicent Barnes experiences odd events, leading to concerns about her sanity."], [1783269656, 1783271213, "The Twilight Zone", "The Monsters are Due on Maple Street", "S1 E22", "Paranoia strikes the residents of Maple Street when they believe human-looking aliens have invaded the neighborhood."], [1783271213, 1783274080, "Quantum Leap", "Another Mother", "S2 E13", "September 30, 1981: As a divorced mother of three, Sam's job of preventing his teenage son from running away, never to be seen again, is made more interesting by the fact that his youngest daughter can see both him and Al."], [1783274080, 1783276966, "Quantum Leap", "All-Americans", "S2 E14", "November 6, 1962: Keeping his best friend from throwing the high school championship football game, costing both of them their scholarship offers, Sam must also get their families to consolidate."], [1783276966, 1783278521, "The Twilight Zone", "A World of Difference", "S1 E23", "Arthur Curtis, a successful businessman sitting in his office discovers that he is on a film set and everyone refers to him as Gerry Reagan, a movie star struggling with alcoholism and a declining career."], [1783278521, 1783280073, "The Twilight Zone", "Long Live Walter Jameson", "S1 E24", "Walter Jameson, a popular history professor, is suspected by his fiancée's father, another professor at the college, to be an immortal."], [1783280073, 1783282950, "Quantum Leap", "Her Charm", "S2 E15", "September 26, 1973: Protecting a female member of the witness protection program from a mafia hitman proves difficult for Sam, since the FBI appears to have an informant confounding his attempts to hide her."], [1783282950, 1783285772, "Quantum Leap", "Freedom", "S2 E16", "November 22, 1970: Rather than saving his grandfather's life, Sam has to escape from jail and elude the police long enough to get them both to the reservation, where the old man can die in peace, at home."], [1783285772, 1783287326, "The Twilight Zone", "People are Alike All Over", "S1 E25", "After a space exploration crash-lands on Mars, the lone surviving astronaut is surprised to find that Martians are human-looking and friendly."], [1783287326, 1783288879, "The Twilight Zone", "Execution", "S1 E26", "When a 20th-century scientist tests out his time machine he accidentally retrieves a murderer from 1880, saving him from the hangman's noose. Unaware of the man's history, the scientist attempts to acclimatize him to his new surroundings."], [1783288879, 1783291766, "Quantum Leap", "Good Night, Dear Heart", "S2 E17", "November 9, 1957: Rather than saving the damsel of the episode, who supposedly committed suicide, Sam is the coroner trying to prove that she was murdered, and find out by whom."], [1783291766, 1783294644, "Quantum Leap", "Pool Hall Blues", "S2 E18", "September 4, 1954: In order to help his granddaughter save a small bar from the slimy loan shark holding a note on the place, Sam has to play pool like a pro...with a little help from Al and Ziggy."], [1783294644, 1783296200, "The Twilight Zone", "The Big Tall Wish", "S1 E27", "An aging boxer finds himself the winner of a match he thought he had lost, the result a six-year-old's frantic wish. But can a world-weary, embittered man still believe in miracles, or will he turn his back on them?"], [1783296200, 1783297753, "The Twilight Zone", "A Nice Place to Visit", "S1 E28", "After being shot to death, the criminal Rocky Valentine encounters the amiable white-haired Mr. Pip in the afterlife, who gives him everything he wishes for."], [1783297753, 1783300643, "Quantum Leap", "Leaping in Without a Net", "S2 E19", "November 18, 1958: Sam remembers he's afraid of heights when he leaps into a trapeze artist, whose sister wants him to catch her as she does a triple without a net. Dad is less than pleased, since his wife died a few years earlier while attempting the same stunt."], [1783300643, 1783303523, "Quantum Leap", "Maybe Baby", "S2 E20", "Sam leaps into the body of Buster who is in the process of kidnapping a baby along with a stripper whose stage name is Bunny O'Hare and whose story is constantly changing. Initially, he thinks they might be the parents but Bunny tells him she is trying to get the baby, Christie, back to its real mother. Turns out she had good reason to take the baby away from her father"], [1783303523, 1783305075, "The Twilight Zone", "Nightmare as a Child", "S1 E29", "Schoolteacher Helen Foley finds a strange and very serious little girl on the stairs outside her apartment, who tries to jog Helen's memory about a man she saw earlier that day."], [1783305075, 1783306630, "The Twilight Zone", "A Stop at Willoughby", "S1 E30", "Tired of his miserable job and wife, a businessman starts dreaming on the train each night, about an old, idyllic town called Willoughby. Soon he has to know whether the town is real and fancies the thought of seeking refuge there."], [1783306630, 1783309480, "Quantum Leap", "Sea Bride", "S2 E21", "June 3, 1954: Aboard an ocean liner, Sam must stop the marriage of a young man's ex-wife to a mobster. In the process, he finds himself in one heck of a mess in the ship's garbage compartment."], [1783309480, 1783312369, "Quantum Leap", "M.I.A.", "S2 E22", "April 1, 1969: When Sam leaps into the life of an undercover cop, Al explains that his mission is to convince a navy nurse that her MIA husband is still alive, and to prevent her from marrying a lawyer she meets on the day Sam leaps in. But a series of coincidences causes Sam to wonder about the true nature of his mission."], [1783312369, 1783313921, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."], [1783313921, 1783315488, "The Twilight Zone", "A Passage for Trumpet", "S1 E32", "Musician Joey Crown is down on his luck. An alcoholic, he can't find work because no one trusts him. Broke, he hocks his trumpet but then steps in front of truck which knocks him onto the sidewalk. He awakens in a strange world where no one can see him and he presumes that he has died. He eventually bumps into someone who can in fact see him, a fellow horn player who tells him that it's still with"], [1783315488, 1783318316, "Quantum Leap", "The Leap Home (1)", "S3 E1", "Sam leaps into himself as a 16-year-old boy to help his high school basketball team win the championship. He also tries to help the other members of his family including his father who died from smoking, his brother who was killed in Vietnam and his sister who married an abusive alcoholic."], [1783318316, 1783321122, "Quantum Leap", "The Leap Home (2): Vietnam", "S3 E2", "April 7, 1970: As a Navy SEAL in his own brother's squad, Sam must determine whether he is there to save Tom's life or ensure the success of the mission on which his brother was killed. Also Al from 1970 was a P.O.W."], [1783321122, 1783322678, "The Twilight Zone", "Mr. Bevis", "S1 E33", "After losing his job, his car and his apartment on the same day, an eccentric loser gets a new lease on life from his guardian angel, but there is a price for keeping it."], [1783322678, 1783324232, "The Twilight Zone", "The After Hours", "S1 E34", "Puzzled and unsettled by the odd behavior of the salespeople, a woman discovers that the floor of a department store, on which she bought a gold thimble, doesn't exist."], [1783324232, 1783326951, "Quantum Leap", "Leap of Faith", "S3 E3", "August 19, 1963: Sam finds himself in one holy mess as a priest in Philadelphia, trying to help an alcoholic priest deal with a killer and the death of a young parishioner."], [1783326951, 1783329814, "Quantum Leap", "One Strobe Over the Line", "S3 E4", "June 15, 1965: Sam is a photographer who must protect a fashion model from a growing dependency on amphetamines and a predatory manager's ambitions."], [1783329814, 1783331366, "The Twilight Zone", "The Mighty Casey", "S1 E35", "A baseball manager takes his team to the championships thanks to a robot pitcher."], [1783331366, 1783332885, "The Twilight Zone", "A World of His Own", "S1 E36", "Coming home, Victoria catches her husband Gregory flirting with a beautiful woman in his study. His explanation that characters come to life before his eyes when he speaks into his dictation machine, leads Victoria to question his sanity."], [1783332885, 1783335703, "Quantum Leap", "The Boogieman", "S3 E5", "October 31, 1964: Things do more than go bump in the night when Sam leaps into Joshua Raye, a horror novelist on Halloween. Although Ziggy claims he's there to prevent the death of a church deacon, things get even stranger when two more people die without warning."], [1783335703, 1783338491, "Quantum Leap", "Miss Deep South", "S3 E6", "June 7, 1958: As Darlene Monte, a contestant in the \"Miss Deep South\" beauty pageant, Sam must come to the aid of an innocent contender who faces disgrace when she poses for naughty pictures taken by a sleazy pageant photographer. As if things weren't bad enough, Sam must ensure that Darlene finishes third, so that she'll go on to become a doctor."], [1783338491, 1783340044, "The Twilight Zone", "King Nine Will Not Return", "S2 E1", "The pilot of a downed B-25, Capt. James Embry, awakens in the desert, with no memory of how he got there. More worrisome, his crew is nowhere to be found. He begins to wonder if he's hallucinating, especially after he sees one of his men sitting in the cockpit. When he awakens in hospital, he thinks it might have all been a dream, but wonders: did any of this really happen?"]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783245198, 1783246562, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783246562, 1783247928, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783247928, 1783249392, "Pee-wee's Playhouse", "Stolen Apples", "S1 E11", "Randy steals Mrs. Steve's crummy crab apples from her tree, and Mrs. Steve needs Pee-wee's help in finding him. Then, Pee-wee plays the hands game with Tito, and \"there\" are enough apples for everyone at snack time."], [1783249392, 1783250856, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783250856, 1783252192, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783252192, 1783253524, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783253524, 1783254731, "Power Rangers", "Foul Play in the Sky", "S1 E13", "Kimberly is in trouble when her uncle Steve succumbs to a sleeping potion in the middle of flying an airplane with her on board."], [1783254731, 1783255947, "Power Rangers", "Dark Warrior", "S1 E14", "Billy is inspired by Trini's uncle Howard - a brilliant scientist and expert in martial arts."], [1783255947, 1783257299, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783257299, 1783258652, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783258652, 1783260115, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783260115, 1783261578, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "Saturday Morning"], [1783261578, 1783262915, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783262915, 1783264253, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783264253, 1783265409, "Power Rangers", "Big Sisters", "S1 E15", "Kim & Trini get the task of being \"big sisters\" to a mischievous little girl named Maria. Rita kidnaps the bratty child, with intent of using her to open a magic trunk filled with Power Eggs. The Rangers end up facing the Chunky Chicken monster to save the annoying girl. All of this, plus, Billy unveils his specially modified VW Beetle, known as the RADBUG."], [1783265409, 1783266626, "Power Rangers", "Switching Places", "S1 E16", "Billy shows Kimberly a new machine he made that is supposed to transport people from one spot to another. Curious to see how well it works, they both get inside and end up switching bodies instead! Bulk and Skull show up and get inside later that day, unbeknown st to Billy or Kimberly and they switch bodies too and accidentally break the machine! Now Billy(in Kimberly's body) must fix the machine "], [1783266626, 1783267994, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783267994, 1783269329, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783269329, 1783270792, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "Saturday Morning"], [1783270792, 1783272255, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "Saturday Morning"], [1783272255, 1783273590, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783273590, 1783274924, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783274924, 1783276132, "Power Rangers", "Green with Evil Part 1: Out of Control", "S1 E17", "Rita creates her own evil Green Ranger to beat the Power Rangers at their own game."], [1783276132, 1783277351, "Power Rangers", "Green with Evil Part 2: Jason's Battle", "S1 E18", "The Power Rangers work to restore Zordon and Alpha unaware that the new kid in school is actually Rita's evil Green Ranger."], [1783277351, 1783278686, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783278686, 1783280023, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783280023, 1783281486, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "Saturday Morning"], [1783281486, 1783282951, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "Saturday Morning"], [1783282951, 1783284288, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783284288, 1783285624, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."], [1783285624, 1783286772, "Power Rangers", "Green with Evil Part 3: The Rescue", "S1 E19", "Femme fatale Scorpina joins Rita as the Green Ranger continues to battle the Power Rangers."], [1783286772, 1783287989, "Power Rangers", "Green with Evil Part 4: Eclipsing Megazord", "S1 E20", "An eclipse of the sun saps the Megazord's power as Rita's forces launch a full scale assault on Angel Grove."], [1783287989, 1783289219, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783289219, 1783290558, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783290558, 1783292023, "Pee-wee's Playhouse", "Episode 19", "S1 E19", "Saturday Morning"], [1783292023, 1783293488, "Pee-wee's Playhouse", "Episode 20", "S1 E20", "Saturday Morning"], [1783293488, 1783294825, "Teenage Mutant Ninja Turtles", "The Cat Woman of Channel Six", "S2 E12", "While experimenting with a matter transporter in his secret hideout, Shredder sends Rocksteady and Bebop to a nearby garbage dump. Through a series of mishaps, Rocksteady and Bebop find themselves in the Turtles' Lair."], [1783294825, 1783296163, "Teenage Mutant Ninja Turtles", "Return of the Technodrome", "S2 E13", "Krang, sick of Shredder's constant failings, resolves to return the Technodrome to Earth."], [1783296163, 1783297310, "Power Rangers", "Green with Evil Part 5: Breaking the Spell", "S1 E21", "The mighty Dragonzord awakes after thousands of years as the Rangers try to break the spell over the Green Ranger once and for all."], [1783297310, 1783298477, "Power Rangers", "The Trouble with Shellshock", "S1 E22", "Squatt and Baboo create their own Shellshock monster to impress Rita."], [1783298477, 1783299814, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783299814, 1783301152, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783301152, 1783302615, "Pee-wee's Playhouse", "Episode 21", "S1 E21", "Saturday Morning"], [1783302615, 1783304080, "Pee-wee's Playhouse", "Episode 22", "S1 E22", "Saturday Morning"], [1783304080, 1783305417, "Teenage Mutant Ninja Turtles", "Beneath these Streets", "S3 E1", "The Turtles learn the cost of slacking off when Splinter is badly hurt during a confrontation with Shredder."], [1783305417, 1783306755, "Teenage Mutant Ninja Turtles", "Turtles On Trial", "S3 E2", "The intentions of the Ninja Turtles are put to the test when a controversial TV-figure portrays our heroes as menaces to society. The Turtles forego publicly clearing their name to defeat Krang and his new robotic weapon."], [1783306755, 1783307972, "Power Rangers", "The Spit Flower", "S1 E23", "Rita and her evil Spit Flower monster set out to ruin Kimberly's design for a float in the world peace parade."], [1783307972, 1783309168, "Power Rangers", "Itsy Bitsy Spider", "S1 E24", "Zack must overcome his fear of spiders to face Rita's newest monster."], [1783309168, 1783310501, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783310501, 1783311833, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783311833, 1783312955, "Pee-wee's Playhouse", "Episode 23", "S1 E23", "Saturday Morning"], [1783312955, 1783314418, "Pee-wee's Playhouse", "Episode 24", "S1 E24", "Saturday Morning"], [1783314418, 1783315758, "Teenage Mutant Ninja Turtles", "Attack of the 50-Foot Irma", "S3 E3", "Irma accidentally becomes gigantic and her naturally clumsy nature makes her a danger to the city."], [1783315758, 1783317096, "Teenage Mutant Ninja Turtles", "The Maltese Hamster", "S3 E4", "Gangsters are swiping all the antiques in town. And when they swipe most of our heroes, it's up to Donatello and April to find out why. Could Shredder be behind this?"], [1783317096, 1783318313, "Power Rangers", "Life's a Masquerade", "S1 E25", "Rita's Frankenstein monster crashes the Power Rangers' Halloween costume party."], [1783318313, 1783319514, "Power Rangers", "Gung Ho!", "S1 E26", "Jason and Tommy must learn to work together to stop Rita's Super Putties."], [1783319514, 1783320850, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783320850, 1783322218, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783322218, 1783324008, "Pee-wee's Playhouse", "Episode 25", "S1 E25", "Saturday Morning"], [1783324008, 1783325407, "Pee-wee's Playhouse", "Open House", "S2 E1", "Today in the \"Playhouse,\" Pee-wee tricks his friends into doing all of his chores by pretending that work is fun. The gang meets some new friends while renovating the \"house.\" Reba arrives in time to deliver Clocky while the Playhouse gang uncovers Floory and meets Mrs. Rene for the first time."], [1783325407, 1783326744, "Teenage Mutant Ninja Turtles", "Sky Turtles", "S3 E5", "The Turtles go flying when the Shredder invents a gravity-altering device."], [1783326744, 1783328079, "Teenage Mutant Ninja Turtles", "The Old Switcheroo", "S3 E6", "The personalities of Shredder and Splinter are switched when a device is accidentally activated during a battle between the Turtles and their enemies. As Shredder plans the Turtles' demise and Splinter plans on how to get back to his body, everyone else is clueless."], [1783328079, 1783329251, "Power Rangers", "Wheel of Misfortune", "S1 E27", "Rita turns Kimberly's grandmother's spinning wheel into her dangerous new weapon."], [1783329251, 1783330470, "Power Rangers", "Island of Illusion (1)", "S1 E28", "Rita traps the Power Rangers on the Island of Illusion, where their greatest fears can destroy them."], [1783330470, 1783331772, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783331772, 1783333138, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783333138, 1783334536, "Pee-wee's Playhouse", "Puppy In the Playhouse", "S2 E2", "Cowntess, just back from a world cruise, is showing some of her home movies from the trip. Globey teaches Pee-wee how to say \"hello, my name is Pee-wee\" in French and Chinese! When a lost puppy appears at the Playhouse door, no one can figure out who the owner is. Pee-wee develops a strong case of puppy love and decides to keep him and name him Aloysius. However, Reba comes \"over,\" and it's obviou"], [1783334536, 1783335928, "Pee-wee's Playhouse", "Store", "S2 E3", "Pee-wee and Cowboy Curtis take a leap into Magic Screen where they enjoy some mighty fine handcart ridin' until a train chases them back into the waiting arms of Chairry! Then, Cowboy Curtis sings a song with \"more\" of the secret word in it than you could scream at. Finally, Cowboy Curtis and Miss Yvonne go shopping at Pee-wee's \"department store\" where they decide to buy Chairry!"], [1783335928, 1783337266, "Teenage Mutant Ninja Turtles", "Burne's Blues", "S3 E7", "In the middle of a summer heat wave, someone is destroying all the air conditioners and taking all the city's freon. In the meantime, Vernon and Burne go looking for the Turtles, but find something else."], [1783337266, 1783338606, "Teenage Mutant Ninja Turtles", "The Fifth Turtle", "S3 E8", "A 14-year-old boy tries his best to help out the Turtles, but with some not so optimal results."], [1783338606, 1783339793, "Power Rangers", "Island of Illusion (2)", "S1 E29", "The Rangers must overcome their own fears to escape Rita's Island of Illusion."]]}, {"id": "7", "name": "Taba TV", "a": "taba-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/taba-tv-v1.png", "progs": [[1783245145, 1783246911, "The Wonder Years", "Episode 9", "S1 E9", "Taba TV"], [1783246911, 1783248206, "The Wonder Years", "
