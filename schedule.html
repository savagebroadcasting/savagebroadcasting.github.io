veral girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783259397, 1783260828, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783260828, 1783262254, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783262254, 1783263689, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783263689, 1783265124, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783265124, 1783267926, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783267926, 1783270742, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783270742, 1783272095, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783272095, 1783273447, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783273447, 1783274672, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783274672, 1783276148, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783276148, 1783277553, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783277553, 1783278979, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783278979, 1783281794, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783281794, 1783284607, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783284607, 1783285975, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783285975, 1783287310, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783287310, 1783288605, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783288605, 1783289973, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783289973, 1783291388, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783291388, 1783292818, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783292818, 1783295635, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783295635, 1783298449, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783298449, 1783299784, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783299784, 1783301120, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783301120, 1783302521, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783302521, 1783303923, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783303923, 1783305352, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783305352, 1783306787, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783306787, 1783309602, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783309602, 1783312299, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783312299, 1783313529, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783313529, 1783314868, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783314868, 1783316255, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783316255, 1783317650, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783317650, 1783319065, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783319065, 1783320500, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783320500, 1783323285, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783323285, 1783326069, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783326069, 1783327407, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783327407, 1783328744, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783328744, 1783330145, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783330145, 1783331515, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783331515, 1783332951, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783332951, 1783334389, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783334389, 1783337131, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783337131, 1783339914, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783245363, 1783246666, "Raising Hope", "Burt Rocks", "S1 E10", "A washed-up rock star who is hired as the lead act at 'Grocery-Palooza', a rock concert at the supermarket where Sabrina works. Smokey was once Burt's musical idol, and Burt hopes to relive his rock-star years by playing backup for him at the concert."], [1783246666, 1783247965, "The Goldbergs (2013)", "Stop Arguing and Start Thanking", "S1 E9", "When Murray's brother, Marvin, visits, there is a surprise in store."], [1783247965, 1783249261, "The Goldbergs (2013)", "Shopping", "S1 E10", "When Erica starts working at a local department store, Beverly's bargain-hunting dreams come true; Adam and Barry go to the racetrack with Pops."], [1783249261, 1783250566, "Schitt's Creek", "Carl's Funeral", "S1 E9", "Johnny reluctantly agrees to speak at the funeral of a local man he doesn’t really know. Alexis struggles with her new boyfriend’s love of animals."], [1783250566, 1783251872, "Schitt's Creek", "Honeymoon", "S1 E10", "Johnny and Moira attend Roland’s annual Hawaiian bash. Alexis and Ted throw a couple’s dinner party, while David and Stevie’s relationship heats up."], [1783251872, 1783254505, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783254505, 1783257060, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783257060, 1783258363, "Raising Hope", "Toy Story", "S1 E11", "Jimmy finds out about his father's annual Christmas scheme where he sells the most wanted toy for a lot of money, which always left Jimmy disappointed when he was a child. Virginia wants the family to be a part of the living nativity scene at their church to gain the respect of the members."], [1783258363, 1783259669, "Raising Hope", "Romeo and Romeo", "S1 E12", "Jimmy hasn't had any time to socialize or make friends since Hope was born, so when he meets another single dad at the grocery store, he immediately sets up a play date. But when Jimmy finds out that Virginia is his new friend's housekeeper, Virginia insists that Jimmy cancel the outing. In an effort to keep the peace, Jimmy and his friend arrange a dinner at the Chance house."], [1783259669, 1783260963, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783260963, 1783262257, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783262257, 1783263563, "Schitt's Creek", "Little Sister", "S1 E11", "Moira's estranged sister, Deedee, pays an unexpected visit, while David agrees to talk with one of Jocelyn's students about being \"different\"."], [1783263563, 1783264867, "Schitt's Creek", "Surprise Party", "S1 E12", "Johnny tries to arrange a surprise birthday party for Moira. Things backfire when Moira, unwittingly, takes over the planning of her own party."], [1783264867, 1783267507, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783267507, 1783270262, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783270262, 1783271565, "Raising Hope", "A Germ of a Story", "S1 E13", "When Sabrina points out to Jimmy just how many germs are lurking around his house, the Chance family becomes obsessed with cleanliness. Finding it impossible to keep Maw Maw clean, they move her to the backyard greenhouse, but after watching some old family movies, they discover a surprising secret that has kept them healthy all these years."], [1783271565, 1783272869, "Raising Hope", "What Up, Cuz?", "S1 E14", "Virginia's cousin Delilah, who struggles to make ends meet, pays a visit to the Chance family unannounced, determined to claim her share of Maw Maw's - whom she thinks died years ago - estate. Further tension builds when Delilah admits she still has a crush on Burt. Meanwhile, Jimmy babysits Maw Maw and panics when she takes off on Sabrina's moped."], [1783272869, 1783274166, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783274166, 1783275464, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783275464, 1783276770, "Schitt's Creek", "Town for Sale", "S1 E13", "Johnny finds a potential buyer for the town, while David and Alexis discover they may have become more attached to Schitt’s Creek than they ever thought possible."], [1783276770, 1783278080, "Schitt's Creek", "Finding David", "S2 E1", "The Roses search for their missing son, David, while Alexis takes her relationship with Mutt to the next level despite technically being engaged to Ted."], [1783278080, 1783280785, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783280785, 1783283475, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783283475, 1783284779, "Raising Hope", "Snip Snip", "S1 E15", "Barely reconciled with having to help care for Jimmy's baby, Burt and Virginia realize their unsafe sex is no longer acceptable. Burt defends his manhood but is outvoted, so Jimmy drags him to Dr. Burwitz for a vasectomy and patiently humors him to get the surgery done."], [1783284779, 1783286082, "Raising Hope", "The Cultish Personality", "S1 E16", "The Chances prepare to host once more Burt's cousin Mike, a hopeless loser even by their standards. Yet they find him a changed man, as neat member of a loony sect, one of Tanya's four 'brother-husbands'. Jimmy is inadvertently attracted by their neat, apparently harmonious 'fraternity'."], [1783286082, 1783287380, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783287380, 1783288674, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783288674, 1783289984, "Schitt's Creek", "Family Dinner", "S2 E2", "Moira decides to cook dinner with the help of David. Johnny scopes out an office for his consulting business. And Alexis finally comes clean with Ted about their engagement."], [1783289984, 1783291294, "Schitt's Creek", "Jazzagals", "S2 E3", "Moira attempts to join the town’s a cappella group. Alexis enjoys the heady first days of her latest relationship. And Johnny helps out at Bob’s Garage despite himself."], [1783291294, 1783293933, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783293933, 1783296926, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783296926, 1783298231, "Raising Hope", "Mongooses", "S1 E17", "The Chance family goes to see a lawyer to get their wills done, and Burt is insulted when Jimmy chooses Sabrina over him. Meanwhile, Sabrina is overcome with emotion by the news, while Maw Maw thinks mongooses are infesting the household."], [1783298231, 1783299535, "Raising Hope", "Cheaters", "S1 E18", "Jimmy hopes gullible Sabrina's boyfriend Wyatt may be cheating on her in college, so he insists to go with her to Wyatt's frat's wild costume party, but conclusive evidence is perilously hard to find. In order to have contact with generation peers, Maw Maw goes to Dead Tooth's daycare."], [1783299535, 1783300829, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783300829, 1783302124, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783302124, 1783303434, "Schitt's Creek", "Estate Sale", "S2 E4", "Johnny and Moira go to an estate sale. Mutt surprises Alexis with a bike, while Roland asks David to help him shop for a special item."], [1783303434, 1783304744, "Schitt's Creek", "Bob's Bagels", "S2 E5", "Johnny talks himself into an unlikely business partnership with Bob. David gets an interview at a woman's clothing store, while Moira reluctantly cares for an ailing Alexis."], [1783304744, 1783307384, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783307384, 1783310024, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783310024, 1783311326, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783311326, 1783312624, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee shop employee."], [1783312624, 1783313920, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783313920, 1783315217, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783315217, 1783316527, "Schitt's Creek", "Moira vs. Town Council", "S2 E6", "Moira tries to beautify the town. David misuses the company credit card. A grooming misstep forces Alexis and Mutt to question their relationship."], [1783316527, 1783317837, "Schitt's Creek", "The Candidate", "S2 E7", "Johnny considers running for town council. David and Stevie look for love. Alexis copes with being single."], [1783317837, 1783320477, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783320477, 1783322589, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783322589, 1783323886, "Raising Hope", "Baby Monitor", "S1 E21", "Barney tells the team he loses each year's annual commercial competition for the store, so now he wants to recruit his employees to compete for this year's submission; unfortunately, flattery and considerations like fair-play, and team spirit, get in the way."], [1783323886, 1783325190, "Raising Hope", "Don't Vote for this Episode", "S1 E22", "The Chances reminisce about the year Jimmy turned 18 - when Maw Maw kicked them out of the house, when a goth Jimmy took up residence in the grocery store and when Burt and Virginia finally figured out how to be adults."], [1783325190, 1783326487, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783326487, 1783327784, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783327784, 1783329094, "Schitt's Creek", "Milk Money", "S2 E8", "Johnny gets thrown into the raw milk business. Moira tries to connect with the townspeople. David gives style advice."], [1783329094, 1783330404, "Schitt's Creek", "Moira's Nudes", "S2 E9", "Moira is worried that racy photos from her past will jeopardize the campaign; Johnny asks for financial help; Alexis gets a job."], [1783330404, 1783331776, "Raising Hope", "Episode 23", "S1 E23", "Y2K"], [1783331776, 1783332948, "Raising Hope", "Episode 24", "S1 E24", "Y2K"], [1783332948, 1783334242, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783334242, 1783335539, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783335539, 1783336849, "Schitt's Creek", "Ronnie's Party", "S2 E10", "Johnny and Moira meet with a key group of people, Alexis struggles with her new job, David offer's emotional support to his boss' daughter."], [1783336849, 1783338159, "Schitt's Creek", "The Motel Guest", "S2 E11", "Johnny and Moira have to deal with a surprise motel guest while Alexis and David go apartment hunting."], [1783338159, 1783339331, "Raising Hope", "Episode 25", "S1 E25", "Y2K"]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783244248, 1783247135, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783247135, 1783249794, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783249794, 1783252388, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783252388, 1783254982, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783254982, 1783257596, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783257596, 1783260202, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783260202, 1783262812, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783262812, 1783265401, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783265401, 1783268044, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783268044, 1783270633, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783270633, 1783273266, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783273266, 1783275820, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783275820, 1783278460, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783278460, 1783281216, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783281216, 1783283920, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783283920, 1783286610, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783286610, 1783289249, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783289249, 1783292242, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783292242, 1783294882, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783294882, 1783297522, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783297522, 1783300162, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783300162, 1783302275, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783302275, 1783305162, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a grou anksgiving", "S1 E9", "Laurie comes home for Thanksgiving with her friend Kate.  Eric is annoyed that he'll have to give up his room for their guest, until he sees how hot Kate is.  Jackie alerts Donna to the trouble she could be facing now that a college girl is sleeping in Eric's bed.  Kitty tries vainly to avoid her mother-in-law's phone calls as she prepares for Thanksgiving dinner."], [1783249175, 1783250523, "That '70s Show", "Sunday, Bloody Sunday", "S1 E10", "Red's mother spends a Sunday with them and drives everyone crazy, except Fez. She seems to have a certain fondness for him."], [1783250523, 1783254597, "Saturday Night Live", "Elliott Gould with Anne Murray", "S1 E9", "Live from New York, it's... Elliott Gould!\n\nSketches include \"The Dead String Quartet,\" \"Interior Demolitionists,\" \"Vito Corleone in Therapy,\" \"The Killer Bees,\" \"Birthright\", \"Gilda and Elliot,\" \"New Shimmer,\" The Muppets, \"Play Misty for Me\" (film), \"Jamitol,\" \"Try-Hard 1-11,\" and \"Powwow With the Press\" (stand-up).\n\nAnne Murray performed \"Long Distance Call\" and \"Boogie With You.\""], [1783254597, 1783258567, "Saturday Night Live", "Buck Henry with Bill Withers and Toni Basil", "S1 E10", "Live from New York, It's...Chevy Chase\n\nSketches include--Suicide Prevention, \"Samurai Deli\", Operation Stumblebum, \"Citizen Kane II\", King Bee(the Blues Brothers), Auto mechanic tells bedtime story, \"Presidential Foreplay\", Chevy misuses a joint, The Constipated Man, The Muppets and the Japanese sex Device."], [1783258567, 1783259913, "That '70s Show", "Eric's Buddy", "S1 E11", "Eric has a new friend and Steven and Kelso can't stand it. Steven doesn't like him because he's rich and Eric doesn't give him a ride home anymore because Buddy has a Trans Am. Kelso, on the other hand, seems like a worried spouse. Eric starts to feel uncomfortable around him however when Buddy makes a move on him. Buddy apparently thought that Eric was also gay. And Red makes his first sale."], [1783259913, 1783261260, "That '70s Show", "The Best Christmas Ever", "S1 E12", "Red gives Eric 40 bucks to buy a Christmas tree and says that he can keep the change for his party. So Eric, Hyde and Kelso cut down a tree off the interstate and keep the money. They spend the money on beer and Kelso buys Jackie a Christmas present. Laurie spikes the punch with rum and Jackie's friend's are all attracted to Fez all of the sudden. Red has to work on Christmas Eve and not long afte"], [1783261260, 1783265266, "Saturday Night Live", "Peter Cook & Dudley Moore with Neil Sedaka", "S1 E11", "Live from New York, It's...Chevy Chase\n\nSketches include-- Bomb Squad, Prisoner Auditions, \"Don Pardo's Holiday on A Elevator\", \"Table Talk\", \"Backstage Banter\", Sonny and Cher, The Baby Jesus, Chevy talks to Angola's roommate, The Muppets."], [1783265266, 1783269305, "Saturday Night Live", "Dick Cavett with Jimmy Cliff", "S1 E12", "Live from New York, It's...Chevy Chase\n\nSketches include--Voodoo on Chevy Chase, Alcohol and Firearms, Lowell Brock of H&R Brock, \"Looks at Books\", Dick Cavett's School of Hydroplane Operation, Dance To The Nation, \"The Apple Follies\", Our Town."], [1783269305, 1783270651, "That '70s Show", "Ski Trip", "S1 E13", "Jackie dumps Kelso after he makes out with Pam Macy and invites everyone but him to her parent's ski cabin for the weekend.  Eric, excited about what this could mean for him and Donna, pays no attention to Kelso's whining about being left behind or Red's tips about driving in the snow.  He doesn't realize that Hyde keeps hitting on Donna and Kelso plans on following them to the lodge.  Also, Kitty"], [1783270651, 1783271998, "That '70s Show", "Stolen Car", "S1 E14", "When Eric scratches the car, Red suspends his driving privileges, so the gang has to walk everywhere. That is, until Kelso's cousin lends him a car. They get arrested though because the car was reported stolen. With one phone call, Kelso calls Jackie and she tells him that she'll have sex with him once he gets out of prison. The whole incident was a mix-up and the gang is released."], [1783271998, 1783275775, "Saturday Night Live", "Peter Boyle with Al Jarreau", "S1 E13", "Live from New York, It's...Chevy Chase\n\nSketches include \"The Valentine's Day Massacre,\" \"Samurai Divorce Court,\" \"Jason and Sunshine,\" \"The Corrida.\" \"All Pro Wrestling,\" \"Remembering of Things Past\", \"Dueling Brandos,\" \"A Home Movie\" (film), and \"The Orgy.\"  Al Jarreau performs \"We'll Get By.\""], [1783275775, 1783279773, "Saturday Night Live", "Desi Arnaz with Desi Arnaz Jr.", "S1 E14", "Live from New York, It's...Chevy Chase\n\nSketches include-- Gerald Ford gives a word association, Literary Recital, Very White(Chevy Chase)sings unsoulful songs, \"The Failed Pilots of I Love Lucy\", Cuban accupunture, Lucille Ball talks about Desi's book, Bisexual Minute."], [1783279773, 1783281120, "That '70s Show", "That Wrestling Show", "S1 E15", "Kitty thinks that it would be a good idea if Red and Eric become friends.  She forces Eric to invite Red to go with the gang to a wrestling event in Kenosha.  Bob tags along and seeks help from Fez and Hyde over Midge's decision to start therapy.  And Jackie is super nice to Kelso now that they've done the deed."], [1783281120, 1783282467, "That '70s Show", "First Date", "S1 E16", "Valentine's Day is coming up, so Eric decides to ask Donna out on their official first date and give her his class ring.  She breaks her study date with Hyde in order to go, leading Hyde to realize he only has one last chance with her.  Red and Kitty discover they don't have that much in common with Bob and Midge anymore.  And Jackie explains to Kelso how things are going to work now that they've "], [1783282467, 1783286454, "Saturday Night Live", "Jill Clayburgh with Leon Redbone", "S1 E15", "Live from New York, It's...Chevy Chase\n\nSketches include-- No More Falls, \"Great Moments in Herstory\", White Guilt Relief Fund, Inq s\", \"Johnny Angel\", \"Cresk Toothpaste,\"\" and \"The Hubcap Thief\" (film).  Leon Russell and Joe Cocker (Belushi) perform \"Daylight\"."], [1783311921, 1783313267, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783313267, 1783314613, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783314613, 1783318627, "Saturday Night Live", "Buck Henry with Gordon Lightfoot", "S1 E21", "Live from New York, It's...Chevy Chase\n\nSketches include--Emmy winner Chevy tries to get Laraine todo the fall, Samurai Tailor, \"Talk Back!\", \"Dell Stator's Toad Ranch Resturaunt\", \"Looks at Books\", The Crowd Audition, Peter Lemon Moodring, \"Not For Ladies Only\", Lorne Micheals offer to the Beatles."], [1783318627, 1783322592, "Saturday Night Live", "Elliott Gould with Leon Redbone and Harlan Collins & Joyce Everson", "S1 E22", "Sketches include \"Wax Museum,\" \"Phone Operator Academy,\" \"European Poker Player,\" \"Babs's Uvula,\" \"The Last Voyage of the Starship Enterprise,\" \"The Bee Honeymooners,\" \"Shirley Temple Black,\" \"Vibramatic,\" \"Uncle Charlie's School,\" and \"Show Us Your Guns.\"\n\nLeon Redbone performed \"Shine On Harvest Moon.\""], [1783322592, 1783323942, "That '70s Show", "Grandma's Dead", "S1 E23", "Red's mother Bernice has once again managed to make e ed Game\"\"   \"\"The Good Behavior Variety Hour Show\"\"   \"\"Handi Man: The Justice Legion of America\"\"  Nikki D perorms"], [1783329427, 1783330126, "Robot Chicken", "Easter Basket", "S2 E3", "Fred and Barney brawl over a box of Fruity Pebbles. Kids have fun with the Phyllis Diller Spray-n-Play. An Egyptian pharaoh builds a pyramid out of Lego, with some \"minor\" design changes. Superspy Sydney Bristow gets aquatic in '\"Whalias\". Anime and Santa collide in \"A Very Dragon Ball Z Christmas\"."], [1783330126, 1783330806, "Robot Chicken", "Celebrity Rocket", "S2 E4", "A Cuban youth plays Castro in \"Dance Dance Counter-Revolution.\" Dirk the Daring from the video game Dragon's Lair fights middle age. Mr. Six, the old dancing guy from the Six Flags commercials saves, and ruins, the day. Lindsay Lohan enters the world of Highlander and battles (and decapitates) teen starlet foes, such as Amanda Bynes and Hilary Duff."], [1783330806, 1783332196, "In Living Color", "Veracosa", "S2 E12", "Sketches include:\n\n\"\"Vera DeMilo: Veracosa, Mistress of Destruction\"\"   \"\"Cephus & Reesie: Christmas Album\"\"   \"\"Lil Miss Trouble at the Museum\"\"   \"\"Homey the Clown: Homey Claus\"\""], [1783332196, 1783333585, "In Living Color", "Johnny Abdul", "S2 E13", "Sketches include:\n\n\"\"The Brothers Brothers: Tom and Tom for the Arizona Tourism Commission\"\"   \"\"Johnny Abdul - Saudi Rock Star\"\"   \"\"The Last Orphan\"\"   \"\"Velma Mulholland\"\"   \"\"B.S. Brothers: Funky Finger Productions\"\"   \"\"The Head Detective\"\"  / Rich Nice performs"], [1783333585, 1783334260, "Robot Chicken", "Dragon Nuts", "S2 E5", "People of all ages (including actor Bruce Campbell) love the new toy, \"Morning Wood!\" A man's groin is possessed in \"Idle Nuts\". Live in fear when a giant midget attacks! A cleaning woman finds the Batcave the hard way. Atreyu and Falkor kick off a Neverending Party! An Omaha evening news broadcast spins out of control, with Paris Hilton as a weather reporter, and traffic copters anxiously watchin"], [1783334260, 1783334935, "Robot Chicken", "1987", "S2 E6", "Twinkie the Kid dispenses justice and lead! Popular board games from Chutes and Ladders to Hungry Hungry Hippos get turned into action-packed feature films. Meet Skeletor's dentist, Mo-Larr! Emperor Palpatine gets a collect call from Darth Vader. Mortal Kombat's Johnny Cage has a bad day on the job. An enraged Ted Turner transforms into his alter-ego, Captain Planet!"], [1783334935, 1783336325, "In Living Color", "Introducing...Fire Marshal Bill", "S2 E14", "Sketches include:\n\n\"\"Mr. Squeegee\"\"   \"\"B.S. Brothers: Big Break\"\"   \"\"Fashion Tampons\"\"   \"\"Fire Marshal Bill\"\"   \"\"Homey the Clown: Home E. Cheese\"\""], [1783336325, 1783337630, "In Living Color", "My Dark Conscience", "S2 E15", "Sketches include:\n\n\"\"Vanilla Ice: White, White Baby\"\"   \"\"Benita Butrell: Block Captain\"\"   \"\"Al MacAfee: Prom Chaperone\"\"   \"\"Oswald Meets the Parole Board\"\"   \"\"My Dark Conscience\"\"   \"\"Fruit of the Loom Boxers\"\""], [1783337630, 1783338298, "Robot Chicken", "Cracked China", "S2 E7", "Learn the secret of what Pikachu is up to inside his Poké Ball! Stupid kids get a new high from \"numb-chucking.\" A checkers champion goes on the adventure of a lifetime. Meet Eagle Eye Smith, the blind athlete who will touch your heart. Then meet the four \"My Little Ponys of the Apocalypse.\" The Golden Girls share their sexual escapades a la Sex and the City."], [1783338298, 1783338931, "Robot Chicken", "Rodiggity", "S2 E8", "The Senior Mutant Ninja Turtles rock the nursing home! Rick Schroder is fighting crime in style in his new hit series \"Rick Shaw\". Order your movie tickets from Fan-Dingo, the paper bags want you to. The cast of Final Fantasy VII get jobs at a burger chain, and Sephiroth makes Cloud work overtime. The Booger Man makes a mess. Bugs Bunny goes hip-hop in \"8 Carrot\" (along with Porky Pig, Elmer Fudd,"], [1783338931, 1783340162, "In Living Color", "Anton in the Burbs", "S2 E16", "Sketches include:\n\n\"\"Ejector Bed\"\"   \"\"Frenchie at a Bachelor Party\"\"   \"\"Lonny Parker, Attorney at Law\"\"   \"\"Les and Wes, Twin Stars\"\"   \"\"Anton in the Burbs\"\" / Leaders of the New School perform \"Case of the P.T.A.\""]]}, {"id": "80", "name": "I Heart 80s", "a": "i-heart-80s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/iheart80s-v2.png", "progs": [[1783245433, 1783246897, "Pee-wee's Playhouse", "Beauty Makeover", "S1 E6", "Miss Yvonne is willing to give a beauty makeover to the next person who steps into the playhouse, and it ends up being Mrs. Steve! Then, the Cowntess has a tea party. You'll have the \"time\" of your life!"], [1783246897, 1783248195, "The Goldbergs (2013)", "Call Me When You Get There", "S1 E7", "Barry is thrilled at the freedom offered by his new driver's license, until Beverly lays down her rules of the road. Pops resists wearing a Life Alert necklace and is forced to call Adam when he needs help."], [1783248195, 1783249484, "The Goldbergs (2013)", "The Kremps", "S1 E8", "Beverly invites the Kremps -- the all-American and seemingly perfect new neighbors -- over for a barbecue."], [1783249484, 1783250709, "The Wonder Years", "Episode 7", "S1 E7", "I Heart 80s"], [1783250709, 1783252185, "The Wonder Years", "Episode 8", "S1 E8", "I Heart 80s"], [1783252185, 1783253550, "Jem and the Holograms", "Starbright (2): Colliding Stars", "S2 E2", "Horrified at the news of Ba Nee's impending blindness, Jerrica learns from her doctor that there is an experimental laser surgical procedure that could save Ba Nee's vision. However, the cost of the surgery is a staggering $250,000. Having canceled all their tour dates to star in the movie, Aja hits on the idea to divert funds from Starlight Music to cover the cost. But when they arrive there, the"], [1783253550, 1783254915, "Jem and the Holograms", "Starbright (3): Rising Star", "S2 E3", "During a dangerous motorcycle scene for the movie, Kimber is caught in the middle of a series of explosions set off by Roxy and Clash, and is almost killed. Infuriated, Jem and the Holograms quit the production permanently, along with most of the crew who witnessed the accident. Jem rallies the crew to continue the movie, but with a new plot and title: Starbright, while the Misfits' demanding beha"], [1783254915, 1783256332, "Teenage Mutant Ninja Turtles", "Episode 7", "S1 E7", "I Heart 80s"], [1783256332, 1783257742, "Teenage Mutant Ninja Turtles", "Episode 8", "S1 E8", "I Heart 80s"], [1783257742, 1783259203, "Pee-wee's Playhouse", "Restaurant", "S1 E7", "Pee-wee is the maitre d', waiter and cashier while playing restaurant. Customer Captain Carl orders everything on the menu only to learn that all they have are peanut-butter-and-jelly sandwiches! Also, Dixie is having a particularly bad \"day.\""], [1783259203, 1783260667, "Pee-wee's Playhouse", "Ants In Your Pants", "S1 E8", "The ants are loose, the ants are loose! While Pee Wee is playing house with Miss Yvonne and the Playhouse Gang, the ants sneak out of their farm, go marching into the Dinosaur Family's home, steal a cake and get all over everybody and everything. \"\"What\"\" will Pee Wee do? The 'Ants In Your Pants Dance!"], [1783260667, 1783261966, "The Goldbergs (2013)", "Stop Arguing and Start Thanking", "S1 E9", "When Murray's brother, Marvin, visits, there is a surprise in store."], [1783261966, 1783263262, "The Goldbergs (2013)", "Shopping", "S1 E10", "When Erica starts working at a local department store, Beverly's bargain-hunting dreams come true; Adam and Barry go to the racetrack with Pops."], [1783263262, 1783265028, "The Wonder Years", "Episode 9", "S1 E9", "I Heart 80s"], [1783265028, 1783266323, "The Wonder Years", "Episode 10", "S1 E10", "I Heart 80s"], [1783266323, 1783267687, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783267687, 1783269053, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783269053, 1783270470, "Teenage Mutant Ninja Turtles", "Episode 9", "S1 E9", "I Heart 80s"], [1783270470, 1783271805, "Teenage Mutant Ninja Turtles", "Return of the Shredder", "S2 E1", "Just when the Turtles believe themselves rid of Shredder, tin-grin is able to persuade Krang to return him to Earth."], [1783271805, 1783273268, "Pee-wee's Playhouse", "Monster In the Playhouse", "S1 E9", "\"Look\" out because Mrs. Steve reports that there is a giant, one-eyed monster in town! He appears in the Playhouse, on the loose, and scares everyone! After Pee-wee makes the monster a snack, and Jambi grants Pee-wee's wish to understand the monster, the whole gang has a new friend! They even play a game of golf."], [1783273268, 1783274732, "Pee-wee's Playhouse", "The Cowboy and the Cowntess", "S1 E10", "The fabulous Miss Yvonne just asked Cowboy Curtis out for a date -- and now he's as nervous as a prairie critter who's just been...um, asked out for a date by Miss Yvonne! To calm Curtis down, Cowntess the Cow suggests a little \"\"date\"\" role-playing -- and suddenly Curtis finds himself with \"\"the most beautiful woman in Puppetland\"\" -- Pee Wee? \"\"Remember\"\" the secret word and you'll have a \"good\""], [1783274732, 1783276025, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783276025, 1783277320, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783277320, 1783278751, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783278751, 1783280177, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783280177, 1783281542, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783281542, 1783282908, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783282908, 1783284246, "Teenage Mutant Ninja Turtles", "The Incredible Shrinking Turtles", "S2 E2", "The turtles seek out the fragments of the eye of Sarnoth, a crystal with unimaginable power. After finding the first fragment, Shredder steals it and uses it to shrink the turtles. Now Splinter and April must intervene. April is able to enlarge the Turtles, but our heroes lose in the end as Shredder escapes with the first fragment."], [1783284246, 1783285584, "Teenage Mutant Ninja Turtles", "It Came from Beneath the Sewers", "S2 E3", "While the Turtles and April O'Neil scour the city for the Second Fragment of the Eye of Zarnov, Shredder sheepishly reports to Krang that he has lost the First Fragment."], [1783285584, 1783287047, "Pee-wee's Playhouse", "Stolen Apples", "S1 E11", "Randy steals Mrs. Steve's crummy crab apples from her tree, and Mrs. Steve needs Pee-wee's help in finding him. Then, Pee-wee plays the hands game with Tito, and \"there\" are enough apples for everyone at snack time."], [1783287047, 1783288511, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783288511, 1783289808, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783289808, 1783291106, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783291106, 1783292331, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783292331, 1783293807, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783293807, 1783295160, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783295160, 1783296512, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783296512, 1783297848, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783297848, 1783299180, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783299180, 1783300644, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783300644, 1783302106, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "I Heart 80s"], [1783302106, 1783303404, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783303404, 1783304698, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783304698, 1783305993, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783305993, 1783307361, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783307361, 1783308729, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783308729, 1783310064, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783310064, 1783311401, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783311401, 1783312739, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783312739, 1783314202, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "I Heart 80s"], [1783314202, 1783315665, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "I Heart 80s"], [1783315665, 1783316958, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783316958, 1783318253, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783318253, 1783319654, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783319654, 1783321056, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783321056, 1783322391, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783322391, 1783323727, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783323727, 1783325062, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783325062, 1783326397, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783326397, 1783327860, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "I Heart 80s"], [1783327860, 1783329324, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "I Heart 80s"], [1783329324, 1783330621, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783330621, 1783331918, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783331918, 1783333305, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783333305, 1783334699, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783334699, 1783335929, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783335929, 1783337268, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783337268, 1783338606, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783338606, 1783339942, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v1.png", "progs": [[1783244094, 1783246850, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783246850, 1783249605, "Beverly Hills, 90210", "Play It Again, David", "S2 E5", "Acting as a \"big brother\" to a 10-year-old boy, Brandon is asked to keep a secret that needs telling about his single mother's physical abuse. Meanwhile, Kelly fears a familial connection to David when his father, Mel, and her mother, Jackie, begin dating. So, Kelly becomes determined to keep them apart. Also, Brenda can't keep the absent Dylan from her thoughts while he is in Hawaii visiting his "], [1783249605, 1783252356, "Beverly Hills, 90210", "Pass/Not Pass", "S2 E6", "Chris, the acting teacher, asks Brenda to perform a scene with Andrea to bring her out of her shell. Brenda admits her crush on Chris to Andrea, who soon develops her own interest in him. The girls take Chris on a tour of the city, and Brenda is devastated when he seems more impressed with Andrea. Chris and Andrea share a good-night kiss. A jealous Brenda slaps Andrea hard during their scene. She "], [1783252356, 1783255111, "Beverly Hills, 90210", "Camping Trip", "S2 E7", "The gang takes off with plans to spend the weekend camping at Yosemite Park. A sudden monsoon forces the teens to seek refuge in a cramped one-bedroom cabin. Everyone quickly begins to get on each other's nerves. Steve and David go out for beer, but an elderly couple takes Steve's money and splits without buying him anything. The honeymooning couple in the next cabin supplies the kids with food an"], [1783255111, 1783257793, "Beverly Hills, 90210", "Wildfire", "S2 E8", "At the opening day of the new school year, Brenda becomes peeved when Dylan starts spending time with the new transfer student Emily Valentine, while she and Brandon also have eyes for each other. Meanwhile, David is reunited with Scott after he returns from his summer vacation in Oklahoma and finds that his friendship with David isn't as close as it used to be."], [1783257793, 1783260521, "Beverly Hills, 90210", "Ashes to Ashes", "S2 E9", "Brandon befriends a black family, the Ashes, which stirs up Beverly Hills when they move in near the Walshes. The siblings include Robby, a freshman photographer who volunteers to work at the Blaze, and his older sister whose boyfriend is roughed up by a racist security patrol. Meanwhile, Jim and Cindy try out a new \"state of the art\" house alarm system which is more of a nuisance than a help."], [1783260521, 1783263257, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783263257, 1783266006, "Beverly Hills, 90210", "Leading From the Heart", "S2 E11", "Brandon and Brenda's handicapped cousin, Bobby, visits the Walshes and a mutual attraction between him and Kelly is complicated more by others assumptions than by Bobby's wheelchair. Meanwhile, David tries asking Donna out on a date. Brenda finally gets her driver's license on the third try, but is hesitant to drive Brandon's car. Also, Emily joins the school newspaper just to be near Brandon."], [1783266006, 1783268760, "Beverly Hills, 90210", "Down and Out of District in Beverly Hills", "S2 E12", "Brandon submits one of Andrea's articles to a high school journalism contest. She wins the contest, but panics because a school district representative wants to conduct a home interview. Andrea asks her grandmother to say that she lives with her, but Rose does not want to play along. The school district initiates an investigation because they suspect that Andrea lives out of district. Andrea moves"], [1783268760, 1783271514, "Beverly Hills, 90210", "Halloween", "S2 E13", "Brenda, Dylan, Steve, Donna and Kelly attend a Halloween party. Donna dresses as a mermaid; but her fins inhibit dancing, walking, and trips to the bathroom. Kelly's seductive costume catches the eye of a college student. She goes upstairs to talk with him, then becomes uncomfortable. The guy accuses her of leading him on and tries to rape her. Brenda and Donna enter in the nick of time, and Steve"], [1783271514, 1783274270, "Beverly Hills, 90210", "The Next 50 Years", "S2 E14", "The students of West Beverly unearth a time capsule from 1941, and put together a capsule of their own. Mrs. Scanlon organizes a surprise party for Scott's birthday, and pushes David to round up the guests. Donna is the only person who wants to attend. Kelly, Steve, Brenda, Brandon and Emily reluctantly come to the party, but act like jerks and refuse to participate in the activities. David tries "], [1783274270, 1783277017, "Beverly Hills, 90210", "U4EA", "S2 E15", "Emily invites everyone to join her at an underground club. The location is a secret; the gang must exchange an egg at a convenience store for this information. The others leave without Steve and Andrea, who end up going to the wrong store and embarrassing themselves. Kelly is mortified when David drinks an entire bottle of whiskey, but Donna dance
