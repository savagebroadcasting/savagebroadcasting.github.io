const D = {"t0": 1783303968, "t1": 1783402665, "gen": 1783307621, "chans": [{"id": "1", "name": "The Silver Screen", "a": "the-silver-screen", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/silver-screen-v2.png", "progs": [[1783305756, 1783308889, "The Twilight Zone", "He's Alive", "S4 E4", "A tiny neo-Nazi organization struggles pathetically to succeed in a big city. A mysterious figure begins to ruthlessly guide a young, insecure U.S. Nazi leader, and the group begins to draw more attention."], [1783308889, 1783312021, "The Twilight Zone", "Mute", "S4 E5", "A 12-year-old girl who lost her parents in a fire doesn't speak because she has grown up in a secret telepathic community. The couple who take her in, and her teacher, are determined to help her adapt to their society, no matter the cost."], [1783312021, 1783315143, "The Twilight Zone", "Death Ship", "S4 E6", "A three-man spacecraft lands on a planet only to discover the wreckage of a spacecraft identical to their own. Two of the crew are convinced that they are dead, but the captain refuses to see the truth."], [1783315143, 1783318273, "The Twilight Zone", "Jess-Belle", "S4 E7", "Appalachian beauty Jess-Belle Stone can't bear to lose Billy Turner, the object of her desire, to local rich girl Ellie Glover, so she turns to local witch Granny Hart for assistance. The results bring unexpected and tragic consequences."], [1783318273, 1783321402, "The Twilight Zone", "Miniature", "S4 E8", "A lonely man falls in love with a mini museum doll, which he believes is alive."], [1783321402, 1783324532, "The Twilight Zone", "Printer's Devil", "S4 E9", "A wily old man, hired by a bankrupt newspaper editor, has the knack of predicting headline stories and claims to be the Devil."], [1783324532, 1783327665, "The Twilight Zone", "No Time Like the Past", "S4 E10", "A man travels back in time to try to prevent some of history's catastrophes."], [1783327665, 1783330795, "The Twilight Zone", "The Parallel", "S4 E11", "An astronaut blacks out while orbiting the earth and ends up in a parallel universe."], [1783330795, 1783333865, "The Twilight Zone", "I Dream of Genie", "S4 E12", "A wiseacre genie appears from a lamp to a meek man, George P. Hanley. Hanley is so used to bad luck, he imagines how each of three possible wishes could go very wrong - but the genie will grant him only one wish!"], [1783333865, 1783336999, "The Twilight Zone", "The New Exhibit", "S4 E13", "When Mr. Ferguson decides to close his wax museum, his employee Martin Lombard Senescue fights to preserve figures of famous murderers and store them in his home basement, a decision that does not sit well with his wife Emma."], [1783336999, 1783340128, "The Twilight Zone", "Of Late I Think of Cliffordville", "S4 E14", "A bored, wealthy businessman gets a chance to go back in time and start over, armed with all the knowledge he's acquired...an arsenal that's not as powerful as he thinks."], [1783340128, 1783343197, "The Twilight Zone", "The Incredible World of Horace Ford", "S4 E15", "Toymaker Horace Ford is increasingly preoccupied with memories of his childhood, endangering his job and marriage - but a visit to his old neighborhood brings a haunting encounter, suggesting the time was not as idyllic as he remembers."], [1783343197, 1783346330, "The Twilight Zone", "On Thursday We Leave for Home", "S4 E16", "The Pilgrim I, the first-ever human space colony, is about to be rescued from Planet V9-Gamma where they've lived for three decades. Their leader William Benteen has trouble accepting that big changes are coming in their lives."], [1783346330, 1783349399, "The Twilight Zone", "Passage on the Lady Anne", "S4 E17", "A young American couple, the Ransomes, who are trying to salvage their troubled marriage, insist on booking passage on an old trans-Atlantic cruise liner. But other passengers try to persuade them to disembark immediately."], [1783349399, 1783352467, "The Twilight Zone", "The Bard", "S4 E18", "Julius Moomer, a talentless, but relentless, self-promoting hack who dreams of becoming a successful television writer, uses a book of magic to summon William Shakespeare to write dramatic teleplays that Moomer will pass off as his own. Shakespeare becomes irritated by Moomer's lack of appreciation and is even more appalled when he discovers the changes wrought on his plays by cynical television e"], [1783352467, 1783354004, "The Twilight Zone", "In Praise of Pip", "S5 E1", "Wearied bookie Max Phillips, learning of his grown soldier son Pip getting wounded during combat in South Vietnam, gets to spend one last delightful hour with a ten-year-old version of Pip at an amusement park after dark."], [1783354004, 1783355514, "The Twilight Zone", "Steel", "S5 E2", "In 1974, boxing has been outlawed and is performed by robots. With his possibly last fight approaching and his outmoded robot Maxo in need of major repair, manager Steel Kelly resorts to a desperate gamble in Maynard, Kansas."], [1783355514, 1783357050, "The Twilight Zone", "Nightmare at 20,000 Feet", "S5 E3", "A man, newly recovered from a nervous breakdown, becomes convinced that a monster only he sees is damaging the plane he's flying in."], [1783357050, 1783358584, "The Twilight Zone", "A Kind of a Stopwatch", "S5 E4", "Long-winded bachelor Patrick Thomas McNulty loses his job in Mr. Cooper's garment factory, visits his favorite local tavern, converses with a stranger, and is inexplicably given a stopwatch that halts time."], [1783358584, 1783360119, "The Twilight Zone", "The Last Night of a Jockey", "S5 E5", "Barred from the track for life, crooked jockey Grady boozily expresses the wish to escape his sordid surroundings and become a truly \"big man.\" His wish is granted by his lookalike alter ego, but there's a heavy price to be paid at fadeout time."], [1783360119, 1783361655, "The Twilight Zone", "Living Doll", "S5 E6", "Erich is displeased when his wife buys an expensive doll for his step-daughter.  He becomes even more displeased when the doll tells him it doesn't like him!"], [1783361655, 1783363190, "The Twilight Zone", "The Old Man in the Cave", "S5 E7", "In a post-apocalyptic settlement in 1974, the inhabitants' survival depends on the advice of an unseen man living in a nearby cave. This dependence is tested when soldiers descends on their town, led by the violent Major French."], [1783363190, 1783364725, "The Twilight Zone", "Uncle Simon", "S5 E8", "Barbara Polk takes care of her elderly and mean-spirited uncle Simon. He is a scientist who spends much of his time in his basement laboratory but when he's not there, he seems to take great pleasure in demeaning his niece. She can't wait for him to die and doesn't hesitate to tell him so. When he does die, things are... not quite what she expected."], [1783364725, 1783366256, "The Twilight Zone", "Probe 7, Over and Out", "S5 E9", "The lone survivors of two annihilated worlds are stranded on a distant planet."], [1783366256, 1783367793, "The Twilight Zone", "The 7th Is Made Up of Phantoms", "S5 E10", "A modern day National Guard unit find themselves in the middle of Custer's Last Stand at the Battle of Little Big Horn."], [1783367793, 1783369327, "The Twilight Zone", "A Short Drink from a Certain Fountain", "S5 E11", "Aging Harmon Gordon convinces his brother Dr. Raymond Gordon to inject him with an experimental youth serum so that Harmon will have sufficient energy to keep up with his much younger gold-digging wife Flora."], [1783369327, 1783370861, "The Twilight Zone", "Ninety Years Without Slumbering", "S5 E12", "Sam Forstman is an old man who lives with his granddaughter Marnie Kirk and her husband Doug. Sam lives a simple life and doesn't sleep much anymore. He's usually up at all hours tinkering on his grandfather clock, something that worries Marnie as his attention to the timepiece verges on the obsessive. The reason for that, however, is quite simple: he is convinced that should the clock ever stop, "], [1783370861, 1783372396, "The Twilight Zone", "Ring-a-Ding Girl", "S5 E13", "While flying across the country en route to a film shoot in Rome, movie star Barbara \"Bunny\" Blake receives a gift from her hometown fans in Howardville: a ring which is giving her warnings to come home."], [1783372396, 1783373903, "The Twilight Zone", "You Drive", "S5 E14", "After causing a hit-and-run motor vehicle accident that killed a bike-riding child, then letting his co-worker Pete Radcliffe take the blame, office manager Oliver Pope is relentlessly haunted by his suddenly aggressive car."], [1783373903, 1783375438, "The Twilight Zone", "The Long Morrow", "S5 E15", "Before leaving on a decades-long solo mission into deep space, astronaut Douglas Stansfield meets attractive Space Agency employee Sandra Horn, and they both fall deeply in love. But what kind of a future can there be for them?"], [1783375438, 1783376974, "The Twilight Zone", "The Self-Improvement of Salvadore Ross", "S5 E16", "Salvatore Ross can trade physical characteristics with other people and will use this talent to do anything to gain both the love of his former social worker Leah Maitland and the approval of her disabled father."], [1783376974, 1783378512, "The Twilight Zone", "Number 12 Looks Just Like You", "S5 E17", "In a future society, everyone must undergo an operation at age 19 to become beautiful and conform to society. Since her father killed himself after his surgery, 18-year-old Marilyn Cubberle desperately wants to hold on to her identity."], [1783378512, 1783380048, "The Twilight Zone", "Black Leather Jackets", "S5 E18", "Leather-jacket-wearing, motorcycle-riding male aliens Scott, Steve, and Fred invade a peaceful neighborhood, where Scott develops a romance with teenage neighbor Ellen Tillman and upsets both his two comrades and Ellen's father Stu."], [1783380048, 1783381558, "The Twilight Zone", "Night Call", "S5 E19", "An elderly, wheelchair-bound lady receives strange anonymous phone calls in the middle of the night."], [1783381558, 1783383094, "The Twilight Zone", "From Agnes – With Love", "S5 E20", "Computer technician James Elwood unwisely takes advice for his love life from Agnes, the computer in his office. He then uses this advice to begin a romance with his attractive young co-worker Millie Randall."], [1783383094, 1783384615, "The Twilight Zone", "Spur of the Moment", "S5 E21", "Heiress Ann Henderson is terrorized by a middle-aged woman as her wedding day approaches with young stockbroker Robert Blake. Should she instead marry her former fiance David Mitchell, whom her parents despise?"], [1783384615, 1783386156, "The Twilight Zone", "An Occurrence at Owl Creek Bridge", "S5 E22", "During the American Civil War, Union troops are about to hang a man, a Southerner, from the Owl Creek bridge. As he goes over the side with the noose around his neck the rope breaks and he manages to unbind his hands and feet. As he swims downstream, he has images of home and his lovely wife. He also manages to evade the troops who are trying to stop him. Just as he reaches his destination however"], [1783386156, 1783387691, "The Twilight Zone", "Queen of the Nile", "S5 E23", "A columnist interviews a famous movie actress who has a secret to her eternal beauty."], [1783387691, 1783389223, "The Twilight Zone", "What's in the Box", "S5 E24", "Taxi driver Joe Britt usually makes his way home to his wife Phyllis but theirs is not a happy marriage as they constantly bicker and she accuses him of having a girlfriend. The obnoxious Joe is having his TV fixed but after the repairman leaves, Joe sees himself with his girlfriend in scenes from the recent past. Soon after, he has a glimpse of what will happen in the near future."], [1783389223, 1783390759, "The Twilight Zone", "The Masks", "S5 E25", "Dying millionaire Jason Foster invites his greedy Boston heirs to a Mardi Gras party where they must wear the masks he had custom-made for them - or else be cut off from their considerably large inheritance."], [1783390759, 1783392295, "The Twilight Zone", "I Am the Night - Color Me Black", "S5 E26", "On the day an unpopular idealist is to be executed for the killing of a racist bully, the townsfolk are shocked to see the skies have turned pitch black."], [1783392295, 1783393822, "The Twilight Zone", "Sounds and Silences", "S5 E27", "Retired Navy man and current model ship manufacturing company owner Roswell Flemington enjoys loud noises, is an annoyance to others, drives his wife to leave him, and is suitably punished with a full dose of irony."], [1783393822, 1783395357, "The Twilight Zone", "Caesar and Me", "S5 E28", "Ventriloquist Jonathan West isn't having much luck finding a job. He's gone to several auditions but no one has taken him on. He's falling behind in his rent and is now getting to the point where he's running out of things to pawn. He has to put up with the taunts of young Susan, the landlady's niece. He's also talking to his dummy, Caesar, who has advice for him on how to get ahead. It's not very"], [1783395357, 1783396892, "The Twilight Zone", "The Jeopardy Room", "S5 E29", "Russian defector Ivan Kuchenko is trapped in a hotel room and given three hours to locate a hidden bomb, hidden there by Commissar Vassiloff, who aspires to turn Ivan's proposed execution into an art form."], [1783396892, 1783398401, "The Twilight Zone", "Stopover in a Quiet Town", "S5 E30", "The morning after a wild night of partying, a hungover married couple awaken in an unfamiliar and artificial place."], [1783398401, 1783399935, "The Twilight Zone", "The Encounter", "S5 E31", "A World War II veteran and a Japanese-American gardener battle each other over a war that ended more than 20 years ago."], [1783399935, 1783401469, "The Twilight Zone", "Mr. Garrity and the Graves", "S5 E32", "In 1890, traveling salesman Jared Garrity visits the town of Happiness, Arizona offering to resurrect the dead and reunite the townsfolk wit out the true nature of his mission."], [1783312369, 1783313921, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."], [1783313921, 1783315488, "The Twilight Zone", "A Passage for Trumpet", "S1 E32", "Musician Joey Crown is down on his luck. An alcoholic, he can't find work because no one trusts him. Broke, he hocks his trumpet but then steps in front of truck which knocks him onto the sidewalk. He awakens in a strange world where no one can see him and he presumes that he has died. He eventually bumps into someone who can in fact see him, a fellow horn player who tells him that it's still with"], [1783315488, 1783318316, "Quantum Leap", "The Leap Home (1)", "S3 E1", "Sam leaps into himself as a 16-year-old boy to help his high school basketball team win the championship. He also tries to help the other members of his family including his father who died from smoking, his brother who was killed in Vietnam and his sister who married an abusive alcoholic."], [1783318316, 1783321122, "Quantum Leap", "The Leap Home (2): Vietnam", "S3 E2", "April 7, 1970: As a Navy SEAL in his own brother's squad, Sam must determine whether he is there to save Tom's life or ensure the success of the mission on which his brother was killed. Also Al from 1970 was a P.O.W."], [1783321122, 1783322678, "The Twilight Zone", "Mr. Bevis", "S1 E33", "After losing his job, his car and his apartment on the same day, an eccentric loser gets a new lease on life from his guardian angel, but there is a price for keeping it."], [1783322678, 1783324232, "The Twilight Zone", "The After Hours", "S1 E34", "Puzzled and unsettled by the odd behavior of the salespeople, a woman discovers that the floor of a department store, on which she bought a gold thimble, doesn't exist."], [1783324232, 1783326951, "Quantum Leap", "Leap of Faith", "S3 E3", "August 19, 1963: Sam finds himself in one holy mess as a priest in Philadelphia, trying to help an alcoholic priest deal with a killer and the death of a young parishioner."], [1783326951, 1783329814, "Quantum Leap", "One Strobe Over the Line", "S3 E4", "June 15, 1965: Sam is a photographer who must protect a fashion model from a growing dependency on amphetamines and a predatory manager's ambitions."], [1783329814, 1783331366, "The Twilight Zone", "The Mighty Casey", "S1 E35", "A baseball manager takes his team to the championships thanks to a robot pitcher."], [1783331366, 1783332885, "The Twilight Zone", "A World of His Own", "S1 E36", "Coming home, Victoria catches her husband Gregory flirting with a beautiful woman in his study. His explanation that characters come to life before his eyes when he speaks into his dictation machine, leads Victoria to question his sanity."], [1783332885, 1783335703, "Quantum Leap", "The Boogieman", "S3 E5", "October 31, 1964: Things do more than go bump in the night when Sam leaps into Joshua Raye, a horror novelist on Halloween. Although Ziggy claims he's there to prevent the death of a church deacon, things get even stranger when two more people die without warning."], [1783335703, 1783338491, "Quantum Leap", "Miss Deep South", "S3 E6", "June 7, 1958: As Darlene Monte, a contestant in the \"Miss Deep South\" beauty pageant, Sam must come to the aid of an innocent contender who faces disgrace when she poses for naughty pictures taken by a sleazy pageant photographer. As if things weren't bad enough, Sam must ensure that Darlene finishes third, so that she'll go on to become a doctor."], [1783338491, 1783340044, "The Twilight Zone", "King Nine Will Not Return", "S2 E1", "The pilot of a downed B-25, Capt. James Embry, awakens in the desert, with no memory of how he got there. More worrisome, his crew is nowhere to be found. He begins to wonder if he's hallucinating, especially after he sees one of his men sitting in the cockpit. When he awakens in hospital, he thinks it might have all been a dream, but wonders: did any of this really happen?"], [1783340044, 1783341597, "The Twilight Zone", "The Man in the Bottle", "S2 E2", "A luckless couple stumbles upon fortune when a genie materializes from a bottle in their antique shop. The genie grants them four wishes but warns them, prophetically, to be careful what you wish for."], [1783341597, 1783344387, "Quantum Leap", "Black on White on Fire", "S3 E7", "August 11, 1965: Sam leaps into a black med. student engaged to a white woman in order to ensure that he and his fiancée survive the Watts Riot together."], [1783344387, 1783347232, "Quantum Leap", "The Great Spontini", "S3 E8", "May 9, 1974: Leaping into magician Harry Spontini, Sam has to prevent his estranged wife from taking their daughter away from him as she files for divorce, so she can marry her sleazy divorce attorney."], [1783347232, 1783348785, "The Twilight Zone", "Nervous Man in a Four Dollar Room", "S2 E3", "Ordered to commit a murder he doesn't want to perform, a smalltime hood nervously looks in the mirror and sees the man he could have been--confident, strong...and determined to get out."], [1783348785, 1783350336, "The Twilight Zone", "A Thing About Machines", "S2 E4", "Bartlett Finchley is an odd man, a writer who contributes to food magazines and the like. He lives alone and is always it seems in need of a repairman for one piece of household equipment or another. As time has gone by, he seems to be in a constant battle with machines - his typewriter, his television - which all have the same message for him: get out of the house. He has no intention of doing so"], [1783350336, 1783353121, "Quantum Leap", "Rebel without a Clue", "S3 E9", "September 1, 1958: As \"Bones,\" a member of a motorcycle gang, Sam is an uneasy rider who has to prevent a Jack Kerouac-inspired young woman from meeting her death on the road."], [1783353121, 1783355967, "Quantum Leap", "A Little Miracle", "S3 E10", "December 24, 1962: On Christmas Eve, Sam leap into Reginald Pierson, valet to a wealthy contractor, who is in danger of losing his soul in an attempt to demolish a Salvation Army mission, so he can build his \"Blake's Plaza.\" Seeing a similarity to the Dickens's character, Sam and Al decide to \"Scrooge\" the greed out of the man."], [1783355967, 1783357521, "The Twilight Zone", "The Howling Man", "S2 E5", "Seeking refuge from a storm, a traveler comes upon a bizarre abbey of monks, who have imprisoned a man who begs for his help. When he confronts the head monk, he is told that the man is the Devil, and he must decide whom to believe."], [1783357521, 1783359077, "The Twilight Zone", "Eye of the Beholder", "S2 E6", "A young woman lying in a hospital bed awaits the outcome of an experimental treatment in an attempt to make her look normal."], [1783359077, 1783361865, "Quantum Leap", "Runaway", "S3 E11", "July 4, 1964: On a cross-country car trip, Sam, as 13-year-old Butchie, must contend with a sadistic older sister and a mother on the verge of running away from an unfulfilling marriage, in search of the feminine mystique."], [1783361865, 1783364748, "Quantum Leap", "8½ Months", "S3 E12", "November 15, 1955: Billie Jean Crockett is a pregnant teenager who will make the second biggest mistake of her life - giving her baby up for adoption - unless Sam, as Billie Jean, can convince someone to help her raise her child... before he goes into labor himself"], [1783364748, 1783366267, "The Twilight Zone", "Nick of Time", "S2 E7", "A superstitious newlywed becomes obsessed by a penny fortune-telling machine when he and his new wife are stranded with car trouble."], [1783366267, 1783367835, "The Twilight Zone", "The Lateness of the Hour", "S2 E8", "Jana Loren is an attractive young woman who lives at home with her parents. She feels suffocated living there however, surrounded by their many servants - that are in fact human-looking robots created by her inventor father. Her parents are quite happy with the life they lead but realize that they're going to have to do something about the rebellious Jana, including revealing at least one secret t"], [1783367835, 1783370721, "Quantum Leap", "Future Boy", "S3 E13", "October 6, 1957: Sam leaps Kenny Sharp, better known as \"Future Boy,\" sidekick to Moe Stein, host of the kid's show, \"Time Patrol,\" who also happens to be building a time machine in his basement. Unless Sam can prevent Moe's daughter from attempting to have her father committed, Moe is destined to be killed as he tries to hop a freight train."], [1783370721, 1783373605, "Quantum Leap", "Private Dancer", "S3 E14", "October 6, 1979: An aspiring dancer working as a waitress in a strip club is in danger of being led into a life of prostitution unless Sam, as \"Rod the Bod,\" can convince her to audition for a spot in a professional dance group. But, since she's deaf, the choreographer doesn't believe she has the time to give the young lady the attention she'll need."], [1783373605, 1783375159, "The Twilight Zone", "The Trouble with Templeton", "S2 E9", "Booth Templeton is an aging actor who longs for the old days when his wife was alive.  Miraculously, he is given a sobering glimpse of the past he holds so dear."], [1783375159, 1783376713, "The Twilight Zone", "A Most Unusual Camera", "S2 E10", "Married couple Chester and Paula have broken into and robbed a curio shop, hoping to sell the loot for a handsome sum of money. Unfortunately, all of it turns out to be junk or fakes. All, that is, save for a mysterious camera. When they try taking a picture, it turns out to be from five minutes into the future. Soon Paula's brother Woodward joins them and the three decide to use the camera at a h"], [1783376713, 1783379537, "Quantum Leap", "Piano Man", "S3 E15", "November 10, 1985: Joey Dinardo is a lounge lizard on the run from mob hitmen. When Sam leaps in, his ex-girlfriend, and former musical partner have found him, and now both are on a run for their lives from a killer who seems to know their every move."], [1783379537, 1783382392, "Quantum Leap", "Southern Comforts", "S3 E16", "August 4, 1961: It's the best little cathouse in New Orleans. No, it's the Gilbert Labonte Sewin' & Quiltin' Academy. As the proprietor of this worthy establishment, Sam must prevent the mysterious death of a resident who doesn't belong there."], [1783382392, 1783383908, "The Twilight Zone", "The Night of the Meek", "S2 E11", "A down-on-his-luck department store Santa Claus discovers a bottomless sack of toys."], [1783383908, 1783385463, "The Twilight Zone", "Dust", "S2 E12", "On a hot day, sympathetic Sheriff Koch and callous con man Peter Sykes are among the many who gather in a desert town to see young Luis Gallegos hanged for accidentally killing a child while drunk. Can some magic dust save Luis?"], [1783385463, 1783388347, "Quantum Leap", "Glitter Rock", "S3 E17", "April 12, 1974: Sam is a glitter rock star in danger of being stabbed to death after a performance, unless Sam can determine who, from a growing list of people, the real killer is."], [1783388347, 1783391231, "Quantum Leap", "A Hunting We Will Go", "S3 E18", "June 18, 1976: It's the leap from hell as Sam, a bounty hunter handcuffed to a wily embezzler who will stop at nothing to get away from him, has to deal with his captive, as well as his attraction towards her, despite her countless attacks on him."], [1783391231, 1783392785, "The Twilight Zone", "Back There", "S2 E13", "It's April 14, 1961. Peter Corrigan and friends are discussing time travel at their men's club. Corrigan suddenly becomes dizzy. When his head clears, he has moved back to April 14, 1865 - the date of Lincoln's assassination."], [1783392785, 1783394336, "The Twilight Zone", "The Whole Truth", "S2 E14", "A peculiar Model A automobile compels a used car dealer to tell only the truth."], [1783394336, 1783397160, "Quantum Leap", "Last Dance Before an Execution", "S3 E19", "May 12, 1971: \"Just think of someplace far away\" is the advice Sam hears as he leaps into Jesus Ortega, a Cuban-American being strapped into an electric chair. A last second stay of execution gives Sam just forty-eight hours to either prove himself innocent or fulfill his mission so that he can leap before the Big Switch is pulled"], [1783397160, 1783400043, "Quantum Leap", "Heart of a Champion", "S3 E20", "July 23, 1955: The heart of a champion belongs to Ronnie, a professional wrestler, who will die if he competes in the title match. Sam, as his brother and new partner Terry, must convince him of his hidden health problem, while avoiding his own health problem - the jealous wrestler-husband of a woman who has taken an amorous interest in Sam."], [1783400043, 1783401597, "The Twilight Zone", "The Invaders", "S2 E15", "An old woman who lives alone in a ramshackle farm house comes face to face with alien invaders. She hears something on her roof and then finds a flying saucer, perhaps six or seven feet across from which emerges two small robots. She fights them as best she can and eventually succeeds in destroying their ship. The nature of the invaders however is not immediately obvious however."]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783306755, 1783307972, "Power Rangers", "The Spit Flower", "S1 E23", "Rita and her evil Spit Flower monster set out to ruin Kimberly's design for a float in the world peace parade."], [1783307972, 1783309168, "Power Rangers", "Itsy Bitsy Spider", "S1 E24", "Zack must overcome his fear of spiders to face Rita's newest monster."], [1783309168, 1783310501, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783310501, 1783311833, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783311833, 1783312955, "Pee-wee's Playhouse", "Episode 23", "S1 E23", "Saturday Morning"], [1783312955, 1783314418, "Pee-wee's Playhouse", "Episode 24", "S1 E24", "Saturday Morning"], [1783314418, 1783315758, "Teenage Mutant Ninja Turtles", "Attack of the 50-Foot Irma", "S3 E3", "Irma accidentally becomes gigantic and her naturally clumsy nature makes her a danger to the city."], [1783315758, 1783317096, "Teenage Mutant Ninja Turtles", "The Maltese Hamster", "S3 E4", "Gangsters are swiping all the antiques in town. And when they swipe most of our heroes, it's up to Donatello and April to find out why. Could Shredder be behind this?"], [1783317096, 1783318313, "Power Rangers", "Life's a Masquerade", "S1 E25", "Rita's Frankenstein monster crashes the Power Rangers' Halloween costume party."], [1783318313, 1783319514, "Power Rangers", "Gung Ho!", "S1 E26", "Jason and Tommy must learn to work together to stop Rita's Super Putties."], [1783319514, 1783320850, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783320850, 1783322218, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783322218, 1783324008, "Pee-wee's Playhouse", "Episode 25", "S1 E25", "Saturday Morning"], [1783324008, 1783325407, "Pee-wee's Playhouse", "Open House", "S2 E1", "Today in the \"Playhouse,\" Pee-wee tricks his friends into doing all of his chores by pretending that work is fun. The gang meets some new friends while renovating the \"house.\" Reba arrives in time to deliver Clocky while the Playhouse gang uncovers Floory and meets Mrs. Rene for the first time."], [1783325407, 1783326744, "Teenage Mutant Ninja Turtles", "Sky Turtles", "S3 E5", "The Turtles go flying when the Shredder invents a gravity-altering device."], [1783326744, 1783328079, "Teenage Mutant Ninja Turtles", "The Old Switcheroo", "S3 E6", "The personalities of Shredder and Splinter are switched when a device is accidentally activated during a battle between the Turtles and their enemies. As Shredder plans the Turtles' demise and Splinter plans on how to get back to his body, everyone else is clueless."], [1783328079, 1783329251, "Power Rangers", "Wheel of Misfortune", "S1 E27", "Rita turns Kimberly's grandmother's spinning wheel into her dangerous new weapon."], [1783329251, 1783330470, "Power Rangers", "Island of Illusion (1)", "S1 E28", "Rita traps the Power Rangers on the Island of Illusion, where their greatest fears can destroy them."], [1783330470, 1783331772, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783331772, 1783333138, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783333138, 1783334536, "Pee-wee's Playhouse", "Puppy In the Playhouse", "S2 E2", "Cowntess, just back from a world cruise, is showing some of her home movies from the trip. Globey teaches Pee-wee how to say \"hello, my name is Pee-wee\" in French and Chinese! When a lost puppy appears at the Playhouse door, no one can figure out who the owner is. Pee-wee develops a strong case of puppy love and decides to keep him and name him Aloysius. However, Reba comes \"over,\" and it's obviou"], [1783334536, 1783335928, "Pee-wee's Playhouse", "Store", "S2 E3", "Pee-wee and Cowboy Curtis take a leap into Magic Screen where they enjoy some mighty fine handcart ridin' until a train chases them back into the waiting arms of Chairry! Then, Cowboy Curtis sings a song with \"more\" of the secret word in it than you could scream at. Finally, Cowboy Curtis and Miss Yvonne go shopping at Pee-wee's \"department store\" where they decide to buy Chairry!"], [1783335928, 1783337266, "Teenage Mutant Ninja Turtles", "Burne's Blues", "S3 E7", "In the middle of a summer heat wave, someone is destroying all the air conditioners and taking all the city's freon. In the meantime, Vernon and Burne go looking for the Turtles, but find something else."], [1783337266, 1783338606, "Teenage Mutant Ninja Turtles", "The Fifth Turtle", "S3 E8", "A 14-year-old boy tries his best to help out the Turtles, but with some not so optimal results."], [1783338606, 1783339793, "Power Rangers", "Island of Illusion (2)", "S1 E29", "The Rangers must overcome their own fears to escape Rita's Island of Illusion."], [1783339793, 1783340973, "Power Rangers", "The Rockstar", "S1 E30", "Jason and his cousin Jeremy find a map that leads to a powerful ancient mirror."], [1783340973, 1783342339, "Jem and the Holograms", "Scandal", "S3 E3", "The Holograms, the Misfits, and Shawn Harrison (the British teen idol Kimber met in The World Hunger Shindig, and has asked her to write a song for him to perform) are all in Venice Beach. The Holograms are supposed to go on Harriet Horne's show, which is a famous celebrity gossip show. While the Holograms think they are not much to gossip about, Jetta steals Kimber's diary and publishes it. Tablo"], [1783342339, 1783343706, "Jem and the Holograms", "One Jem Too Many", "S3 E4", "Jerrica, stressed-out from dealing with tax forms and problems with the Starlight record company and home for girls, gets into trouble with a nasty tempered Jem impersonator, who turns out to be Clash disguised in one of The Misfits' plots to ruin Jem."], [1783343706, 1783345095, "Pee-wee's Playhouse", "Pee-wee Catches a Cold", "S2 E4", "Today the secret word is \"out,\" but Pee-wee is stuck in when he overdoes it and comes down with a cold! It's lovely Nurse Yvonne and ultra-health conscious Ricardo to the rescue with some good advice and chicken soup for their sick and cranky friend. In no time, Pee-wee's back to his old self again to join in the Playhouse fun."], [1783345095, 1783346480, "Pee-wee's Playhouse", "Why Wasn't I Invited?", "S2 E5", "Nothing bugs Pee-wee's flowers more than having a caterpillar in their flower box until Magic Screen shows how a caterpillar can turn itself into a beautiful butterfly. The caterpillar's not the only uninvited creature around when Cowntess has a birthday party and invites practically \"all\" of Puppetland except Pee-wee! Is she mad at him or just being moody?"], [1783346480, 1783347819, "Teenage Mutant Ninja Turtles", "Enter: The Rat King", "S3 E9", "Thompson assigns April to research the growing rat infestation. She is pursued by an army of rats and escapes on a passing city bus."], [1783347819, 1783349157, "Teenage Mutant Ninja Turtles", "Turtles at the Earth's Core", "S3 E10", "After witnessing a living dinosaur wander in the city and disappear abruptly, the Turtles follow its tracks into a large hole, where they discover a shocking revelation: A land frozen in a stage where dinosaurs roam the land."], [1783349157, 1783350373, "Power Rangers", "Calamity Kimberly", "S1 E31", "Poor Kimberly is having possibly the worst day of her life as she encounters misfortune after misfortune. Tommy tries to make her feel better and things are looking up, until Rita makes Kimberly's day go from bad to worse and Tommy is injured while trying to save her. The four remaining rangers race against time to rescue Kimberly before she is gone for good."], [1783350373, 1783351510, "Power Rangers", "A Star is Born", "S1 E32", "Tommy eagerly auditions for a karate commercial especially when he sees that he's up against a clueless Bulk. Meanwhile, the rest of the rangers are enjoying a day at the beach.....until Scorpina crashes the party and traps them in a cocoon from which they can't seem to escape. To make matters worse, no one can contact Tommy since he took off his communicator!"], [1783351510, 1783352875, "Jem and the Holograms", "The Bands Break Up", "S3 E5", "Upset with the way their bands treat them, Kimber and Stormer quit and join forces. They are extremely popular and try to release an album, but they soon realize Eric Raymond is using them to get back his half of Starlight Music."], [1783352875, 1783354241, "Jem and the Holograms", "The Fan", "S3 E6", "Jem is kidnapped by a rich fan with help of The Misfits and taken to a copy of Starlight Mansion with actors playing her friends in an attempt to find out her real identity."], [1783354241, 1783355630, "Pee-wee's Playhouse", "Tons of Fun", "S2 E6", "Today, Pee-wee gives everybody \"That Certain Feeling\" by lip-synching to one of his old records. Later, while Pee-wee is out with the Playhouse Gang, Cowboy Curtis comes over and sings to the flowers, and Miss Yvonne does a wild clog dance. Tensions mount when the gang ends up with two \"cool\" ice cream desserts, and they have to choose which to eat. Of course, they could just eat them both!"], [1783355630, 1783357018, "Pee-wee's Playhouse", "School", "S2 E7", "Learning is \"easy\" when your teacher makes it fun. No one can make it more fun than Pee-wee, especially when he turns the Playhouse into a schoolhouse! The Playhouse Gang are his students, Magic Screen is his blackboard, and Globey is, well, his globe. Pee-wee makes history exciting when he teaches about Christopher Columbus and the Declaration of Independence. Sit back, laugh, and learn!"], [1783357018, 1783358357, "Teenage Mutant Ninja Turtles", "April Fool", "S3 E11", "Emperor Aleister of Malicuria comes to New York City, bringing along a shard of Lydium 90 to the USA."], [1783358357, 1783359697, "Teenage Mutant Ninja Turtles", "Attack of the Big MACC", "S3 E12", "A robot warrior, known as the Mobile Armored Computerized Combatant (M.A.C.C.), arrives from 400 years in the future in 20th-Century New York. He befriends the Turtles, but Shredder and Krang are looking to bring him to their side, at any means necessary."], [1783359697, 1783360914, "Power Rangers", "The Yolk's on You!", "S1 E33", "With the Angel Grove High talent show around the corner, the Rangers have a lot to deal with when Tommy is kidnapped and imprisoned by putties, and Finster creates the Fang monster in celebration of Rita's birthday."], [1783360914, 1783362074, "Power Rangers", "The Green Candle (1)", "S1 E34", "Tommy's nervous about asking Kimberly to the dance but goes for it anyway. Before he can, the Putties transport him to another dimension where a green candle that's linked to his powers is lit. He discovers that when the candle burns out, his powers will go back to Rita! Tommy manages to escape but without the candle, which is still burning."], [1783362074, 1783363439, "Jem and the Holograms", "Fathers' Day", "S3 E7", "It's Fathers' Day! Kimber has a bad time, trying to remembering her late father, but learns to cope after having a talk with Pizzazz's father as he has his own problems with his daughter. Also, The Holograms and Misfits visit Clash and Video's hometown for a Father's day banquet."], [1783363439, 1783364805, "Jem and the Holograms", "Treasure Hunt", "S3 E8", "The Starlight Girls compete with Misfits-in-Training in a treasure hunt for literacy. In the end, they learn that knowledge is the greatest prize of all."], [1783364805, 1783366194, "Pee-wee's Playhouse", "Spring", "S2 E8", "As the Spring season comes to \"begin,\" Pee-wee plants a seed, and it grows quickly (courtesy of Clockey). Also, the King of Cartoons presents his wife, \"The Queen of Cartoons,\" and his son, \"The Prince of Cartoons.\" Also, when Pee-wee doesn't make the baseball team, Ricardo shows him that there are other sports he can try."], [1783366194, 1783367582, "Pee-wee's Playhouse", "Playhouse In Outer Space", "S2 E9", "Aaaaugh! The secret word is \"zyzzybalubah,\" and that can only mean one thing! The entire Playhouse, including Reba, is sucked into space, transported to a strange planet, and taken over by an odd, lonely alien! Yvona, an alien from the planet, is trying to escape the unfriendly Zyzzybalubah, but Pee-wee teaches him how to be polite and make friends. Reba teaches Pee-wee how to whistle, and she sin"], [1783367582, 1783368913, "Teenage Mutant Ninja Turtles", "The Turtle Terminator", "S3 E37", "Irma is kidnapped by Bebop and Rocksteady and is replaced by a robot that looks just like her that is programmed to eliminate the turtles."], [1783368913, 1783370241, "Teenage Mutant Ninja Turtles", "The Great Boldini", "S3 E38", "The Turtles must clear their names when they are believed to be jewel thieves who stole a priceless emerald during a magic act run by a wizard named Boldini."], [1783370241, 1783371400, "Power Rangers", "The Green Candle (2)", "S1 E35", "As Jason journeys to the dimensional prison to stop the green candle from burning out, Tommy battles the Cyclops with the Dragonzord."], [1783371400, 1783372620, "Power Rangers", "Birds of a Feather", "S1 E36", "While Zack trains a young student for a karate tournament, Rita sends her Hatchasaurus monster down to Earth."], [1783372620, 1783373794, "Jem and the Holograms", "Aztec Enchantment", "S3 E9", "The Misfits join up with Clash, who was just given a video camera by her father, and hit Mexico to ruin Jem and the Holograms' new music video directed by Video at the ruins of an ancient Aztec temple. Also the Holograms befriend a poor young boy who wants to go to the United States."], [1783373794, 1783375160, "Jem and the Holograms", "Music Is Magic", "S3 E10", "Jem & the Holograms are set to appear on a Music & Magic TV Special. However, matters are made worse when they discover that their rivals The Misfits are also guests on the show but the real trouble starts when they all keep disappearing one by one but who's behind it?"], [1783375160, 1783376548, "Pee-wee's Playhouse", "Pajama Party", "S2 E10", "Guess who's having a pajama-party sleepover? That's right, it's Pee-wee along with his co-hostess, \"the most beautiful woman in Puppetland,\" Miss Yvonne! Jambi's got a head for pajama fashion when he gives Cowboy Curtis a Wild-West pair of P.J.s! Wacky Roger, the Monster, keeps an eye on things as Pee-wee decides that, since he loves his fruit salad so much, he's going to marry it! \"Watch\" for the"], [1783376548, 1783377938, "Pee-wee's Playhouse", "Episode 11", "S2 E11", "Saturday Morning"], [1783377938, 1783379268, "Teenage Mutant Ninja Turtles", "The Missing Map", "S3 E39", "Zach and his brother Walt visit the Turtles. As they leave, Walt takes a map that could guide Shredder to the lair if it happens to fall into the wrong hands."], [1783379268, 1783380597, "Teenage Mutant Ninja Turtles", "The Gang's All Here", "S3 E40", "Shredder tries to trick the Turtles into eating cookies made with anti-mutagen. Michaelangelo, wanting to be a human, tries one of the cookies and it mutates him into a teenager."], [1783380597, 1783381793, "Power Rangers", "Clean-Up Club", "S1 E37", "The Ranger teens form a Clean-Up Club and take part in cleaning up Angel Grove Park, but Rita has plans of her own and sends the Polluticorn monster after them."], [1783381793, 1783382999, "Power Rangers", "A Bad Reflection on You", "S1 E38", "Rita creates a team of evil duplicates of the Power Rangers to frame them."], [1783382999, 1783384365, "Jem and the Holograms", "The Jazz Player", "S3 E11", "Jem tries to reunite the Tapps Tucket Quartet, an old jazz group. Meanwhile, Eric Raymond is trying to put out a compilation album of jazz songs. Eric and the Misfits do everything in their power to stop the Tapps Tucket Quartet from getting back together so Eric's jazz album can be released."], [1783384365, 1783385730, "Jem and the Holograms", "Danse Time", "S3 E12", "The Holograms want to submit a video with the theme of friendship for a competition. But in the process, Danse is injured. Will she heal in time for them to make the perfect video?"], [1783385730, 1783387115, "Pee-wee's Playhouse", "Episode 12", "S2 E12", "Saturday Morning"], [1783387115, 1783388505, "Pee-wee's Playhouse", "Episode 13", "S2 E13", "Saturday Morning"], [1783388505, 1783389837, "Teenage Mutant Ninja Turtles", "The Grybyx", "S3 E41", "Kala's pet Grybyx, which has a really bad temper whenever it gets hungry, escapes from Dimension X through a portal to Earth, causing trouble for the Turtles."], [1783389837, 1783391168, "Teenage Mutant Ninja Turtles", "Mister Ogg Goes to Town", "S3 E42", "While searching for a device to transform crude oil into liquid hydrogen, Krang accidentally brings Mr. Ogg from Dimension Z to earth."], [1783391168, 1783392327, "Power Rangers", "Doomsday (1)", "S1 E39", "Rita unveils her own evil Zord as she brings her entire palace from the Moon to Angel Grove."], [1783392327, 1783393453, "Power Rangers", "Doomsday (2)", "S1 E40", "The Power Rangers fight to rescue the citizens of Angel Grove from Rita, Lokar and Cyclopsis."], [1783393453, 1783394819, "Jem and the Holograms", "Roxy Rumbles", "S3 E13", "Roxy wins the lottery and goes home to Philadelphia  to show off her new lavish lifestyle to her old friends. Meanwhile, Jem and the Holograms are in Philadelphia on a tour to promote literacy. What no one knows is Roxy is illiterate. Roxy decides to throw a bigger party than the Holograms and ends up without any money left because she didn't read the fine print on her contracts. In the end, she d"], [1783394819, 1783396185, "Jem and the Holograms", "Alone Again", "S3 E14", "Laura Holloway, a new Starlight Girl with a talent for music, falls victim to Bobby Braddock, a drug dealer at her school. Ashley plays an important role again, this time helping to confront Laura and eventually help the police catch Bobby."], [1783396185, 1783397576, "Pee-wee's Playhouse", "Episode 14", "S2 E14", "Saturday Morning"], [1783397576, 1783398966, "Pee-wee's Playhouse", "Episode 15", "S2 E15", "Saturday Morning"], [1783398966, 1783400295, "Teenage Mutant Ninja Turtles", "Shredderville", "S3 E43", "The Turtles are frustrated that they let Shredder slip away from them again. They feel like giving up, and wish they had never been born."], [1783400295, 1783401628, "Teenage Mutant Ninja Turtles", "Bye Bye Fly", "S3 E44", "An interdimensional alien spacecraft leads Baxter Stockman to his latest vengeful plot to destroy the Turtles and Shredder."]]}, {"id": "7", "name": "Taba TV", "a": "taba-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/taba-tv-v1.png", "progs": [[1783306787, 1783309602, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783309602, 1783312299, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783312299, 1783313529, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783313529, 1783314868, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783314868, 1783316255, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783316255, 1783317650, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783317650, 1783319065, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783319065, 1783320500, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783320500, 1783323285, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783323285, 1783326069, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783326069, 1783327407, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783327407, 1783328744, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783328744, 1783330145, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783330145, 1783331515, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783331515, 1783332951, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783332951, 1783334389, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783334389, 1783337131, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783337131, 1783339914, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."], [1783339914, 1783341246, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783341246, 1783342578, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783342578, 1783343970, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783343970, 1783345318, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783345318, 1783346712, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783346712, 1783348118, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783348118, 1783350906, "Beverly Hills, 90210", "Summer Storm", "S2 E3", "Cindy's mothering instincts upset both Jim and Brenda after she brings an injured Dylan to recuperate at their house after he has a accident while surfing in dangerous conditions, while Dylan's father is arrested for income tax evasion. Kelly gets involved with a shy volleyball player named Kyle who is reluctant to make a move on her. Meanwhile, David and Donna are reluctantly paired for a Romeo a"], [1783350906, 1783353661, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783353661, 1783354997, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783354997, 1783356366, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783356366, 1783357698, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783357698, 1783359086, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783359086, 1783360481, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783360481, 1783361808, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783361808, 1783364563, "Beverly Hills, 90210", "Play It Again, David", "S2 E5", "Acting as a \"big brother\" to a 10-year-old boy, Brandon is asked to keep a secret that needs telling about his single mother's physical abuse. Meanwhile, Kelly fears a familial connection to David when his father, Mel, and her mother, Jackie, begin dating. So, Kelly becomes determined to keep them apart. Also, Brenda can't keep the absent Dylan from her thoughts while he is in Hawaii visiting his "], [1783364563, 1783367314, "Beverly Hills, 90210", "Pass/Not Pass", "S2 E6", "Chris, the acting teacher, asks Brenda to perform a scene with Andrea to bring her out of her shell. Brenda admits her crush on Chris to Andrea, who soon develops her own interest in him. The girls take Chris on a tour of the city, and Brenda is devastated when he seems more impressed with Andrea. Chris and Andrea share a good-night kiss. A jealous Brenda slaps Andrea hard during their scene. She "], [1783367314, 1783368615, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783368615, 1783369981, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783369981, 1783371377, "The Wonder Years", "How I'm Spending My Summer Vacation", "S2 E17", "As the end of school approaches, Kevins looks forward to spending the summer with Paul and Winnie. However, his summer is spoiled when Paul tells hims that he'll be leaving for summer and Winnie seems to be avoiding him."], [1783371377, 1783373103, "The Wonder Years", "Episode 18", "S2 E18", "Taba TV"], [1783373103, 1783374493, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783374493, 1783375886, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783375886, 1783378641, "Beverly Hills, 90210", "Camping Trip", "S2 E7", "The gang takes off with plans to spend the weekend camping at Yosemite Park. A sudden monsoon forces the teens to seek refuge in a cramped one-bedroom cabin. Everyone quickly begins to get on each other's nerves. Steve and David go out for beer, but an elderly couple takes Steve's money and splits without buying him anything. The honeymooning couple in the next cabin supplies the kids with food an"], [1783378641, 1783381323, "Beverly Hills, 90210", "Wildfire", "S2 E8", "At the opening day of the new school year, Brenda becomes peeved when Dylan starts spending time with the new transfer student Emily Valentine, while she and Brandon also have eyes for each other. Meanwhile, David is reunited with Scott after he returns from his summer vacation in Oklahoma and finds that his friendship with David isn't as close as it used to be."], [1783381323, 1783382689, "Jem and the Holograms", "Scandal", "S3 E3", "The Holograms, the Misfits, and Shawn Harrison (the British teen idol Kimber met in The World Hunger Shindig, and has asked her to write a song for him to perform) are all in Venice Beach. The Holograms are supposed to go on Harriet Horne's show, which is a famous celebrity gossip show. While the Holograms think they are not much to gossip about, Jetta steals Kimber's diary and publishes it. Tablo"], [1783382689, 1783384057, "Jem and the Holograms", "One Jem Too Many", "S3 E4", "Jerrica, stressed-out from dealing with tax forms and problems with the Starlight record company and home for girls, gets into trouble with a nasty tempered Jem impersonator, who turns out to be Clash disguised in one of The Misfits' plots to ruin Jem."], [1783384057, 1783385302, "The Wonder Years", "Episode 19", "S2 E19", "Taba TV"], [1783385302, 1783386704, "The Wonder Years", "Summer Song", "S3 E1", "The Arnold family and Paul Pfeiffer travel to Ocean City for a little fun in the sun. However, once there, no one really seems to be having any. Paul's allergies flare up, and Wayne and Karen's attitudes are making it nothing like the family trips from long ago. Kevin is still stinging from the news the Winnie Cooper has a new boyfriend, until he meets a cute (but older) girl named Teri."], [1783386704, 1783388098, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't bear to think of her having a new man in her life."], [1783388098, 1783389492, "The Fresh Prince of Bel-Air", "Guess Who's Coming to Marry?", "S2 E6", "Tensions spill over just before the wedding of Will's Aunt Janice when Will's mom meets Janice's intended - and forbids Will to attend the interracial wedding."], [1783389492, 1783392220, "Beverly Hills, 90210", "Ashes to Ashes", "S2 E9", "Brandon befriends a black family, the Ashes, which stirs up Beverly Hills when they move in near the Walshes. The siblings include Robby, a freshman photographer who volunteers to work at the Blaze, and his older sister whose boyfriend is roughed up by a racist security patrol. Meanwhile, Jim and Cindy try out a new \"state of the art\" house alarm system which is more of a nuisance than a help."], [1783392220, 1783394956, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783394956, 1783396322, "Jem and the Holograms", "The Bands Break Up", "S3 E5", "Upset with the way their bands treat them, Kimber and Stormer quit and join forces. They are extremely popular and try to release an album, but they soon realize Eric Raymond is using them to get back his half of Starlight Music."], [1783396322, 1783397688, "Jem and the Holograms", "The Fan", "S3 E6", "Jem is kidnapped by a rich fan with help of The Misfits and taken to a copy of Starlight Mansion with actors playing her friends in an attempt to find out her real identity."], [1783397688, 1783399075, "The Wonder Years", "Math Class", "S3 E2", "Kevin has trouble in math class when he comes up against a teacher who Kevin thinks is completely unreasonable."], [1783399075, 1783400441, "The Wonder Years", "Wayne on Wheels", "S3 E3", "Kevin wants to get to the mall to see a girl he can't stop thinking about, but the only way he can is by begging his brother to drive."], [1783400441, 1783401834, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783304744, 1783307384, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783307384, 1783310024, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783310024, 1783311326, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783311326, 1783312624, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee shop employee."], [1783312624, 1783313920, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783313920, 1783315217, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783315217, 1783316527, "Schitt's Creek", "Moira vs. Town Council", "S2 E6", "Moira tries to beautify the town. David misuses the company credit card. A grooming misstep forces Alexis and Mutt to question their relationship."], [1783316527, 1783317837, "Schitt's Creek", "The Candidate", "S2 E7", "Johnny considers running for town council. David and Stevie look for love. Alexis copes with being single."], [1783317837, 1783320477, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783320477, 1783322589, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783322589, 1783323886, "Raising Hope", "Baby Monitor", "S1 E21", "Barney tells the team he loses each year's annual commercial competition for the store, so now he wants to recruit his employees to compete for this year's submission; unfortunately, flattery and considerations like fair-play, and team spirit, get in the way."], [1783323886, 1783325190, "Raising Hope", "Don't Vote for this Episode", "S1 E22", "The Chances reminisce about the year Jimmy turned 18 - when Maw Maw kicked them out of the house, when a goth Jimmy took up residence in the grocery store and when Burt and Virginia finally figured out how to be adults."], [1783325190, 1783326487, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783326487, 1783327784, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783327784, 1783329094, "Schitt's Creek", "Milk Money", "S2 E8", "Johnny gets thrown into the raw milk business. Moira tries to connect with the townspeople. David gives style advice."], [1783329094, 1783330404, "Schitt's Creek", "Moira's Nudes", "S2 E9", "Moira is worried that racy photos from her past will jeopardize the campaign; Johnny asks for financial help; Alexis gets a job."], [1783330404, 1783331776, "Raising Hope", "Episode 23", "S1 E23", "Y2K"], [1783331776, 1783332948, "Raising Hope", "Episode 24", "S1 E24", "Y2K"], [1783332948, 1783334242, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783334242, 1783335539, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783335539, 1783336849, "Schitt's Creek", "Ronnie's Party", "S2 E10", "Johnny and Moira meet with a key group of people, Alexis struggles with her new job, David offer's emotional support to his boss' daughter."], [1783336849, 1783338159, "Schitt's Creek", "The Motel Guest", "S2 E11", "Johnny and Moira have to deal with a surprise motel guest while Alexis and David go apartment hunting."], [1783338159, 1783339331, "Raising Hope", "Episode 25", "S1 E25", "Y2K"], [1783339331, 1783340634, "Raising Hope", "Prodigy", "S2 E1", "When Jimmy watches a home video of himself as a thirteen-year-old, he discovers that he was a musical prodigy with a promising career as a singer and pianist until a horrible accident involving a golf putter rendered him talentless. Jimmy recruits Burt, Virginia and Maw Maw to help him rediscover his lost abilities."], [1783340634, 1783341929, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783341929, 1783343225, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783343225, 1783344535, "Schitt's Creek", "Lawn Signs", "S2 E12", "Moira’s campaign takes a turn when some of her lawn signs mysteriously disappear. David and Alexis must work together to get David’s boss out of legal trouble."], [1783344535, 1783345844, "Schitt's Creek", "Happy Anniversary", "S2 E13", "Johnny and Moira go out for their anniversary and run into a couple they knew from their former life, while Alexis and David attend Mutt’s annual barn party, making up with some friends, and making out with others."], [1783345844, 1783347146, "Raising Hope", "Sabrina Has Money", "S2 E2", "When Burt discovers that Sabrina is the daughter of his wealthy new client, he lets the family in on her secret. Embarrassed by her family’s wealth she reluctantly introduces the Chance family to her father, Cap. Meanwhile Jimmy decides Hope should have rich friends and begs Sabrina to take him to her sister’s party where Sabrina’s insecurities become apparent."], [1783347146, 1783348450, "Raising Hope", "Kidnapped", "S2 E3", "When a ponytailed hippie named Jack who kidnapped Burt twenty years ago unexpectedly pays the Chance family a visit, they discover that Burt's disappearance wasn't all it appeared. Meanwhile Jimmy's jealousy creeps out when Sabrina anxiously awaits a text from her boyfriend Wyatt."], [1783348450, 1783349749, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783349749, 1783351044, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783351044, 1783352355, "Schitt's Creek", "Opening Night", "S3 E1", "Johnny struggles to find a new purpose, while Moira must confront the harsh realities of local politics."], [1783352355, 1783353665, "Schitt's Creek", "The Throuple", "S3 E2", "Johnny offers to help out an injured Twyla by waiting tables at the café, but soon gets in over his head. Alexis and Moira make a plan to have lunch, despite the fact that they're both anxious about spending time alone together. David and Stevie try to figure out the boundaries of their three-way relationship with Jake."], [1783353665, 1783354968, "Raising Hope", "Henderson, Nevada-Adjacent Baby! Henderson, Nevada-Adjacent!", "S2 E4", "Virginia, Burt, Jimmy and Sabrina go to Las Vegas when Delilah plans a big wedding, but Virginia is jealous of her cousin's fancy ceremony because she never had one. Meanwhile, Jimmy hopes his luck with Sabrina will improve in Sin City."], [1783354968, 1783356226, "Raising Hope", "Killer Hope", "S2 E5", "After discovering that Hope hit a boy at daycare, the family becomes worried that Hope is following in her mother's footsteps. Meanwhile, the Chances run into some problems when they camp out in tents due to their home being fumigated for termites."], [1783356226, 1783357522, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783357522, 1783358818, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783358818, 1783360128, "Schitt's Creek", "New Car", "S3 E3", "Johnny decides to buy a new car, and he and Moira craft an increasingly elaborate ruse to avoid getting gouged by the dealership. David accompanies Stevie as she says goodbye to her great-aunt and confronts her own mortality in the process. Alexis and Ted negotiate the rules of their professional relationship when Ted receives a gift from a female client."], [1783360128, 1783361438, "Schitt's Creek", "Driving Test", "S3 E4", "As the new owner of the motel, Stevie is in over her head, and Johnny and Moira employ different strategies to discourage Stevie from selling. Meanwhile, Alexis drives a stressed-out David to his driving test, and Alexis finds herself in the unusual position of coaching her older brother."], [1783361438, 1783362739, "Raising Hope", "Jimmy and the Kid", "S2 E6", "Supermarket manager Barney's wicked ex Gloria is in town and gets him to employ her cute teenage son, Trevor. Jimmy's sympathy for the kid turns into panic when Sabrina clearly prefers his wittier humor and boyish charms and Trevor digs her."], [1783362739, 1783364042, "Raising Hope", "Burt's Parents", "S2 E7", "Jimmy, Virginia, Burt, Sabrina, Maw Maw and Hope borrow a house to impress Burt's wealthy parents who have decided at the last minute to celebrate Thanksgiving with the family. Things also get interesting when the real homeowners return early."], [1783364042, 1783365335, "The Goldbergs (2013)", "I Rode a Hoverboard", "S2 E8", "When Adam sustains a severe compound fracture, he lies in school about having ridden a hoverboard, just like Back to the Future II. However, the lie threatens his friendship with Emmy Mirsky. Meanwhile, when the Goldberg family is enamored with a new restaurant, China Garden, Beverly fears that her family does not appreciate her cooking. This leads to a war between her and restaurant
