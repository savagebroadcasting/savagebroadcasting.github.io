const D = {"t0": 1783499534, "t1": 1783596527, "gen": 1783507505, "chans": [{"id": "1", "name": "The Silver Screen", "a": "the-silver-screen", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/silver-screen-v2.png", "progs": [[1783500571, 1783503703, "The Twilight Zone", "Mute", "S4 E5", "A 12-year-old girl who lost her parents in a fire doesn't speak because she has grown up in a secret telepathic community. The couple who take her in, and her teacher, are determined to help her adapt to their society, no matter the cost."], [1783503703, 1783506825, "The Twilight Zone", "Death Ship", "S4 E6", "A three-man spacecraft lands on a planet only to discover the wreckage of a spacecraft identical to their own. Two of the crew are convinced that they are dead, but the captain refuses to see the truth."], [1783506825, 1783509955, "The Twilight Zone", "Jess-Belle", "S4 E7", "Appalachian beauty Jess-Belle Stone can't bear to lose Billy Turner, the object of her desire, to local rich girl Ellie Glover, so she turns to local witch Granny Hart for assistance. The results bring unexpected and tragic consequences."], [1783509955, 1783513084, "The Twilight Zone", "Miniature", "S4 E8", "A lonely man falls in love with a mini museum doll, which he believes is alive."], [1783513084, 1783516214, "The Twilight Zone", "Printer's Devil", "S4 E9", "A wily old man, hired by a bankrupt newspaper editor, has the knack of predicting headline stories and claims to be the Devil."], [1783516214, 1783519347, "The Twilight Zone", "No Time Like the Past", "S4 E10", "A man travels back in time to try to prevent some of history's catastrophes."], [1783519347, 1783522477, "The Twilight Zone", "The Parallel", "S4 E11", "An astronaut blacks out while orbiting the earth and ends up in a parallel universe."], [1783522477, 1783525547, "The Twilight Zone", "I Dream of Genie", "S4 E12", "A wiseacre genie appears from a lamp to a meek man, George P. Hanley. Hanley is so used to bad luck, he imagines how each of three possible wishes could go very wrong - but the genie will grant him only one wish!"], [1783525547, 1783528681, "The Twilight Zone", "The New Exhibit", "S4 E13", "When Mr. Ferguson decides to close his wax museum, his employee Martin Lombard Senescue fights to preserve figures of famous murderers and store them in his home basement, a decision that does not sit well with his wife Emma."], [1783528681, 1783531810, "The Twilight Zone", "Of Late I Think of Cliffordville", "S4 E14", "A bored, wealthy businessman gets a chance to go back in time and start over, armed with all the knowledge he's acquired...an arsenal that's not as powerful as he thinks."], [1783531810, 1783534879, "The Twilight Zone", "The Incredible World of Horace Ford", "S4 E15", "Toymaker Horace Ford is increasingly preoccupied with memories of his childhood, endangering his job and marriage - but a visit to his old neighborhood brings a haunting encounter, suggesting the time was not as idyllic as he remembers."], [1783534879, 1783538012, "The Twilight Zone", "On Thursday We Leave for Home", "S4 E16", "The Pilgrim I, the first-ever human space colony, is about to be rescued from Planet V9-Gamma where they've lived for three decades. Their leader William Benteen has trouble accepting that big changes are coming in their lives."], [1783538012, 1783541081, "The Twilight Zone", "Passage on the Lady Anne", "S4 E17", "A young American couple, the Ransomes, who are trying to salvage their troubled marriage, insist on booking passage on an old trans-Atlantic cruise liner. But other passengers try to persuade them to disembark immediately."], [1783541081, 1783544149, "The Twilight Zone", "The Bard", "S4 E18", "Julius Moomer, a talentless, but relentless, self-promoting hack who dreams of becoming a successful television writer, uses a book of magic to summon William Shakespeare to write dramatic teleplays that Moomer will pass off as his own. Shakespeare becomes irritated by Moomer's lack of appreciation and is even more appalled when he discovers the changes wrought on his plays by cynical television e"], [1783544149, 1783545686, "The Twilight Zone", "In Praise of Pip", "S5 E1", "Wearied bookie Max Phillips, learning of his grown soldier son Pip getting wounded during combat in South Vietnam, gets to spend one last delightful hour with a ten-year-old version of Pip at an amusement park after dark."], [1783545686, 1783547196, "The Twilight Zone", "Steel", "S5 E2", "In 1974, boxing has been outlawed and is performed by robots. With his possibly last fight approaching and his outmoded robot Maxo in need of major repair, manager Steel Kelly resorts to a desperate gamble in Maynard, Kansas."], [1783547196, 1783548732, "The Twilight Zone", "Nightmare at 20,000 Feet", "S5 E3", "A man, newly recovered from a nervous breakdown, becomes convinced that a monster only he sees is damaging the plane he's flying in."], [1783548732, 1783550266, "The Twilight Zone", "A Kind of a Stopwatch", "S5 E4", "Long-winded bachelor Patrick Thomas McNulty loses his job in Mr. Cooper's garment factory, visits his favorite local tavern, converses with a stranger, and is inexplicably given a stopwatch that halts time."], [1783550266, 1783551801, "The Twilight Zone", "The Last Night of a Jockey", "S5 E5", "Barred from the track for life, crooked jockey Grady boozily expresses the wish to escape his sordid surroundings and become a truly \"big man.\" His wish is granted by his lookalike alter ego, but there's a heavy price to be paid at fadeout time."], [1783551801, 1783553337, "The Twilight Zone", "Living Doll", "S5 E6", "Erich is displeased when his wife buys an expensive doll for his step-daughter.  He becomes even more displeased when the doll tells him it doesn't like him!"], [1783553337, 1783554872, "The Twilight Zone", "The Old Man in the Cave", "S5 E7", "In a post-apocalyptic settlement in 1974, the inhabitants' survival depends on the advice of an unseen man living in a nearby cave. This dependence is tested when soldiers descends on their town, led by the violent Major French."], [1783554872, 1783556407, "The Twilight Zone", "Uncle Simon", "S5 E8", "Barbara Polk takes care of her elderly and mean-spirited uncle Simon. He is a scientist who spends much of his time in his basement laboratory but when he's not there, he seems to take great pleasure in demeaning his niece. She can't wait for him to die and doesn't hesitate to tell him so. When he does die, things are... not quite what she expected."], [1783556407, 1783557938, "The Twilight Zone", "Probe 7, Over and Out", "S5 E9", "The lone survivors of two annihilated worlds are stranded on a distant planet."], [1783557938, 1783559475, "The Twilight Zone", "The 7th Is Made Up of Phantoms", "S5 E10", "A modern day National Guard unit find themselves in the middle of Custer's Last Stand at the Battle of Little Big Horn."], [1783559475, 1783561009, "The Twilight Zone", "A Short Drink from a Certain Fountain", "S5 E11", "Aging Harmon Gordon convinces his brother Dr. Raymond Gordon to inject him with an experimental youth serum so that Harmon will have sufficient energy to keep up with his much younger gold-digging wife Flora."], [1783561009, 1783562543, "The Twilight Zone", "Ninety Years Without Slumbering", "S5 E12", "Sam Forstman is an old man who lives with his granddaughter Marnie Kirk and her husband Doug. Sam lives a simple life and doesn't sleep much anymore. He's usually up at all hours tinkering on his grandfather clock, something that worries Marnie as his attention to the timepiece verges on the obsessive. The reason for that, however, is quite simple: he is convinced that should the clock ever stop, "], [1783562543, 1783564078, "The Twilight Zone", "Ring-a-Ding Girl", "S5 E13", "While flying across the country en route to a film shoot in Rome, movie star Barbara \"Bunny\" Blake receives a gift from her hometown fans in Howardville: a ring which is giving her warnings to come home."], [1783564078, 1783565585, "The Twilight Zone", "You Drive", "S5 E14", "After causing a hit-and-run motor vehicle accident that killed a bike-riding child, then letting his co-worker Pete Radcliffe take the blame, office manager Oliver Pope is relentlessly haunted by his suddenly aggressive car."], [1783565585, 1783567120, "The Twilight Zone", "The Long Morrow", "S5 E15", "Before leaving on a decades-long solo mission into deep space, astronaut Douglas Stansfield meets attractive Space Agency employee Sandra Horn, and they both fall deeply in love. But what kind of a future can there be for them?"], [1783567120, 1783568656, "The Twilight Zone", "The Self-Improvement of Salvadore Ross", "S5 E16", "Salvatore Ross can trade physical characteristics with other people and will use this talent to do anything to gain both the love of his former social worker Leah Maitland and the approval of her disabled father."], [1783568656, 1783570194, "The Twilight Zone", "Number 12 Looks Just Like You", "S5 E17", "In a future society, everyone must undergo an operation at age 19 to become beautiful and conform to society. Since her father killed himself after his surgery, 18-year-old Marilyn Cubberle desperately wants to hold on to her identity."], [1783570194, 1783571730, "The Twilight Zone", "Black Leather Jackets", "S5 E18", "Leather-jacket-wearing, motorcycle-riding male aliens Scott, Steve, and Fred invade a peaceful neighborhood, where Scott develops a romance with teenage neighbor Ellen Tillman and upsets both his two comrades and Ellen's father Stu."], [1783571730, 1783573240, "The Twilight Zone", "Night Call", "S5 E19", "An elderly, wheelchair-bound lady receives strange anonymous phone calls in the middle of the night."], [1783573240, 1783574776, "The Twilight Zone", "From Agnes – With Love", "S5 E20", "Computer technician James Elwood unwisely takes advice for his love life from Agnes, the computer in his office. He then uses this advice to begin a romance with his attractive young co-worker Millie Randall."], [1783574776, 1783576297, "The Twilight Zone", "Spur of the Moment", "S5 E21", "Heiress Ann Henderson is terrorized by a middle-aged woman as her wedding day approaches with young stockbroker Robert Blake. Should she instead marry her former fiance David Mitchell, whom her parents despise?"], [1783576297, 1783577838, "The Twilight Zone", "An Occurrence at Owl Creek Bridge", "S5 E22", "During the American Civil War, Union troops are about to hang a man, a Southerner, from the Owl Creek bridge. As he goes over the side with the noose around his neck the rope breaks and he manages to unbind his hands and feet. As he swims downstream, he has images of home and his lovely wife. He also manages to evade the troops who are trying to stop him. Just as he reaches his destination however"], [1783577838, 1783579373, "The Twilight Zone", "Queen of the Nile", "S5 E23", "A columnist interviews a famous movie actress who has a secret to her eternal beauty."], [1783579373, 1783580905, "The Twilight Zone", "What's in the Box", "S5 E24", "Taxi driver Joe Britt usually makes his way home to his wife Phyllis but theirs is not a happy marriage as they constantly bicker and she accuses him of having a girlfriend. The obnoxious Joe is having his TV fixed but after the repairman leaves, Joe sees himself with his girlfriend in scenes from the recent past. Soon after, he has a glimpse of what will happen in the near future."], [1783580905, 1783582441, "The Twilight Zone", "The Masks", "S5 E25", "Dying millionaire Jason Foster invites his greedy Boston heirs to a Mardi Gras party where they must wear the masks he had custom-made for them - or else be cut off from their considerably large inheritance."], [1783582441, 1783583977, "The Twilight Zone", "I Am the Night - Color Me Black", "S5 E26", "On the day an unpopular idealist is to be executed for the killing of a racist bully, the townsfolk are shocked to see the skies have turned pitch black."], [1783583977, 1783585504, "The Twilight Zone", "Sounds and Silences", "S5 E27", "Retired Navy man and current model ship manufacturing company owner Roswell Flemington enjoys loud noises, is an annoyance to others, drives his wife to leave him, and is suitably punished with a full dose of irony."], [1783585504, 1783587039, "The Twilight Zone", "Caesar and Me", "S5 E28", "Ventriloquist Jonathan West isn't having much luck finding a job. He's gone to several auditions but no one has taken him on. He's falling behind in his rent and is now getting to the point where he's running out of things to pawn. He has to put up with the taunts of young Susan, the landlady's niece. He's also talking to his dummy, Caesar, who has advice for him on how to get ahead. It's not very"], [1783587039, 1783588574, "The Twilight Zone", "The Jeopardy Room", "S5 E29", "Russian defector Ivan Kuchenko is trapped in a hotel room and given three hours to locate a hidden bomb, hidden there by Commissar Vassiloff, who aspires to turn Ivan's proposed execution into an art form."], [1783588574, 1783590083, "The Twilight Zone", "Stopover in a Quiet Town", "S5 E30", "The morning after a wild night of partying, a hungover married couple awaken in an unfamiliar and artificial place."], [1783590083, 1783591617, "The Twilight Zone", "The Encounter", "S5 E31", "A World War II veteran and a Japanese-American gardener battle each other over a war that ended more than 20 years ago."], [1783591617, 1783593151, "The Twilight Zone", "Mr. Garrity and the Graves", "S5 E32", "In 1890, traveling salesman Jared Garrity visits the town of Happiness, Arizona offering to resurrect the dead and reunite the townsfolk with their departed loved ones out of the goodness of his heart for hefty prices."], [1783593151, 1783594684, "The Twilight Zone", "The Brain Center at Whipple's", "S5 E33", "A factory CEO replaces human workers with machines."], [1783594684, 1783596220, "The Twilight Zone", "Come rts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783502214, 1783503652, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783503652, 1783506394, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783506394, 1783509177, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."], [1783509177, 1783510509, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783510509, 1783511841, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783511841, 1783513233, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783513233, 1783514581, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783514581, 1783515975, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783515975, 1783517381, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783517381, 1783520169, "Beverly Hills, 90210", "Summer Storm", "S2 E3", "Cindy's mothering instincts upset both Jim and Brenda after she brings an injured Dylan to recuperate at their house after he has a accident while surfing in dangerous conditions, while Dylan's father is arrested for income tax evasion. Kelly gets involved with a shy volleyball player named Kyle who is reluctant to make a move on her. Meanwhile, David and Donna are reluctantly paired for a Romeo a"], [1783520169, 1783522924, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783522924, 1783524260, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783524260, 1783525629, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783525629, 1783526961, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783526961, 1783528349, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783528349, 1783529744, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783529744, 1783531071, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783531071, 1783533826, "Beverly Hills, 90210", "Play It Again, David", "S2 E5", "Acting as a \"big brother\" to a 10-year-old boy, Brandon is asked to keep a secret that needs telling about his single mother's physical abuse. Meanwhile, Kelly fears a familial connection to David when his father, Mel, and her mother, Jackie, begin dating. So, Kelly becomes determined to keep them apart. Also, Brenda can't keep the absent Dylan from her thoughts while he is in Hawaii visiting his "], [1783533826, 1783536577, "Beverly Hills, 90210", "Pass/Not Pass", "S2 E6", "Chris, the acting teacher, asks Brenda to perform a scene with Andrea to bring her out of her shell. Brenda admits her crush on Chris to Andrea, who soon develops her own interest in him. The girls take Chris on a tour of the city, and Brenda is devastated when he seems more impressed with Andrea. Chris and Andrea share a good-night kiss. A jealous Brenda slaps Andrea hard during their scene. She "], [1783536577, 1783537878, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783537878, 1783539244, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783539244, 1783540640, "The Wonder Years", "How I'm Spending My Summer Vacation", "S2 E17", "As the end of school approaches, Kevins looks forward to spending the summer with Paul and Winnie. However, his summer is spoiled when Paul tells hims that he'll be leaving for summer and Winnie seems to be avoiding him."], [1783540640, 1783542366, "The Wonder Years", "Episode 18", "S2 E18", "Taba TV"], [1783542366, 1783543756, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783543756, 1783545149, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783545149, 1783547904, "Beverly Hills, 90210", "Camping Trip", "S2 E7", "The gang takes off with plans to spend the weekend camping at Yosemite Park. A sudden monsoon forces the teens to seek refuge in a cramped one-bedroom cabin. Everyone quickly begins to get on each other's nerves. Steve and David go out for beer, but an elderly couple takes Steve's money and splits without buying him anything. The honeymooning couple in the next cabin supplies the kids with food an"], [1783547904, 1783550586, "Beverly Hills, 90210", "Wildfire", "S2 E8", "At the opening day of the new school year, Brenda becomes peeved when Dylan starts spending time with the new transfer student Emily Valentine, while she and Brandon also have eyes for each other. Meanwhile, David is reunited with Scott after he returns from his summer vacation in Oklahoma and finds that his friendship with David isn't as close as it used to be."], [1783550586, 1783551952, "Jem and the Holograms", "Scandal", "S3 E3", "The Holograms, the Misfits, and Shawn Harrison (the British teen idol Kimber met in The World Hunger Shindig, and has asked her to write a song for him to perform) are all in Venice Beach. The Holograms are supposed to go on Harriet Horne's show, which is a famous celebrity gossip show. While the Holograms think they are not much to gossip about, Jetta steals Kimber's diary and publishes it. Tablo"], [1783551952, 1783553320, "Jem and the Holograms", "One Jem Too Many", "S3 E4", "Jerrica, stressed-out from dealing with tax forms and problems with the Starlight record company and home for girls, gets into trouble with a nasty tempered Jem impersonator, who turns out to be Clash disguised in one of The Misfits' plots to ruin Jem."], [1783553320, 1783554565, "The Wonder Years", "Episode 19", "S2 E19", "Taba TV"], [1783554565, 1783555967, "The Wonder Years", "Summer Song", "S3 E1", "The Arnold family and Paul Pfeiffer travel to Ocean City for a little fun in the sun. However, once there, no one really seems to be having any. Paul's allergies flare up, and Wayne and Karen's attitudes are making it nothing like the family trips from long ago. Kevin is still stinging from the news the Winnie Cooper has a new boyfriend, until he meets a cute (but older) girl named Teri."], [1783555967, 1783557361, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't bear to think of her having a new man in her life."], [1783557361, 1783558755, "The Fresh Prince of Bel-Air", "Guess Who's Coming to Marry?", "S2 E6", "Tensions spill over just before the wedding of Will's Aunt Janice when Will's mom meets Janice's intended - and forbids Will to attend the interracial wedding."], [1783558755, 1783561483, "Beverly Hills, 90210", "Ashes to Ashes", "S2 E9", "Brandon befriends a black family, the Ashes, which stirs up Beverly Hills when they move in near the Walshes. The siblings include Robby, a freshman photographer who volunteers to work at the Blaze, and his older sister whose boyfriend is roughed up by a racist security patrol. Meanwhile, Jim and Cindy try out a new \"state of the art\" house alarm system which is more of a nuisance than a help."], [1783561483, 1783564219, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783564219, 1783565585, "Jem and the Holograms", "The Bands Break Up", "S3 E5", "Upset with the way their bands treat them, Kimber and Stormer quit and join forces. They are extremely popular and try to release an album, but they soon realize Eric Raymond is using them to get back his half of Starlight Music."], [1783565585, 1783566951, "Jem and the Holograms", "The Fan", "S3 E6", "Jem is kidnapped by a rich fan with help of The Misfits and taken to a copy of Starlight Mansion with actors playing her friends in an attempt to find out her real identity."], [1783566951, 1783568338, "The Wonder Years", "Math Class", "S3 E2", "Kevin has trouble in math class when he comes up against a teacher who Kevin thinks is completely unreasonable."], [1783568338, 1783569704, "The Wonder Years", "Wayne on Wheels", "S3 E3", "Kevin wants to get to the mall to see a girl he can't stop thinking about, but the only way he can is by begging his brother to drive."], [1783569704, 1783571097, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."], [1783571097, 1783572491, "The Fresh Prince of Bel-Air", "She Ain't Heavy", "S2 E8", "Will hits it off with the full-figured Dee Dee, but her size keeps him from asking her to the dance."], [1783572491, 1783575240, "Beverly Hills, 90210", "Leading From the Heart", "S2 E11", "Brandon and Brenda's handicapped cousin, Bobby, visits the Walshes and a mutual attraction between him and Kelly is complicated more by others assumptions than by Bobby's wheelchair. Meanwhile, David tries asking Donna out on a date. Brenda finally gets her driver's license on the third try, but is hesitant to drive Brandon's car. Also, Emily joins the school newspaper just to be near Brandon."], [1783575240, 1783577994, "Beverly Hills, 90210", "Down and Out of District in Beverly Hills", "S2 E12", "Brandon submits one of Andrea's articles to a high school journalism contest. She wins the contest, but panics because a school district representative wants to conduct a home interview. Andrea asks her grandmother to say that she lives with her, but Rose does not want to play along. The school district initiates an investigation because they suspect that Andrea lives out of district. Andrea moves"], [1783577994, 1783579359, "Jem and the Holograms", "Fathers' Day", "S3 E7", "It's Fathers' Day! Kimber has a bad time, trying to remembering her late father, but learns to cope after having a talk with Pizzazz's father as he has his own problems with his daughter. Also, The Holograms and Misfits visit Clash and Video's hometown for a Father's day banquet."], [1783579359, 1783580724, "Jem and the Holograms", "Treasure Hunt", "S3 E8", "The Starlight Girls compete with Misfits-in-Training in a treasure hunt for literacy. In the end, they learn that knowledge is the greatest prize of all."], [1783580724, 1783582090, "The Wonder Years", "Mom Wars", "S3 E4", "Kevin thinks his mother is being over-protective when she tries to stop him from playing tackle football after school."], [1783582090, 1783583478, "The Wonder Years", "On the Spot", "S3 E5", "Kevin joins the school play just to get out of Gym class, while Winnie and Paul seem to take it very seriously. Winnie has problems with her performance, and Kevin unexpectedly helps her during the show."], [1783583478, 1783584872, "The Fresh Prince of Bel-Air", "Cased Up", "S2 E9", "A pompous lawyer who's dating Hilary is no fan of Will's after he's sideswiped by Will's roadster."], [1783584872, 1783586246, "The Fresh Prince of Bel-Air", "Hi-Ho Silver", "S2 E10", "Will and Carlton think a party guest stole the silverware."], [1783586246, 1783589000, "Beverly Hills, 90210", "Halloween", "S2 E13", "Brenda, Dylan, Steve, Donna and Kelly attend a Halloween party. Donna dresses as a mermaid; but her fins inhibit dancing, walking, and trips to the bathroom. Kelly's seductive costume catches the eye of a college student. She goes upstairs to talk with him, then becomes uncomfortable. The guy accuses her of leading him on and tries to rape her. Brenda and Donna enter in the nick of time, and Steve"], [1783589000, 1783591756, "Beverly Hills, 90210", "The Next 50 Years", "S2 E14", "The students of West Beverly unearth a time capsule from 1941, and put together a capsule of their own. Mrs. Scanlon organizes a surprise party for Scott's birthday, and pushes David to round up the guests. Donna is the only person who wants to attend. Kelly, Steve, Brenda, Brandon and Emily reluctantly come to the party, but act like jerks and refuse to participate in the activities. David tries "], [1783591756, 1783592930, "Jem and the Holograms", "Aztec Enchantment", "S3 E9", "The Misfits join up with Clash, who was just given a video camera by her father, and hit Mexico to ruin Jem and the Holograms' new music video directed by Video at the ruins of an ancient Aztec temple. Also the Holograms befriend a poor young boy who wants to go to the United States."], [1783592930, 1783594296, "Jem and the Holograms", "Music Is Magic", "S3 E10", "Jem & the Holograms are set to appear on a Music & Magic TV Special. However, matters are made worse when they discover that their rivals The Misfits are also guests on the show but the real trouble starts when they all keep disappearing one by one but who's behind it?"], [1783594296, 1783595687, "The Wonder Years", "Odd Man Out", "S3 E6", "When Kevin and Paul get on each other's nerves, they try to become best friends with two other boys."]]}, {"id": "5", "name": "The Fifth Dimension", "a": "the-fifth-dimension", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/fifth-dimension-v2.png", "progs": [[1783500656, 1783503441, "Quantum Leap", "Rebel without a Clue", "S3 E9", "September 1, 1958: As \"Bones,\" a member of a motorcycle gang, Sam is an uneasy rider who has to prevent a Jack Kerouac-inspired young woman from meeting her death on the road."], [1783503441, 1783506287, "Quantum Leap", "A Little Miracle", "S3 E10", "December 24, 1962: On Christmas Eve, Sam leap into Reginald Pierson, valet to a wealthy contractor, who is in danger of losing his soul in an attempt to demolish a Salvation Army mission, so he can build his \"Blake's Plaza.\" Seeing a similarity to the Dickens's character, Sam and Al decide to \"Scrooge\" the greed out of the man."], [1783506287, 1783507841, "The Twilight Zone", "The Howling Man", "S2 E5", "Seeking refuge from a storm, a traveler comes upon a bizarre abbey of monks, who have imprisoned a man who begs for his help. When he confronts the head monk, he is told that the man is the Devil, and he must decide whom to believe."], [1783507841, 1783509397, "The Twilight Zone", "Eye of the Beholder", "S2 E6", "A young woman lying in a hospital bed awaits the outcome of an experimental treatment in an attempt to make her look normal."], [1783509397, 1783512185, "Quantum Leap", "Runaway", "S3 E11", "July 4, 1964: On a cross-country car trip, Sam, as 13-year-old Butchie, must contend with a sadistic older sister and a mother on the verge of running away from an unfulfilling marriage, in search of the feminine mystique."], [1783512185, 1783515068, "Quantum Leap", "8½ Months", "S3 E12", "November 15, 1955: Billie Jean Crockett is a pregnant teenager who will make the second biggest mistake of her life - giving her baby up for adoption - unless Sam, as Billie Jean, can convince someone to help her raise her child... before he goes into labor himself"], [1783515068, 1783516587, "The Twilight Zone", "Nick of Time", "S2 E7", "A superstitious newlywed becomes obsessed by a penny fortune-telling machine when he and his new wife are stranded with car trouble."], [1783516587, 1783518155, "The Twilight Zone", "The Lateness of the Hour", "S2 E8", "Jana Loren is an attractive young woman who lives at home with her parents. She feels suffocated living there however, surrounded by their many servants - that are in fact human-looking robots created by her inventor father. Her parents are quite happy with the life they lead but realize that they're going to have to do something about the rebellious Jana, including revealing at least one secret t"], [1783518155, 1783521041, "Quantum Leap", "Future Boy", "S3 E13", "October 6, 1957: Sam leaps Kenny Sharp, better known as \"Future Boy,\" sidekick to Moe Stein, host of the kid's show, \"Time Patrol,\" who also happens to be building a time machine in his basement. Unless Sam can prevent Moe's daughter from attempting to have her father committed, Moe is destined to be killed as he tries to hop a freight train."], [1783521041, 1783523925, "Quantum Leap", "Private Dancer", "S3 E14", "October 6, 1979: An aspiring dancer working as a waitress in a strip club is in danger of being led into a life of prostitution unless Sam, as \"Rod the Bod,\" can convince her to audition for a spot in a professional dance group. But, since she's deaf, the choreographer doesn't believe she has the time to give the young lady the attention she'll need."], [1783523925, 1783525479, "The Twilight Zone", "The Trouble with Templeton", "S2 E9", "Booth Templeton is an aging actor who longs for the old days when his wife was alive.  Miraculously, he is given a sobering glimpse of the past he holds so dear."], [1783525479, 1783527033, "The Twilight Zone", "A Most Unusual Camera", "S2 E10", "Married couple Chester and Paula have broken into and robbed a curio shop, hoping to sell the loot for a handsome sum of money. Unfortunately, all of it turns out to be junk or fakes. All, that is, save for a mysterious camera. When they try taking a picture, it turns out to be from five minutes into the future. Soon Paula's brother Woodward joins them and the three decide to use the camera at a h"], [1783527033, 1783529857, "Quantum Leap", "Piano Man", "S3 E15", "November 10, 1985: Joey Dinardo is a lounge lizard on the run from mob hitmen. When Sam leaps in, his ex-girlfriend, and former musical partner have found him, and now both are on a run for their lives from a killer who seems to know their every move."], [1783529857, 1783532712, "Quantum Leap", "Southern Comforts", "S3 E16", "August 4, 1961: It's the best little cathouse in New Orleans. No, it's the Gilbert Labonte Sewin' & Quiltin' Academy. As the proprietor of this worthy establishment, Sam must prevent the mysterious death of a resident who doesn't belong there."], [1783532712, 1783534228, "The Twilight Zone", "The Night of the Meek", "S2 E11", "A down-on-his-luck department store Santa Claus discovers a bottomless sack of toys."], [1783534228, 1783535783, "The Twilight Zone", "Dust", "S2 E12", "On a hot day, sympathetic Sheriff Koch and callous con man Peter Sykes are among the many who gather in a desert town to see young Luis Gallegos hanged for accidentally killing a child while drunk. Can some magic dust save Luis?"], [1783535783, 1783538667, "Quantum Leap", "Glitter Rock", "S3 E17", "April 12, 1974: Sam is a glitter rock star in danger of being stabbed to death after a performance, unless Sam can determine who, from a growing list of people, the real killer is."], [1783538667, 1783541551, "Quantum Leap", "A Hunting We Will Go", "S3 E18", "June 18, 1976: It's the leap from hell as Sam, a bounty hunter handcuffed to a wily embezzler who will stop at nothing to get away from him, has to deal with his captive, as well as his attraction towards her, despite her countless attacks on him."], [1783541551, 1783543105, "The Twilight Zone", "Back There", "S2 E13", "It's April 14, 1961. Peter Corrigan and friends are discussing time travel at their men's club. Corrigan suddenly becomes dizzy. When his head clears, he has moved back to April 14, 1865 - the date of Lincoln's assassination."], [1783543105, 1783544656, "The Twilight Zone", "The Whole Truth", "S2 E14", "A peculiar Model A automobile compels a used car dealer to tell only the truth."], [1783544656, 1783547480, "Quantum Leap", "Last Dance Before an Execution", "S3 E19", "May 12, 1971: \"Just think of someplace far away\" is the advice Sam hears as he leaps into Jesus Ortega, a Cuban-American being strapped into an electric chair. A last second stay of execution gives Sam just forty-eight hours to either prove himself innocent or fulfill his mission so that he can leap before the Big Switch is pulled"], [1783547480, 1783550363, "Quantum Leap", "Heart of a Champion", "S3 E20", "July 23, 1955: The heart of a champion belongs to Ronnie, a professional wrestler, who will die if he competes in the title match. Sam, as his brother and new partner Terry, must convince him of his hidden health problem, while avoiding his own health problem - the jealous wrestler-husband of a woman who has taken an amorous interest in Sam."], [1783550363, 1783551917, "The Twilight Zone", "The Invaders", "S2 E15", "An old woman who lives alone in a ramshackle farm house comes face to face with alien invaders. She hears something on her roof and then finds a flying saucer, perhaps six or seven feet across from which emerges two small robots. She fights them as best she can and eventually succeeds in destroying their ship. The nature of the invaders however is not immediately obvious however."], [1783551917, 1783553470, "The Twilight Zone", "A Penny for Your Thoughts", "S2 E16", "The lucky flip of a coin seems to give a mild-mannered bank clerk the power to read minds. But he soon learns that you can't believe everything you read."], [1783553470, 1783556298, "Quantum Leap", "Nuclear Family", "S3 E21", "October 26, 1962: Sam finds himself the brother of a fallout shelter salesman during the Cuban Missile Crisis, where he must defuse a potentially explosive situation as panic sets in on the night of John F. Kennedy's speech to the nation."], [1783556298, 1783559182, "Quantum Leap", "Shock Theater", "S3 E22", "October 3, 1954: Leaping into Sam Bederman, a mental patient who is suffering from acute depression, Sam receives an overloaded electroshock treatment, which causes his Swiss-cheesed memory to be replaced by personas from previous leaps. Al, finding himself visible to the mentally absent, must try to complete Sam's mission, and convince him to take another shock treatment, in order to leap Sam out"], [1783559182, 1783560734, "The Twilight Zone", "Twenty Two", "S2 E17", "Miss Powell has a recurring nightmare about room 22 – a morgue."], [1783560734, 1783562286, "The Twilight Zone", "The Odyssey of Flight 33", "S2 E18", "Global Flight 33 is en route from London to New York in what appears to be a routine flight in a modern jetliner. Suddenly however, the jet's speed increases to an incredible 3000 knots and they arrive in New York rather quickly. Neither the captain or his well-trained crew can explain what happened - a strange tail-wind perhaps - but they are certainly not prepared for what they find as they surv"], [1783562286, 1783565080, "Quantum Leap", "The Leap Back", "S4 E1", "June 15, 1945: Struck by lightning, Sam and Al find their roles reversed, as Sam returns to the future, and to a long-lost love, while Al leaps back to 1945 to prevent the death of a returning World War II hero and his former girl friend."], [1783565080, 1783567904, "Quantum Leap", "Play Ball", "S4 E2", "August 6, 1961: A pitcher on a minor league baseball team, Sam must decide if he's there to help a fellow team member, get his host back into the major leagues, or baby-sit the porcine team mascot, all while resisting the amorous advances of the women in his life."], [1783567904, 1783569447, "The Twilight Zone", "Mr. Dingle, the Strong", "S2 E19", "Luther Dingle is a meek and mild-mannered vacuum cleaner salesman. He spends some time in a bar but always seems to be in the middle of others arguments and always seems to get the worst of it. Courtesy of visiting - but invisible - aliens, he is given great strength, some 300 times greater than that of a normal human being. Dingle becomes something of a local celebrity but just how long will his "], [1783569447, 1783570978, "The Twilight Zone", "Static", "S2 E20", "Ed Lindsay hates television, so he gets his old radio out of the basement of the boardinghouse where he lives. He soon finds he can receive programs from the past when he's alone."], [1783570978, 1783573744, "Quantum Leap", "Hurricane", "S4 E3", "August 17, 1969: Sam meets Camille, and possibly a killer, when he leaps into a deputy sheriff in a small Mississippi town, lying in the path of a deadly hurricane."], [1783573744, 1783576506, "Quantum Leap", "Justice", "S4 E4", "May 11, 1965: Sam must don the robe of a Ku Klux Klansman in order to save the life of an ambitious young civil rights leader, who is trying to register black voters."], [1783576506, 1783578062, "The Twilight Zone", "The Prime Mover", "S2 E21", "Ace Larsen discovers his business partner has the ability to control objects with his mind. The pair head to Vegas to win big."], [1783578062, 1783579617, "The Twilight Zone", "Long Distance Call", "S2 E22", "A toy telephone given as a birthday gift becomes the link between young Billy Bayles and his newly deceased beloved grandmother, but this link becomes dangerous when she apparently wants him to join her on the other side."], [1783579617, 1783582442, "Quantum Leap", "Permanent Wave", "S4 E5", "June 2, 1983: Sam leaps into Frank Bianca, a hairstylist in leather pants, to prevent the death of a young murder witness and his mother."], [1783582442, 1783585241, "Quantum Leap", "Raped", "S4 E6", "June 20, 1980: It's up to Sam to try to bring a rapist to justice when he leaps into the perp's victim, a young woman who may have been unwilling to press charges against the young man - the son of the pillar of the community."], [1783585241, 1783586762, "The Twilight Zone", "A Hundred Yards Over the Rim", "S2 E23", "In 1847 a western settler sets out to find medicine for his dying son - and stumbles into modern-day New Mexico."], [1783586762, 1783588326, "The Twilight Zone", "The Rip Van Winkle Caper", "S2 E24", "Thieves put themselves into suspended animation for 100 years after hiding a million dollars worth of gold bars."], [1783588326, 1783591120, "Quantum Leap", "The Wrong Stuff", "S4 E7", "January 24, 1961: The fates make a monkey out of Sam when he leaps into Bobo, an astro-chimp who must avoid succumbing to the experiments of an Air Force neurologist."], [1783591120, 1783593913, "Quantum Leap", "Dreams", "S4 E8", "February 28, 1979: It's more like a nightmare when Sam leaps into a detective, investigating a gruesome murder. He may be next if he doesn't find out who eviscerated the victim and his only hope is the victim's catatonic son and her husband's psychiatrist. The horrific flashbacks he's experiencing don't help matters much either."], [1783593913, 1783595467, "The Twilight Zone", "The Silence", "S2 E25", "Annoyed by fellow country club member Jamie Tennyson's constant chatter, Colonel Archie Taylor bets half a million dollars that Jamie cannot be completely silent for one year while living in a glass enclosure in the club's basement."]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783500071, 1783501861, "Pee-wee's Playhouse", "Episode 25", "S1 E25", "Saturday Morning"], [1783501861, 1783503260, "Pee-wee's Playhouse", "Open House", "S2 E1", "Today in the \"Playhouse,\" Pee-wee tricks his friends into doing all of his chores by pretending that work is fun. The gang meets some new friends while renovating the \"house.\" Reba arrives in time to deliver Clocky while the Playhouse gang uncovers Floory and meets Mrs. Rene for the first time."], [1783503260, 1783504597, "Teenage Mutant Ninja Turtles", "Sky Turtles", "S3 E5", "The Turtles go flying when the Shredder invents a gravity-altering device."], [1783504597, 1783505932, "Teenage Mutant Ninja Turtles", "The Old Switcheroo", "S3 E6", "The personalities of Shredder and Splinter are switched when a device is accidentally activated during a battle between the Turtles and their enemies. As Shredder plans the Turtles' demise and Splinter plans on how to get back to his body, everyone else is clueless."], [1783505932, 1783507226, "He-Man and the Masters of the Universe", "A Tale of Two Cities", "S1 E27", "After He-Man rescues Princess Rhea from Queen Balina's guards, the queen believes that he is a spy from her rival city, Operon, and captures him. Now, He-Man must fight the queen's champion gladiator to survive."], [1783507226, 1783508526, "He-Man and the Masters of the Universe", "Valley of Power", "S1 E28", "Adam, Teela and Cringer are exploring the Valley of Power, which contains magical water which imbues anyone who drinks it with great power.  But a stranger called Danavas is also in the area, and has stolen the egg of a Mother Rogue.  When the baby bird hatches, he makes it drink the water and gain its power, so he can control it for himself.  The bird grows to giant size, and soon the Royal Palac"], [1783508526, 1783509698, "Power Rangers", "Wheel of Misfortune", "S1 E27", "Rita turns Kimberly's grandmother's spinning wheel into her dangerous new weapon."], [1783509698, 1783510917, "Power Rangers", "Island of Illusion (1)", "S1 E28", "Rita traps the Power Rangers on the Island of Illusion, where their greatest fears can destroy them."], [1783510917, 1783512219, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783512219, 1783513585, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783513585, 1783514983, "Pee-wee's Playhouse", "Puppy In the Playhouse", "S2 E2", "Cowntess, just back from a world cruise, is showing some of her home movies from the trip. Globey teaches Pee-wee how to say \"hello, my name is Pee-wee\" in French and Chinese! When a lost puppy appears at the Playhouse door, no one can figure out who the owner is. Pee-wee develops a strong case of puppy love and decides to keep him and name him Aloysius. However, Reba comes \"over,\" and it's obviou"], [1783514983, 1783516375, "Pee-wee's Playhouse", "Store", "S2 E3", "Pee-wee and Cowboy Curtis take a leap into Magic Screen where they enjoy some mighty fine handcart ridin' until a train chases them back into the waiting arms of Chairry! Then, Cowboy Curtis sings a song with \"more\" of the secret word in it than you could scream at. Finally, Cowboy Curtis and Miss Yvonne go shopping at Pee-wee's \"department store\" where they decide to buy Chairry!"], [1783516375, 1783517713, "Teenage Mutant Ninja Turtles", "Burne's Blues", "S3 E7", "In the middle of a summer heat wave, someone is destroying all the air conditioners and taking all the city's freon. In the meantime, Vernon and Burne go looking for the Turtles, but find something else."], [1783517713, 1783519053, "Teenage Mutant Ninja Turtles", "The Fifth Turtle", "S3 E8", "A 14-year-old boy tries his best to help out the Turtles, but with some not so optimal results."], [1783519053, 1783520343, "He-Man and the Masters of the Universe", "Game Plan", "S1 E29", "Negator, an evil character with a love of computers and electronics, sees Man-At-Arms testing out his latest invention, the Beam Ray, in the desert. Impressed, Negator wants the scientist to come and work for him, so that he can use his creations for his own evil purposes. When Man-At-Arms refuses, Negator captures Teela to force him to come to him. As He-Man, Ram Man and Battle Cat search for the"], [1783520343, 1783521636, "He-Man and the Masters of the Universe", "The Return of Orko's Uncle", "S1 E30", "A villain called Azrog is arrested on Trolla by Uncle Montork, but he flees to Eternia where he joins forces with the witch Spydra.  Montork follows him, but ends up imprisoned in Spydra's castle.  When He-Man, Battle Cat, Teela and Orko go to rescue Montork, Orko falls under Azrog's spell and becomes evil, and is set against his friends."], [1783521636, 1783522824, "Power Rangers", "Island of Illusion (2)", "S1 E29", "The Rangers must overcome their own fears to escape Rita's Island of Illusion."], [1783522824, 1783524003, "Power Rangers", "The Rockstar", "S1 E30", "Jason and his cousin Jeremy find a map that leads to a powerful ancient mirror."], [1783524003, 1783525369, "Jem and the Holograms", "Scandal", "S3 E3", "The Holograms, the Misfits, and Shawn Harrison (the British teen idol Kimber met in The World Hunger Shindig, and has asked her to write a song for him to perform) are all in Venice Beach. The Holograms are supposed to go on Harriet Horne's show, which is a famous celebrity gossip show. While the Holograms think they are not much to gossip about, Jetta steals Kimber's diary and publishes it. Tablo"], [1783525369, 1783526737, "Jem and the Holograms", "One Jem Too Many", "S3 E4", "Jerrica, stressed-out from dealing with tax forms and problems with the Starlight record company and home for girls, gets into trouble with a nasty tempered Jem impersonator, who turns out to be Clash disguised in one of The Misfits' plots to ruin Jem."], [1783526737, 1783528125, "Pee-wee's Playhouse", "Pee-wee Catches a Cold", "S2 E4", "Today the secret word is \"out,\" but Pee-wee is stuck in when he overdoes it and comes down with a cold! It's lovely Nurse Yvonne and ultra-health conscious Ricardo to the rescue with some good advice and chicken soup for their sick and cranky friend. In no time, Pee-wee's back to his old self again to join in the Playhouse fun."], [1783528125, 1783529510, "Pee-wee's Playhouse", "Why Wasn't I Invited?", "S2 E5", "Nothing bugs Pee-wee's flowers more than having a caterpillar in their flower box until Magic Screen shows how a caterpillar can turn itself into a beautiful butterfly. The caterpillar's not the only uninvited creature around when Cowntess has a birthday party and invites practically \"all\" of Puppetland except Pee-wee! Is she mad at him or just being moody?"], [1783529510, 1783530849, "Teenage Mutant Ninja Turtles", "Enter: The Rat King", "S3 E9", "Thompson assigns April to research the growing rat infestation. She is pursued by an army of rats and escapes on a passing city bus."], [1783530849, 1783532187, "Teenage Mutant Ninja Turtles", "Turtles at the Earth's Core", "S3 E10", "After witnessing a living dinosaur wander in the city and disappear abruptly, the Turtles follow its tracks into a large hole, where they discover a shocking revelation: A land frozen in a stage where dinosaurs roam the land."], [1783532187, 1783533481, "He-Man and the Masters of the Universe", "The Mystery of Man-E-Faces", "S1 E31", "Prince Adam tells Man-At-Arms the story of how he, as He-Man, changed the life of Man-E-Faces.  In flashback, we see how Man-E was once a bad guy who terrorized the Widgets with his three faces, and how Skeletor tried to recruit him into his forces before He-Man enabled Man-E to see the error of his ways."], [1783533481, 1783534775, "He-Man and the Masters of the Universe", "Keeper of the Ancient Ruins", "S1 E32", "Whilst on an archaeological dig, Man-At-Arms and Professor Smallen are taken captive by ancient robots called Zaktons, who were left by the Ancient Ones to guard the ruins of the desert.  He-Man and Teela head to the Ancient Ruins to save them, but they also face danger from Trap Jaw, who wants the Zaktons' artifacts for himself."], [1783534775, 1783535991, "Power Rangers", "Calamity Kimberly", "S1 E31", "Poor Kimberly is having possibly the worst day of her life as she encounters misfortune after misfortune. Tommy tries to make her feel better and things are looking up, until Rita makes Kimberly's day go from bad to worse and Tommy is injured while trying to save her. The four remaining rangers race against time to rescue Kimberly before she is gone for good."], [1783535991, 1783537127, "Power Rangers", "A Star is Born", "S1 E32", "Tommy eagerly auditions for a karate commercial especially when he sees that he's up against a clueless Bulk. Meanwhile, the rest of the rangers are enjoying a day at the beach.....until Scorpina crashes the party and traps them in a cocoon from which they can't seem to escape. To make matters worse, no one can contact Tommy since he took off his communicator!"], [1783537127, 1783538493, "Jem and the Holograms", "The Bands Break Up", "S3 E5", "Upset with the way their bands treat them, Kimber and Stormer quit and join forces. They are extremely popular and try to release an album, but they soon realize Eric Raymond is using them to get back his half of Starlight Music."], [1783538493, 1783539859, "Jem and the Holograms", "The Fan", "S3 E6", "Jem is kidnapped by a rich fan with help of The Misfits and taken to a copy of Starlight Mansion with actors playing her friends in an attempt to find out her real identity."], [1783539859, 1783541248, "Pee-wee's Playhouse", "Tons of Fun", "S2 E6", "Today, Pee-wee gives everybody \"That Certain Feeling\" by lip-synching to one of his old records. Later, while Pee-wee is out with the Playhouse Gang, Cowboy Curtis comes over and sings to the flowers, and Miss Yvonne does a wild clog dance. Tensions mount when the gang ends up with two \"cool\" ice cream desserts, and they have to choose which to eat. Of course, they could just eat them both!"], [1783541248, 1783542636, "Pee-wee's Playhouse", "School", "S2 E7", "Learning is \"easy\" when your teacher makes it fun. No one can make it more fun than Pee-wee, especially when he turns the Playhouse into a schoolhouse! The Playhouse Gang are his students, Magic Screen is his blackboard, and Globey is, well, his globe. Pee-wee makes history exciting when he teaches about Christopher Columbus and the Declaration of Independence. Sit back, laugh, and learn!"], [1783542636, 1783543975, "Teenage Mutant Ninja Turtles", "April Fool", "S3 E11", "Emperor Aleister of Malicuria comes to New York City, bringing along a shard of Lydium 90 to the USA."], [1783543975, 1783545315, "Teenage Mutant Ninja Turtles", "Attack of the Big MACC", "S3 E12", "A robot warrior, known as the Mobile Armored Computerized Combatant (M.A.C.C.), arrives from 400 years in the future in 20th-Century New York. He befriends the Turtles, but Shredder and Krang are looking to bring him to their side, at any means necessary."], [1783545315, 1783546610, "He-Man and the Masters of the Universe", "The Region of Ice", "S1 E33", "The Ice Lord captures the entire Royal Family, along with Teela and Man-At-Arms. Orko finds out that Skeletor has taken the Ice Lord's daughter and would only trade her back if the Ice Lord brought the entire Royal Family to him."], [1783546610, 1783547907, "He-Man and the Masters of the Universe", "Masks of Power", "S1 E34", "He-Man, Man-At-Arms, and Orko explore the City of the Ancient Ones. Skeletor sends his new servants to the city to retrieve the Masks of Power. Unfortunately, the masks cause the ancient evil rulers, Demos and Tyrella, to return and go after the Sword of the Ancients."], [1783547907, 1783549124, "Power Rangers", "The Yolk's on You!", "S1 E33", "With the Angel Grove High talent show around the corner, the Rangers have a lot to deal with when Tommy is kidnapped and imprisoned by putties, and Finster creates the Fang monster in celebration of Rita's birthday."], [1783549124, 1783550285, "Power Rangers", "The Green Candle (1)", "S1 E34", "Tommy's nervous about asking Kimberly to the dance but goes for it anyway. Before he can, the Putties transport him to another dimension where a green candle that's linked to his powers is lit. He discovers that when the candle burns out, his powers will go back to Rita! Tommy manages to escape but without the candle, which is still burning."], [1783550285, 1783551650, "Jem and the Holograms", "Fathers' Day", "S3 E7", "It's Fathers' Day! Kimber has a bad time, trying to remembering her late father, but learns to cope after having a talk with Pizzazz's father as he has his own problems with his daughter. Also, The Holograms and Misfits visit Clash and Video's hometown for a Father's day banquet."], [1783551650, 1783553015, "Jem and the Holograms", "Treasure Hunt", "S3 E8", "The Starlight Girls compete with Misfits-in-Training in a treasure hunt for literacy. In the end, they learn that knowledge is the greatest prize of all."], [1783553015, 1783554405, "Pee-wee's Playhouse", "Spring", "S2 E8", "As the Spring season comes to \"begin,\" Pee-wee plants a seed, and it grows quickly (courtesy of Clockey). Also, the King of Cartoons presents his wife, \"The Queen of Cartoons,\" and his son, \"The Prince of Cartoons.\" Also, when Pee-wee doesn't make the baseball team, Ricardo shows him that there are other sports he can try."], [1783554405, 1783555792, "Pee-wee's Playhouse", "Playhouse In Outer Space", "S2 E9", "Aaaaugh! The secret word is \"zyzzybalubah,\" and that can only mean one thing! The entire Playhouse, including Reba, is sucked into space, transported to a strange planet, and taken over by an odd, lonely alien! Yvona, an alien from the planet, is trying to escape the unfriendly Zyzzybalubah, but Pee-wee teaches him how to be polite and make friends. Reba teaches Pee-wee how to whistle, and she sin"], [1783555792, 1783557123, "Teenage Mutant Ninja Turtles", "The Turtle Terminator", "S3 E37", "Irma is kidnapped by Bebop and Rocksteady and is replaced by a robot that looks just like her that is programmed to eliminate the turtles."], [1783557123, 1783558451, "Teenage Mutant Ninja Turtles", "The Great Boldini", "S3 E38", "The Turtles must clear their names when they are believed to be jewel thieves who stole a priceless emerald during a magic act run by a wizard named Boldini."], [1783558451, 1783559745, "He-Man and the Masters of the Universe", "Ordeal in the Darklands", "S1 E35", "Evil-Lyn captures Mira, the daughter of the powerful wizard Kor, and frames He-Man and Man-At-Arms for the capture.  Kor takes He-Man and Man-At-Arms prisoner, and refuses to listen to their pleas for innocence, planning to unleash a demonic entity called the Crimson Scourge upon them unless they reveal his daughter's whereabouts."], [1783559745, 1783561039, "He-Man and the Masters of the Universe", "City Beneath the Sea", "S1 E36", "He-Man and Man-At-Arms set sail to investigate the disappearance of some of King Randor's food ships.  Sucked beneath the surface by a whirlpool, they find themselves in the underwater city of Aquatica, which has been taken over by Merman.  Merman has kidnapped the city's princess, Nahmi, and is controlling the Aquaticans with the Pearl of Power!  But he has convinced them that the surface dweller"], [1783561039, 1783562198, "Power Rangers", "The Green Candle (2)", "S1 E35", "As Jason journeys to the dimensional prison to stop the green candle from burning out, Tommy battles the Cyclops with the Dragonzord."], [1783562198, 1783563418, "Power Rangers", "Birds of a Feather", "S1 E36", "While Zack trains a young student for a karate tournament, Rita sends her Hatchasaurus monster down to Earth."], [1783563418, 1783564592, "Jem and the Holograms", "Aztec Enchantment", "S3 E9", "The Misfits join up with Clash, who was just given a video camera by her father, and hit Mexico to ruin Jem and the Holograms' new music video directed by Video at the ruins of an ancient Aztec temple. Also the Holograms befriend a poor young boy who wants to go to the United States."], [1783564592, 1783565958, "Jem and the Holograms", "Music Is Magic", "S3 E10", "Jem & the Holograms are set to appear on a Music & Magic TV Special. However, matters are made worse when they discover that their rivals The Misfits are also guests on the show but the real trouble starts when they all keep disappearing one by one but who's behind it?"], [1783565958, 1783567347, "Pee-wee's Playhouse", "Pajama Party", "S2 E10", "Guess who's having a pajama-party sleepover? That's right, it's Pee-wee along with his co-hostess, \"the most beautiful woman in Puppetland,\" Miss Yvonne! Jambi's got a head for pajama fashion when he gives Cowboy Curtis a Wild-West pair of P.J.s! Wacky Roger, the Monster, keeps an eye on things as Pee-wee decides that, since he loves his fruit salad so much, he's going to marry it! \"Watch\" for the"], [1783567347, 1783568736, "Pee-wee's Playhouse", "Episode 11", "S2 E11", "Saturday Morning"], [1783568736, 1783570066, "Teenage Mutant Ninja Turtles", "The Missing Map", "S3 E39", "Zach and his brother Walt visit the Turtles. As they leave, Walt takes a map that could guide Shredder to the lair if it happens to fall into the wrong hands."], [1783570066, 1783571395, "Teenage Mutant Ninja Turtles", "The Gang's All Here", "S3 E40", "Shredder tries to trick the Turtles into eating cookies made with anti-mutagen. Michaelangelo, wanting to be a human, tries one of the cookies and it mutates him into a teenager."], [1783571395, 1783572688, "He-Man and the Masters of the Universe", "The Defection", "S1 E37", "Queen Sybilline, apparently once one of the most evil sorceresses in Eternia, has defected to the side of good.  She enlists the help of He-Man and his companions in restoring King Danton of the Isle of Tears to the throne, having helped the evil Gorgon to overthrow him.  But will they succeed, when Gorgon has recruited Evil-Lyn as his replacement sorceress?"], [1783572688, 1783573982, "He-Man and the Masters of the Universe", "Teela's Trial", "S1 E38", "When Man-At-Arms is attacked, Teela uses his new transporter device to teleport him back to the palace. But it accidentally sends him into Skeletor's territory, where he's captured. Blaming herself, Teela exiles herself."], [1783573982, 1783575178, "Power Rangers", "Clean-Up Club", "S1 E37", "The Ranger teens form a Clean-Up Club and take part in cleaning up Angel Grove Park, but Rita has plans of her own and sends the Polluticorn monster after them."], [1783575178, 1783576384, "Power Rangers", "A Bad Reflection on You", "S1 E38", "Rita creates a team of evil duplicates of the Power Rangers to frame them."], [1783576384, 1783577750, "Jem and the Holograms", "The Jazz Player", "S3 E11", "Jem tries to reunite the Tapps Tucket Quartet, an old jazz group. Meanwhile, Eric Raymond is trying to put out a compilation album of jazz songs. Eric and the Misfits do everything in their power to stop the Tapps Tucket Quartet from getting back together so Eric's jazz album can be released."], [1783577750, 1783579115, "Jem and the Holograms", "Danse Time", "S3 E12", "The Holograms want to submit a video with the theme of friendship for a competition. But in the process, Danse is injured. Will she heal in time for them to make the perfect video?"], [1783579115, 1783580499, "Pee-wee's Playhouse", "Episode 12", "S2 E12", "Saturday Morning"], [1783580499, 1783581890, "Pee-wee's Playhouse", "Episode 13", "S2 E13", "Saturday Morning"], [1783581890, 1783583222, "Teenage Mutant Ninja Turtles", "The Grybyx", "S3 E41", "Kala's pet Grybyx, which has a really bad temper whenever it gets hungry, escapes from Dimension X through a portal to Earth, causing trouble for the Turtles."], [1783583222, 1783584552, "Teenage Mutant Ninja Turtles", "Mister Ogg Goes to Town", "S3 E42", "While searching for a device to transform crude oil into liquid hydrogen, Krang accidentally brings Mr. Ogg from Dimension Z to earth."], [1783584552, 1783585847, "He-Man and the Masters of the Universe", "The Starchild", "S1 E39", "He-Man rescues a small girl from danger in the Evergreen Forest, and it turns out that the girl is a magical Starchild- and two tribes in the forest, the Tree People and the Cave People, are fighting for custody of her.  He-Man takes the Starchild back to Palace Eternia with him, so the Royal Family can sort out the custody battle."], [1783585847, 1783587139, "He-Man and the Masters of the Universe", "Orko's Missing Magic", "S1 E40", "When he is practising a magic spell, Orko's magic is stolen by a small creature called a Gronk, which teleports to another world.  The Sorceress traces Orko's magic to the strange world of Omiros, and He-Man and Orko journey there to recover the magic.  On this surreal planet, they find that an evil wizard called Zolt has absorbed Orko's magic and is using it to control Omiros.  They must fight Zo"], [1783587139, 1783588299, "Power Rangers", "Doomsday (1)", "S1 E39", "Rita unveils her own evil Zord as she brings her entire palace from the Moon to Angel Grove."], [1783588299, 1783589425, "Power Rangers", "Doomsday (2)", "S1 E40", "The Power Rangers fight to rescue the citizens of Angel Grove from Rita, Lokar and Cyclopsis."], [1783589425, 1783590790, "Jem and the Holograms", "Roxy Rumbles", "S3 E13", "Roxy wins the lottery and goes home to Philadelphia  to show off her new lavish lifestyle to her old friends. Meanwhile, Jem and the Holograms are in Philadelphia on a tour to promote literacy. What no one knows is Roxy is illiterate. Roxy decides to throw a bigger party than the Holograms and ends up without any money left because she didn't read the fine print on her contracts. In the end, she d"], [1783590790, 1783592157, "Jem and the Holograms", "Alone Again", "S3 E14", "Laura Holloway, a new Starlight Girl with a talent for music, falls victim to Bobby Braddock, a drug dealer at her school. Ashley plays an important role again, this time helping to confront Laura and eventually help the police catch Bobby."], [1783592157, 1783593548, "Pee-wee's Playhouse", "Episode 14", "S2 E14", "Saturday Morning"], [1783593548, 1783594938, "Pee-wee's Playhouse", "Episode 15", "S2 E15", "Saturday Morning"]]}, {"id": "7", "name": "Weather on the 7s", "a": "weather-on-the-7s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/weather-on-the-7s-v2.png", "progs": [[1783501282, 1783522882, "Weather on the 7s", "", "", "Weather on the 7s"], [1783522882, 1783544482, "Weather on the 7s", "", "", "Weather on the 7s"], [1783544482, 1783566082, "Weather on the 7s", "", "", "Weather on the 7s"], [1783566082, 1783587682, "Weather on the 7s", "", "", "Weather on the 7s"], [1783587682, 1783594942, "Weather on the 7s", "", "", "Weather on the 7s"]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783500084, 1783501380, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783501380, 1783502676, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783502676, 1783503986, "Schitt's Creek", "New Car", "S3 E3", "Johnny decides to buy a new car, and he and Moira craft an increasingly elaborate ruse to avoid getting gouged by the dealership. David accompanies Stevie as she says goodbye to her great-aunt and confronts her own mortality in the process. Alexis and Ted negotiate the rules of their professional relationship when Ted receives a gift from a female client."], [1783503986, 1783505296, "Schitt's Creek", "Driving Test", "S3 E4", "As the new owner of the motel, Stevie is in over her head, and Johnny and Moira employ different strategies to discourage Stevie from selling. Meanwhile, Alexis drives a stressed-out David to his driving test, and Alexis finds herself in the unusual position of coaching her older brother."], [1783505296, 1783506597, "Raising Hope", "Jimmy and the Kid", "S2 E6", "Supermarket manager Barney's wicked ex Gloria is in town and gets him to employ her cute teenage son, Trevor. Jimmy's sympathy for the kid turns into panic when Sabrina clearly prefers his wittier humor and boyish charms and Trevor digs her."], [1783506597, 1783507900, "Raising Hope", "Burt's Parents", "S2 E7", "Jimmy, Virginia, Burt, Sabrina, Maw Maw and Hope borrow a house to impress Burt's wealthy parents who have decided at the last minute to celebrate Thanksgiving with the family. Things also get interesting when the real homeowners return early."], [1783507900, 1783509193, "The Goldbergs (2013)", "I Rode a Hoverboard", "S2 E8", "When Adam sustains a severe compound fracture, he lies in school about having ridden a hoverboard, just like Back to the Future II. However, the lie threatens his friendship with Emmy Mirsky. Meanwhile, when the Goldberg family is enamored with a new restaurant, China Garden, Beverly fears that her family does not appreciate her cooking. This leads to a war between her and restaurant employee Mrs."], [1783509193, 1783510490, "The Goldbergs (2013)", "The Most Handsome Boy on the Planet", "S2 E9", "Barry is excited when a modelling representative approaches him, but Erica thinks it's a scam."], [1783510490, 1783511800, "Schitt's Creek", "Rooms by the Hour", "S3 E5", "Johnny puts the motel in jeopardy when he rents rooms to a dubious enterprise and David helps Moira with a film audition."], [1783511800, 1783513109, "Schitt's Creek", "Murder Mystery", "S3 E6", "Johnny and Stevie visit a nearby golf course to pitch a package deal with the motel, but Johnny becomes distracted by his desire to play a round of golf. After agreeing to attend Twyla's murder mystery party, Moira must help her recruit other guests. Alexis entertains a suggestion from Ted to go back to school."], [1783513109, 1783514408, "Raising Hope", "Bro-gurt", "S2 E8", "Virginia encourages the family to submit their own inventions in the National Invention Convention Extravaganza, so they could win the cash prize. Burt and Andrew team up to create unusual flavored yogurt, while Sabrina and Jimmy create a new baby mop."], [1783514408, 1783515706, "Raising Hope", "The Men of New Natesville", "S2 E9", "After being encouraged to be more of a daredevil by Burt, Jimmy jumps at the chance of showing off his bolder side at a party at Frank's house. Frank and Jimmy realize they have shared a common high school bully, and when they try to take him down, they realize their old bully has changed."], [1783515706, 1783517003, "The Goldbergs (2013)", "DannyDonnieJoeJonJordan", "S2 E10", "Beverly is ordered to clean out the garage by Murray, who wants everything gone except for one trunk that he allows her to keep. Meanwhile, Adam and Barry discover Erica's old collection of New Kids on the Block memorabilia."], [1783517003, 1783518292, "The Goldbergs (2013)", "The Darryl Dawkins Dance", "S2 E11", "As the Sadie Hawkins dance approaches, Erica asks Beverly to help her find Barry a date to keep him away from Lainey. But Beverly comes up with a girl that shocks everyone. Meanwhile, Adam gets into a fight with his best friend...Pops."], [1783518292, 1783519601, "Schitt's Creek", "General Store", "S3 E7", "When David contemplates starting a new business in town, Moira uses her seat on town council to protect her son's interests. Alexis discovers high school isn't as easy as it used to be. Johnny reluctantly offers romantic advice to Ivan, the hapless baker, in return for help with the motel's continental breakfast."], [1783519601, 1783520911, "Schitt's Creek", "Motel Review", "S3 E8", "David meets a new friend while setting up his business, Johnny defends Alexis’s schoolwork, and Moira deals with a difficult guest at the motel."], [1783520911, 1783522214, "Raising Hope", "It's a Hopeful Life", "S2 E10", "In this \"It's a Wonderful Life\" themed episode, Jimmy is transported into a cinematic dreamlike state and watches on at a world where he never met Lucy. When he returns to reality he realizes that if Hope had never been born, his life wouldn't be as good. Meanwhile, Virginia, Burt and Maw Maw see a movie that bares a striking resemblance to their day-to-day lives."], [1783522214, 1783523516, "Raising Hope", "Mrs. Smartypants", "S2 E11", "When Hope shows signs of being a baby genius, the family pits themselves against one another to earn their GEDs. While attempting to secure his GED, Jimmy finds out that his old high school teacher, Mr. Swift, is teaching the class."], [1783523516, 1783524808, "The Goldbergs (2013)", "Cowboy Country", "S2 E12", "Beverly can't accept Adam has deep feelings for Dana. Murray watches football with Lainey's dad."], [1783524808, 1783526104, "The Goldbergs (2013)", "Van People", "S2 E13", "When Murray takes Erica's car privileges away, Erica and Barry retaliate by buying their own shabby used black van. Meanwhile, Adam gets voted in the yearbook as \"nicest guy,\" which results in a suspension when he objects."], [1783526104, 1783527414, "Schitt's Creek", "The Affair", "S3 E9", "Moira and Roland find themselves in a compromising situation. Alexis drives a wedge between David and Patrick."], [1783527414, 1783528723, "Schitt's Creek", "Sebastien Raine", "S3 E10", "David’s photographer ex-boyfriend arrives in town to do a photo series on Moira. Johnny and Roland suspect that Bob is cheating at poker."], [1783528723, 1783530025, "Raising Hope", "Gambling Again", "S2 E12", "When Burt starts gambling again to try and win back the items he lost 20 years ago, Jimmy and Virginia get addicted to gambling themselves, which causes them to forget about Shelley's play that Sabrina wrote and Hope stars in."], [1783530025, 1783531328, "Raising Hope", "Tarot Cards", "S2 E13", "Burt hires Barney to help him with his receipts during corporate tax season, and while caught up in the stress Burt accidentally makes a mean comment about Virginia's job, so she decides to change careers and become a tarot card reader. Meanwhile, Sabrina contemplates moving to Africa with Wyatt, upsetting Jimmy."], [1783531328, 1783532627, "The Goldbergs (2013)", "Barry Goldberg's Day Off", "S2 E14", "Barry pretends to be sick so he can have an epic day off -- but things don't go as planned. Pops and Adam try to help salvage Barry's day."], [1783532627, 1783533924, "The Goldbergs (2013)", "Happy Mom, Happy Life", "S2 E15", "Dana and Adam are given a doll to parent for a school project, but end up in jeopardy of failing because of Beverly's \"grand-smothering.\" Meanwhile, Erica tries to get back at Barry for monopolizing her best friend's time by joining the JTP, however her plan doesn't go as expected."], [1783533924, 1783535234, "Schitt's Creek", "Stop Saying Lice!", "S3 E11", "Johnny tries to avoid the spread of lice in the motel. Moira tries to get out of having a flower garden named after her."], [1783535234, 1783536543, "Schitt's Creek", "Friends and Family", "S3 E12", "Johnny and Moira struggle to find a place for their family portrait. David hosts a 'soft launch' of his new store."], [1783536543, 1783537833, "Raising Hope", "Jimmy's Fake Girlfriend", "S2 E14", "Bored and increasingly desperate for a distraction even they can afford, Burt and Virginia try out various hobbies, until they agree improvisation acting fits them scoundrels. Jimmy feels Sabrina a lost cause after her engagement with Wyatt."], [1783537833, 1783539134, "Raising Hope", "Sheer Madness", "S2 E15", "Jimmy and Sabrina continue building their relationship by learning more about their strange habits and childhood fears. Meanwhile, Virginia learns more about a habit Burt has been hiding from her for years."], [1783539134, 1783540429, "The Goldbergs (2013)", "The Lost Boy", "S2 E16", "Adam attends a Phillies game with his dad and ends up lost in the stadium after Murray allows him to leave his seat on his own. Elsewhere, Beverly's guilt trip backfires when Erica and Barry drive off without her during an argument
