on their way home from the mall."], [1783540429, 1783541720, "The Goldbergs (2013)", "The Adam Bomb", "S2 E17", "Adam and Barry get in a prank war, while Erica tries to become a pop star."], [1783541720, 1783543030, "Schitt's Creek", "Grad Night", "S3 E13", "Johnny and Stevie celebrate having a fully booked hotel; David and Patrick go on a date."], [1783543030, 1783544339, "Schitt's Creek", "Dead Guy in Room 4", "S4 E1", "While Moira fears she is responsible for the death of a motel guest, David and Patrick decide to make their budding romance official."], [1783544339, 1783545642, "Raising Hope", "Single White Female Role Model", "S2 E16", "Sabrina is arrested at a protest for civil disobedience, but her two-week sentence in jail is made even worse by a prison attendant who claims that they're old friends. Meanwhile, Virginia saves the Natesville mayor from a public scandal, but Jimmy's political encounter could threaten Sabrina's freedom."], [1783545642, 1783546945, "Raising Hope", "Spanks Butt, No Spanks", "S2 E17", "When a raccoon decides to take residency under the Chance's porch, Virginia and Sabrina work together to try and lure the critter out. Meanwhile, Hope's misbehavior has become such an issue that Virginia and Burt suggest that it might be time for Jimmy to spank her."], [1783546945, 1783548234, "The Goldbergs (2013)", "I Drank the Mold", "S2 E18", "Adam's birthday sleepover goes awry while Barry and Erica compose a song to get Murray to appreciate music."], [1783548234, 1783549526, "The Goldbergs (2013)", "La Biblioteca Es Libros", "S2 E19", "Beverly arranges for Adam's teacher to tutor him in Spanish, a class she can't believe he's failing; at the same time, Barry gets a job delivering pizzas to impress Murray, but meanwhile, Erica is upset that her father hasn't acknowledged the fact that she has been working throughout her teen years."], [1783549526, 1783550835, "Schitt's Creek", "Pregnancy Test", "S4 E2", "Johnny braces himself for the possibility of another baby in the family after finding a positive pregnancy test and David and Patrick search for privacy."], [1783550835, 1783552144, "Schitt's Creek", "Asbestos Fest", "S4 E3", "Moira prepares for her headline debut at the annual Schitt's Creek Asbestos Fest, while David deals with a group of loitering teens in the apothecary."], [1783552144, 1783553447, "Raising Hope", "Poking Holes in the Story", "S2 E18", "Virginia agrees to be a live-in house sitter for her client and look after a troublesome teenage girl. Meanwhile, Maw Maw once again confuses Jimmy with her late husband Wilfrid, so Jimmy and Sabrina play along."], [1783553447, 1783554750, "Raising Hope", "Hogging All the Glory", "S2 E19", "Natesville parish's charitable group's insufferable chairperson Sara Louise expected another term by acclamation, but against better judgment and spousal warnings Burt decides to stand against her. So he can't refuse the perilous duty of minding blind church organist Carl's 'guide pig'."], [1783554750, 1783556044, "The Goldbergs (2013)", "Just Say No", "S2 E20", "Erica tries to educate Beverly about voting. After losing a wrestling match, Barry wants to prove his athletic prowess. Adam makes a TV audition tape for Barry."], [1783556044, 1783557339, "The Goldbergs (2013)", "As You Wish", "S2 E21", "Murray's joy over Adam wanting to play a sport is short-lived once he discovers that it's fencing, and worse yet, he was inspired by a scene from \"The Princess Bride.\" Meanwhile, things don't go exactly as planned when Beverly tries to make a love connection between Barry's wrestling coach and Erica's voice teacher."], [1783557339, 1783558648, "Schitt's Creek", "Girls' Night", "S4 E4", "Alexis and Twyla have a girls' night out and Patrick teaches David about compromise."], [1783558648, 1783559957, "Schitt's Creek", "RIP Moira Rose", "S4 E5", "A rumor of Moira's death appears online and Roland asks Johnny to be his child's godfather."], [1783559957, 1783561253, "Raising Hope", "Sabrina's New Jimmy", "S2 E20", "Sabrina's new study buddy Philip is a gorgeous hunk, so Virginia convinces Jimmy he must be considered a likely rival, probably harder to eliminate than Wyatt. A dirty trick with text messages after stealing her phone does the trick, but only leads to the arrival of another stud, Philip."], [1783561253, 1783562565, "Raising Hope", "Inside Probe (1)", "S2 E21", "Geraldo's stand-in Nancy Grace interviewed the Chance family and friends for a documentary on the Natesville crime cloud since Lucy arrived. As it's finally aired, they, now jealous Sabrina and townsfolk are shocked time and again, how badly evil's shadow struck."], [1783562565, 1783563860, "The Goldbergs (2013)", "Dance Party USA", "S2 E22", "Adam, thinking Pop's good luck might rub off on him, takes a gamble and ends up losing his beloved toys. Meanwhile, Erica's dream of appearing on a popular TV dance show turns into a nightmare when Barry gives her pink eye."], [1783563860, 1783565154, "The Goldbergs (2013)", "Bill/Murray", "S2 E23", "Erica makes a music video to get into college, while Murray and Bill's friendship grows."], [1783565154, 1783566463, "Schitt's Creek", "Open Mic", "S4 E6", "Patrick hosts an open-mic night in an attempt to lure customers into the store, Alexis works on a marketing strategy for the motel, and Moira accidentally learns the sex of Roland's and Jocelyn's baby."], [1783566463, 1783567772, "Schitt's Creek", "The Barbecue", "S4 E7", "The Rose family throws a barbecue to celebrate David and Patrick's four-month anniversary, but an unexpected visitor threatens to destroy their relationship. Also, Alexis struggles to find meaning when she gets a random text from Ted."], [1783567772, 1783569075, "Raising Hope", "I Want My Baby Back, Baby Back, Baby Back (2)", "S2 E22", "After the talk-show discloses in detail how diabolically smart serial killer Lucy survived her mishandled execution and the embarrassed authorities discretely released her, she returns to Natesville and files for custody of Hope. The Chances still can hire no better lawyer the self-confessed incompetent Wally Phipps."], [1783569075, 1783570370, "The Goldbergs (2013)", "Goldbergs Feel Hard", "S2 E24", "Beverly and Murray react as Erica readies to head out of town for the summer, while Barry becomes the school mascot."], [1783570370, 1783571667, "The Goldbergs (2013)", "A Kick-Ass Risky Business Party", "S3 E1", "Lainey, Erica and Barry plan a big party while Lainey's father is out of town. Murray is annoyed by the amount of time Adam spends on the phone talking to Dana."], [1783571667, 1783572976, "Schitt's Creek", "The Jazzaguy", "S4 E8", "After the barbecue fiasco, Stevie takes David to a spa for some consoling, but she bought a honeymoon package making things worse. Johnny impresses the Jazzagals with his talents, but Moira doesn't like his joining the group. Alexis tries out a dating app and dates a cute local."], [1783572976, 1783574286, "Schitt's Creek", "The Olive Branch", "S4 E9", "David tries to rekindle his romance with Patrick, who decides to make him pay for his selfish behavior. Meanwhile, Moira steals Alexis's town council proposal, and Johnny gives Stevie an impractical gift."], [1783574286, 1783575583, "The Goldbergs (2013)", "A Chorus Lie", "S3 E2", "Beverly asks Miss Cinoman to let Adam -- who is going through puberty -- lip sync in the school musical. Murray inspires Erica to go to the homecoming dance with Geoff Schwartz."], [1783575583, 1783576880, "The Goldbergs (2013)", "Jimmy 5 Is Alive", "S3 E3", "Murray's attempt at bonding with Adam goes awry when the two end up fighting over the robot they are building. Barry makes a huge mistake when he accidentally tapes over Beverly's beloved video of his 5th birthday party."], [1783576880, 1783578189, "Schitt's Creek", "Baby Sprinkle", "S4 E10", "For research, Johnny and Moira attend a singles event but get too involved. Alexis runs into an old friend, David agrees to help Jocelyn in planning her baby shower."], [1783578189, 1783579498, "Schitt's Creek", "The Rollout", "S4 E11", "Moira tries to avoid jury duty and David issues a recall on a Rose Apothecary product that causes rashes."], [1783579498, 1783580795, "The Goldbergs (2013)", "I Caddyshacked the Pool", "S3 E4", "Adam is embarrassed when his body begins to change, and he tries to get out of swim class, but Coach Mellor threatens to fail him for not participating; Erica has trouble discovering her identity, and forms her own club, but Barry winds up joining."], [1783580795, 1783582096, "The Goldbergs (2013)", "Boy Barry", "S3 E5", "Upset by Barry's insecurity in their relationship, Lainey sets out to teach him a lesson with Erica's help. However, the situation turns into something totally different and Barry goes to school dressed like Boy George hoping it will change. Meanwhile, Beverly doesn't approve Murray's new mustache so she shaves it off but it backfires."], [1783582096, 1783583405, "Schitt's Creek", "Singles Week", "S4 E12", "Singles Week gets underway just as Jocelyn’s baby arrives, and Patrick takes his relationship with David to the next level."], [1783583405, 1783584918, "Schitt's Creek", "Episode 13", "S4 E13", "Y2K"], [1783584918, 1783586219, "The Goldbergs (2013)", "Couples Costume", "S3 E6", "Adam chooses to spend Halloween night with Dana rather than Beverly, who decides to teach her son a lesson about the dangers of the holiday. Adam regrets taking Barry and Erica's advice to visit a haunted house when he's expected to go back inside to find Dana's lost promise ring."], [1783586219, 1783587519, "The Goldbergs (2013)", "Lucky", "S3 E7", "Barry's dream of having a dog comes true, but he's disappointed when the pup takes an immediate liking to Murray. Beverly is upset not to be included when Erica and Lainey plan a girls-only sleepover."], [1783587519, 1783588828, "Schitt's Creek", "The Crowening", "S5 E1", "While Moira is in Bosnia filming the Crows movie that she hopes will revive her acting career, David attempts to take his relationship with Patrick to new heights."], [1783588828, 1783590137, "Schitt's Creek", "Love Letters", "S5 E2", "A sleep-deprived Moira worries about a stack of old love letters addressed to Johnny from another woman, while David and Stevie are held up at David's store."], [1783590137, 1783591436, "The Goldbergs (2013)", "In Conclusion, Thanksgiving", "S3 E8", "Beverly insists the entire family gather for the holiday, but tension builds when brother-in-law Marvin tricks Pop-Pop into thinking Thanksgiving was at his house.Meanwhile, Pops passes the torch to Barry and Erica to give the holiday toast, resulting in them trying to one-up each other."], [1783591436, 1783592735, "The Goldbergs (2013)", "Wingmom", "S3 E9", "Inspired by “Top Gun,” Barry decides to join ROTC. Convinced it will help discipline him, Murray orders the Captain to prevent Barry from quitting when the going gets tough, prompting Beverly to join Barry, too! Meanwhile, Adam helps Pops get his swag back with a special librarian."], [1783592735, 1783594044, "Schitt's Creek", "The Plant", "S5 E3", "Alexis and Johnny hatch a plan to impress a motel reviewer, while David and Patrick search for a new apartment."], [1783594044, 1783595353, "Schitt's Creek", "The Dress", "S5 E4", "Johnny finds himself under financial pressure with the arrival of Moira’s high-priced red carpet gown for the Crows movie premiere. David is conned into taking a road trip with Stevie."]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783499534, 1783502174, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783502174, 1783504287, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783504287, 1783507175, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783507175, 1783509834, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783509834, 1783512428, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783512428, 1783515022, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783515022, 1783517635, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783517635, 1783520242, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783520242, 1783522851, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783522851, 1783525440, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783525440, 1783528083, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783528083, 1783530672, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783530672, 1783533305, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783533305, 1783535860, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783535860, 1783538500, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783538500, 1783541255, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783541255, 1783543959, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783543959, 1783546650, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783546650, 1783549288, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783549288, 1783552281, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783552281, 1783554921, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783554921, 1783557561, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783557561, 1783560201, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783560201, 1783562314, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls  be losing a key member of the club."], [1783575662, 1783578269, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783578269, 1783580878, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783580878, 1783583468, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783583468, 1783586110, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783586110, 1783588700, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783588700, 1783591332, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783591332, 1783593887, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783593887, 1783596527, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."]]}, {"id": "70", "name": "Groovy TV", "a": "groovy-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/groovy-v2.png", "progs": [[1783500436, 1783501763, "That '70s Show", "Roller Disco", "S3 E5", "Jackie has wonderful news: there's a roller disco competition in Kenosha and she wants Hyde to be her partner.  When she finds that he's more than unwilling, she's left with a choice between Kelso and Fez, and after seeing their moves, she chooses Fez.  This leaves Kelso less than happy, and more than a little jealous.  Red, meanwhile, is being sued by an ex-Price Mart employee for wrongful termin"], [1783501763, 1783503090, "That '70s Show", "Eric's Panties", "S3 E6", "Donna finds a pair of panties in the Vista Cruiser and thinks that Eric is cheating on her with his lab partner.  Everyone is in for a big shock when they find out who the panties really belong to.  Red's doctor's appointment shows that he has high blood pressure, so Kitty puts him on a strict diet, which he finds inedible.  Kelso gains a new nickname due to a mishap in the cafeteria."], [1783503090, 1783504416, "That '70s Show", "Baby Fever", "S3 E7", "Red is not happy when Kitty becomes obsessed with the idea of having another baby after bringing a friend's child home for Laurie to baby-sit.  Laurie is completely at a loss on how to take care of a baby until her maternal instincts eventually kick in.  Donna gets mad at Eric for thinking that she'll stay home with the children when they have their own.  And Hyde and Fez mediate a mock divorce se"], [1783504416, 1783505743, "That '70s Show", "Jackie Bags Hyde", "S3 E8", "It's Veteran's Day and the Formans are getting ready for their annual barbeque after the town parade. Trouble is that Bob, who was only in the National Guard and never saw any action, has inexplicably decided to throw his own barbeque in competition with the Formans. Hyde tells Jackie point blank that he's not interested, inspiring her to bring a date to the Formans' to make him jealous. This ploy"], [1783505743, 1783507069, "That '70s Show", "Hyde's Christmas Rager", "S3 E9", "Living with Bud has some definite benefits; Hyde finds this out when he's having his first Christmas party at Bud's place, and Bud leaves the guys alone with a keg of beer.  Eric suffers the consequences of being bad at quarters, and has to be carried home, where Red and Kitty decide that Bud needs a talking to about proper parenting practices.  Meanwhile, Jackie is desperate for a boyfriend, and "], [1783507069, 1783508396, "That '70s Show", "Ice Shack", "S3 E10", "In order to win Jackie back, Kelso has a master plan: He wants to take Eric, Donna and Jackie to his uncle's ice shack and copy all the sweet things Eric does for Donna. However, Fez knows about the plan and comes along as well. At the shack Fez and Kelso both try to get Jackie. Meanwhile Kitty tells Red to talk to Laurie about her future and Hyde drives Leo and a bag which, according to Leo, cont"], [1783508396, 1783509722, "That '70s Show", "Who Wants It More", "S3 E11", "After an argument, Eric and Donna decide to withhold sex to see who'll cave in first. Red is nearly killed by a falling tree and it changes his whole outlook on life. He starts being nice to people, even Fez, but he soon realizes that that's not who he is. Kelso claims to have seen a UFO."], [1783509722, 1783511050, "That '70s Show", "Fez Gets a Girl", "S3 E12", "Fez has a crush on a girl but is too shy to approach her, so Donna sets them up together. Donna wins two tickets to see Led Zeppelin in concert but Eric can't go because he has to work so she gives one to Fez and the other to Caroline, the girl that Fez has a crush on, because Kelso, Hyde and Jackie keep fighting over who she's going to take. Eric is named Price Mart employee of the month and it g"], [1783511050, 1783512376, "That '70s Show", "Dine & Dash", "S3 E13", "Kelso invites the gang to an expensive dinner but skips on the bill, leaving Eric and Donna in the restaurant with no money. The two of them decide to shed their \"square\" personalities and get back at the gang. Bob is upset that Red didn't offer him a job at Price Mart."], [1783512376, 1783513704, "That '70s Show", "Radio Daze", "S3 E14", "Donna gets a job at a radio station and Eric gets jealous because on the air she's known as Hot Donna and supposedly single. Red gets Earl fired from Fatso Burger but Kitty makes him get Earl his job back. Leo wants to sell his car to Kelso but then changes his mind and gives it to Hyde."], [1783513704, 1783515031, "That '70s Show", "Donna's Panties", "S3 E15", "Eric pulls Donna's pants down in public and reveals her granny panties to everyone.  So he tries to make up by giving her sexy panties on Valentine's Day. When Kelso finds out that Laurie cheated on him he realizes how Jackie must have felt when he cheated on her with Laurie; to Jackie's surprise he doesn't want her to feel sorry for him. Fez asks Caroline to go steady with him and only afterwards"], [1783515031, 1783516358, "That '70s Show", "Romantic Weekend", "S3 E16", "Eric finds a brochure for a nice motel and plans a romantic weekend with Donna, who's glad for the chance to get away from her feuding parents.  Both lie about their whereabouts to their parents.  But the lie blows up in their faces when they learn who their neighbors are at the motel.  Meanwhile, Kelso thinks that he's not a man any more because he can't perform with Pam Macy."], [1783516358, 1783517685, "That '70s Show", "Kitty's Birthday (That's Today?!)", "S3 E17", "It's Kitty's birthday and the only one who remembers is Hyde.  To make up for forgetting, Eric and Red agree to do the most horrifying thing imaginable. Meanwhile, Kelso plans to win Jackie back by being her friend, but it doesn't work the way he thinks it would.  And Hyde learns something disturbing about Caroline when he drives her home in his new car."], [1783517685, 1783519012, "That '70s Show", "The Trials of M. Kelso", "S3 E18", "Jackie tests Kelso to see if she should get back together with him. Fez, Eric and Hyde vandalize an opposing school's locker room because Fez was beaten up by their jocks. Kitty is angry at Bob and Midge for not inviting her and Red to their party until she finds out that Bob and Midge are nudists."], [1783519012, 1783520339, "That '70s Show", "Eric's Naughty No-No", "S3 E19", "Kitty's sister visits and Kitty thinks she's only there to show off that she's more successful. After going to see an X-rated movie, Eric tries a new move on Donna but it freaks her out; Kelso learns that honesty is the best policy."], [1783520339, 1783521665, "That '70s Show", "Holy Craps!", "S3 E20", "Kitty forces Red, Eric, Hyde and Kelso to help out at a church fundraiser. Red spends all of his time at the craps table, Kelso and Hyde cheat at bingo so they can win all the prizes. Eric is busy worrying about his relationship with Donna because a church member told him that his wife was nice too, when they first met, until they got tired of each other. Jackie and Donna tell Fez that Caroline is"], [1783521665, 1783522992, "That '70s Show", "Fez Dates Donna", "S3 E21", "Fez and Donna pretend to date so Caroline will leave him alone, but she stalks him anyways, until Fez tells her he doesn't like her any more. Bob reads the deed to his house and discovers that he owns half of Red's garage but Red sets him straight by turning the deed around and proving him wrong. Eric and Hyde have a pool going on when Kelso and Jackie will fight."], [1783522992, 1783524319, "That '70s Show", "Eric's Drunken Tattoo", "S3 E22", "After reading an entry in Donna's diary, Eric decides to get a tattoo, but things don't turn out the way he planned.  Kitty has Pastor Dave over for dinner and he ends up in the hospital; Jackie tries to get Kelso to sleep so he can repeat something he said before when he was sleeping."], [1783524319, 1783525646, "That '70s Show", "Canadian Road Trip", "S3 E23", "Eric, Hyde, Fez, Kelso and Leo go to Canada to get some beer.  Unfortunately, they get stopped on their way back across the border because Fez lost his green card. Donna tries to convince Jackie that she's being scammed by a modeling agency. Red gets a bonus at work: a Beta Max so he can tape something now and watch it later, but he forgets a vital step in the process."], [1783525646, 1783526979, "That '70s Show", "Backstage Pass", "S3 E24", "Eric gets upset at Donna when she goes backstage at a Ted Nugent concert and then forgets about him; Hyde and Fez get busted for selling counterfeit t-shirts; Kelso tries to be more romantic; and Red and Kitty can't remember how they first met."], [1783526979, 1783528305, "That '70s Show", "The Promise Ring", "S3 E25", "Eric and Kelso buy promise rings for Donna and Jackie. Eric gives Donna the ring but she doesn't react the way Eric thought. Kelso is unsure Jackie would want a ring and hesitates to give it. Meanwhile, Jackie heard Kelso got her a ring and can't wait to get it. Hyde and Fez go cruising for girls."], [1783528305, 1783529701, "That '70s Show", "Episode 26", "S3 E26", "Groovy TV"], [1783529701, 1783531038, "That '70s Show", "It's a Wonderful Life", "S4 E1", "Eric is absolutely devastated over his and Donna's break-up, and spends all day in bed wishing they never had kissed. But asleep an angel comes to show Eric, how his and the gang's lives had turned if he and Donna had never been together."], [1783531038, 1783532367, "That '70s Show", "Eric's Depression", "S4 E2", "Four days after the big break-up, Eric locks himself in his room ignoring Red and Kitty's pleas for him to come out and talk about it. Meanwhile, the gang goes to Funland without Eric, and Kelso gets lost."], [1783532367, 1783533696, "That '70s Show", "Pinciotti vs. Forman", "S4 E3", "Eric kicks Donna out of the basement when she tries to hang out with their friends.  Jackie inspires Donna to compete with Eric over their friends.  The competition threatens to tear the entire group apart.  Meanwhile, Kitty is ecstatic when she learns that Red has become friends with Pastor Dave."], [1783533696, 1783535025, "That '70s Show", "Hyde Gets a Girl", "S4 E4", "Eric and Fez decide Hyde needs a girlfriend so they throw a party and invite lots of pretty girls, and Hyde isn't the only one to meet someone he likes; Eric finds a new way to deal with his depression over losing Donna; Kelso and Bob compete to win a van in a radio station contest."], [1783535025, 1783536353, "That '70s Show", "Bye-Bye Basement", "S4 E5", "After Hyde moves back in with the Formans, Kitty decides to redecorate the basement so she hires Leo and his cousin Theo to do the job. Meanwhile, Donna and Eric engage in post-break-up bickering, while Fez takes up ballet to meet girls only to discover that they consider him one of the girls."], [1783536353, 1783537660, "That '70s Show", "The Relapse", "S4 E6", "Bob is in denial after Midge leaves. Donna seeks comfort in the arms of Eric, who thinks this means they're back together. Kelso and Fez go to the supermarket to try and pick up older women."], [1783537660, 1783538969, "That '70s Show", "Uncomfortable Ball Stuff", "S4 E7", "Donna keeps her promise to accompany Eric to the Pricemart Ball as a friend, but she gets jealous when she sees Eric with another girl. Fez gets a job at the Foto Hut but gets fired for being too efficient and making Hyde and Leo look bad, even though they're the only other two who work there and Leo is the boss. Bob meets a woman at the supermarket."], [1783538969, 1783540298, "That '70s Show", "Donna's Story", "S4 E8", "Eric is upset when Donna writes a story in the school newspaper that sounds exactly like events that happened in their relationship; he decides to write his own story. Red and Kitty have dinner with Bob and his new girlfriend.  Red doesn't like her because she's taught Bob how to stand up for himself.  Kelso invests in a pinball machine but loses out when Fez persuades the owner to get rid of it a"], [1783540298, 1783541606, "That '70s Show", "The Forgotten Son", "S4 E9", "Red has to produce a new Pricemart instructional film, and his choice of actor for the part of \"Stockboy\" leaves Eric stunned. Kitty and Donna become friends, spending time together, and Leo takes Hyde and Fez on a shopping spree after inheriting money from his Uncle."], [1783541606, 1783542934, "That '70s Show", "Red and Stacey", "S4 E10", "Red thinks Pricemart checkout girl Stacey is perfect for his lovelorn son. The girl impresses Red when she justifies her dubious customer relations with a phrase dear to his heart. Red encourages Eric to ask her out and he even offers to assist. But when Red talks to Stacey, she says she's interested in someone else.  Meanwhile, Jackie and Donna give Big Rhonda a makeover for her first date with F"], [1783542934, 1783544263, "That '70s Show", "The Third Wheel", "S4 E11", "When the guys go bowling for boy's night, Hyde throws a wrench in the plan when his \"friend\" Jill shows up. Kelso and Fez decide to hunt down their own ladies and leave Eric to feel like the third wheel. Meanwhile, Donna is uncomfortable when she discovers Bob's new girlfriend is spending the night. When Red unintentionally inspires Pastor Dave to give up the cloth, he gets into trouble with Kitty"], [1783544263, 1783545570, "That '70s Show", "An Eric Forman Christmas", "S4 E12", "Eric thinks that Christmas just isn't as fun as it used to be when he was a kid, so Kitty suggests that he direct the church Christmas pageant.  He has some artistic differences with the gang over how things should go.  Kelso is upset that everyone is making fun of him for wanting to watch Christmas specials on television; and Red is upset over Bob's Christmas decorations."], [1783545570, 1783546898, "That '70s Show", "Jackie Says Cheese", "S4 E13", "Eric catches Red looking through his dresser drawers for a condom and thinks that Red has found Hyde's stash. Jackie gets a job as a cheese maiden and Fez is jealous of the new foreign guy."], [1783546898, 1783548214, "That '70s Show", "Eric's Hot Cousin", "S4 E14", "Eric' cousin Penny, whom he used to tease unmercifully when they were younger, comes for a visit, and she's...grown some. All the guys are infatuated with her, much to Donna and Jackie's dismay.  Jackie and Donna try to be hotter than Penny, with disasterous results.  Kitty, feeling like she's not needed, wants to get a pet."], [1783548214, 1783549542, "That '70s Show", "Tornado Prom", "S4 E15", "A tornado is on its way to Point Place and Red and Kitty are stuck in their basement with Bob and Joanne; Eric is stuck with Donna at the radio station; the rest of the gang is stuck at the school during a dance. Kelso is named the Snow King and Jackie can't believe she's only the Snow Queen runner-up."], [1783549542, 1783550870, "That '70s Show", "Donna Dates a Kelso", "S4 E16", "Eric and Donna both start dating other people; Jackie sets Donna up with Kelso's older brother Casey, while Eric has his pick of the girls at school after being named Point Place High's most eligible bachelor. Fez thinks that he's finally going to lose his virginity, and looks for a place that he and Rhonda can use for that purpose.  Bob becomes rich again and Red buys a Corvette."], [1783550870, 1783552198, "That '70s Show", "Kelso's Career", "S4 E17", "Eric doesn't know what to do when Red says 'I love you', so he decides to say it back, but learns that Red was drugged when he said it. Fez buys Rhonda a box of candies for Valentine's day, then can't help but eat them all. Jackie tells Kelso to get a job so he can buy her something nice for Valentine's day, and he finds a career that suits his interests and hobbies at the same time."], [1783552198, 1783553526, "That '70s Show", "Leo Loves Kitty", "S4 E18", "Hyde tries to teach Fez to drive but Fez damages the car and hurts Leo, who was taking a nap behind the car. While in the hospital Leo falls in love with Kitty and starts showing up at the Formans bearing gifts for her. Kelso becomes a department store model and Jackie is jealous because it's her dream to be a model. She confronts him and demands that he doesn't do it but he stands up to her and d"], [1783553526, 1783554825, "That '70s Show", "Jackie's Cheese Squeeze", "S4 E19", "Eric catches Jackie kissing Todd, her boss, but instead of telling Kelso, he holds it over her head.  Jackie decides to tell Kelso about it herself, as well as telling him that Eric knew all about it.  Both of their plans backfire on them.  Kitty feels neglected and worries about becoming a Corvette-widow when Red spends all his time with his new car."], [1783554825, 1783556153, "That '70s Show", "Class Picture", "S4 E20", "When their class is having their pictures taken for the yearbook, Kelso concentrates on his coy look, but Jackie insists a meaningful personal quote is even more important. Eric's suggestion to put in something about them all starts a lot of memories since their early days when they met as little kids or at school. Eric has another big zit. Donna finally deals with Kelso's frustration to be the on"], [1783556153, 1783557479, "That '70s Show", "Prank Day", "S4 E21", "It's Prank Day according to Kelso, who manages to trick his friends twice with his stunts.  The guys' attempt to retaliate backfires horribly when Red triggers their prank instead.  But rather than venting his wrath on Eric, Red joins the prank war to show the boys how it's done.  Meanwhile, Jackie throws an impromptu slumber party to cheer Donna up on her parents' wedding anniversary."], [1783557479, 1783558808, "That '70s Show", "Eric's Corvette Caper", "S4 E22", "When Red and Kitty go out of town, Eric takes the Corvette out and lets his date drive. She manages to get it all dirty and Eric scrambles to get it clean in time because his parents are coming home early. Jackie and Donna snoop around in Casey Kelso's room while he's away, and discover that Michael likes to hang out there."], [1783558808, 1783560113, "That '70s Show", "Hyde's Birthday", "S4 E23", "Kitty plans a surprise birthday party for Hyde's 18th birthday.  She recruits Jackie and Fez as decorators because of their feminine creativity (much to Donna's annoyance).  Eric, Donna, and Kelso decide to steal a street sign for Hyde's present.  But Hyde doesn't want to celebrate because he thinks this means he'll have to move out of the Formans' house."], [1783560113, 1783561449, "That '70s Show", "That '70s Musical", "S4 E24", "Fez fantasizes about several musical numbers featuring himself and the rest of the gang while he gets ready for a school concert."], [1783561449, 1783562746, "That '70s Show", "Eric's False Alarm", "S4 E25", "When Eric finds out that Casey is taking Donna to a motel, he decides to show up to make sure she doesn't do anything she'll regret.  Bob's divorce from Midge comes through, he mentions marriage to Joanne, who totally freaks out.  Naturally, Red and Kitty are called upon to advise their neighbors, but unfortunately they aren't offering the same advice.  And Kelso stalks Jackie at the mall to preve"], [1783562746, 1783564074, "That '70s Show", "Everybody Loves Casey", "S4 E26", "Kitty decides to throw a neighborhood barbecue after she wins a year's worth of hot dogs.  Eric is upset when he learns Casey is invited, so he devises a convoluted plan to make Casey look bad in front of Donna.  Kelso and Jackie seek relationship advice from Cosmo to uncover the root of their problems.  Fez can't get past second base with Rhonda; Hyde's fed up with how the guys talk about the gir"], [1783564074, 1783565403, "That '70s Show", "Love, Wisconsin Style", "S4 E27", "Kitty and Eric go to the Hub after a dentist appointment and catch Donna (who's drunk) skipping school with Casey. Neither Bob nor Joanne can exert any authority over Donna, so a frustrated Red intervenes while everyone watches. Meanwhile, Jackie suggests that Kelso kiss another girl so that they can reconcile. And Hyde and Fez try to decide what to do with some dead fish that they stole."], [1783565403, 1783566719, "That '70s Show", "Going to California", "S5 E1", "Donna has had enough of the Golden State. She misses Eric, who, although she doesn't know it, is headed West - despite his parents' objections - to declare his love and bring her home. Kelso, however, has decided he has found the woman of his dreams in Annette, who is beautiful and believes in him.  Back in Wisconsin, Jackie is a changed woman, thanks to a change in boyfriends."], [1783566719, 1783568033, "That '70s Show", "I Can't Quit You Baby", "S5 E2", "As punishment for Donna going away to California, Bob transfers her to a Catholic School, which means that Donna won't get to see Eric as much.  Eric is determined to fight for their right to be together, until he sees Donna in her new school uniform.  Jackie and Hyde get caught making out in the basement; Eric and Donna try to convince them to tell Kelso what's going on."], [1783568033, 1783569348, "That '70s Show", "What Is and What Should Never Be", "S5 E3", "Kitty joyfully announces that she's pregnant, but the reaction that she gets from Red leaves a lot to be desired. Eric and Donna continue their campaign to get Jackie and Hyde to tell the truth about their relationship to Kelso. A trip to the DMV seems to present the perfect opportunity, but Fez is the one who seizes the day rather than Hyde."], [1783569348, 1783570664, "That '70s Show", "Heartbreaker", "S5 E4", "Kitty's parents arrive from Arizona, after being told that Kitty has some wonderful news to share with them. Kitty's news isn't what she thought it would be, and throws a damper on the high spirits. Donna learns a thing or two from Bea about getting people to do things, while Eric and Red learn a thing or two from the World Book about \"lady problems.\" Kelso works out his feelings about Jackie and "], [1783570664, 1783571980, "That '70s Show", "Ramble On", "S5 E5", "In a romantic moment, Donna presents Eric with a ring, much like the promise ring that he gave her, and caused their break up.  For Donna, the ring symbolizes their enduring love and committment; for Eric, it symbolizes ugliness.  To protect Donna's feelings, he decides not to say anything, but the secret gains a life of its own.  Kitty is determined not to let menopause affect her life, but has a"], [1783571980, 1783573265, "That '70s Show", "Over the Hills and Far Away", "S5 E6", "The kids prepare to make a weekend college visit to the University of Wisconsin. There's only one snag in the plan: Donna tells Eric that Bob will not let her go to UW. Instead he wants her to visit Marquette, a small Catholic college. So Donna and Jackie visit Marquette, where Jackie spends her time worrying about Hyde; the guys go to UW with Red and a very irritable Kitty."], [1783573265, 1783574574, "That '70s Show", "Hot Dog", "S5 E7", "When Eric decides to buy Donna a meaningful gift, he ends up getting her an engagement ring. But after discussing it with the guys, he realizes they are too young and the ring was a bad idea. Unfortunately, Eric already told Donna he got her a surprise and on their special evening out, he's put on the spot and forced to make the biggest decision of his life. Meanwhile, in an attempt to lift menopa"], [1783574574, 1783575889, "That '70s Show", "Thank You", "S5 E8", "It's Thanksgiving day and Eric can't tell Red about failing math or about his secret engagement to Donna. Red may reward Eric's (alleged) maturity at dinner, and Kelso is 'dating' Eric's math teacher. Kitty's Mom and Dad add to the chaos."], [1783575889, 1783577199, "That '70s Show", "Black Dog", "S5 E9", "When Jackie's father is arrested for bribery, Kelso thinks she'll come running back to him. But when Hyde and Kelso get into a brawl over Jackie, Kelso accidentally shoots Hyde with a BB gun and all hell breaks lose. Donna and Eric argue over how Hyde should deal with Jackie's pain.  Meanwhile, Fez realizes he has a crush on his boss at the DMV."], [1783577199, 1783578515, "That '70s Show", "The Crunge", "S5 E10", "The S.A.T. scores have come in and everyone does significantly better than Eric.  He's particularly upset by Donna's high score and blames her for distracting him during the exam.   As a result, Eric enlists Red to help him buckle down and stay away from Donna until he retakes the test.  Meanwhile, Kelso discovers that he may have a bright future and Jackie pushes Hyde towards a college career."], [1783578515, 1783579798, "That '70s Show", "The Girl I Love", "S5 E11", "When Fez decides to introduce his new girlfriend, Nina, to the gang, Kitty offers to throw a dinner party for the event. The guys resent being dragged to a dinner party, while the girls are excited at the thought of a grown-up night."], [1783579798, 1783581114, "That '70s Show", "Misty Mountain Hop", "S5 E12", "With Jackie's dad in prison for bribery, he is now broke and the bank foreclosed on his cabin so Kitty elects her, Red, Eric, and Donna to help Jackie clean out the cabin. Jackie doesn't want Hyde to know so she tells him she tells him she's going to a doll expo. Hyde takes this as an opportunity to go to Jackie's dad's cabin with Kelso and Fez for a guy's weekend."], [1783581114, 1783582428, "That '70s Show", "Your Time Is Gonna Come", "S5 E13", "Annette, Kelso's girlfriend from California, comes to Point Place to visit him.  The entire gang is shocked to learn how closely her personality resembles Jackie's, while Jackie tries to conceal her jealousy from Hyde.  Meanwhile, Kitty's parents show up unexpectedly and announce that they'll be moving in for a while.  This unpleasant situation gets far worse when Eric finds his grandfather collap"], [1783582428, 1783583742, "That '70s Show", "Babe I'm Gonna Leave You", "S5 E14", "Hyde's depressed that Jackie still seems to have feelings for Michael. Annette's not happy either, because Kelso seems to still be attached to Jackie. And Kitty takes to her bed, because she feels her mother doesn't love her."], [1783583742, 1783585048, "That '70s Show", "When the Levee Breaks", "S5 E15", "When Bob goes out of town, Eric and Donna decide to \"practice\" being married at her house. The gang is excited because they think this is a chance to party all weekend at the Pinciotti's place, until Eric and Donna are forced to set them straight. Meanwhile, Kitty goes to the jewelers to pick up a ring she thinks Red got her as a surprise. But she discovers the real surprise: it's actually an enga"], [1783585048, 1783586363, "That '70s Show", "Whole Lotta Love", "S5 E16", "Red is angry that Donna and Eric are engaged, so he gives Eric the silent treatment, leaving it up to Donna to try to talk to him.  Fez finally does it with Nina; he's happy that he finally did it, but afterwards, things aren't so great.  Kelso gives Jackie a birthday present, but insists that he's not trying to do anything; Hyde didn't even know it was her birthday."], [1783586363, 1783587655, "That '70s Show", "The Battle of Evermore", "S5 E17", "Things are still bad between Red and Eric, so Kitty signs them up for the Point Place Paul Bunyan Pioneer Days Jamboree.  The estranged men must work together in order to beat Charlie and Mitch, an obnoxious father/son team who have won the past two years.  Meanwhile, Hyde doesn't understand why Leo hasn't called him back to work in a while.  He takes the gang to the Foto Hut only to find the plac"], [1783587655, 1783588940, "That '70s Show", "Hey, Hey What Can I Do", "S5 E18", "Everyone has their own reasons for going to the job fair. Eric needs a full-time job now that Red refuses to pay for college. The Photo Hut is closed, so Hyde's looking for work too. Fez wants to make out with Nina at the DMV booth while \"Hot Donna\" will be signing autographs at the radio station's booth. And after failing to flirt his way out of a parking ticket, Kelso fears that his good looks w"], [1783588940, 1783590245, "That '70s Show", "Bring It on Home", "S5 E19", "The Formans discover that Jackie has been sleeping in Hyde's room since neither of her parents are home.  The best solution that everyone can come up with is for Jackie to move in with Bob and Donna, but unforunately Jackie doesn't appreciate everyone's pity.  Meanwhile, Red gives Eric a hard time when he finds out that his son sleeps nude.  And Fez has dinner at Nina's house, where he learns that"], [1783590245, 1783591561, "That '70s Show", "No Quarter", "S5 E20", "The Pinciottis learn very quickly that living with Jackie is going to be difficult.  Kelso swipes Jackie's panties to taunt Hyde, who has his revenge when Kelso gets a job at the hotel kitchen where Hyde works.  Eric receives notice that he must return Donna's engagement ring if he can't make a payment by Friday.  His visits to the jewelry store reveal that there's bad blood between Fez and Fenton"], [1783591561, 1783592872, "That '70s Show", "Trampled Under Foot", "S5 E21", "Nina breaks up with Fez, although he doesn't realize it until the gang sets him straight. It turns out that Nina thinks Fez is too needy. As for the others, they decide to rejuvenate their dull lives by finding another friend to hang out with. Kitty has one candidate in mind, but she has an ulterior motive."], [1783592872, 1783594187, "That '70s Show", "You Shook Me", "S5 E22", "Hyde turns down a hot nurse out of faithfulness to Jackie, then demands that Jackie not hang out alone with Kelso any more. The recent nurse convention at the hotel inspires Fez to have an erotic dream about a nurse…who turns out to be Kelso! Naturally, Kelso freaks out, and he turns to his ex for comfort. Meanwhile, Eric accepts a job at the dog food factory where Joanne works in order to earn en"], [1783594187, 1783595502, "That '70s Show", "Nobody's Fault But Mine", "S5 E23", "Hyde cheats on Jackie because he thinks she still loves Kelso. After realizing his mistake, he apologizes to her but she breaks up with him. Red and Kitty dare Eric and Donna to get married by graduation in order to pressure them into calling off their engagement. Their plan works, but a little better than they expected. Fez refuses to give Mitch Miller his driver's license, so Mitch digs up dirt "]]}, {"id": "75", "name": "Late Nite", "a": "late-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/late-nite-v2.png", "progs": [[1783501071, 1783502446, "In Living Color", "Dickie Peterson: Cherub of Justice", "S2 E25", "Sketches include:\n\n\"\"Dickie Peterson: Secret Service\"\"   \"\"A New 911 Message Service\"\"   \"\"Frenchie at the Opera\"\"   \"\"Clear Conscience Fur Farm and Outlet Store\"\"   \"\"Velma Sings\"\"   \"\"Visiting Day for Oswald\"\""], [1783502446, 1783503225, "Robot Chicken", "Rabbits on a Roller Coaster", "S3 E3", "Randy experiences cross-dressing as the Pink Ranger and death in The Worst Halloween. The crew of Battlestar Galactica defeats the FCC threat. Dick Tracy earns his name. Behold, the newest adventure of Turbo Teen. M.A.S.K.’s Matt Tracker takes a bride."], [1783503225, 1783503886, "Robot Chicken", "Tapping a Hero", "S3 E4", "Law & Order has never been c lor", "Home Alone Again", "S3 E6", "Sketches include Minute Maiden / Vera Demilo / Coyote Ugly Escape Kit / The Brothers Brothers / Adopt A TV Child / Home Alone Again / Ninja Home Security System / Nice N Smooth perform \"Hip-Hop Junkies\""], [1783516729, 1783518044, "In Living Color", "The Jackson Bunch", "S3 E7", "Sketches include Environment Guy / Ice Poe / The Jackson Bunch / D.A.R.E. / Sam And Samantha Kinison"], [1783518044, 1783518734, "Robot Chicken", "Help Me", "S4 E1", "Seth and Matt enlist the help of Joss Whedon, Ron Moore and Seth MacFarlane to get their show renewed. PaRappa the Rapper is facing criminal charges when he takes his teacher's advice and does a rap that rats out the real criminal. Filming of an episode of Tila Tequila's \"A Shot at Love\" is interrupted when it's revealed that she's an experimental cyborg. Movie and TV favorites are trimmed down to"], [1783518734, 1783519430, "Robot Chicken", "They Took My Thumbs", "S4 E2", "A contractor demonstrates the various death traps being built to protect a temple from intruders. Jason Voorhees gets ready for Friday the 13th. Wildman shares some summer fun tips with a group of kids. What happens when the Justice League struggle through \"Bring a Sidekick to Work Day?\""], [1783519430, 1783520720, "In Living Color", "Late Night with Mike Tyson", "S3 E8", "Sketches include Paula Abdul / Les & Wes / Mike Tyson Show / Stereotype Woman / Timbuk / Big Daddy Kane performs \"Ooh, Aah, Nah-Nah-Nah\""], [1783520720, 1783521918, "In Living Color", "Krishnia Cop", "S3 E9", "Sketches include David Duke / Krishna Cop / Bill Benson / 48 Hours Again - Oswald Bates / Crystal Waters / Head Detective / Queen Latifah performs"], [1783521918, 1783522583, "Robot Chicken", "I'm Trapped", "S4 E3", "Homonyms are explained in an educational musical. Vice President Dick Cheney is captured by terrorists and held captive along with Tony Stark. The truth behind James Bond's sex life is revealed. Skeletor's plot involving a less-than-perfect clone of He-Man doesn't work out well."], [1783522583, 1783523249, "Robot Chicken", "In a DVD Factory", "S4 E4", "It's been said that \"only\" a silver bullet can kill a werewolf, but we'll see about that! Witness the secret origin of Composite Santa Claus. The amount of advance planning Daredevil has to make in advance of a dramatic entrance is revealed. As the world mourns Hannah Montana's death, her friends continue to protect her secret identity as Miley."], [1783523249, 1783524624, "In Living Color", "My Left Foot of Fury", "S3 E10", "Sketches include My Left Foot Of Fury / Wilt Chamberlain Wall / Frenchie / Skully / Men On Film"], [1783524624, 1783526000, "In Living Color", "Anton And The Reporter", "S3 E11", "Sketches include Jimmy Swaggart / Anton And The Reporter / Cal Hoon Tubbs / Benita Butrell / L.L. Cool J \"Mama's Gonna Kick Me Out\""], [1783526000, 1783526679, "Robot Chicken", "Tell My Mom", "S4 E5", "Joey Fatone gives a pitch for a new sketch featuring himself. Sam Witwicky gets new scooter. The true story is revealed behind Billy Joel's hit single, Piano Man. Annie learns about orphans in various countries. If you have a problem and the A-Team can't be reached, maybe you should hire the B-Team!"], [1783526679, 1783527341, "Robot Chicken", "PS Yes, In That Way", "S4 E6", "Billy Dee Williams goes shopping. The Peculiar Purple Pie Man gets accused of stealing Black Cherry Pie's black cherry. The Henderson family says goodbye to Harry, and get an unwelcome sendoff from his cousin in return. G.I. Joe takes on a new member, but they take the razzing a little too far."], [1783527341, 1783528719, "In Living Color", "Sidekick in Nam", "S3 E12", "Sketches include HBO's Tired Comedy Night / The Cosby Condom / Lil Magic / Testy Shields / Wanda / Side Kick In Nam"], [1783528719, 1783530085, "In Living Color", "Santa Fire Marshall Bill", "S3 E13", "Sketches include Equity Express Card / Great Moments In Black History / Fire Marshall Bill As Santa C
