783554055, 1783554716, "Robot Chicken", "Major League of Extraordinary Gentlemen", "S5 E7", "The creators give us the best 60 seconds in TV history! Plus find out how the ice cream sundae was created; what having \"Spider-sense\" is really like, and if the Keebler Elves can defend their home against their greatest enemy: The Cookie Monster!"], [1783554716, 1783555366, "Robot Chicken", "Schindler's Bucket List", "S5 E8", "Baby needs-a-name, from Strawberry Shortcake, gets a name no one will ever forget; a roast for Cobra Commander has a surprise ending and the creators finally reveal the secret of what happened to Skeeter from Muppet Babies."], [1783555366, 1783556739, "In Living Color", "Cousin Elsee", "S3 E26", "Sketches include Crazy Polident / Les And Wes / Cousin Elsee / Howard Tibbs III & Clavell \"Funky Finger Productions\" / Heavy D & the Boys perform \"You Can't See What I Can See\""], [1783556739, 1783558115, "In Living Color", "Silly Cone", "S3 E27", "Sketches include Silly Cone / Ms. Bonita / LaShawn the Tour Guide / Fire Marshall Bill / MC Lyte performs Poor Georgie"], [1783558115, 1783558812, "Robot Chicken", "No Country for Old Dogs", "S5 E9", "Is the voice that Mortal Kombat's Johnny Cage hears real or just in his own head? Also, the creators tackle the question of what was going through Morgan Freeman's mind during his 2008 car crash. Find out what happens when a group of mentally challenged soldiers take on Hitler and the SS."], [1783558812, 1783559497, "Robot Chicken", "Catch Me If You Kangaroo Jack", "S5 E10", "The creators ponder what a Diablo Cody eulogy would be like - home-skillett; the Joker finally gets what's coming to him and find out how the Robot Chicken Nerd would fare in the world of Tron."], [1783559497, 1783560188, "Robot Chicken", "Beastmaster & Commander", "S5 E11", "The creators imagine what CHiPs would have been like if the cops had actual potato chip heads, a magical zebra helps out a man with a broken cell phone, Green Lantern wears his ring on another part of his body, and the Bloopers Host returns with clips from his life."], [1783560188, 1783560967, "Robot Chicken", "Casablankman", "S5 E12", "See! Rubik the Amazing Cube as he returns for one last adventure. Watch! As kids try out the newest fad - getting Supe'd. Discover! The secret behind a small doorway in a little boys room. And finally, the creators imagine what Eternia's 24-hour gym might be like."], [1783560967, 1783561624, "Robot Chicken", "The Departy Monster", "S5 E13", "Will the world ever find out what Master Chief looks like under his mask? What is life like for the pink Frankenstein's Monster, Frankenberry? How did Princess Toadstool's parents react when they first met Mario? How will the Scarecrow survive his time in the prison called Oz? The creators answer these questions and more in this thrilling episode!"], [1783561624, 1783562280, "Robot Chicken", "Some Like It Hitman", "S5 E14", "Think being a witch or wizard would be fun? The creators show you what life in Hogwart's would really be like. Ever wonder why Winnie the Pooh likes honey so much? Can you say addict? Find out why Donald Duck's nephew's spend so much time with their uncle instead of their mother. All that, plus find out who's ass Tommy Tapeworm will come wriggling out of."], [1783562280, 1783562944, "Robot Chicken", "The Core, The Thief, His Wife and Her Lover", "S5 E15", "The creators imagine just how far Kratos, from the God of War series, will go to collect blood orbs. Superman flies back through time so he won't have to hear Lois whine...ever again. The Velveteen Rabbit gets a raw deal. And what did the aliens from Close Encounters of the Third Kind really come to prove?"], [1783562944, 1783563597, "Robot Chicken", "The Godfather of the Bride II", "S5 E16", "Remember when MTV used to actually be about music? The MTV logo does and it's out for revenge. The Robot Chicken Nerd dreams of hanging out with Michael Knight from Knight Rider. A bunch of Spocks from the future gather for a surprise party and the creators imagine what television will be like in the year 2013."], [1783563597, 1783564245, "Robot Chicken", "The Curious Case Of The Box", "S5 E17", "The creators re-imagine the moment before death in Reaped, Dora the Explorer conquers Mt. Everest, God gets busted in the Garden of Eden, and witness the most horrifyingly hysterical car clown crash in history."], [1783564245, 1783564902, "Robot Chicken", "Fool's Goldfinger", "S5 E18", "Magneto makes Iron Man a ballet legend in Iron Marionette, Morpheus leaves a message on Neo's answering machine, Walt Whitman causes trouble for a modern day high school student and the creators imagine a musical number from Grand Theft Auto's Gay Tony."], [1783564902, 1783565575, "Robot Chicken", "Casablankman II", "S5 E19", "Ever wonder how Doc Brown got the plutonium from the Libyan terrorists? Find out here! The creators imagine what it would be like if Jesus came down to talk to us normal humans. See what life would be like for Bella and Edward, who is a 109-year-old vampire."], [1783565575, 1783566223, "Robot Chicken", "Fight Club Paradise", "S5 E20", "The creators imagine what the movie Sex and the City 3 will be like if made more guy friendly, Yogi Bear battles with the Power Rangers from Jellystone Park, find out why no one cares about Woody Woodpecker anymore and see the nail biting, hair raising, super big finish of Season Five in Robot Chicken's 100th episode finale!"], [1783566223, 1783566875, "Robot Chicken", "Episode 21", "S5 E21", "Late Nite"], [1783566875, 1783567558, "Robot Chicken", "Executed by the State", "S6 E1", "G.I. Joe is put up to his biggest challenge yet. Find out what being a vegetarian is really all about. The creators answer the questions surrounding Starbucks famous logo."], [1783567558, 1783568247, "Robot Chicken", "Crushed by a Steamroller on My 53rd Birthday", "S6 E2", "Alvin and the Chipmunks have a wild time after a concert. Mary Poppins isn't quite the nanny anyone expected. Find out why B.A. Baracus hates flying so much. G.I. Joe in a real war situation in Afghanistan."], [1783568247, 1783568932, "Robot Chicken", "Punctured Jugular", "S6 E3", "Robot Chicken pitches \"The Fast and the Furious 6\"; We see Wilson from \"Cast Away\" in a \"Bourne Identity\"-type role; We find out what Odd Job does on his day off; The writers dream how different Scooby-Doo would be if Lisbeth Salander joined them."], [1783568932, 1783569614, "Robot Chicken", "Poisoned by Relatives", "S6 E4", "The truth behind Osama Bin Laden's death according to Robot Chicken. The Shirt Tales take to the skies in WWII. King Don rules with an iron fist and creamy goodness. What happens when overweight cartoon characters join the cast of The Fattest Fat Loser!"], [1783569614, 1783570291, "Robot Chicken", "Hurtled from a Helicopter into a Speeding Train", "S6 E5", "Middle-Earth will never be the same after Robot Chicken takes on \"The Lord of the Rings\"; We imagine what happens when Elijah finally makes it home for Passover Seder; Elliot and E.T. have another adventure."], [1783570291, 1783570947, "Robot Chicken", "Disemboweled by an Orphan", "S6 E6", "Gadget has a surprise in store; Frosty goes through a change; and two Eternia tourists witness a battle between He-Man and Skeletor."], [1783570947, 1783571607, "Robot Chicken", "In Bed Surrounded by Loved Ones", "S6 E7", "The Robot Chicken writers show you why you don't want to prank Apache Chief; We delve deep into the Lego world; What would happen if we got rid of all the wolves?; The creators show the good times catching up with Captain Kirk."], [1783571607, 1783572261, "Robot Chicken", "Choked on Multi-Colored Scarves", "S6 E8", "Robot Chicken dreams up a TV theme song that just keeps going and going; The Robot Chicken Nerd joins Team Fortress; She-Ra knows what it feels like to be her horse, Swift Wind; We show you Skeletor's new plan to take over Eternia."], [1783572261, 1783572923, "Robot Chicken", "Hemlock Gin and Juice", "S6 E9", "Dora the Explorer turns 15; the reason behind Angry Birds' rage is revealed; and Thomas the Tank Engine meets an explosive end."], [1783572923, 1783573580, "Robot Chicken", "Collateral Damage in Gang Turf War", "S6 E10", "E.T. takes over an ER; Harry Potter lands in a not-so-magical situation; the reason why Black Widow and Hawkeye remain part of the Avengers is revealed; and the characters encounter zombies."], [1783573580, 1783574370, "Robot Chicken", "Eviscerated Post-Coital by a Six Foot Mantis", "S6 E11", "A brand new eco-friendly addition to Sesame Street; what happens when Mario from Super Mario Bros. gets rich; and some kind of Pinky & the Brain spoof."], [1783574370, 1783574979, "Robot Chicken", "Butchered in Burbank", "S6 E12", "How to bring Monopoly to the silver screen; Dracula hosts a dinner party; The Little Mermaid travels up the Hudson River to New York."], [1783574979, 1783575661, "Robot Chicken", "Robot Chicken's ATM Christmas Special", "S6 E13", "Santa almost misses Christmas; Kano spends the holidays with Mrs. Cage; Justin Bieber releases a new song; and G.I. Joe has a special Christmas."], [1783575661, 1783576327, "Robot Chicken", "Papercut to Aorta", "S6 E14", "Rocky and Bullwinkle in Of Moose and Men; Badtz-Maru has a bad day."], [1783576327, 1783576980, "Robot Chicken", "Caffeine-Induced Aneurysm", "S6 E15", "Robot Chicken brings you the facts about what really happened to the helicopter from Airwolf; We show you how we see iCarly's final episode going; Our rendition of the song Dr. Noonian Soong rapped after creating Data."], [1783576980, 1783577657, "Robot Chicken", "Eaten by Cats", "S6 E16", "What The Teletubbies would be like as the next generation of Power Rangers; Doc Brown just can't get his time machine right; Parappa the Rapper teams with 50 Cent in our crazy world."], [1783577657, 1783578323, "Robot Chicken", "Botched Jewel Heist", "S6 E17", "Robot Chicken takes on sexual politics with The Disney Characters; We imagine what would happen when Jason Voorhees and Michael Meyers finally meet; The creators come up with a new rap for pescatarians and we show you the future of our holidays."], [1783578323, 1783578990, "Robot Chicken", "Robot Fight Accident", "S6 E18", "The Robot Chicken Nerd tackles the role of Little Red Riding Hood; see The Avengers in their new Broadway show; the next version of the next Aliens film is imagined."], [1783578990, 1783579655, "Robot Chicken", "Choked on a Bottle Cap", "S6 E19", "The Humping Robot attacks the U.S. Navy in Battlehump; an intervention for M.A.D. Cat; imagine how the Thundercats learn about estrus."], [1783579655, 1783580328, "Robot Chicken", "Immortal", "S6 E20", "A look inside the Oompa Loompa writer's room; Jesus returns to his home in Heaven; a new twist on Cabin in the Woods."], [1783580328, 1783580994, "Robot Chicken", "Episode 21", "S6 E21", "Late Nite"], [1783580994, 1783581670, "Robot Chicken", "Episode 22", "S6 E22", "Late Nite"], [1783581670, 1783582336, "Robot Chicken", "Episode 23", "S6 E23", "Late Nite"], [1783582336, 1783582996, "Robot Chicken", "Episode 24", "S6 E24", "Late Nite"], [1783582996, 1783583655, "Robot Chicken", "Episode 25", "S6 E25", "Late Nite"], [1783583655, 1783587593, "Saturday Night Live", "George Carlin with Billy Preston and Janis Ian", "S1 E1", "Live from New York, It's... George Carlin!\n\nSketches Include: Wolverines, New Dad Insurance, The Courtroom, Victims of Shark Bite, Jamitol, Triopenin, Jim Henson's Muppets, Bee Hospital, Academy of Better Careers, Show Us Your Guns, Trojan Horse Home Security, Triple-Trac"], [1783587593, 1783591550, "Saturday Night Live", "Paul Simon with Randy Newman and Phoebe Snow", "S1 E2", "Live from New York, It's... Paul Simon!\n\nSketches Include:  The Berkeley Collection, Bees, Jim Henson's Muppets, Try-Hard 1-11"], [1783591550, 1783592932, "In Living Color", "Pilot", "S1 E1", "Skit #1 \"Love Connection: Jewish Woman Dates a Black Man\" Skit #2 \"Great Moments in Black History: First Black Man on the Moon\" Skit #3 \"Homeboy Shopping Network\" Skit #4 \"Redd Foxx for Hire\" Skit #5 \"Equity Express\" Skit #6 \"Men on Film\""], [1783592932, 1783594312, "In Living Color", "The Wrath of Farrakhan", "S1 E2", "Arsenio Hall welcomes Marion Barry to his show. Also: Keenen and Damon Wayans introduce the \"Do-It-Yourself Milli Vanilli Kit.\""], [1783594312, 1783595010, "Robot Chicken", "Junk in the Trunk", "S1 E1", "Rachael Leigh Cook smashes more than eggs in her latest This Is Your Brain on Drugs public service announcement. Optimus Prime, leader of the Autobots, falls prey to prostate cancer. The outcome is never in doubt during \"World's Most One-Sided Fistfights Caught on Film.\" Outtakes from The Dukes of Hazzard, The X-Files, Battlestar Galactica and more come to light in \"Bloopers.\""]]}, {"id": "80", "name": "I Heart 80s", "a": "i-heart-80s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/iheart80s-v2.png", "progs": [[1783500021, 1783501356, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783501356, 1783502725, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783502725, 1783504065, "Teenage Mutant Ninja Turtles", "Attack of the 50-Foot Irma", "S3 E3", "Irma accidentally becomes gigantic and her naturally clumsy nature makes her a danger to the city."], [1783504065, 1783505403, "Teenage Mutant Ninja Turtles", "The Maltese Hamster", "S3 E4", "Gangsters are swiping all the antiques in town. And when they swipe most of our heroes, it's up to Donatello and April to find out why. Could Shredder be behind this?"], [1783505403, 1783507193, "Pee-wee's Playhouse", "Episode 25", "S1 E25", "I Heart 80s"], [1783507193, 1783508592, "Pee-wee's Playhouse", "Open House", "S2 E1", "Today in the \"Playhouse,\" Pee-wee tricks his friends into doing all of his chores by pretending that work is fun. The gang meets some new friends while renovating the \"house.\" Reba arrives in time to deliver Clocky while the Playhouse gang uncovers Floory and meets Mrs. Rene for the first time."], [1783508592, 1783509891, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783509891, 1783511186, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783511186, 1783512582, "The Wonder Years", "How I'm Spending My Summer Vacation", "S2 E17", "As the end of school approaches, Kevins looks forward to spending the summer with Paul and Winnie. However, his summer is spoiled when Paul tells hims that he'll be leaving for summer and Winnie seems to be avoiding him."], [1783512582, 1783514308, "The Wonder Years", "Episode 18", "S2 E18", "I Heart 80s"], [1783514308, 1783515610, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783515610, 1783516976, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783516976, 1783518313, "Teenage Mutant Ninja Turtles", "Sky Turtles", "S3 E5", "The Turtles go flying when the Shredder invents a gravity-altering device."], [1783518313, 1783519648, "Teenage Mutant Ninja Turtles", "The Old Switcheroo", "S3 E6", "The personalities of Shredder and Splinter are switched when a device is accidentally activated during a battle between the Turtles and their enemies. As Shredder plans the Turtles' demise and Splinter plans on how to get back to his body, everyone else is clueless."], [1783519648, 1783521046, "Pee-wee's Playhouse", "Puppy In the Playhouse", "S2 E2", "Cowntess, just back from a world cruise, is showing some of her home movies from the trip. Globey teaches Pee-wee how to say \"hello, my name is Pee-wee\" in French and Chinese! When a lost puppy appears at the Playhouse door, no one can figure out who the owner is. Pee-wee develops a strong case of puppy love and decides to keep him and name him Aloysius. However, Reba comes \"over,\" and it's obviou"], [1783521046, 1783522438, "Pee-wee's Playhouse", "Store", "S2 E3", "Pee-wee and Cowboy Curtis take a leap into Magic Screen where they enjoy some mighty fine handcart ridin' until a train chases them back into the waiting arms of Chairry! Then, Cowboy Curtis sings a song with \"more\" of the secret word in it than you could scream at. Finally, Cowboy Curtis and Miss Yvonne go shopping at Pee-wee's \"department store\" where they decide to buy Chairry!"], [1783522438, 1783523734, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783523734, 1783525031, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783525031, 1783526276, "The Wonder Years", "Episode 19", "S2 E19", "I Heart 80s"], [1783526276, 1783527678, "The Wonder Years", "Summer Song", "S3 E1", "The Arnold family and Paul Pfeiffer travel to Ocean City for a little fun in the sun. However, once there, no one really seems to be having any. Paul's allergies flare up, and Wayne and Karen's attitudes are making it nothing like the family trips from long ago. Kevin is still stinging from the news the Winnie Cooper has a new boyfriend, until he meets a cute (but older) girl named Teri."], [1783527678, 1783529044, "Jem and the Holograms", "Scandal", "S3 E3", "The Holograms, the Misfits, and Shawn Harrison (the British teen idol Kimber met in The World Hunger Shindig, and has asked her to write a song for him to perform) are all in Venice Beach. The Holograms are supposed to go on Harriet Horne's show, which is a famous celebrity gossip show. While the Holograms think they are not much to gossip about, Jetta steals Kimber's diary and publishes it. Tablo"], [1783529044, 1783530411, "Jem and the Holograms", "One Jem Too Many", "S3 E4", "Jerrica, stressed-out from dealing with tax forms and problems with the Starlight record company and home for girls, gets into trouble with a nasty tempered Jem impersonator, who turns out to be Clash disguised in one of The Misfits' plots to ruin Jem."], [1783530411, 1783531750, "Teenage Mutant Ninja Turtles", "Burne's Blues", "S3 E7", "In the middle of a summer heat wave, someone is destroying all the air conditioners and taking all the city's freon. In the meantime, Vernon and Burne go looking for the Turtles, but find something else."], [1783531750, 1783533089, "Teenage Mutant Ninja Turtles", "The Fifth Turtle", "S3 E8", "A 14-year-old boy tries his best to help out the Turtles, but with some not so optimal results."], [1783533089, 1783534477, "Pee-wee's Playhouse", "Pee-wee Catches a Cold", "S2 E4", "Today the secret word is \"out,\" but Pee-wee is stuck in when he overdoes it and comes down with a cold! It's lovely Nurse Yvonne and ultra-health conscious Ricardo to the rescue with some good advice and chicken soup for their sick and cranky friend. In no time, Pee-wee's back to his old self again to join in the Playhouse fun."], [1783534477, 1783535862, "Pee-wee's Playhouse", "Why Wasn't I Invited?", "S2 E5", "Nothing bugs Pee-wee's flowers more than having a caterpillar in their flower box until Magic Screen shows how a caterpillar can turn itself into a beautiful butterfly. The caterpillar's not the only uninvited creature around when Cowntess has a birthday party and invites practically \"all\" of Puppetland except Pee-wee! Is she mad at him or just being moody?"], [1783535862, 1783537156, "The Goldbergs (2013)", "I Rode a Hoverboard", "S2 E8", "When Adam sustains a severe compound fracture, he lies in school about having ridden a hoverboard, just like Back to the Future II. However, the lie threatens his friendship with Emmy Mirsky. Meanwhile, when the Goldberg family is enamored with a new restaurant, China Garden, Beverly fears that her family does not appreciate her cooking. This leads to a war between her and restaurant employee Mrs."], [1783537156, 1783538452, "The Goldbergs (2013)", "The Most Handsome Boy on the Planet", "S2 E9", "Barry is excited when a modelling representative approaches him, but Erica thinks it's a scam."], [1783538452, 1783539839, "The Wonder Years", "Math Class", "S3 E2", "Kevin has trouble in math class when he comes up against a teacher who Kevin thinks is completely unreasonable."], [1783539839, 1783541205, "The Wonder Years", "Wayne on Wheels", "S3 E3", "Kevin wants to get to the mall to see a girl he can't stop thinking about, but the only way he can is by begging his brother to drive."], [1783541205, 1783542571, "Jem and the Holograms", "The Bands Break Up", "S3 E5", "Upset with the way their bands treat them, Kimber and Stormer quit and join forces. They are extremely popular and try to release an album, but they soon realize Eric Raymond is using them to get back his half of Starlight Music."], [1783542571, 1783543937, "Jem and the Holograms", "The Fan", "S3 E6", "Jem is kidnapped by a rich fan with help of The Misfits and taken to a copy of Starlight Mansion with actors playing her friends in an attempt to find out her real identity."], [1783543937, 1783545276, "Teenage Mutant Ninja Turtles", "Enter: The Rat King", "S3 E9", "Thompson assigns April to research the growing rat infestation. She is pursued by an army of rats and escapes on a passing city bus."], [1783545276, 1783546614, "Teenage Mutant Ninja Turtles", "Turtles at the Earth's Core", "S3 E10", "After witnessing a living dinosaur wander in the city and disappear abruptly, the Turtles follow its tracks into a large hole, where they discover a shocking revelation: A land frozen in a stage where dinosaurs roam the land."], [1783546614, 1783548003, "Pee-wee's Playhouse", "Tons of Fun", "S2 E6", "Today, Pee-wee gives everybody \"That Certain Feeling\" by lip-synching to one of his old records. Later, while Pee-wee is out with the Playhouse Gang, Cowboy Curtis comes over and sings to the flowers, and Miss Yvonne does a wild clog dance. Tensions mount when the gang ends up with two \"cool\" ice cream desserts, and they have to choose which to eat. Of course, they could just eat them both!"], [1783548003, 1783549392, "Pee-wee's Playhouse", "School", "S2 E7", "Learning is \"easy\" when your teacher makes it fun. No one can make it more fun than Pee-wee, especially when he turns the Playhouse into a schoolhouse! The Playhouse Gang are his students, Magic Screen is his blackboard, and Globey is, well, his globe. Pee-wee makes history exciting when he teaches about Christopher Columbus and the Declaration of Independence. Sit back, laugh, and learn!"], [1783549392, 1783550689, "The Goldbergs (2013)", "DannyDonnieJoeJonJordan", "S2 E10", "Beverly is ordered to clean out the garage by Murray, who wants everything gone except for one trunk that he allows her to keep. Meanwhile, Adam and Barry discover Erica's old collection of New Kids on the Block memorabilia."], [1783550689, 1783551978, "The Goldbergs (2013)", "The Darryl Dawkins Dance", "S2 E11", "As the Sadie Hawkins dance approaches, Erica asks Beverly to help her find Barry a date to keep him away from Lainey. But Beverly comes up with a girl that shocks everyone. Meanwhile, Adam gets into a fight with his best friend...Pops."], [1783551978, 1783553343, "The Wonder Years", "Mom Wars", "S3 E4", "Kevin thinks his mother is being over-protective when she tries to stop him from playing tackle football after school."], [1783553343, 1783554732, "The Wonder Years", "On the Spot", "S3 E5", "Kevin joins the school play just to get out of Gym class, while Winnie and Paul seem to take it very seriously. Winnie has problems with her performance, and Kevin unexpectedly helps her during the show."], [1783554732, 1783556097, "Jem and the Holograms", "Fathers' Day", "S3 E7", "It's Fathers' Day! Kimber has a bad time, trying to remembering her late father, but learns to cope after having a talk with Pizzazz's father as he has his own problems with his daughter. Also, The Holograms and Misfits visit Clash and Video's hometown for a Father's day banquet."], [1783556097, 1783557462, "Jem and the Holograms", "Treasure Hunt", "S3 E8", "The Starlight Girls compete with Misfits-in-Training in a treasure hunt for literacy. In the end, they learn that knowledge is the greatest prize of all."], [1783557462, 1783558801, "Teenage Mutant Ninja Turtles", "April Fool", "S3 E11", "Emperor Aleister of Malicuria comes to New York City, bringing along a shard of Lydium 90 to the USA."], [1783558801, 1783560141, "Teenage Mutant Ninja Turtles", "Attack of the Big MACC", "S3 E12", "A robot warrior, known as the Mobile Armored Computerized Combatant (M.A.C.C.), arrives from 400 years in the future in 20th-Century New York. He befriends the Turtles, but Shredder and Krang are looking to bring him to their side, at any means necessary."], [1783560141, 1783561530, "Pee-wee's Playhouse", "Spring", "S2 E8", "As the Spring season comes to \"begin,\" Pee-wee plants a seed, and it grows quickly (courtesy of Clockey). Also, the King of Cartoons presents his wife, \"The Queen of Cartoons,\" and his son, \"The Prince of Cartoons.\" Also, when Pee-wee doesn't make the baseball team, Ricardo shows him that there are other sports he can try."], [1783561530, 1783562918, "Pee-wee's Playhouse", "Playhouse In Outer Space", "S2 E9", "Aaaaugh! The secret word is \"zyzzybalubah,\" and that can only mean one thing! The entire Playhouse, including Reba, is sucked into space, transported to a strange planet, and taken over by an odd, lonely alien! Yvona, an alien from the planet, is trying to escape the unfriendly Zyzzybalubah, but Pee-wee teaches him how to be polite and make friends. Reba teaches Pee-wee how to whistle, and she sin"], [1783562918, 1783564210, "The Goldbergs (2013)", "Cowboy Country", "S2 E12", "Beverly can't accept Adam has deep feelings for Dana. Murray watches football with Lainey's dad."], [1783564210, 1783565506, "The Goldbergs (2013)", "Van People", "S2 E13", "When Murray takes Erica's car privileges away, Erica and Barry retaliate by buying their own shabby used black van. Meanwhile, Adam gets voted in the yearbook as \"nicest guy,\" which results in a suspension when he objects."], [1783565506, 1783566898, "The Wonder Years", "Odd Man Out", "S3 E6", "When Kevin and Paul get on each other's nerves, they try to become best friends with two other boys."], [1783566898, 1783568293, "The Wonder Years", "The Family Car", "S3 E7", "When the Arnold family car breaks down and Jack can't fix it, Kevin hopes his father will buy something more fancy."], [1783568293, 1783569467, "Jem and the Holograms", "Aztec Enchantment", "S3 E9", "The Misfits join up with Clash, who was just given a video camera by her father, and hit Mexico to ruin Jem and the Holograms' new music video directed by Video at the ruins of an ancient Aztec temple. Also the Holograms befriend a poor young boy who wants to go to the United States."], [1783569467, 1783570833, "Jem and the Holograms", "Music Is Magic", "S3 E10", "Jem & the Holograms are set to appear on a Music & Magic TV Special. However, matters are made worse when they discover that their rivals The Misfits are also guests on the show but the real trouble starts when they all keep disappearing one by one but who's behind it?"], [1783570833, 1783572164, "Teenage Mutant Ninja Turtles", "The Turtle Terminator", "S3 E37", "Irma is kidnapped by Bebop and Rocksteady and is replaced by a robot that looks just like her that is programmed to eliminate the turtles."], [1783572164, 1783573492, "Teenage Mutant Ninja Turtles", "The Great Boldini", "S3 E38", "The Turtles must clear their names when they are believed to be jewel thieves who stole a priceless emerald during a magic act run by a wizard named Boldini."], [1783573492, 1783574881, "Pee-wee's Playhouse", "Pajama Party", "S2 E10", "Guess who's having a pajama-party sleepover? That's right, it's Pee-wee along with his co-hostess, \"the most beautiful woman in Puppetland,\" Miss Yvonne! Jambi's got a head for pajama fashion when he gives Cowboy Curtis a Wild-West pair of P.J.s! Wacky Roger, the Monster, keeps an eye on things as Pee-wee decides that, since he loves his fruit salad so much, he's going to marry it! \"Watch\" for the"], [1783574881, 1783576270, "Pee-wee's Playhouse", "Episode 11", "S2 E11", "I Heart 80s"], [1783576270, 1783577569, "The Goldbergs (2013)", "Barry Goldberg's Day Off", "S2 E14", "Barry pretends to be sick so he can have an epic day off -- but things don't go as planned. Pops and Adam try to help salvage Barry's day."], [1783577569, 1783578866, "The Goldbergs (2013)", "Happy Mom, Happy Life", "S2 E15", "Dana and Adam are given a doll to parent for a school project, but end up in jeopardy of failing because of Beverly's \"grand-smothering.\" Meanwhile, Erica tries to get back at Barry for monopolizing her best friend's time by joining the JTP, however her plan doesn't go as expected."], [1783578866, 1783580243, "The Wonder Years", "The Pimple", "S3 E8", "Just when the Pruitts and their daughter Gina are coming to visit, Kevin gets a giant pimple. With only a few days until the Pruitts arrive, Kevin resorts to all kinds of methods to get rid of the unsightly blemish."], [1783580243, 1783581638, "The Wonder Years", "Math Class Squared", "S3 E9", "Kevin decides cheating is the only way to get ahead in math class."], [1783581638, 1783583004, "Jem and the Holograms", "The Jazz Player", "S3 E11", "Jem tries to reunite the Tapps Tucket Quartet, an old jazz group. Meanwhile, Eric Raymond is trying to put out a compilation album of jazz songs. Eric and the Misfits do everything in their power to stop the Tapps Tucket Quartet from getting back together so Eric's jazz album can be released."], [1783583004, 1783584369, "Jem and the Holograms", "Danse Time", "S3 E12", "The Holograms want to submit a video with the theme of friendship for a competition. But in the process, Danse is injured. Will she heal in time for them to make the perfect video?"], [1783584369, 1783585699, "Teenage Mutant Ninja Turtles", "The Missing Map", "S3 E39", "Zach and his brother Walt visit the Turtles. As they leave, Walt takes a map that could guide Shredder to the lair if it happens to fall into the wrong hands."], [1783585699, 1783587028, "Teenage Mutant Ninja Turtles", "The Gang's All Here", "S3 E40", "Shredder tries to trick the Turtles into eating cookies made with anti-mutagen. Michaelangelo, wanting to be a human, tries one of the cookies and it mutates him into a teenager."], [1783587028, 1783588412, "Pee-wee's Playhouse", "Episode 12", "S2 E12", "I Heart 80s"], [1783588412, 1783589803, "Pee-wee's Playhouse", "Episode 13", "S2 E13", "I Heart 80s"], [1783589803, 1783591098, "The Goldbergs (2013)", "The Lost Boy", "S2 E16", "Adam attends a Phillies game with his dad and ends up lost in the stadium after Murray allows him to leave his seat on his own. Elsewhere, Beverly's guilt trip backfires when Erica and Barry drive off without her during an argument on their way home from the mall."], [1783591098, 1783592389, "The Goldbergs (2013)", "The Adam Bomb", "S2 E17", "Adam and Barry get in a prank war, while Erica tries to become a pop star."], [1783592389, 1783593749, "The Wonder Years", "Rock 'n Roll", "S3 E10", "When Kevin watches The Beatles on TV he notices a new kid at his school named Larry. Larry asks Kevin does he want to join his band. After turning him down Larry asks again but Kevin's dad tells him \"No.\" So he buys his own guitar. While in the band Larry tells Kevin and the other band members that he got them a gig which Kevin feels they are not ready for."], [1783593749, 1783595120, "The Wonder Years", "Don't You Know Anything About Women?", "S3 E11", "Kevin wants to take Susan Fisher to the dance, but she has a boyfriend, Donald Wallach. However, he hears rumors that they have broken up, so he's about to ask her until Donald interferes. Linda Sloan, his lab partner, suggests that they go as friends so they do.\n\nThey have a good time in the beginning, but it turns sour when while Linda is dancing with Steve Padway, Kevin dances with Susan and th"]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v2.png", "progs": [[1783500470, 1783503196, "Beverly Hills, 90210", "Destiny Rides Again", "S3 E12", "Brenda runs into Rick at a video store, as he has transferred to UCLA. She goes out with him and continues to pretend that she is French. He is understanding when she finally reveals the truth. The SAT review board accuses Dylan of paying someone to take his test. He annoys Brenda by refusing to re-take the test. After Dylan confesses that he had a summer fling, Brenda suggests that they take a br"], [1783503196, 1783505934, "Beverly Hills, 90210", "Rebel With a Cause", "S3 E13", "Kelly and Dylan go on a date, as Brenda insists that Dylan is free to see whomever he wishes. Brenda explodes when she and Rick run into Kelly and Dylan at a restaurant. Kelly denies that she is a bimbo and Brenda responds, \"I was always told that if it looks like a duck and walks like a duck...\" Kelly believes that Dylan is on the rebound, so she pushes him away. Brenda breaks up with Rick becaus"], [1783505934, 1783508642, "Beverly Hills, 90210", "Wild Horses", "S3 E14", "Dylan's Porsche breaks down near a secluded ranch. The wealthy owner takes him in and wants him to stay permanently (as her boy toy). Dylan is disappointed when she sells her favorite horse, and decides not to live in an environment where everything is for sale. Brenda and Kelly make up. David fires Steve as manager after he is humiliated at a showcase because he had to go on without a sound check"], [1783508642, 1783511408, "Beverly Hills, 90210", "The Kindness of Strangers", "S3 E15", "Brandon finds Jack Canner (the homeless vet he met at the beach club) rummaging through the dumpster behind the Peach Pit. He takes him home for Thanksgiving dinner, but Canner runs afoul of Jim, who accuses him of shirking his family responsibilities and hiding behind the flag. Brandon explains to Canner that Jim's father was a Marine; the two never spoke again after Jim refused to go to Vietnam."], [1783511408, 1783514145, "Beverly Hills, 90210", "It's a Totally Happening Life", "S3 E16", "Two talking stars narrate an account of the gang's events during the week before Christmas. Brenda, Kelly and Dylan decide to be friends, but the arrangement falls apart after both girls make out with Dylan. Andrea is accepted to Yale, but gets dumped by her boyfriend. Nikki tells Brandon that she is moving back to San Francisco. Brandon and Andrea share a kiss while watching \"\"It's a Wonderful Li"], [1783514145, 1783516913, "Beverly Hills, 90210", "The Game Is Chicken", "S3 E17", "Steve becomes friends with a guy in detention through their interest in cars. Steve and Brandon win a lot of money betting on Joe in a car race, but Dylan warns that the whole thing may be a scam. Steve and Brandon agree to bankroll Joe in a high-stakes race against drug dealer Frank Padilla. Brandon realizes that their opponent may be the guy who ran over Andrea. While Brandon contacts the police"], [1783516913, 1783519677, "Beverly Hills, 90210", "Midlife...Now What?", "S3 E18", "Cindy, Jackie and the girls spend the weekend at a health spa. Kelly is wary because Babette, a friend of Jackie's from her drug-using days, works at the facility. Brenda overhears a gossipy masseuse discussing a friend's affair with Mel. Kelly calls home and learns from David that Mel has been gone for several days. Babette tries to comfort Jackie by offering her drugs, but she resists temptation"], [1783519677, 1783522368, "Beverly Hills, 90210", "Back in the High Life Again", "S3 E19", "Jack is released from prison. He encourages Dylan to invite all his friends to a party, but only Kelly shows up. Dylan tells Kelly that he has chosen her over Brenda, and they kiss in the hotel pool. Dylan and Kelly take Brenda for a walk to inform her of Dylan's decision, and reveal their summer fling. She screams that she will never speak to them again. The financially destitute Jack wants to di"], [1783522368, 1783525077, "Beverly Hills, 90210", "Parental Guidance Recommended", "S3 E20", "Iris flies in from Hawaii, and Dylan and Jack try to soften her up to convince her to approve the dissolution of the trust. She is leery of Jack's motives, but elects not to stand in their way. Jack makes a clandestine phone call and promises someone that he will get the money. Brenda mopes around in her room and discards all mementos of Dylan. A visit from Iris convinces her to get past her pain,"], [1783525077, 1783527829, "Beverly Hills, 90210", "Dead End", "S3 E21", "Jack and Dylan begin living on a yacht, where they are constantly kept under surveillance. Jim does not want to dissolve the trust, but finally gives his approval so that Dylan can have a new life with his father. Christine accepts Jack's marriage proposal. Dylan and Kelly sleep together. Jack tries to confess something to Dylan, but a man interrupts them and warns Jack that he is breaking their d"], [1783527829, 1783530532, "Beverly Hills, 90210", "The Child Is Father to the Man", "S3 E22", "In the wake of his father's death, Dylan grapples with his personal demons while trying to elude the reporters camping out on his lawn. The media speculates that Jack was killed because of his mob ties--and that Dylan is the next target. Kelly feels uncomfortable when Brenda invites Dylan to stay with the Walshes. David has to miss the post-funeral reception because of a recording session. He post"], [1783530532, 1783533284, "Beverly Hills, 90210", "Duke's Bad Boy", "S3 E23", "Duke warns Brandon that he must pay off a $1500 debt by the end of the week. Brandon places a bet with a high school bookie and wins, but the guy cannot cover his bet. A desperate Brandon tries to rough him up. Nat realizes that Brandon is in trouble and pays Duke, but forces Brandon to promise that he will never place another bet. Kelly fears that she is losing her connection with Dylan. She beco"], [1783533284, 1783536050, "Beverly Hills, 90210", "Perfectly Perfect", "S3 E24", "Kelly continues to starve herself and abuse diet pills, and becomes extremely irritable. She freaks out and screams at a potential buyer for the house. Kelly believes that her friends are talking behind her back, until Steve explains that they are planning a surprise party for her eighteenth birthday. Brenda finds Kelly passed out in the Peach Pit's bathroom during the party. Kelly ignores the doc"], [1783536050, 1783538802, "Beverly Hills, 90210", "Senior Poll", "S3 E25", "Kelly stops attending her eating disorder group because the girls with more severe cases unnerve her. Kelly wins \"Most Beautiful\" in the senior poll, while Dylan is \"Most Handsome.\" Kelly suspects that everyone judges her entirely on her looks, and blows up at Dylan and Jackie. Dylan lets her read a section from his manuscript in which he describes his feelings for her. Brenda feels isolated from "], [1783538802, 1783541542, "Beverly Hills, 90210", "She Came in Through the Bathroom Window", "S3 E26", "The Gang plans to go to Magic Mountain for Senior Ditch Day but plans change for Brandon, Dylan, and Steve when a Burt Reynolds fan club eats at The Peach Pit when Nat is sick. Everyone else heads to Magic Mountain."], [1783541542, 1783544130, "Beverly Hills, 90210", "A Night to Remember", "S3 E27", "Brandon and Andrea discover that the school board has quietly passed a measure in which any senior found drunk at the prom will be barred from graduation. Jackie tells David and Kelly that she has sold the house. Brandon and Brenda do not plan to attend the prom. Brenda accepts an invitation from football star Tony Miller, and Andrea calls Brandon at the last minute after Jordan gets the flu. Donn"], [1783544130, 1783546759, "Beverly Hills, 90210", "Something in the Air", "S3 E28", "Following a little advice from Gil Meyers, Brandon and the rest of Donna's friends join forces to help her in a major school protest when she is suspended from school and is threatened with not graduating for getting drunk on Senior Prom night."], [1783546759, 1783549520, "Beverly Hills, 90210", "Commencement", "S3 E29", "At graduation, the friends reminisce about their high-school days and look ahead to college."], [1783549520, 1783552238, "Beverly Hills, 90210", "Episode 30", "S3 E30", "The Peach Pit"], [1783552238, 1783554951, "Beverly Hills, 90210", "Episode 31", "S3 E31", "The Peach Pit"], [1783554951, 1783557695, "Beverly Hills, 90210", "So Long, Farewell, Auf Wiedersehen, Goodbye", "S4 E1", "Steve is taken off the waiting list and accepted to California University. A producer hoping to entice Samantha to star in a sitcom allows Steve, Brandon and Celeste use of his beach house for a few weeks. The gang throws a blow-out bash the night before Brenda is to leave for Minnesota. Kelly comes home early from Europe--without Dylan. She claims that all is well, but later confesses to Donna th"], [1783557695, 1783560438, "Beverly Hills, 90210", "The Girl From New York City", "S4 E2", "Brandon and Steve become very competitive over a tennis match, and nearly come to blows when Steve purposely hits Jill with the ball. Jill pushes Brandon away. She confesses that she was recently raped. Brandon agrees to sleep beside her because she is not ready for sex, but cannot talk her out of returning to New York. Dylan returns to the U.S., and Kelly avoids him. She explains to Donna that Dy"], [1783560438, 1783563177, "Beverly Hills, 90210", "The Little Fish", "S4 E3", "Jim and Cindy are shocked when Brenda returns from Minnesota. Brandon considers moving out because he can no longer use Brenda's bedroom as a rec room. Brenda announces that she is not interested in returning to college. Dylan grows tired of waiting to register and also chooses to forego college, much to Kelly's chagrin. Brenda and Dylan spend a relaxing day fishing, and elect to enroll in Califor"], [1783563177, 1783565714, "Beverly Hills, 90210", "Greek to Me", "S4 E4", "Steve badgers Brandon into pledging the Kappa Epsilon Gamma fraternity. The frat brothers disapprove of Brandon's involvement with Josh and the Progressives. Brandon disassociates himself from the party when it proposes the elimination of all fraternities and sororities. He disappoints Steve by not joining the KEG house, but is made an honorary member. Kelly, Donna, Brenda and Andrea pledge the Al"], [1783565714, 1783568457, "Beverly Hills, 90210", "Radio Daze", "S4 E5", "Donna quits the radio show because she can no longer take the demanding schedule. When she goes to tell Howard, he asks her to fill in for a missing DJ. He offers her the afternoon show, which angers David, but recants after reconciling with his girlfriend (the previous afternoon DJ). John continues to pursue Kelly. Dylan and Kelly argue because he does not wish to attend the freshman pool party. "], [1783568457, 1783571198, "Beverly Hills, 90210", "Strangers in the Night", "S4 E6", "Dylan's Porsche is experiencing severe wear and tear, so he must buy a new car. He plans to just get a working vehicle, but instead splurges on a new Porsche. Kelly realizes that she and Dylan have vastly different interests, and recommends that they see other people. As Dylan drives home after the break-up, he is carjacked. Andrea loses her virginity to Dan. She feels uncomfortable in English cla"], [1783571198, 1783573940, "Beverly Hills, 90210", "Moving Targets", "S4 E7", "Dylan considers buying a gun after his new car is stolen from him at gunpoint. Meanwhile, Brandon's sociology professor Corey Randall asks him to tutor the university's basketball star, D'Shawn Hardell; Andrea and Dan mull over going public with their affair; Brenda and her parents are invited to lunch at Stuart's parents' house in Bel Air as Brenda and Stuart's romance really takes off."], [1783573940, 1783576685, "Beverly Hills, 90210", "Twenty Years Ago Today", "S4 E8", "The Walshes host a party to celebrate their twentieth anniversary. An unstable Dylan buys a gun from a private dealer and waves it around like a toy. Brandon breaks into Dylan's house to retrieve his parents' anniversary gift, and Dylan nearly shoots him. He promises to dispose of the weapon. Dylan warns Brandon that Stuart has an unsavory past. Stuart proposes to Brenda during the party. Everyone"], [1783576685, 1783579341, "Beverly Hills, 90210", "Otherwise Engaged", "S4 E9", "Stuart rents a luxurious hotel room for Brenda and himself as a getaway. Brenda is furious to discover a prenuptial agreement in his briefcase. Dylan makes a play for Brenda in the hopes of persuading her to break the engagement. Brenda learns that her father encouraged Dylan, and storms out in a huff. She seeks refuge at the hotel, and decides to sign the prenup because she doesn't want Stuart's "], [1783579341, 1783582082, "Beverly Hills, 90210", "And Did It...My Way", "S4 E10", "Professor Randall and Lucinda invite Brandon and D'Shawn over for dinner. Steve tries to avoid the smitten Laura. Mr. and Mrs. Carson plan to turn Brenda and Stuart's wedding into a major social event. The couple decides to sneak off to Las Vegas and elope. Brandon and the gang follow them in the hopes of changing their minds. They pretend to be supportive, but play on the couple's insecurities by"], [1783582082, 1783584823, "Beverly Hills, 90210", "Take Back the Night", "S4 E11", "Steve tells Laura that he cannot see her again because he has a girlfriend. During the activities for Take Back the Night Week, she concludes that she was a victim of date rape and plans to identify Steve at a campus rally. Kelly warns Steve, who adamantly proclaims his innocence. Steve confesses his indiscretion to Celeste, who breaks up with him. Before Laura can speak at the rally, Kelly steps "], [1783584823, 1783587563, "Beverly Hills, 90210", "Radar Love", "S4 E12", "After mistaking a woman at a gas station for Emily, Brandon decides to visit Emily's home in Marin County. He learns that the family has moved to Greece, but runs into Emily by chance on a cable car in San Francisco. They rekindle their romance and decide to spend Thanksgiving together. Emily does not reveal that she must move away in a week. The KEG house and Alpha sorority serve Thanksgiving din"], [1783587563, 1783590304, "Beverly Hills, 90210", "Emily (a.k.a. The Pink Pearl)", "S4 E13", "Emily has been accepted to the prestigious Cousteau Institute in France, but does not want to attend because she and Brandon are in love. Brandon observes her passion for marine biology and encourages her to pursue her dream. Brenda balks when she is asked to appear nude in an experimental campus play. The frat and sorority pledges must endure a series of humiliating experiences during \"\"Hell Week"], [1783590304, 1783593037, "Beverly Hills, 90210", "Windstruck", "S4 E14", "Donna and David celebrate their second anniversary as a couple. She finally agrees to sleep with him, but their romantic evening is interrupted by a surprise visit from her parents. Donna dodges suspicion by admitting that David lives in the apartment. Felice is angry at the deception, but Dr. Martin encourages her to let Donna live her own life. Donna puts David on hold because she does not want "], [1783593037, 1783595631, "Beverly Hills, 90210", "Somewhere in the World It's Christmas", "S4 E15", "The Walshes plan to spend the holidays in Hawaii, but their plane experiences mechanical problems. They are forced to fly back to Los Angeles and make an emergency landing. Dylan receives a surprise visit from Suzanne Steele, his father's former lover, and her 12-year-old daughter. The duo recently lost its home in Iowa to a flood, and decided to take a road trip as a distraction. Suzanne reveals "]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783500747, 1783503531, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783503531, 1783506316, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783506316, 1783507752, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783507752, 1783509191, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783509191, 1783510594, "Saved by the Bell", "The Prom", "S2 E1", "Zack asks Kelly to be his date for the prom and she agrees, but when her father loses his job, she decides family is more important and gives up her chance to go, but cannot bring herself to tell Zack."], [1783510594, 1783511997, "Saved by the Bell", "Zack's War", "S2 E2", "Mr. Belding tries to reform Zack by making him join the Army Cadet Corps. Zack gets the whole gang to join him, and they end up competing with each other in an obstacle course. Meanwhile, Lisa is swayed by the Cadet Corps drill instructor, Chet Adams."], [1783511997, 1783513390, "In Living Color", "Laquita Meets Billy Dee", "S2 E8", "Sketches include:\n\n\"\"Magenta's Acting School\"\"   \"\"Foundation for Golf Heritage\"\"   \"\"Evelyn Smith\"\"   \"\"Laquita Sings the Blues\"\""], [1783513390, 1783514556, "In Living Color", "Men on Vacation", "S2 E9", "Sketches include:\n\nA Lassie '90 Sequel / Amazing Grace - Rocky VI / Cousin Milly / PMS Defense System / Men on Vacation / 3rd Bass perform \"Product of the Environment\""], [1783514556, 1783516174, "Sex and the City", "Old Dogs, New Dicks", "S2 E9", "Carrie tries to get Big to stop checking out other women when they're together. Miranda and Steve's opposite schedules become a problem. Samantha runs into an old hockey-player boyfriend who is now a blonde drag queen named Samantha. Charlotte is turned-off when she dates a man who has not been circumcised; Carrie points out to Charlotte that 85% of men are not circumcised while Samantha claims to"], [1783516174, 1783517837, "Sex and the City", "The Caste System", "S2 E10", "Carrie gets fed up with high society while at an Upper East Side party with Big. Miranda and Steve have an argument over money and social status. Charlotte meets Wiley Ford, the movie star and joins his entourage. Samantha dates a wealthy real-estate developer with a Southeast Asian live-in servant who has her master wrapped around her little finger."], [1783517837, 1783520579, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783520579, 1783523362, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."], [1783523362, 1783524756, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783524756, 1783526162, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783526162, 1783527565, "Saved by the Bell", "Save the Max", "S2 E3", "The gang unearths Bayside's old school radio station and begins broadcasting again, before learning that The Max is to be closed if Max does not manage to pay $10,000 in back rent."], [1783527565, 1783528968, "Saved by the Bell", "Driver's Education", "S2 E4", "In order to get their driver's licenses, the gang go through a driver's education course. Zack and Kelly advance in their relationship, with Zack buying Kelly a ring. Slater buys a car, and is at the head of the driver's ed class. When Zack becomes jealous of Kelly's attention toward Slater over the driving issue, he tries to set Slater up to fail, but gets the boot himself instead."], [1783528968, 1783530359, "In Living Color", "Anton's Thanksgiving", "S2 E10", "Sketches include:\n\nThe Brothers Brothers: Two Sisters for Two Brothers / Barbara Bush Visits the Illiterates / Dickie Peterson: Cherub of Justice / Anton's Thanksgiving / D-Nice performs"], [1783530359, 1783531748, "In Living Color", "Justice Legions of America", "S2 E11", "Sketches include:\n\n\"\"Three Champs and a Little Lady\"\"   \"\"The Newlywed Game\"\"   \"\"The Good Behavior Variety Hour Show\"\"   \"\"Handi Man: The Justice Legion of America\"\"  Nikki D perorms"], [1783531748, 1783533370, "Sex and the City", "Evolution", "S2 E11", "Carrie tries to leave her mark at Big's place by leaving some personal items behind. Miranda finds out that one of her ovaries has stopped producing eggs. Charlotte dates Stefan, a pastry chef who she mistakenly thought was gay but is, in his own words, a \"gay straight man\". Samantha tries to get revenge on Dominic, her ex who broke her heart."], [1783533370, 1783535118, "Sex and the City", "La Douleur Exquise!", "S2 E12", "Carrie is horrified when Big casually tells her he's moving to Paris for seven months. Miranda dates a man who only wants to have sex in places where they might get caught. Charlotte meets Buster, a high-end shoe salesman with a serious foot fetish. Samantha introduces the girls to a hot new S&M restaurant."], [1783535118, 1783537905, "Beverly Hills, 90210", "Summer Storm", "S2 E3", "Cindy's mothering instincts upset both Jim and Brenda after she brings an injured Dylan to recuperate at their house after he has a accident while surfing in dangerous conditions, while Dylan's father is arrested for income tax evasion. Kelly gets involved with a shy volleyball player named Kyle who is reluctant to make a move on her. Meanwhile, David and Donna are reluctantly paired for a Romeo a"], [1783537905, 1783540661, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783540661, 1783542056, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783542056, 1783543383, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783543383, 1783544720, "Saved by the Bell", "House Party", "S2 E5", "Zack stays over at Screech's place for the weekend where the two of them along with Slater throw a party which is interrupted by the girls before breaking off a valuable item from Mrs. Powers."], [1783544720, 1783546125, "Saved by the Bell", "Blind Dates", "S2 E6", "Mr. Belding blackmails Zack with suspension if he won't take his bratty niece, Penny, out on a date. So, Zack asks Screech to impersonate him while he takes out Kelly for her birthday party at the Max. But Slater overhears this and decides to break up Zack's plans to he can have another chance with Kelly. Meanwhile, Lisa sets Jessie up on a blind date, but there's a problem: the guy is much shorte"], [1783546125, 1783547515, "In Living Color", "Veracosa", "S2 E12", "Sketches include:\n\n\"\"Vera DeMilo: Veracosa, Mistress of Destruction\"\"   \"\"Cephus & Reesie: Christmas Album\" ea, who soon develops her own interest in him. The girls take Chris on a tour of the city, and Brenda is devastated when he seems more impressed with Andrea. Chris and Andrea share a good-night kiss. A jealous Brenda slaps Andrea hard during their scene. She "], [1783557529, 1783558918, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783558918, 1783560312, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783560312, 1783561714, "Saved by the Bell", "Rent-a-Pop", "S2 E7", "Zack hires an actor named James, who works as a waiter at the Max, to impersonate his father, Derek, to Mr. Belding, and later, asks James to impersonate Mr. Belding to his real father to avoid the consequences of some bad grades. Meanwhile, the rest of the gang plans a carnival to raise money for a new school field trip."], [1783561714, 1783563122, "Saved by the Bell", "Miss Bayside", "S2 E8", "Bayside's winner of the Miss Bayside beauty pageant will go on to compete in the state-wide pageant of Miss High School California. The pageant stirs up controversy about sexism, in which both A.C. Slater and Screech enter as contestants to win a bet over who could win. Who will be the next Miss Bayside?"], [1783563122, 1783564513, "In Living Color", "Introducing...Fire Marshal Bill", "S2 E14", "Sketches include:\n\n\"\"Mr. Squeegee\"\"   \"\"B.S. Brothers: Big Break\"\"   \"\"Fashion Tampons\"\"   \"\"Fire Marshal Bill\"\"   \"\"Homey the Clown: Home E. Cheese\"\""], [1783564513, 1783565817, "In Living Color", "My Dark Conscience", "S2 E15", "Sketches include:\n\n\"\"Vanilla Ice: White, White Baby\"\"   \"\"Benita Butrell: Block Captain\"\"   \"\"Al MacAfee: Prom Chaperone\"\"   \"\"Oswald Meets the Parole Board\"\"   \"\"My Dark Conscience\"\"   \"\"Fruit of the Loom Boxers\"\""], [1783565817, 1783567463, "Sex and the City", "Shortcomings", "S2 E15", "Carrie dates an author who has a premature ejaculation problem and finds that she regrets having to break-up... with his perfect family. Child-phobic Miranda dates a divorced father who has a son. Charlotte's brother Wesley stays with her after his wife leaves him. Samantha gives Charlotte's brother what he really needs: sex."], [1783567463, 1783568999, "Sex and the City", "Was It Good for You?", "S2 E16", "Carrie dates a recovering alcoholic who becomes obsessed with her. Charlotte is determined to learn how to have good sex after her latest partner falls asleep on her, and drags the girls to a Tantric sex class. Samantha gets an offer to have a threesome with two curious gay friends."], [1783568999, 1783571753, "Beverly Hills, 90210", "Camping Trip", "S2 E7", "The gang takes off with plans to spend the weekend camping at Yosemite Park. A sudden monsoon forces the teens to seek refuge in a cramped one-bedroom cabin. Everyone quickly begins to get on each other's nerves. Steve and David go out for beer, but an elderly couple takes Steve's money and splits without buying him anything. The honeymooning couple in the next cabin supplies the kids with food an"], [1783571753, 1783574436, "Beverly Hills, 90210", "Wildfire", "S2 E8", "At the opening day of the new school year, Brenda becomes peeved when Dylan starts spending time with the new transfer student Emily Valentine, while she and Brandon also have eyes for each other. Meanwhile, David is reunited with Scott after he returns from his summer vacation in Oklahoma and finds that his friendship with David isn't as close as it used to be."], [1783574436, 1783575830, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't
